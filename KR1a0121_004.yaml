body:
  text: 易酌卷四祁州刁包撰周易上經坤下震上豫利建侯行師上動而下順外動而内順非和樂不至此故為豫孟子云底豫又云一遊一豫皆此豫也傳曰豫者安和悅樂之義建侯樹屏所以共安天下諸侯和順則萬民恱服兵師之興衆心和悅則願從而有功故豫恱之道利于建侯行師也張中溪曰坤下震上為豫地以靜鎮建侯也然謙有坤无震不言行師乎雷以威動行師也然屯有震无坤不言建侯乎先儒推廣豫字之義曰逸豫曰僃豫曰飾豫各有取爾也彖曰豫剛應而志行順以動豫九四一剛五隂同應故曰剛應剛有應則上進之志行矣坤順也震動也坤遇震順以動也順以動則樂所謂豫也豫順以動故天地如之而况建侯行師乎豫順以動天地之道不過如此而况建侯行師豈能有外焉者乎傳曰天地之道萬物之理唯至順而已大人所以先天後天而不違者亦順乎理而已天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉由順動之道而極推之天地以順動而日月代明焉雖隂陽有薄蝕之患而分抄莫之或爽也而四時錯行焉雖隂陽有愆伏之災而寒暑莫之或易也此天地之豫也聖人法天地而立道則徳化翔洽刑罰清簡有以省為清者天下无寃民也有以措為清者天下无犯令也聖人順天地萬民順聖人中心悅而誠服也此聖人之豫也豫之時義可以範圍天地聖人而天地聖人不能盡豫之時義大矣哉傳曰既言豫順之道矣然其㫖味淵永言盡而意有餘也故復賛之云豫之時義大矣哉欲人研味其理優柔涵泳而識之也學易者不能優柔涵泳則无以識其理矣又曰豫以下十一卦豫遯姤旅言時義坎睽蹇言時用頤大過解革言時各以其大者也諸儒言十二卦者以隨言義亦以其類也訂詁云易有時有用有義時其所遭也用其所致也義其所寓也六十四卦時而已矣事若淺而有深意故曰時義大矣哉欲人思之也非美事而有時或用之故曰時用大矣哉欲人别之也大事大變則曰時大矣哉欲人謹之也孔仲達云此嘆卦也凡言不盡意者不可煩文具說且嘆之以示情使後世思其餘藴得意而忘言也吳幼清云耑言時者重在時字時義重在義字時用重在用字乃或以時義為時與義時用為時與用失之矣合說其義始盡象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考傳曰雷者陽氣奮發隂陽相薄而成聲也即正蒙所謂陽在内者不得出則奮激而為雷霆也又曰坤順震發和順積中而發于聲樂之象也與夲義所謂先王作樂既象其聲又取其義者俱精甚取義即取至和之義也余意雷行天者也而曰出地反其所自始也樂反其所自始故君子觀于雷出地奮之象而作樂薦上帝以配祖考正反始之象也奮者振動迅厲而後能開通和暢故為豫樂記曰奮至徳之光動四氣之和樂正豫象也王者治定功成則有樂所以褒崇其徳而播之音律也月令云雩上帝用盛樂盛者殷薦之意薦上帝以配祖考即禮所謂郊祀后稷以配天宗祀文王于明堂以配上帝言薦上帝而配以祖考也蒙引云以字作而字看又云薦上帝配祖考二句平說恐非是初六鳴豫凶初六以隂柔居下而與九四為應恃其强援自鳴得意所謂燕雀處堂煦煦相樂不知棟宇之將焚者也傳曰不中不正之小人處豫而為上所寵不勝其豫至發于聲音輕淺如是必至于凶也均一鳴也鳴謙則吉鳴豫則凶謙自謹豫自恣也夲義曰卦之得名夲為和樂然卦辭為衆樂之意爻辭除九四與卦同外皆為自樂所以有吉凶之異卦爻取義之不同如此不可不知象曰初六鳴豫志窮凶也夲義曰窮謂滿極言其志得意滿不復更留餘地也如栁韋等之附王叔文自以為伊周管葛潘陸等之附司馬彰自號二十四友可謂鳴豫矣卒罹貶竄誅死之禍不亦凶乎六二介于石不終日貞吉傳曰逸豫之道放則失正故豫之諸爻多不得正才與時合也唯六二一爻處中正又無應為自守之象故曰介于石其介如石也二當豫之時而以中正自守上無應與故為介于石之象介如石者特立獨行不與世俗為縁也葢逸豫塲中人皆見為可樂二獨見為可憂是以飄然遐舉刻不容停也處豫而不為豫所累故得正而吉傳曰處豫不可安且乆也乆則溺矣如二可謂見幾而作者也夫子因二之見幾而極言知幾之道曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日㫁可識矣君子知㣲知彰知柔知剛萬夫之望夫見事之幾㣲者其神妙矣乎君子上交不至于諂下交不至于瀆者葢知幾也不知幾則至于過而不已交于上以恭巽故過則為諂交于下以和易故過則為瀆君子見于幾㣲故不至于過也所謂幾者始動之㣲也吉凶之端可先見而未著也獨言吉者見之于先豈復至有凶也君子明哲見事之幾微故能其介如石其守既堅則不惑而明見幾而動豈俟終日也斷别也其判别可見矣微與彰柔與剛相對者也君子見微則知彰矣見柔則知剛矣知幾如是衆所仰也故賛之曰萬夫之望夲義曰其徳安靜而堅確故其思慮明審不俟終日而見凡事之幾微也大學曰安而后能慮慮而后能得意正如此傳􅍯矣夲義又發此一段道理正不可少象曰不終日貞吉以正中也象言中正見其認的真抛的下惟无偏私故也一有偏私將戀戀而不能舍矣有中正之徳故其守堅而能辨之早去之速爻言六二處豫之道為教之意深矣若西漢之疏廣疏受東漢之梅福逢萌俱可以當之六三盱豫悔遲有悔夲義盱豫二字平說謂上視于四而下溺于豫也竊意四豫之主上視于四即盱豫也當與冥豫例看不必分說葢三以不中不正之人逼近九四盱張目以視猶諺云滿眼看着他一般焦氏云仰其鼻息惟恐失之之象極得趨勢附利情狀然以不中正不為四所取故有悔也遲有悔註作進退皆悔不如夲義速悔義為是故悔者悔其盱也悔其盱則翻然而改如六二之不終日庶幾可免于悔矣若復遲疑不决悔之來將何時而已乎象曰盱豫有悔位不當也居不中正之位故失身權貴自貽厥悔也九四由豫大有得勿疑朋盍簮九四為成卦之主豫之所以得名者也故曰由豫以一陽之豫為五隂之豫故曰大有得四居大臣之位上近柔弱之君二以正人不來親附初與三皆懐怙恩恃寵之心危疑之地也惟是无猜无嫌不以人之逺已也而疎之不以人之附已也而親之開誠布公曉然相信于上下之間則朋類合而從之矣朋類謂五隂也以四徳陽而位隂故也傳曰夫欲上下之信唯至誠而已苟盡其至誠則何患乎其无助也簮聚也簮之名簮取聚髮也或曰卦惟一陽安得同徳之助曰居上位而至誠求助理必得之姤之九五曰有隕自天是也四以陽剛逼近君位而專主乎豫聖人宜為之戒而不然者豫和順之道也由和順之道不失為臣之正也如此而耑主于豫乃是任天下之事而致時于豫者也故惟戒之以至誠勿疑大臣任天下之道盡于此矣象曰由豫大有得志大行也志在豫而一世之豫皆由之故曰志大行也六爻惟二不言豫四則和豫之豫其餘皆逸豫之豫也六五貞疾恒不死五以柔居尊而當豫之時荒淫晏安不能自強又權臣竊命上下皆歸之是腹心之疾莫之能瘳也故有貞疾之象貞疾猶言痼疾也疾雖痼而恒不死者名號攸存寄空名于九鼎之上也傳以漢魏末世之君當之愚謂東周南宋威權之去乆矣然而能乆存者如人羸弱之極元氣尚在固可以苟延嵗月耳此証似更確切訂詁云古者有疾謂之不豫疾者豫之反也六五以柔居尊當豫之時易于沉溺况天下事權皆已入九四之手衆心不附主勢孤立亦危矣哉必戰兢畏惕以正自守常如疾病在身乃得恒而不死所謂生于憂患者也孟子謂人之有徳慧術智者恒存乎疢疾其此爻之謂乎此說與舊解全異然理有可通故姑存之傳曰人君致危亡之道非一而以豫為多在四不言失正而于五乃見其强逼者四夲无失故于四言大臣任天下事之義于五則言柔弱居尊不能自立威權去已之義各據爻以取義故不同也若五不失君道而四主于豫乃是任得其人安享其功如太甲成王也蒙亦以隂居尊位二以陽為蒙之主然彼吉而此疾者時不同也童蒙而資之于人宜也耽豫而失之于人危亡之道也故蒙相應則倚任者也豫相逼則失權者也易之不可為典要如此何可不知謹按折𠂻引王氏宗傳曰當逸豫之時恣驕侈之欲宜其死于安樂也然乘九四之剛恃以拂弼于已故得恒不死也孟子曰入則无法家拂士出則无敵國外患者國恒亡然後知生於憂患而死于安樂也則六五之得九四法家拂士也故雖當豫之時不得以縱其所樂惟不得以縱其所樂則恒不死宜也夫當豫之時而不為豫者以正自守也六二是地當豫之時而不得豫者見正于人也六五是也故豫之六爻惟六二六五不言豫此說與訂詁意合且以九四為拂士而不以為權臣尤為理長竊嘗細味此爻之辭與象傳覺二聖人示戒之意深切著明而解者謂五之威權去已四之勢位相逼說成王莾曹操一流人未免將四說壊了葢四為成卦之主夲爻不言其失正祗以象傳乘剛二字便目為權臣寃矣葢聖人示戒之意全為六五而起以其柔而居尊全靠九四實心任事以成天下之豫必兢業自存常如有疾乃可免于危亡也古來如太甲之于伊尹成王之于周公尚已他如劉禪之闇弱得一孔明盡瘁鞠躬君无逼己之嫌臣无震主之禍以保西蜀之豫者四十年迨孔明殁而鳴豫盱豫之人進啣璧之凶所以立至也此爻之義似亦可僃一說故存之以俟髙明象曰六五貞疾乘剛也恒不死中未亡也下乘九四之剛一柔懦不足以勝之太阿倒持而授之柄也居上卦之中以名器繫属遠近是以未至于滅亡也訂詁曰乘剛而有衰弱之疾自度无以御其下是故其操心也危其慮患也深貞疾之謂也依前說須如此作解上六冥豫成有渝无咎註曰極豫盡樂故至于冥豫成也傳曰在豫之終故為冥豫已成也當以冥豫成為句夲義曰以隂柔居豫極為昏冥于豫之象以其動體故又為其事雖成而能有渝之象當以成有渝為句要之二讀皆通謹按夲義之理甚長當從夲義之說為是上六以隂柔當豫之極迷而不悟者也故曰冥豫豫既成似牢不可拔矣但天下无不可改過之人故渝則无咎无咎者恕其舊惡許之更新也傳曰聖人發此義所以勸遷善也故更不言冥之凶耑言渝之无咎夲義因之象曰㝠豫在上何可長也昏㝠于豫至于終極災咎行及矣其可長然乎當速渝也不速渝則遂非而怙終也初鳴豫病在輕薄其前途尚為有望也而直斥其凶絶之也絶之所以激其始也上㝠豫病在冐昧其末路正自无多也而逆許其无咎勉之也勉之所以善其終也然則聖人汲汲接引之心其欲使天下无棄人乎按楚莊王聽伍舉之諫而罷淫樂齊威王因淳于髠之諷而行誅賞漢武帝晚年詔曰朕自即位以來所為多狂悖使天下愁苦卒可追悔今事有傷害百姓縻費天下者悉罷之此三君者皆所謂成有渝者也震下兊上隨元亨利貞无咎執物自是不肯舍己以從人生人之大病也隨者降心抑志相從如轉圓故其道大亨傳曰凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也如此始可盡隨之義或耑指君民說謬矣陽動隂說易至詭隨故又利在得正无徇情无阿黨而后可无咎不然則不免于咎矣于亨之道何居夲義云卦以物隨為義爻以隨物為義故蒙引反覆致辨愚意隨之道由内以反外者也下體震剛隨柔也上體兌柔隨剛也剛柔互相隨也若剛不下柔柔雖欲隨之其可得乎故卦以隨物為主而物隨自在其中彖傳只是推極言之非有二義也彖曰隨剛來而下柔動而說隨以卦變釋之傳主乾坤二卦變夲義主困噬嗑未濟三卦變皆以剛隨柔之義也竊意傳似更顯傳曰乾之上九來居坤之下坤之初六往居乾之上故曰剛來而下柔也以卦體釋之震動兌說下動而上說内動而外說男動而女説動而可說所以隨也謹按卦變之說諸家不一王氏宗傳曰世儒惑于卦變殊不知八卦成列因而重之而内外上下往來之義已僃乎其中自八卦既重之後又烏有所謂内外往來上下之義乎最得易象之夲㫖足以破卦變之支離大亨貞无咎而天下隨時隨如此則大亨矣訂詁于此斷句以貞无咎而天下隨時為一句頗有理彖耑言貞彖傳便發出時字貞以言乎其體也時以言乎其用也聖人合天下之用以為體天下分聖人之體以為用聖人隨天下之時天下隨聖人之時千變萬化无有紀極故曰隨時之義大矣哉隨時之義大矣哉傳曰從宜適變不可為典要非造道之深知幾能權者不能與于此也故賛之曰隨之時義大矣哉凡賛之者欲人知其義之大玩而識之也此賛隨時之義大與豫等諸卦不同諸卦時與義是兩事如此說與豫等諸卦不同極是本義從王肅本天下隨時時字作之字隨時之義時字在之字下竊恐未是象曰澤中有雷隨君子以嚮晦入宴息傳云澤隨雷動夲義云雷藏澤中觀君子不以之動作而以之休息夲義更確大抵天地之道不翕聚則不能發散雷之道不蟄伏則不能震動人之道不休息則不能明作其理一也又震一陽之始日出象兌一隂之終日入象自震而兌嚮晦象嚮晦則當與萬物同寂故君子宴安休息所為養其神以待用也蒙引云日入而息也不可說忒深訂詁云動亦定静亦定此心寂然似失之深或云雷春夏用事月令仲秋雷始收聲兌為正秋又為澤震伏兊下故曰澤中有雷其義益顯明矣初九官有渝貞吉出門交有功初以一陽為震之主而隨卦由之以成有官象剛來柔下變而動有渝象苟弗正亦為不善變矣故須得正而吉一陽而上兩隂畫偶中空有門象出而交于四則有功也此教人尋師訪友撤籓籬剖門戸往收麗澤之益也傳曰人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也苟以親愛而隨之則是私情所與豈合正理故出門而交則有功也出門謂非私暱交不以私故其隨當而有功說破世情歸諸正道為教深矣象曰官有渝從正吉也出門交有功不失也從得其正則官无曠而一變至道故吉也出門交有功以公義相取不失之私且狹也六二係小子失丈夫二與五為正應相去却逺而近與初比初在下小子也五在上丈夫也小子少不更事之稱丈夫特立獨行之稱係小子則失丈夫雖中正曽无足恃豈非以其隂柔不能固守而戒之與傳曰二有中正之徳非必至如是也在隨之時當為之戒也此義須知之不可說壊六二象曰係小子弗兼與也傳曰人之所隨得正則逺邪從非則失是无兩從之理二苟係初則失五矣弗能兼與也所以戒人從正當耑一也最為明盡六三係丈夫失小子隨有求得利居貞三不中正與初同體而比鄰九四四在上丈夫也可係而不可失也初在下小子也可舍而不可係也係丈夫失小子視六二有間矣而无應更无隨之者三係四故四隨三隨故惟三所欲者求必得也程傳本義俱以隨為三愚獨以隨為四何也卦中三隂爻俱言係不言隨隨獨于陽爻言之故知其為四也且九四隨有獲正承此隨字接去雖然求之有道不以其道得之是希世取寵之徒也故曰利居貞三以隂居陽不正四以陽居陰亦不正慮其不正故以正教之也傳曰舍初從上得隨之宜也上隨則善也如昏之隨明事之從善上隨也背是從非舍明逐暗下隨也又曰固不可非理枉道以隨于上苟取愛說以遂所求如此乃小人邪諂趨利之為也故云利居貞自處于正則所謂有求而必得者乃正事君子之隨也俱格言可作隨字箴象曰係丈夫志舎下也初雖在下而有官聲氣甚廣三又陰邪多求與之同體未易舍也今乃斷然舎去志可則也曰志舎下嘉其取舎之正也本義曰非正應有不正而為邪媚之嫌故戒以居貞也讀隨二三兩爻知學者不可以不求友又見居者不可以不擇鄰也二中正姿質原是好的又有正應是好師友堪相唱和者只縁處的地位不好是以比匪有戒三不中正姿質原是不好的又无正應那得好師友與之相唱和只縁處的地位甚好是以仰止有資然則求友者何可以不卜居乎哉九四隨有獲貞凶有孚在道以明何咎傳曰九四以陽剛之才處臣位之極若于隨有獲則雖正亦凶有獲謂得天下之心隨于己為臣之道當使恩威一出于上衆心皆隨于君若人心從已危疑之道也故凶居此地者奈何唯孚誠積于中動為合于道以明哲處之則又何咎古之人有行之者伊尹周公孔明是也皆徳及于民而民隨之其得民之隨所以成其君之功致其國之安是以下信而上不疑位極而无逼上之嫌勢重而无耑强之過非聖人大賢則不能也其次如唐之郭子儀威震主而主不疑亦由中有誠孚而處无甚失也非明哲能如是乎說理至此无容賛一辭矣然余嘗有數語云内積忠信之心坦然推誠而不欺有孚也外奉聖賢之道確然循理而不過在道也燭㣲見遠不惑于崇高而以察察自矜无所往而不宜以明也何過咎之有此全從傳得來然亦可為大臣行實特存之象曰隨有獲其義凶也有孚在道明功也隨有獲近于樹黨揆之于義非所宜也故凶有孚在道所以徙義非明哲不至此故功有獨歸焉傳以伊尹周公孔明當之而末及郭子儀既以孚且明許之矣至在道二字㣲有斟酌知言哉愚謂狄梁公桃李盡在公門隨有獲也屢罹于禍貞凶也然諄諄以母子天性為言有孚在道也卒收明哲之功有以哉蒙引以蕭何當之非其倫矣何君臣間以詐御詐明則有之曰孚曰道則未也九五孚于嘉吉居尊得正而中寔下應六二信之篤任之耑孚于嘉也物之美好曰嘉人之徽懿亦曰嘉一徳交孚盡善盡美吉可知也蒙引以舜武之五臣十亂及湯之于伊尹成康之于周召當之固矣又云漢高之于三傑夫三傑或囚或醢或去而云孚于嘉乎過矣象曰孚于嘉吉位正中也嘉莫嘉于中正孚于嘉者九五六二均處中正之位也上六拘係之乃從維之王用亨于西山註䟽俱以拘係至乃從為句維之王用亨于西山為句至傳始改正之以拘係之為句乃從維之為句葢上以隂柔處隨之極享所謂極其隨者也故有拘係從維之象拘係束縳之意從維纒綿之意極言隨之固結而不可解也王用亨于西山傳作亨曰昔太王用此道亨王業于西山太王避狄之難去豳來岐豳人老稚扶携以隨之如歸市葢其人心之隨固結如此用此道故能亨盛其王業于西山西山岐山也周之王業葢興于此上居隨極固為太過然在得民之隨與隨善之固如此乃為善也施於他則過矣此理極好夲義作祭亨之享謂誠意之極可通神明神亦隨之而况人乎尤為現成要之二義俱不可少太王而后劉𤣥徳廹于曹兵奔江南避之從者數萬人曹兵急或欲棄之𤣥徳曰百姓不忍舎我我何忍舎百姓庶幾此爻之義矣謹按折𠂻云卦之初剛下于二柔則九五之剛亦下于上柔也而諸儒說兩爻義皆不及此故于九五孚嘉以為應六二猶可而于上六拘係則說的全无根㨿矣凡易中五上二爻六五下上九則有尚賢之義大有大畜頤鼎是也九五近上六則有比匪之義大過咸夬兌是也然九五上六相比不正之私情必于兌體取之者為其以相說而動易入于不正也獨此卦雖亦兌體而卦以剛下柔為義則九五上六有相隨之義非不正也故于九五曰孚于嘉所以别于兌之孚于剝也于上六則不曰係小子亦不曰係丈夫而但曰拘係之下乃云王用亨于西山明乎其所係者王也凡易爻言王用亨者三皆謂王用如此爻者之人以享于山川上帝也非謂其爻為王也葢賢人者山川所生上帝所簡故使之主祭則百神享之而天受之又以見王者之克當天心无有大于用賢者爾此爻與蠱上義正反對當隨之時則拘係而不去當蠱之時則高尚而不事各惟其宜而已矣此豈縻于禄而彼豈遯乎世哉較之諸家之說似覺明暢象曰拘係之上窮也夲義窮解極言上之隨極至而无以復加也折中云上窮則有高亢之意在人如絶世離羣往而不返者是也卦之隂爻皆云係至上六獨曰拘係之故夫子發明其義以為因上六之不易係也巽下艮上蠱元亨利涉大川先甲三日後甲三日上艮艮止也下巽巽順也順而止非蠱順而止所以致蠱也蠱訓蟲訓皿如蟲生器皿中欲不洗刷蕩滌一番不得也壊極則當生新否極則當泰來故為元亨此以蠱之時言也傳曰如卦之才以治蠱則能致元亨也恐費一轉天運當興人事宜力安常守故以兾幸于起替興衰不亦難乎須是冒險阻歴艱難乃克有濟故曰利涉大川先甲三日後甲三日其說甚多要以傳為的傳曰甲數之首事之始也如辰之甲乙甲第甲令皆謂首也事之端也治蠱之道當思慮其先後三日葢推原先後為救弊可乆之道先甲謂先于此䆒其所以然也後甲謂後于此慮其將然也一日二日至于三日言慮之深推之逺也究其所以然則知救之之道慮其將然則知僃之之方善救則前弊可革善僃則後利可乆此古之聖王所以新天下而垂後世也後之治蠱者不明聖人先甲後甲之誡慮淺而事近故勞于救世而亂不革功未及成而弊已生矣甲者事之首庚者變更之首制作政教之類則云甲舉其首也發號施令之事則云庚庚猶更也有所更變也又從其意推之天下事知敗壊何因便知補救何術如秦以暴虐亡故漢濟之以寛大隋以驕奢亡故唐濟之以恭儉此先甲三日之說也天下事知釁孽何萌便知斬伐何自如宋慮藩鎮為禍則以杯酒釋兵權太祖慮宦官為禍則戒内臣不得干預外事此後甲三日之說也夲義云先甲三日辛也謂自新以圖前事也後甲三日丁也謂丁寧以善後事也其理自好但非辛字丁字本意未詳是否彖曰蠱剛上而柔下巽而止蠱傳云剛上柔下尊卑得正上下順理治蠱之道下巽上止止于巽順以巽順之道治蠱是以元亨朱子甚非之云下卑巽而上苟止所以成蠱此二句乃致蠱之由非治蠱之道其說夲趙德莊極是葢艮剛在上而不下交巽柔居下而不上交兩情乖拂又在下者一味柔懦卑巽无所規正在上者一味剛愎懶惰无所作為天下事安得不壊此其所以為蠱也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也天下本无事是被人壊却到那壊盡時却有元亨的道理何也亂者治之始也祗如此解去為是朱子既非伊川治蠱之說又曰治蠱至于元亨恐不必不曰往有功而曰往有事言自此一往與一世更始大費氣力正不得委之无事也先甲原始後甲要終大學云事有終始中庸云誠者物之終始不言始終而必言終始者終則有始正如貞下起元天之行也治蠱者法天之行而自強不息可矣天行即乾行健而无息之謂乾盡人事以回造化也若袛作天運循環說恐非聖人先甲後甲之㫖象曰山下有風蠱君子以振民育徳風為山所御則散于物故為壊而有事之象君子觀其象以從事莫大于明徳新民新民者必有以振之振民者振其宴安之氣而鼔舞作興之也明徳者必有以育之育徳者育其彛秉之性而涵育薰陶之也李氏云風能鼔為號令故曰振民然有長養之功獨无取于育徳乎山能養成材力故曰育徳然有樹立之槩獨无取于振民乎或曰先言振民後言育徳徳指民說育徳正所以振民也葢蠱屬人而君子治之故育徳就民說為是初六幹父之蠱有子考无咎厲終吉治蠱專說子道亦先王以孝治天下意孝者所以事君也傳曰初居内而在下故取子幹父蠱之象夲義蠱者前人已壊之緒故諸爻皆以父子為言𤓰山潘氏曰本義為長如程說則惟初爻可通不能通于他爻也其說極是夲義曰幹如木之幹枝葉之所附而立者也愚意幹者植立之意亦旋轉之意幹蠱者補救其缺失彌縫其罅漏也有子如昔人云某有子矣如戴記云幸哉有子如此可謂孝矣考无咎如周公告蔡仲曰爾尚葢前人之愆是也時稱考以父没言也禮父没稱考父没而子幼弱一切家事悉付之時勢孔艱故曰厲體巽而能作主故曰厲終吉象曰幹父之蠱意承考也意字指子說鄭氏云子改父道事若不順而意則順是矣張氏云不承其事而承其意則非也人子之道率乃父攸行而乃改其所為者意在承當父事而潛移黙革不彰其咎也九二幹母之蠱不可貞九二剛中上應六五柔中有以剛幹柔之義故曰子幹母蠱也一部易都是利貞貞者事之幹也幹母獨曰不可貞何也權也傳曰夫子之于母當以柔巽輔導之使得于義不順而致敗蠱則子之罪也從容將順豈无道乎以婦人言之則陰柔可知若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在于屈己下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也又安能使之為甚高之事乎若于柔弱之君盡誠竭忠致之于中道則可矣又安能使之大有為乎且以周公之聖輔佐成王成王非甚柔弱也然第能使之為成王而已守成不失其道則可矣固不能使之為義皇堯舜之事也從子道說至臣道无不曲盡象曰幹母之蠱得中道也道以貞為中曰不可貞能无過不及之失乎葢善處母子之間正須如此所謂權而不失其經也二處巽之中故有此象繋辭有曰㢲以行權九三幹父之蠱小有悔无大咎三以剛居剛剛而過矣所謂家之諍子是也凡事爭之太過本心畢竟未安故有小小之悔然使其父不䧟于不義不得罪于鄉黨州里故无大咎也傳曰在㢲體雖剛過而不為无順順事親之本也又曰有小悔已非善事親也夲義曰過剛不中故有小悔㢲體得正故无大咎象曰幹父之蠱終无咎也爻曰无大咎猶似有小咎象直斷曰終无咎者以陽剛之道事親視愛父以姑息䧟之不義者相去遠矣終許之也六四裕父之蠱往見吝四以陰居陰寛假苟安坐視其父之敗壊而不為意者也故有裕父之蠱之象寛裕以處蠱將日深往則徒貽厥父羞而已不可謂有子也故見吝此主本義一直說傳曰所處得正故為寛裕以處其父事者也夫柔順之才而處正僅能尋常自守而已若往幹過常之事則不勝而見吝也以隂柔而无應助往安能濟尤為婉曲象曰裕父之蠱往未得也往未得者往不能以有濟也六五幹父之蠱用譽以九二言則五為母二為子以六五言則五為君二為臣所謂隨爻取義也張子曰雖天子必有父故六五亦曰幹父之蠱五繼世之君也其于父之蠱非以一人幹之以羣賢幹之也幹蠱之功雖自二成之幹蠱之名則自五收之也故曰用譽言用其人以致譽也詩所謂令聞令望是已傳曰太甲成王皆以其臣而用譽者也余謂三代而后若漢昭帝之用霍光亦庶幾矣彼其君臣葢能幹武帝之蠱也蒙引引宋仁宗而及韓范富歐陽之臣為喻亦確象曰幹父用譽承以徳也九二以剛中之徳上承柔中之君故五能光顯前人而有善繼善述之譽也上九不事王侯高尚其事上九蠱之終居最高最上之位而下无係應无所事者也故曰不事王侯然既曰不事又曰高尚其事者見上自有其事而王侯非其事也是故不以朝廷為事而以山林為事不以富貴功名為事而以綱常名教為事所謂王侯遇之失其貴者也范文正記嚴子陵祠堂而引此爻曰先生以之知言哉傳曰士之高尚亦非一道有懐抱道徳不遇于時而高潔自守者有知足止之道退而自保者有量能度分安于不求知者有清介自守不屑天下之事獨潔其身者所處雖有得失大小之殊皆自高尚其事者也愚謂第一段其謂伊尹耕于莘野太公釣于渭濵之時乎第二段其謂張良疏廣之類乎第三段其謂徐孺子申屠蟠之類乎第四段其謂嚴陵周黨之類乎分四類而古今高尚之士无有遺焉者矣又曰象所謂志可則者進退合道者也葢謂象耑指懐抱道徳一流言故于伊尹太公之外又益以曽子子思之徒也大抵上九一爻為朝廷標節義為艸野維風俗凡一代興亡之際少這等人物不得是真能幹君父之蠱者若以爻辭不言幹蠱而視為无所事事之人則失之矣象曰不事王侯志可則也爻言事象復言志者亦孟子以尚志為事之意也銖視軒冕卓乎百世之師矣文文山云臣事君猶子事父此卦五爻言父子而君臣在其中矣上九一爻言君臣而父子又在其中矣且也言父母初言无父之子上言不事之臣其義何詳僃也兌下坤上臨元亨利貞至于八月有凶臨者大也二陽漸進有盛長之勢故大也傳曰以上臨下或曰監臨之臨是也如君父之臨臣子上官之臨僚屬長吏之臨兆姓尊長之臨卑幼皆臨也夲義云臨進而凌逼于物凌逼二字下得重恐于元亨利貞有礙且卦體喜悅和順似與凌逼相反若如孟子所云治人治于人之分則凌逼于物反似陽為陰所逼矣彖傳六爻本此義蒙引多援故實以証之恐添足自乾以下坤屯隨臨无妄革凡七卦皆曰元亨利貞除坤卦皆一陽居下葢陽徳初動漸當亨通然未有不利在貞正者也二陽方長于下駸駸有莫遏之勢矣聖人即戒之曰至于八月有凶憂盛危明之心思患預防之道也傳曰大率聖人為戒必于方盛之時方盛而慮衰則可以防其滿極而圖其永乆若既衰而后戒亦无及矣自古天下治安未有乆而不亂者葢不能戒于盛也方其盛而不知戒故狃安富則驕侈生樂舒肆則綱紀壊忘禍亂則釁孽萌是以浸淫不知亂之將至也自天子以至於庶人處盛滿者不可不知此義彖曰臨剛浸而長剛浸而長浸者積漸之意日増而月益也以初二兩爻言也說而順剛中而應内兌說外坤順說而順以上下兩體言也二為卦主以剛在下卦之中而五以柔中在上應之剛中而應以二五兩爻言也大亨以正天之道也剛浸長而說順剛中而應柔中以大亨正也傳大亨以正專承剛中而應來似不如全承為是傳曰大亨而得正合天之道剛正而和順天之道也化育之功所以不息者剛正和順而已然則人非剛正和順豈能仰合天道哉至于八月有凶消不乆也至於八月有凶亦以天道卜之也月數至八時日未為不乆以慮患之心言之則凛乎如在目前故曰消不乆也傳作周正八月本義周正夏正兩存其說而曰文王作卦辭時或只用周正記之似矣然周正建子恐是武王大定天下改正朔后纔如此商正建丑文王作卦時尚是商之臣子豈有遽用周正之理隆山李氏曰臨者建丑之月二陽浸長逼四隂至于八月建酉卦為觀四隂浸長逼二陽則臨二陽至觀危矣故曰至于八月有凶葢言之于臨則當自臨數而不當自復數以觀次臨則當數至觀而不當數至遯此說極有理傳義皆當折𠂻于此按傳又廣其說云以人事言之則陽為君子陰為小人方君子道長之時聖人為之戒使知極則有凶之理而虞僃之庶不至滿極則亢凶也為教切矣謹按隆山李氏之説于理頗順而折衷獨主陸氏之說謂陽數窮于九則退而生少隂之八隂數極于六則進而生少陽之七故言隂來之期曰八月言陽來之期曰七日此義亦覺有理較勝諸家之說象曰澤上有地臨君子以教思无窮容保民无疆坤地兌澤澤上之地為岸岸臨水莫切近于此故有以上臨下之象君子觀其象而以移風易俗為臨則教思无窮沾濡漸被法澤之潤地无渗漏也以仁育義正為臨則容保无疆含𢎞廣大法地之容澤无畛域也言教而必曰思見君子黙成有術而非僅口耳之誨也言容而必曰保見君子撫循有道而非僅器量之宏也初九咸臨貞吉傳咸作感自王弼已知此說夲義以為牽强改作皆與徧意謂徧臨四陰也恐不見初與四二與五相應正意竊意咸如咸卦之咸感之以无心也初與四為應而感以无心故得正而吉也傳于此爻貞吉又益以貞固守之則吉葢主感臨說徳感之說其理甚長故折衷亦指此說象曰咸臨貞吉志行正也初以陽居陽正也四以隂居隂亦正也正感正應初之志行于四矣故曰志行正也九二咸臨吉无不利二以剛中之徳上應柔中之君剛柔互濟感應咸宜故不特吉而且利不特利而且无所不利也无心之感其感神矣傳曰吉者已然如是故吉也无不利者將然于所施為无不利也分别最是象曰咸臨吉无不利未順命也未順命夲義未詳縁作皆與徧意故此句難解傳曰未者非遽之辭孟子或問勸齊伐燕有諸曰未也又云仲子所食之粟伯夷之所樹與抑亦盗跖之所樹歟是未可知也史記侯嬴曰人固未易知古人用字之意皆如此今人大率用對已字故意似異然實不殊也九二與五感應以臨下葢以剛徳之長而又得中至誠相感非由順上之命也其義亦詳矣又從其說推之二所以吉无不利者未嘗順承五命也書所謂予違汝弼汝无面從正此意也葢獻可替否人臣之義故必商酌從宜而不敢以唯諾塞責若漫无可否惟命是從昔人所謂阿諛順㫖者也為悔為吝為凶又安得吉无不利哉所以然者五順體若二復用順取說是以火濟火以水濟水也剛中者當不如是六三甘臨无攸利既憂之无咎六三陰邪不中正徒以美言好語說人故曰甘臨此以順為正者也二剛處說之中故雖在下位而能不順上之命三柔處說之極故雖在上位而反順下之命在二以不順命為利在三以順命為不利其理正同且二陽秉則徳厭絶三所為故无攸利然志在說人反為人所不說意興消沮當轉說而憂矣憂則不甘不甘則无復柔媚故態故无咎象曰甘臨位不當也既憂之咎不長也以一爻言之三以隂居陽以三爻言之三以一隂居二陽之上位不當也既憂之則改過遷善始雖有咎而終无咎故不長也六四至臨无咎四應初初剛正四柔正兩正相投情意懇摰故曰至臨又四居坤兌之間地澤相臨莫切至于此者故其象如此象曰至臨无咎位當也以隂居隂不乘陽而應陽位當也傳曰居近君之位為得其任以隂處四為得其正與初相應為下賢所以无咎葢由位之當也說的最為周到六五知臨大君之宜吉六五柔中居尊下應剛中之賢此知人善任使者也故曰知臨人君以用人為急用人以得賢為要五得二而用之此統馭天下之道在是矣故曰大君之宜吉傳曰夫以一人之身臨乎天下之廣若區區自任豈能周于萬事故自任其知者適足為不知惟能取天下之善任天下之聡明則无所不周是不自任其知則其知大矣可作臨天下箴象曰大君之宜行中之謂也凡事以適宜為中五不自用其中而用二之中君道合當如是所以為宜也南軒引舜作用中于民說恐非是傳曰五有中徳故能倚任剛中之賢得大君之道成知臨之功葢由行其中徳也人君之于賢才非道同徳合豈能用哉畢竟此說為確上六敦臨吉无咎上六臨之終亦坤之終坤以厚徳載物故曰敦臨與敦艮敦復之敦同皆層累到至極處也傳曰上與初二雖非正應然大率隂求于陽又其至順故志在從乎二陽尊而應卑高而從下尊賢取善敦厚之至也故曰敦臨所以吉而无咎說敦字纔有着落又曰隂柔在上非能臨者宜有咎也以其敦厚于順剛是以吉而无咎六居臨之終而不取極意臨无過極故止為厚意真得聖人作經之㫖要之上六隂也隂夲虚故曰敦臨所以實其虚初二陽也陽夲實曰咸臨所以虚其實虚首實之實者虚之可以觀易教矣象曰敦臨之吉志在内也志在内志在初與二也以實徳相砥礪故有敦臨之吉也此卦以二陽臨四隂得名由内外言之二陽臨四隂内臨外剛臨柔也由上下言之四隂臨二陽上臨下柔臨剛也陽與隂交相臨也然以二陽為主四應初五應二分應二陽也三上无應合應二陽也朱子以六三為小人臨君子良是蒙引夲其說遂以初二為君子臨小人非矣坤下㢲上觀盥而不薦有孚顒若臨觀皆二陽四隂之卦臨卦二陽浸長消四隂則以二陽臨四隂為義雖四隂居上臨下无不俯而合志于二陽也觀卦四隂浸長消二陽則以四隂觀二陽為義雖二陽一變即剥正為八月之卦而四隂莫不仰而觀徳焉扶陽抑隂之意深矣觀者垂範作則為一世之具瞻傳本胡翼之之說謂盥為祭祀之始盥手酌鬰鬯于地求神之時謂薦為獻腥獻熟之時言始事嚴肅既薦則誠意懈怠故為天下之觀當如始盥之時不可如既薦之後也朱子以為承先儒之誤言如此說則是先王之祭初間猶有誠意到後來便不成禮矣盥只是潔意言致其潔清而不輕自用也說亦未顯又云此是假設來説不薦者言常持得這誠敬如盥之意常在若薦則是用出用出則纔畢便過了无復有初意矣此理甚好愚意盥作灌地求神說言盥之時全副精神都凝聚在這裏若薦則借物以將吾敬而敬之誠于中者形于外矣著見于外便在外面觀此聖人所以取象于盥而不薦也此說葢從程朱之言折𠂻之謹按此卦彖辭无甚難解而衆論紛紜不能一致者大要其理皆是其說不暢只索其解于字句之間故耳試由諸家之說推之盥者誠之聚于内也薦者誠之見于外也盥而不薦者誠積于中不待著見于外也有孚顒若者自然誠意感孚顒然而仰望之也故彖傳釋之曰下觀而化也即詩所謂奏假无言時靡有爭中庸所謂不動而敬不言而信之意葢此卦以二陽在上四隂在下陽剛居尊為羣下所觀仰之義以陽之體實而用虚故誠于此而孚于彼也觀堯之明峻徳而黎民於變舜之正南面而四方從欲可見彖曰大觀在上順而㢲中正以觀天下傳曰五居尊位以陽剛中正之徳為下所觀其徳甚大故曰大觀在上或曰統指二陽以其居髙處尊為四隂所仰也亦是正解順而㢲指上下兩體也五居上卦之中而又以陽居陽中正也以大中至正之徳觀示天下所謂皇建其有極也觀盥而不薦有孚顒若下觀而化也下觀而化觀其中正之徳㢲而順之而不知誰之為之也觀天之神道而四時不忒聖人以神道設教而天下服矣天通至神故曰神道温凉寒燠歴終古代謝如一故曰四時不忒觀四時運行无有差忒而天之神道見矣聖人以天之神道為教張弛閤闢一符造化之自然也傳曰至神之道莫可名言惟聖人黙契體其妙用設為政教故天下之人涵泳其徳而不知其功鼔舞其化而莫測其用自然仰觀而戴服其義大矣夲義曰極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也其義精矣又朱子曰以上示下曰觀自下觀上曰觀故彖辭下觀大象觀民及六之觀觀字皆平聲餘皆去聲象曰風行地上觀先王以省方觀民設教風行地上周遍庶物為逰歴周覧之象故先王體之以省方履其地也觀民問其風也隨五方風氣而陳常藝極如齊之末業教以農桑衞之淫佚教以禮别奢如曹教之以儉儉如魏教之以禮是也古者天子巡狩太史陳詩以觀民風司市納賈以觀民之好惡其為設教地乎傳曰省方觀民也設教為民觀也夲義因之初六童觀小人无咎君子吝九五為觀主四隂同觀之初以隂柔居下位去五甚逺昏暗无所見故曰童觀傳曰陽剛中正在上聖賢之君也近之則見其道徳之盛初乃逺之所見不明如童蒙之觀也如此暢發為是小人下民也見不出閭里識不越農桑日用而不知其夲色耳故不足謂之過咎若有位君子自當度越小人寡見謏聞愧厥名多矣豈不可羞吝乎象曰初六童觀小人道也傳以小人道為小人之道葢小人與君子不同道故特地寛他一步寛小人所以責君子也六二闚觀利女貞初與二皆幼穉象隂柔正同然在初陽位則為男在二隂位則為女二與五為正應居内而觀外者也三四隔之其明不能及逺故曰闚觀傳曰闚覘之觀雖少見而不能甚明也利女貞依本義作女子之正說葢女子不出門庭孑焉自守其正也象曰闚觀女貞亦可醜也丈夫為女子之事巾幗之辱鬚眉之羞也可醜孰甚焉蒙引援司馬子長邵堯夫及蘇子由上韓太尉書以喻士君子當逺歴四方以廣見聞亦有理六三觀我生進退傳曰三居非其位處順之極能順時以進退者也若居當其位則无進退之義也從坤體取義甚精又三居上下之間比上體則可以進居下體則可以退使非觀我生而進退其能咸宜乎觀我生傳云動作施為本義云我之所行也亦是傳意疑于生字未確余嘗有說云我生謂天命之性也可以進則進而天命之性即經術之具可以退則退而天命之性即卷懐之實非有道者未易幾也此說向已削去近讀文清先生語録云聖賢相傳之道不外天命之性覺此說亦可通姑存之又本義云觀所行之通塞以為進退蒙引詳解之曰如使吾之學成徳立言之于君者君我用行之于民者民我從是我所行之通也反是是我所行之塞也此說本朱子語録然于本義不觀九五句悖矣𠫭義曰如其行之善而通也雖進可也其未善而塞也雖退可也如此解較是謹按先儒云六三似漆雕開則觀已所學之疑信以為進退其理甚合葢三居多凶之地觀五則隔于四觀上雖為正應而上又貴而无位故必觀其所學而后進非慕禄退非石隱如此說于象傳未失道句亦有闗會象曰觀我生進退未失道也道者義路禮門守身之階梯觀我生進退根乎性安乎命酌乎時宜故于道未有失也此本余前說作解按諸儒或曰未失觀之道或曰未失進退之道二說俱通但此爻以出處之詳審言也進退不失道則觀可知矣後說較優近思我生之說又有進者我生者何天命之性也天命之性者何仁義禮智信也觀我生之進合乎仁合乎義合乎禮智信則可以進矣觀我之進不合乎仁不合乎義不合乎禮智信則可以退矣進退以天所命我之五常為衡故曰未失道也此亦從文清之說推之似更顯六四觀國之光利用賔于王傳曰觀莫明于近五以剛陽中正居尊位聖賢之君也四切近之觀見其道故云觀國之光觀見國之盛徳光輝也不指君之身而云國者在人君而言豈止觀其行一身乎當觀天下之政化則人君之道徳可見矣利用賔于王夫聖明在上則懐抱才徳之人皆願進于朝廷輔戴之以康濟天下四既觀見人君之徳國家之治光華盛美所宜賔于王朝効其智力上輔于君以施澤天下也古者有賢徳之人則人君賔禮之故士之仕進于王朝謂之賔如此發揮爻義始盡余謂士修之家獻之天子之庭以分言則君臣也以義言則賔主也故貢士之典必曰賔興所以表士之貴而勵其自重之節也象曰觀國之光尚賔也傳曰君子懐負才業志在乎兼善天下然有卷懐自守者葢時无明君莫能用其道不得已也豈君子之志哉故孟子曰中天下而立定四海之民君子樂之既觀見國之盛徳光輝古人所謂非常之遇也所以志願登進王朝以行其道故云觀國之光尚賔也尚謂尚志其志意願慕賔于王朝也此理極好但尚下添志字又尚賔俱指四說恐未是余謂賔指四則尚賔宜指五言四所以觀國之光者以五能尊徳樂道而崇尚夫王家之賔也如此說較妥九五觀我生君子无咎九五在上為大觀之主所謂中正以觀天下者也然必反躬省察果足以為觀于天下不愧陽剛中正之君子而後可以无咎也傳曰天下之俗皆君子未免强入觀民意恐非是若依天命之性說則觀我生觀其所命于天者也命于天者純粹至善故必為君子而后无忝所生也君子聖賢之通稱全乎仁義禮智信之徳者也象曰觀我生觀民也我與民同生民不為君子皆我生之咎也而况大觀在上為民作君作師者乎故象雖曰觀我而觀民在其中矣未有遺棄斯民而為我者即未有遺棄斯民而為觀者故蒙引云觀民也亦即是觀我生句内意極是傳曰人君欲觀已之施為善否當觀于民民俗善則政化善也本義曰此夫子以義言之明人君觀已所行不但一身之得失又當觀民徳之善否以自省察也但進一步說未安上九觀其生君子无咎上九以陽剛之徳居无位之地是賢人君子以道徳為天下所觀仰者也辭與九五同本義曰但以我為其小有賔主之異耳陳氏曰避九五不得稱我猶若他人之辭耳二義俱精朱子又曰觀我生是自觀如視履考祥的語勢觀其生亦是自觀就自家視聽言動應事接物處說易中其字不指别人如乘其墉之類俱確甚象曰觀其生志未平也傳曰雖不在位然以觀其徳用為儀法故當自慎省觀其所生常不失于君子則人不失所望而化之矣不可以不在于位故安然放意无所事也是其志意未得安也故云志未平也平謂安寧也此意可使從古高尚一流人爽然自失本義未可忘戒懼只是傳意按上九與九五同觀孔子釋九五之象則曰觀民以五居尊位故也居尊位則仁義禮智信之徳與民共之兼善天下其志得矣更何未平之有釋上九之象則曰志未平以上居无位之地故也居无位之地則仁義禮智信之徳僅以盡其在我而已獨善其身豈萬物一體之志故曰志未平也如此說似更有理震下離上噬嗑亨利用獄上下二陽而中虚為頤口之象九四一陽間于其中為頤中有物之象物為口作梗人為天下作梗須除去之乃得和合无間大亨之道也故曰噬嗑亨齧去其間而合之非刑獄不可故利用獄傳曰不曰利用刑而曰利用獄者卦有明照之象利于察獄也昔人以獄為福堂葢安置之以詳察其情偽防閑之以漸俟其悔悟也大凡治獄者明足以照而威不足以斷則有寛縱養奸之弊威足以斷而明不足以照則有冒昧殘民之失兩體交濟治獄之道盡矣傳曰几天下至于一國一家至于萬事所以不和合者皆由有間也无間則和合矣以至天地之生萬物之成皆合而後能遂凡未合者皆有間也若君臣父子親戚朋友之間有離貳怨隙者葢讒邪間于其間也除去之則和合矣故間隔者天下之大害也聖人觀噬嗑之象推之于天下萬事皆使去其間隔而合之則无不和且治矣噬嗑者治天下之大用也讀此則應事接物齊家治國平天下之道俱在是矣彖曰頤中有物曰噬嗑頤者口也頤之為體其中虚足以受其齒剛足以斷有物間隔齧而后合故曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也彖辭言亨傳加而亨便有用力意非優㳺无事所可坐致亨通也剛柔分如本義均停之意亦是但三剛三柔之卦尚多不應于此與節卦獨言剛柔分也傳曰剛爻與柔爻相間剛柔分而不相雜為明明辨之象此須將六爻三分而各數之亦未甚得竊意分對合看剛柔分連動而明看震剛離柔剛分在下柔分在上此以二體言也震下離上在下者必動在上者必明此以二徳言也但有分而无合則不可以章矣震雷離電相須並見此以二象言也傳曰雷電合而章言威照並用也訂詁曰漢五侯僣逼罪狀顯著成帝得于目覩非不明也乃不能置之法則雷不與電合矣趙葢韓楊之死成帝非不斷也然皆死非其罪則電不與雷合矣此理甚好柔得中而上行本義作卦變說言自益卦六四之柔上行以至于五而得中也傳曰六五以柔得中為用柔得中之義上行謂居尊位此耑主時位說又曰以柔居五為不當位而利于用獄者治獄之道全剛則傷于嚴暴過柔則失于寛縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也須如此分析纔是三代而后若漢文帝者鄧通之獄不撓大臣之法薄昭之獄不徇戚畹之情其亦庶乎柔中而利用獄者矣象曰雷電噬嗑先王以明罰勅法夲義作電雷從蔡邕石經本為是或曰雷電與天地交一例非也電光發則雷聲繼之應合而无間故為噬嗑之象先王觀此象而辨析其刑以示民使之憬然知避法電之明也整飭其法以防民使之凛然如畏法雷之威也明罰勅法尚未說到用處與折獄致刑不同則以豐者震在明前噬嗑者明在震前故也傳曰法者明事理而為之防者也一語最精初九履校滅趾无咎子夏曰此戒治獄者不可不謹其㣲也焦氏遂謂六爻皆言治獄看上九如何說的去且中四爻俱取噬字為義初上則否故知初上无位則受刑之人中四爻為用刑之人也程朱之說不可易矣一陽居震之初震動也動則多咎書所謂非終乃惟𤯝者也宜薄示懲創用木械加于足如納履然故曰履校滅趾繋辭曰小懲而大戒小人之福也傳曰言懲之于小與初故得无咎也按震為足下畫為趾初剛橫亘于震足之下足械没其趾之象又足械之制周圍其脛而已下不及足也若然則滅趾袛是遮没其趾併非滅傷其趾之謂也象曰履校滅趾不行也防㣲以杜其漸創始以善其終傳曰履校而滅其趾則知懲戒而不敢長其惡故云不行也葢禁止其行使不進于惡也六二噬膚滅鼻无咎二應五之位以中正治獄者也居中得正刑人而人服之故取噬膚為象如噬齧人之肌膚最為易入其入之深至没其鼻傳曰二乘初剛是用刑于剛强之人刑剛强之人必須深痛故至滅鼻而无咎也又曰中正之道易以服人與嚴刑以待剛强義不相妨竊意中正體也嚴刑以待剛强中正之用也故義不相妨象曰噬膚滅鼻乘剛也初剛强而二乘之若僅僅在皮膚間用力未為得也故用刑深嚴至于滅鼻傳曰深嚴則得宜乃所謂中也而正不待言矣六三噬腊肉遇毒小吝无咎三隂柔不居正而居下之上有治獄之權无治獄之徳者也夲義云腊肉謂獸脂全體骨而為之者堅靭之物喻人之倔强難馴也遇毒喻倔强輩怨懟悖逆而反噬之也刑人而人不服至使有以藉口而興禍心能无羞吝乎然在彼有應治之罪在此有治獄之責以分以理固自應爾何咎之有象曰遇毒位不當也在周公不欲寛假小人而屈朝廷之法故薄責其失而曰无咎在孔子不欲苛䋲下民而緩源本之治故推原其失而曰位不當此交相發明者也一存居尊之體一明反求之道也九四噬乾胏得金矢利艱貞吉傳曰九四居近君之位當噬嗑之任者也四已過中是其間愈大而用刑愈深也故云噬乾胏按腊肉肉藏骨柔中有剛喻人之外善柔而内剛狠也六三柔居剛故所噬如之乾胏骨連肉剛中有柔喻人外鴛鷔而内隂險也九四剛居柔故所噬如之得金矢本義引周禮獄訟入鈞金束矢而後聽之為解似有証據但百姓曲直未分一例以此責之束百矢亦已難矣而况鈞金三十斤豈易辦乎是開富人以賄賂之門而貧乏者雖有竒寃終不獲伸也恐虞書所謂金作贖刑者不如此則周禮亦何可盡信乎訂詁云以此解金矢似與噬乾胏句全不相蒙斷不可用是也傳曰金取剛矢取直九四陽徳剛直為得剛直之道故曰得金矢此說極有理宜用之又曰九四剛而明體陽而居柔剛明則傷于果故戒以知難居柔則守不固故戒以堅貞剛而不貞者有矣凡失剛者皆不貞也其說尤為確妥愚謂艱者其難其慎不敢自恃其剛直也貞者不詭不阿不敢自弛其剛直也故吉雙湖胡氏曰以全體言九四為一卦之間則受噬者在四卦辭利用獄是刑四也以六爻言則受噬者在初上故初上皆受刑四反為噬之主與三隂爻同噬初上者也卦言其位則梗在其中爻言其才則剛足以噬其取義故不同也亦可謂善言易矣象曰利艱貞吉未光也離為明居離之初其明未宣著也故有利艱貞之戒葢以四之體言也傳曰凡言未光其道未光大也戒于利艱貞葢其所不足也不得中正故也則以四之位言六五噬乾肉得黄金貞厲无咎五以中正居尊位為噬嗑之主者也噬乾肉視膚難而視腊胏則易矣傳曰五乘在上之勢以刑于下其勢易也得黄金黄中色金剛物五居中為得中道處剛而四輔以剛得黄金也然五雖處中位剛而體本柔故又以貞厲戒之貞者固守其正无偏无黨厲者兢愓靡寧哀矜惻怛之心也以此噬嗑故得无咎象曰貞厲无咎得當也彖傳言不當位象傳言得當葢位雖不當而所以處其位者則得當也傳曰所謂當居中用剛而能守正慮危也意極渾全勝于耑指用刑說者逺矣上九何校滅耳凶地居其亢陽過其極書所謂怙終不悛非眚乃惟終者也以木械負頸而滅其耳怙終賊刑也凶可知已繋辭云惡積而不可掩罪大而不可解葢履校不懲故至何校㓕趾不戒故至滅耳也鄭康成曰離為槁木坎為耳木在耳上何校滅耳之象也亦通象曰何校滅耳聰不明也傳曰人之聾暗不悟積其罪惡以至于極古人制刑罪之大者何之以校為其无所聞知積成其惡故以校而滅傷其耳誡聰之不明也本義曰滅耳葢罪其聽之不聪也若能審聽而早圖之則无此凶矣說理甚好但于聰不明三字俱未甚顯竊意滅趾曰不行滅耳宜曰不聰乃云聰不明者何也聰字𦂳跟耳字言耳夲聰而蔽塞冐昧故至于此如此說較顯離下艮上賁亨小利有攸往物之合者必聚聚而不以文行之則固陋俚塞之弊生焉傳曰无夲不立无文不行有實而加飾則可以亨矣賁飾也文物彩章著見于外故有亨義以此應酬世故繫属人情不為无益故小利有攸往利往加小見非全美也聖人纔言賁飾便有濫觴之慮用字斟酌如此按家語孔子筮得此卦愀然有不平之色子張進曰師聞卜得賁卦者吉也而夫子有不平之色何也孔子曰以其離耶在周易山下有火賁非正色之謂也夫質也黒白宜正焉今得賁非吉兆也吾聞丹漆不文白玉不雕何謂也質有餘者不受飾也吕覧有說亦是此類故解者以黄白不純色為賁此理近似但以彖傳觀之恐未是孔子語彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也夲義亨字疑衍傳曰天下之事无飾不行故賁則能亨也疏曰不直言賁而云賁亨者由賁而致亨事義相連也亦是或作過脉語曰賁之所以亨者何也亦通天下萬事萬物那箇不從乾坤中來傳云凡卦之變皆乾坤是也葢此卦下體夲乾柔來文其中而為離文明之象也上體本坤剛往文其上而為艮乾之中爻往文于艮之上也何等顯易然二卦之變共成賁義而彖分言上下各主一事者剛寔質也柔虚文也柔來文剛質為主而文輔之幾于彬彬矣故亨分剛上而文柔則是文為主而質為輔也夲義云以其柔來文剛陽得隂助而離明于内故為亨以其剛上文柔而艮止于外故小利有攸往甚是分曉註曰柔來文剛居中得正是以亨剛上文柔不得中位不若柔來文剛故小利有攸往亦通一剛一柔互交而成文者卦之變也于此得天文焉日星羅列雲漢昭回舉在其中矣只如此承上文說為是本義依王弼加剛柔交錯四字似亦不必文明以止人文也明而止者卦之徳也于此得人文焉止字傳作處于文明本義謂各得其分言截然有分限以相守也傳曰質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文非知道者孰能識之最宜詳玩觀乎天文以察時變觀乎人文以化成天下觀乎天文以察時變豈特觀日月星辰之錯列陰陽寒暑之代謝而知四時之遷改哉欽若昊天授歴明時在璇璣玉衡以齊七政皆察之之事也觀乎人文以化成天下如視聽言動人也聖哲謀肅乂則為人文君臣父子夫婦兄弟朋友人也親義序别信則為人文政教行風俗美則天下之化成矣此聖人用賁之道也謹按卦變之說諸家聚訟紛紜由來已乆竊意聖人畫卦之時不過八卦成列因而重之而剛柔往來之義已具何嘗曰某卦變某卦某卦自某卦來如是之作意安排也至于自兩卦變自三卦變其說尤為支離且卦變之說于易之義理无所發明不如除去為妥或有執此卦彖傳為卦變確証者觀折𠂻云剛上文柔而曰分者夲于内之誠寔以為節文之則乃是由中而分出者故曰分也此說可以破卦變之謬學者宜詳察焉象曰山下有火賁君子以明庶政无敢折獄本義主明不及逺以庶政為事之小折獄為事之大恐未確傳曰山者艸木百物之所聚生也火在其下而上照庶類皆被其光彩為賁飾之象然明得山止而不過亦有不輕用明之象君子觀其象于凡百庶司之政一一辦理而修明之如火之照山也葢庶政非文不明也若夫折獄則不敢何也曰折獄者耑用情實有文飾則没其情矣故无敢用文以折獄也此解最確或曰言刻覈者曰深文言鍜錬者曰文致法曰文網弄法者曰舞文治獄之多寃未有不起于文者此皆敢心誤之也君子之无敢折獄法火之止于麓也此又從程傳推開說甚好然則庶政用離折獄用艮正君子之善用賁也初九賁其趾舍車而徒初九剛徳明體剛則不屈于勢明則不惑于利賁飾在下有賁其趾之象舎車弗乘而甘心徒行正所以賁其趾也傳曰舍車而徒之義兼于比應取之初比二而應四應四正也與二非正也九之剛明守義不近與于二而速應于四舍易而從難如舍車而徒行也守飾義君子之賁也是故君子所賁世俗所羞世俗所貴君子所賤以車徒為言者因趾與行為義也何等明透象曰舎車而徒義弗乘也士君子進退出處務合乎義義弗乘者所謂不義而富且貴于我如浮雲也以徒步為賁不以高車駟馬為賁豈非義則榮不義則辱乎傳曰君子之賁守其義而已本義曰君子之取舍决于義而已俱係名言六二賁其須卦之賁成于二二賁之主也然隂柔中正而无應勢必有所附麗然後可以彰其美三居剛得正亦无應而適與之比以徳以位皆有附麗之理故為賁其須之象須附頤而動如二附三而動也象曰賁其須與上興也三在二之上二以須為象者附上而動與之興起以有為也從其文觀之二賁三從其質觀之三實二之所以賁者也九三賁如濡如永貞吉三居離之上體極其文明者也而二四又交賁之故曰賁如如辭助也一陽居二隂之間坎體故曰濡如二隂共比一陽溺于文則不能固守其剛然六二六四柔之正也九三剛之正也彼此以正相切劘則潤澤之濡不為䧟溺之濡矣故曰永貞吉傳曰賁飾之盛光彩潤澤故云濡如光彩之盛則有潤澤詩云麀鹿濯濯永貞吉三與二四非正應相比而成相賁故戒以常永貞正賁者飾也賁飾之事難乎常也故永貞則吉三與四相賁又下比于二二柔文一剛上下交賁為賁之盛也尤為曲盡象曰永貞之吉終莫之陵也文人所以召侮者以其不正也否則晚節難終也常守其正二隂奉事之不暇誰敢侮子傳曰飾而不常且非正人所陵侮也二語可書以自儆六四賁如皤如白馬翰如匪㓂婚媾此爻畢竟主傳為的本義似覺未安傳曰四與初為正應相賁者也本當賁如而為三所隔故不獲相賁而皤如皤白也未獲賁也馬在下而動者也未獲相賁故曰白馬其從正應之志如飛故云翰如非為九三之㓂讐所隔則婚媾遂其相親矣已之所乘與動于下者馬之象也初四正應終必獲親第始為其間隔耳謹按此爻傳義俱覺未安折𠂻云程傳沿註疏本義又沿程傳皆以為初四相賁而為二三所隔故未得其賁而皤然也然朱子語類以无飾言之則已自改其說矣故以後諸儒皆以皤白為崇素反質之義寔與卦意為合又云易中重言如者皆兩端不定之辭此爻言當賁之時既外尚乎文飾而下應初剛又心崇乎質素故兩端未能自决象傳謂之疑者此也白馬翰如指初九也已有皤如之心故知白馬翰如而來者匪冦也乃已之婚媾也按六四為艮止之初又係陰爻不動故白馬句指初九最是可破羣疑象曰六四當位疑也匪㓂婚媾終无尤也正應既逺又有從中隔之者故傳意皆以為所當之位為可疑疑其不能相賁也然以其正應終得相賁故无怨尤謹按六四以柔居柔其位甚當故曰當位而又曰疑者則折𠂻所云當賁之時外既尚乎文飾心又崇乎質素有未能自决之象如此講疑字方妥若如傳義之說則當字宜讀為平聲與他卦俱不恊矣六五賁于丘園束帛戔戔吝終吉五君位而本義以為丘園之象恐不類敦本尚實亦不稱六五徳位且于有喜何干程傳之說尤艱曲難從不若先儒作聘賢說為確葢上陽剛而處外又艮為山乃賢人隱丘園之象六五賁其廬而束帛將之可謂致敬以有禮矣戔戔照說文云委積則吝字說不去宜照本義淺小意看葢六五柔中以正意相將不在禮文之繁縟也其儀則薄其情則渥故雖吝嗇而終吉張衡東京賦云聘丘園之耿介旋束帛之戔戔則其說由來逺矣象曰六五之吉有喜也徴聘賢士帝王盛典且為朝廷得人以成賁之功其可喜何如也上九白賁无咎上九居賁之極亦居止之極賁極而能止故為白賁在丘園之士一被朝廷徴聘恒易以文彩相飾上九純任質素不着一㸃浮華故无咎葢光被上國不改丘園之色也傳曰上九賁之極也賁飾之極則失于華偽唯能質白其賁則无過失之咎白素也尚質素則不失其本正所謂尚質素者非无飾也不使華没實耳本義曰賁極反本復于无色善補過矣二義俱精象曰白賁无咎上得志也賁極而止者上之位亦上之志也繁文縟禮一切掃除只從本色做去則其志得矣葢競華闘靡者非其志而崇雅還淳者乃其志也傳曰雖居无位之地而實尸賁之功為得志也與他卦居極者異矣易酌卷四
