body:
  text: 易酌卷九祁州刁包撰周易不經震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯一震卦也或説的凜然可畏使人有不敢即安之意或説的安然無事使人有吾何畏彼之意讀者當自得之震者一陽動於二隂之下也傳曰陽生於下而上進有亨之義又震為動為恐懼為有主震而奮發動而進懼而修有主而保大皆可以致亨故震則有亨如此説其義始備震之來也虩虩然傳以為顧慮不安之貌曰蠅虎謂之虩者以其周旋顧慮不自寧也本義恐懼驚顧不出傳意傳以笑言啞啞為言笑和適之貌而必曰處震如是則能保其安裕是虩虩正所以啞啞也梁溪先生曰坦坦蕩蕩從兢兢業業得來正是此理震為雷雷之震聲聞百里人恆懼而自失唯祭祀者不然也以鼎實升俎鬯以灌地降神祭祀之事也祭祀之事以一心對越神明雖雷轟於前而罔聞故不喪匕鬯也傳曰臨大震懼能安而不自失者唯誠敬而已此處震之道也昔先生渡河舟幾覆舟中人皆號叫先生獨安坐自若既渡或問之對曰心存誠敬耳此正其驗也朱子曰言人常似那震來時虩虩地便能笑言啞啞到得震驚百里時也不喪匕鬯這箇相連做一串説下來謹按乙巳之夏家兄宰上元豫代收瓜埠官田麥租回時渡江尚未及半而風浪大作舟為顚側不寧水自窗中潑入者再從行皆無人色豫自若也已而抵燕子磯有老吏袁某請曰適間事且不測獨不動聲色何也豫曰人之可自主者恃此心耳今日舟中豫乃若革之心也若不自持汝等必大驚惶舵工懼而失手立見顚覆矣且茫茫大江兩岸相距皆七八里徒驚擾無益也不如安坐不動若輩猶可恃以無恐耳其人首肯雖未敢竊比程先生然而其事頗類故及之彖曰震亨本義曰震有亨道不待言也震來虩虩一句釋震字笑言啞啞一句釋亨字震驚百里不喪匕鬯二句又總釋震亨故不待言也震來虩虩恐致福也笑言啞啞後有則也震來虩虩豈徒多懼已哉知過而有令圖天佑之矣故曰恐致福也笑言啞啞豈徒自若已哉循理而無過舉畏天者也故曰後有則也都是進一步説震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也本義謂出可以守句上宜冇不喪匕鬯四字逺者驚邇者懼雷之震天之威也丘氏曰驚者卒然遇之而動乎外懼者惕然畏之而變于中分疏最確不喪匕鬯句脫如傳説或曰出即鬯字之誤非也本義曰出謂繼世而主祭是就君説傳曰以長子之義通解之謂其誠敬能不喪匕鬯則君出而可以守宗廟社稷為祭主也還是就長子説按易乾為人君之象震為長子之象主器莫若長子序卦有明文矣疏曰出謂君出巡狩等事也君出則長子留守宗廟社稷攝祭主之禮事也當以此説為正象曰洊雷震君子以恐懼修省內外兩體俱震重襲之義故曰洊雷聞雷之洊而恐懼者恆情也君子非特恐懼而已有修省之實功焉恐懼是修省的本體修省是恐懼的工夫外考諸應事接物之際得無有含糊不堪問已者與內考諸處心積慮之微得無有暗昧不堪告人者與惴惴焉常若上無以對天地下無以對鄉里逺無以對聖賢近無以對妻子其嚴乎傳曰君子畏天之威則修正其身思省其過咎而改之尤為醒切又曰不惟雷震凡遇驚懼之事皆當如是余又從而進之曰不獨驚懼雖遇歡悅之事亦然禍之來也固恐其有以召之福之來也又懼其無以當之那一件可輕易放過昔人所謂淵默雷聲也曽子日事三省之功而其所自述則曰戰戰兢兢如臨深淵如履薄氷其得洊雷之義者乎人知其善用詩而不知其善用易也初九震來虩虩後笑言啞啞吉初為成卦之主可該全體故爻辭與卦辭同只加後字言畏懼于前乃能安樂于後也爻之吉即卦之亨也然重申再告不憚諄復無非示人以恐懼修省之意耳象曰震來虩虩恐致福也笑言啞啞後有則也焦氏云福由恐致然福非外至也意思安間笑言啞啞而已啞啞又非侈然自放也循其法則不失常度而已聖人之所謂福者如此笑言啞啞即在震來虩虩中震驚百里虩虩也不喪匕鬯笑言啞啞也原不可分先後至彖傳與初爻加一後字又是一意蓋非恐懼無以致安樂所以足前言之所未備互相發也其説甚好存之六二震來厲億喪貝躋于九陵勿逐七日得二以柔順中正居初之上初一陽上進其鋒不可當岌岌乎殆矣故曰震來厲程傳億作度本義未詳余謂十萬曰億極言數之多也億喪貝言大喪其貨貝也近閲訂詁已先得我心矣從來避患者恆戀戀於所有故未能割去必貨貝無所愛然後能全身逺害也如張子房不愛萬金之資是也躋于九陵升于九重之髙陵也勿逐即書勿敢越逐之逐既喪而有悔心焉則逐之矣二中正自守無容心于其間物極數過則有復反之理七日得言可計日而取也傳云卦位有六七乃更始故曰七日或曰自二至上又自上而二七數亦通謹按億大也觀六五象曰大無喪可見二至九四為艮陵之象也在初九之上九陵之象也喪貝而躋陵墜甑不顧也七日而可得去珠復還也象曰震來厲乘剛也二所以厲者下乘初九之剛故也乘剛而不早為之所難以免矣六三震蘇蘇震行無眚三不中正遇震而不能自立者也蘇蘇傳云緩散自失之狀本義因之竊意震懼之極生氣僅存如所云絶而復蘇是也隂不正而陽正去三以就四反正之道故無過眚也李氏曰陽爻震物隂爻被震隂被震而不敢輕犯其鋒必須逃避而後獲免故二則欲其躋于九陵三則欲其行無眚此説甚妙象曰震蘇蘇位不當也以隂居陽為不當居不當行則當矣九四震遂泥四與初同為震之主初動而二隂辟易其震為有權四動而重隂掣肘其震為無威遂泥者陷于四隂之中而不能自拔也遂即春秋遂伐楚遂入越之遂言其竟陷于泥也傳曰遂者無反之意泥滯溺也本義因之象曰震遂泥未光也陽剛有光明之才震動有光顯之勢徒以處柔而不中正遂為四隂所制曖昧無色故曰未光也六五震往來厲億無喪有事六五當震之時往則上以柔居動之極來則四以剛為動之主往來無安止之地危厲亦甚矣然以柔居剛而有中德中則不失其正故無喪而有事也有事者居中用中之事也傳曰二五雖不當位多以中為美三四雖當位或以不中為過中常重于正也蓋中則不違于正正不必中也天下之理莫善于中于六五可見學易者不可不知此理象曰震往來厲危行也其事在中大無喪也上行危下行亦危危行也其事在固守其中故無喪二喪貝五無喪中德同而初四之剛異也傳以無喪為大竊意大即春秋書大有大去之大猶云全也盡也所以釋億字之義也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言上以隂柔處動之極志氣消索殆盡故曰震索索心驚而目眩顧盼張惶故曰視矍矍以索索矍矍之狀而欲有行其凶必矣震四也逺上不于其躬也近五于其鄰也禍患尚未切身及此而能恐懼修省則鄰之震不至為躬之震矣故無咎三者上之婚媾也無應故有言傳曰六居震之上始為衆動之首今乃畏鄰戒而不敢進與諸處震者異矣故婚媾有言也象曰震索索中未得也雖凶無咎畏鄰戒也中未得傳作中道本義作中心蓋中心有未安也故見于外者爾爾以隂柔之才當震極之地雖凶而無咎者因震鄰之恐用以自戒故也不能虩虩于始而能虩虩于終震極則知變耳艮下艮上艮其背不獲其身行其庭不見其人無咎程子曰看一部華嚴經不如讀一艮卦以耽空守寂為艮便入禪學矣故言止即言行言靜必言動只要事事到恰好處便是艮卦之義艮其背傳云止于所不見也朱子以為誤極辨之謂身動物也唯背為止艮其背則止于所當止也止于所當止則不隨身而動矣是不有其身也如是則雖行于庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得無咎也其義甚精然程傳之理終不可廢故又引入近思録中昔唐太宗除笞背法以為人之五臟皆附于背然則背也者無思無為而為諸體之總會故曰所也止于是所謂于止知其所止也內見有已未免有繫戀處不獲其身內不見有已也外見有人未免有瞻顧處行其庭不見其人外不見有人也人已兩忘而止于至善故無咎也艮其背行其庭雖對説却以艮其背句為主蓋卦義三字盡之矣故彖傳先發此句之義而後以三句總結之也彖曰艮止也時止則止時行則行動靜不失其時其道光明本義曰此釋卦名艮之義則止也然豈塊然不動之謂哉時可以止則止止之時止也時可以行則行行之時亦止也行動也止靜也行止以身言動靜兼心言也時止時行動靜不失其時也傳曰在物為理處物為義動靜合義理乃為不失其時如此時字始有著落或問艮之象何以為光明朱子曰定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定而天光發是也胡氏曰艮一陽見于二隂之上陽明著見隂莫得而掩蔽之故艮獨稱光明二説正互相發艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮其止即以止當背也或曰背字之誤不必傳曰止而不得其所則無可止之理夫子曰于止知其所止謂當止之所也其義甚精又曰夫有物必有則父止于慈子止于孝君止于仁臣止于敬萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各于其所而已其義甚大上下二體如兩山分峙而立相背不相向故相敵不相與也如各人做各人職事各人盡各人道理無雷同依附之迹是以內不見已外不見人而無咎也象曰兼山艮君子以思不出其位兩山相並故曰兼山重艮之象也君子觀重艮之象而屹乎如山無越思焉思不出位即所謂素位而行不願乎外也如居富貴之位便思富貴的道理稍有越思虧却本分事情矣以至貧賤夷狄患難莫不皆然蓋一念悠忽便是廢思一念紛擾便是思出其位位以言乎其分也若夫以體言則曰背以理言則曰所思其位正以止其所也止其所正以艮其背也傳曰當行而止當速而久或過或不及皆出其位也况踰分非據乎此義又進一層蓋卦爻俱從身説大象又歸本于心故不出其位而必曰以思昔人所稱山中宰相弗思耳初六艮其趾無咎利永貞初居艮之最下趾之象也趾主行艮其趾止而不行也與壯于前趾者異矣故曰無咎隂柔之才慮其止于始而未能止于終也故又戒以永貞之利象曰艮其趾未失正也以隂居陽非得正也方艮之初行則不正止則正止而不敢妄動猶未至于失正也未失正故既以無咎許之而又以永貞望之六二艮其腓不拯其隨其心不快二與五非正應失其主矣三以成艮之主橫亘其上是二之主不在五而在三也二之進退不能自主而聽于三猶腓之進退不能自主而聽于股也故為艮其腓之象三過剛不中二柔順無能改于其德其勉而隨之也豈得已哉其心當有鬱鬱不樂者形迹之間似涉浮沉其心則曉然可諒也或曰傳云不拯而唯隨也唯字未的當信然象曰不拯其隨未退聽也本義云三止于上未肯退而聽乎二可見不拯其隨咎不在二而在三也爻既為二原情象復為三著罪是皆春秋筆意也九三艮其限列其夤厲薰心三以剛居剛一陽橫亘中間有艮其限之象上下四隂皆為隔絶有列其夤之象限腰胯也分而為上下則脈絡不相流通夤脊骨也列而為左右則營衛不相統屬矣全體痞結心居中無所依附如焚如灼故曰厲薰心傳曰人之固止一隅而舉世莫與宜者則艱蹇忿畏焚撓其中豈有安裕之理厲薰心謂不安之勢薰爍其中也象曰艮其限危薰心也象但用危字易厲字慨嘆一番言剛而絶物流毒遂至此也絶物者適所以自絶耳六四艮其身無咎傳云四居大臣之位僅能善其身無取之甚也看爻辭云無咎殊無不足之意本義以隂居隂時止則止之説亦未確張氏云四正當心位不言心而言身心不可見身者心之區宇也觀其身之止則知其心之止故無咎此説得之矣象曰艮其身止諸躬也爻曰艮其身象傳恐人誤認身為正面故以止諸躬釋之僂身為躬説文窮從吕從身吕背膂也蓋止諸躬即艮其背也艮其背則不獲其身矣象辭進一步説以補爻辭之所未備與文王卦旨正合六五艮其輔言有序悔亡五君位發號施令使天下各止其所者也其位適當輔處故以輔言輔頰之兩旁骨背後可得而見者見其兩輔之不動則知其口之不言矣咸其輔尚口也艮其輔塞兌也義正相反慎默簡重有不言言必中節矣故曰有序言有序者有倫次有條理德音秩秩也輕發躁出則有起羞之悔艮而有序其悔亡矣本義云悔謂以隂居陽象曰艮其輔以中正也傳依本文解曰言以得中為正止之于輔使不失中乃得正也本義曰正字羡文叶韻可見則只以居上卦之中言之上九敦艮吉五爻皆取象于身至上九在艮山之極為成艮之主非但無咎悔亡而已也故不從人身取象而曰敦艮吉傳曰人之止難于久故節或移于晚守或失于終事或廢于久人之所同患也九能敦厚于終止道之至善也故六爻之德唯此為吉象曰敦艮之吉以厚終也敦艮之吉節以久而益貞守以久而益堅事以久而益勵故曰以厚終也艮下巽上漸女歸吉利貞巽長女在外未成婦也艮少男在內未親迎也故其義為漸本義云為卦止于下而巽于上為不遽進之義有女歸之象焉最精又自二至五位皆得正初終二爻雖不當位然陽上隂下亦得尊卑之正位也故曰女歸吉也女歸必以漸也女子生而願為之有家故以嫁為歸詩之子于歸春秋王姬歸于齊無貴賤一也傳曰天下之事進必以漸者莫如女歸臣之進于朝人之進于事固當有序不以其序則陵節犯義凶咎隨之然而禮義亷恥之重天下國家之本無若女之歸故專以此取義六禮不備貞女不行故女歸之利在貞也在禮聘則為妻奔則為妾不貞則奔可乎傳曰諸卦多有利貞而所施或不同有涉不正之義而為之戒者有其事以貞乃得其宜者有言所以利者以其有貞也所謂涉不正之疑而為之戒者損之九二是也處隂居説故戒以宜貞也有其事必貞乃得宜者大畜是也言所畜利于貞也有言所以利者以其有貞者漸是也言女歸之所以吉利于如此貞正也蓋其固有非設戒也學易須如此分疏始得彖曰漸之進也女歸吉也本義云之字衍衍之字則與晉無異矣傳注于之字俱有解固是若如本義作漸字更確女歸吉女以漸歸故吉也進得位往有功也進以正可以正邦也進得位以卦變言本義曰自渙而來九進居三自旅而來九進居五皆為得位之正傳曰乾坤之變為巽艮巽艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位蓋下體本坤陽進居上而為艮上體本乾隂進居下而為巽進得隂陽之正位故往有巽艮之功也進以正諸家多泛説非是宜緊根上句來進得位則男正位乎外女正乎內矣進以正也進以正則夫夫婦婦而家齊家齊而國治天下平矣故曰可以正邦也進以正即進得位可以正邦即往有功也此釋利貞之義也其位剛得中也剛得中指九五言以陽剛中正居尊位也傳曰諸爻之得正亦可謂之得位矣然未若五之得尊位故特言之此釋卦體也訂詁云但取畫之隂陽更不論卦之男女也此義亦宜知止而巽動不窮也艮止于內而巽以行之動而不過故不窮也傳曰人之進也若以欲心之動則躁而不得其漸故有困窮在漸之義內止靜而外巽順故其進動不有困窮也此釋卦德也象曰山上有木漸君子以居賢德善俗語曰十年之計樹木非積有嵗年未遽髙也故山上有木為漸進之象君子觀其象以居賢德法艮之止也善俗法巽之入也本義曰二者皆當以漸而進此兩平説傳曰人之進于賢德必有其漸習而後能安非可陵節而遽至也在己且然教化之于人不以漸其能入乎移風易俗非一朝一夕所能成故善俗必以漸也此兩截説竊意串説亦是韓退之曰陽子居于晉之鄙薰其德而善良者幾千人善俗之説也君子以移風易俗為己任俗而善雖小人共勉為君子俗而不善雖君子漸墜為小人然非居賢德不可居者安土而不遷也本之躬行積久而後效見所謂涵育薰陶俟其自化也此漸之義也然夬曰居德則忌何也夬之象以德及人而不自有漸之象自有其德而後及人也初六鴻漸于干小子厲有言無咎從來有序者必稱鴈行以其不失次也親迎者必先奠雁以其不亂羣也漸進之義從夫之道皆于是乎見之故六爻皆取鴻象或曰木落南翔氷泮北徂其往來也有時亦漸之象也初隂柔居下上無應援漸于干之象也干水涯也漸于干戢翼以俟時耳小子未更事之稱見已然不見未然危懼有言愛鴻也非知鴻也然鴻固無咎也傳曰君子深識逺照知義理之所安時事之所宜處之不疑小人幼子非能燭理故有言蓋不知在下所以有進也用柔所以不躁也無應所以能漸也若漸之初而用剛急進則失漸之義不能進而有咎必矣其義甚精象曰小子之厲義無咎也小子之厲以為未得所安耳不知始雖翅垂終當翼振于守身之義為無咎也六二鴻漸于磐飲食衎衎吉二柔順中正上得九五之君為之應其進安且裕矣故有漸于磐之象傳曰磐石之安平者江河之濱所有進至是不復如干之厲而有言矣宴息得所飲啄自如吉可知也象曰飲食衎衎不素飽也傳曰爻辭以其進之安平故取飲食和樂為言夫子恐後人未喻使伴食輩得以藉口故以不素飽釋之言其以伐檀之君子為和羮之大人也楊誠齋曰食君之祿又豈素飱云乎亦欲置國家于磐石之安納人民于和衎之樂而已故傅説之志在中興有商而非后則不食其祿孟子之志在平治天下而食前方丈則得志不為絶好名理昔王曽大魁天下或戲之曰狀元試三場一生喫著不盡公正色曰曽平生之志不在溫飽庶幾此爻之義矣九三鴻漸于陸夫征不復婦孕不育凶利禦冦傳云安處平地則得漸道本義云鴻水鳥陸非所安也本義為是三過剛不中上無正應處非其據故有漸于陸之象三四相比不相應非耦也三比四則夫征不復如魯公孫敖從紀氏楚子反從夏姬之類四比三則婦孕不育如楚鬬伯比不育榖於兔之類鴻失匹則不再配三四夫婦如此愧漸陸之鴻多矣非理相從者冦也比則不利禦則利三以過剛之才當艮止之極故以禦冦勉之傳曰守正以閉邪所謂禦冦也胡氏曰當合卦爻辭觀之卦辭女歸吉者以三四兩爻也爻辭夫婦凶者亦三四兩爻也卦以兩體論巽女有歸艮男之象爻以應否論當相應之位者為正不當相應之位者為邪四女無歸三男之禮也特相比而相得為私情之相合耳易之取義不同如此象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也傳以為好醜之醜疏曰醜類是也言三與初二雖有隂陽之殊同體艮卦故謂之羣醜也外比則內離矣四無媒而合失夫婦之正道也孕其敢育乎從冦逆也禦冦順也三與二協力同心以禦失道之冦則醜類合矣故曰順相保也順保即守望相助之意傳曰君子之于小人比也自守以正豈惟君子自守其己而已乎亦使小人得不陷于非義是以順道相保禦止其惡故曰禦冦或曰雁羣不亂飛則列陳相保亦有禦冦象六四鴻漸于木或得其桷無咎焦氏云乘剛不安之説殊無干涉非也鴻趾連不能握枝漸于木不安甚矣柔而乘剛之象也或得橫平之柯處之則轉危為安而無咎矣蒙引曰或得者言有此而庶幾可望之辭也最得或字之義傳曰四居正而巽順宜無咎者也必以得失言者因得失以明其義也象曰或得其桷順以巽也四在巽體之下而又以隂居隂順以巽也順以巽故得桷也傳曰桷者平安之處求安之道唯順與巽若其義順正其處卑巽何處而不安如四是也九五鴻漸于陵婦三嵗不孕終莫之勝吉五以陽剛中正居尊位漸于陵之象也陵視于陸于磐髙矣而逺于水亦非安也二漸磐在江河之濱與五正應而為三四所隔故有此象也傳曰三比二四比五皆隔其交者也婦謂二二為五之婦也中遭隔絶獨隂不成其能孕乎焦氏云歷三位而後至故有三嵗不孕之象然三四以邪比二五以正應邪不勝正故曰終莫之勝也傳曰以不正而敵中正一時之為耳久其能勝乎在四既以邪正為安危在五又以邪正為勝負而即以邪正為吉凶也學易者可以觀矣象曰終莫之勝吉得所願也二五相應其所願也若為三四所勝則失願矣豈知天道人心終有反正之理乎故信其必得也上九鴻漸于陸其羽可用為儀吉傳曰安定胡公以陸為逵逵雲路也謂虛空之中爾雅九達謂之逵逵通達無阻蔽之義本義云以韻讀之良是五爻皆以進而止上則翺翔天際故有漸于逵之象處漸之終巽之極雖無位而有用也其羽可用為儀吉本義云儀羽旄旌纛之飾也按羽之用雉取其綵鷺取其白鴻取其知時上九之儀取其秩序非取其文明也傳曰在人則超逸乎常事之外者也進至于是而不失其漸賢達之髙致也故可用為儀法而吉也傳義甚確象曰其羽可用為儀吉不可亂也本義云其志卓然豈可得而亂哉傳云可用為儀以其有序而不可亂也觀鴻之飛從容間適後先秩然莫之或紊所謂其儀不忒者也不亂言其儀度非言其志意也本義解爻辭切鴻恐未切上九解象辭切上九恐未切鴻不如傳説的完美自古髙尚一流天子不得臣諸侯不得友然或一意枯寂如長沮桀溺之流其羽不可用為儀也或一意放曠如竹林七賢之流其羽不可用為儀也超然物外以禮自守容止可觀進退可法瑟僴赫喧儼然為一代之師表焉此大賢以上之事非幽人達士所可幾及也兌下震上歸妹征凶無攸利歸妹亦女歸也而義各不同蓋漸與歸妹相對而相反之卦也漸巽上艮下少男下長女而長女歸于少男也故曰女歸剛先求于柔陽先求于隂是以貞吉無不利歸妹震上兌下少女悅長男而長男歸于少女也故曰歸妹柔先求于剛隂先求于陽是以征凶無攸利男感而女應則正女感而男應則邪此漸歸妹之分也不以理而以欲不以道而以情將傷身敗德故曰征凶失尊卑之序拂剛柔之常旡所往而可也故曰無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也歸妹卦本不好聖人却説出許大道理來此泛言男女交感之理也一隂一陽之謂道物無獨生而獨成者故男有室女有家天地之常經是乃其大義也震長男天交于地之始兌少女地交于天之終天地不交則人類滅絶萬物何由而興乎是故天地之道寄諸男女男女之道合乎天地也古往今來繩繩相續人所以始而終終而復始者以歸妹故也猶禮云大昏萬世之嗣也本義云歸者女之終生育者人之始固自切貼説以動所歸妹也女悅而男動悅以動也所歸妹言所歸在妹也歸者妹實主之而長男不與焉征凶位不當也無攸利柔乘剛也中四爻俱隂上陽下初上二爻亦如之位不當也三乘二五乘四柔乘剛也從未有男子制于婦人之手而家道克有成者傳曰男女有尊卑之序夫婦有唱隨之禮此常禮也如恆是也茍不由常正之道徇情肆欲唯説是動則夫婦瀆亂男牽欲而失其剛婦狃悅而忘其順如歸妹之乘剛是也所以凶無所往而利也象曰澤上有雷歸妹君子以永終知敝雷動于上而澤水為之搖漾似女悅以從男之象故為歸妹君子觀其象而知始合不以正必有中道棄捐之悔氓之蚩蚩所為作也傳曰夫婦之道當常永有終必知其有敝壞之理而戒慎敝壞謂離隙歸妹悅以動者也異乎恆之巽而動漸之止而巽也少女之悅情之感動動則失正非夫婦正而可常之道久必敝壞知其必敝則當思永其終也其義醒矣再由夫婦之道推之天地間自進身交友以至應事接物其罅漏有自其破敗有因須早見而預圖之如器然安蝢的好則久而不敝矣防于未然非救于已然知其敝所以永其終也以先事之哲為善後之圖惟是絶私情而篤公義母若少女長男以悅而動則可耳初九歸妹以娣跛能履征吉初有陽剛之德女之賢明者也在下而無正應故為娣之象古者諸侯一娶九女嫡夫人以姪娣所以廣繼嗣也焦氏云娣之為言第也言以次第御于君也婦人從人娣又從其從人者雖有賢德未敢直行其意如跛者之能履也跛不能自行依人以行娣不能自行依君以行如是而行分固應爾吉之道也象曰歸妹以娣以恆也跛能履吉相承也以恆本義云有常久之德或曰姪娣之從古今常理曰以恆謂以常禮而行也其説甚好相承非一人之言也與諸姪娣同承順主君之命而行耳曰以恆曰相承便有實命不猶之意小星所為作也此爻衛戴媯足以當之九二眇能視利幽人之貞二剛而能中正室之象進乎娣矣娣跛能履承三也二眇能視承五也五為正應而質反隂柔其配不良能成內助之功乎故不能逺照而晦其明以自安也五隂柔不正動于悅者二不能為容悅惟以幽靜之德固守正道故曰利幽人之貞傳曰二之才如是而言利貞者利言宜于如是之貞非不足而為之戒也本義云幽人亦抱道守正而不偶者也俱極明備象曰利幽人之貞未變常也傳曰守其幽貞未失夫婦常正之道也世人以媟狎為常故以貞靜為變常不知乃常久之道也此即柏舟之詩所謂我心匪石不可轉我心匪席不可卷者也蓋不以配之不良而改其德也此爻衛莊薑足以當之六三歸妹以須反歸以娣程朱俱作待謂不正之女人莫之取故有所待也或按天官書須賤妾也亦通三隂柔不中正而偃然居二之上所謂狐媚專寵者也反歸謂宜出而歸之使如初之卑巽善下以安娣媵之分可耳歸即春秋出歸之歸與歸妹不同象曰歸妹以須未當也未當謂以隂居陽也柔乘剛賤陵貴之象也此如仕者不自貴重而以事是君為容悅之類九四歸妹愆期遲歸有時四以陽居隂似不當位然處柔婦人之道而居上尊貴之體蓋賢明之女自守以待佳偶雖抱標梅之嘆而不遑恤也以其無正應故曰愆期以其有女德故曰遲歸有時如孟光之待梁鴻也象曰愆期之志有待而行也象復指出志字即志可則之志謂其心確有以自守未嘗俯仰取容也學者抱道擇主而不輕以身許人其九四之謂乎六五帝乙歸妹其君之𬒮不如其娣之𬒮良月幾望吉朱子以帝乙歸妹與箕子明夷髙宗伐鬼方之類俱當時占得此爻余未敢信五以中正居尊位下應九二為王姬下嫁之象以婚姻之禮制自帝乙故推本言之小君德冠後宫不與諸娣爭飾故其君之𬒮不如其娣之𬒮良也漢馬后常衣大練裙不加緣朔望諸姬至朝謁望見后袍衣疏粗以為綺穀就視乃笑后曰此繒特宜染色故用之耳君之袂不如娣之袂良馬后有焉王后配月月幾望吉傳云德謙盛而不盈也本義云后德之盛無以加此玩幾字傳尤確象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也上二句直述爻辭下始解之五柔德而居中位故以其貴尚者行之所貴尚者在德不在飾也上六女承筐無實士刲羊無血無攸利孔子曰婚禮合二姓之好以為宗廟主是故女德不可以奉祭祀則無取焉上六以隂柔居歸妹之終而無應傳云女歸之無終者也本義云約婚而不終者也傳主祭祀説筐即詩維筐及筥之筐謂諸侯大夫妻誠敬以奉祭祀之器也承筐而無蘋藻之實則女無以奉祭祀矣按禮諸侯之祭親割牲卿大夫亦然割取血以祭也士刲羊無血無以奉祭祀矣夫婦共承宗廟旡以奉祭祀則于義當離是夫婦之不終者也故無所往而利本義主婚姻説女承士之筐而無幣帛之實故士不能具酒食以召鄉黨僚友刲羊無血也所以為約婚不終之象二説俱有理宜併存之胡氏曰震有虛筐象兌羊象上與三皆隂虛無應故有承筐無實刲羊無血之象謹按前説主奉祭祀于義較長蓋夫婦之道以奉祭祀為重也象曰上六無實承虛筐也象單解承筐句即女之無實以該士之無血也或曰卦為歸妹設故言女而不及士離下震上豐亨王假之勿憂宜日中豐卦是極好的爻辭却不甚好以其盛極而衰也朱子曰人君于豐之時當如捧盤水戰兢自持方無傾倒滿溢之患若才有纎毫自滿之心即散矣所以此處極難豐者事事完全物物美備若天助其成者然盛大之勢故自具有亨義也王者天下所歸往也合天下之人民物力統歸一人惟王者可以至此故曰王假之也其勢方隆則其為憂方大上體震震有憂象故戒之曰勿憂勿憂與勿恤不同言其勿徒憂也下體離離南方之卦有日中象故曰宜日中盛到極處須常常如日中時候保護才好不然或過或不及皆非所宜也彖曰豐大也明以動故豐或曰豐盈或曰豐盛或曰豐厚豐之為義不一皆可以大字括之離明震動相資為用故豐也王假之尚大也勿憂宜日中宜照天下也王假之尚大也傳曰所有既大其保之治之之道亦當大也故王者之所尚至大也蒙引云居得為之位操得為之勢而又當此得為之時凡百如意所為不期侈而自侈也故曰尚大也尚大所以有憂道也此説亦通勿憂宜日中日所以照也日中所以普天下而無遺照也有遺照則釁孽萌于其間矣故必四照如舜之明四目達四聰而後可此釋卦辭也大意已完下又因日中一言而推極之本義所謂又發明卦辭外意是也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎日中則昃如日之升則不昃月盈則食如月之恆則不食天地盈則與時消天地虛則與時息是天地不能違時也而况于人與鬼神乎人與鬼神有盛有衰亦與時消息而已然而言天地又言鬼神何也天地者鬼神之所以為體也鬼神者天地之所以為用也造化之迹如風雨露雷之類皆是也徹上徹下莫不在理數倚伏之中傳曰為此誡者欲其守中不至過盛也本義曰言不可過中也明乎此而持盈保泰之道思過半矣象曰雷電皆至豐君子以折獄致刑皆至雷電交作也威照並行故為豐之象君子觀其象以折獄致刑傳曰折獄者必照其情實唯明克允致刑者施威于姦惡唯斷乃成數語最精蓋獄以離折電之照也洞若觀火也刑以震致雷之威也德威惟畏也在此有確然曲中之情曰折謂屈服也在彼有固然應得之罪曰致謂自取也噬嗑之明罰敇法則曰先王立法者也原其情而制律以示之使勿犯也豐之折獄致刑則曰君子奉法者也得其情而按律以治之使勿枉也然則二卦之分一以明在上一以明在下故也旅明在上而亦云君子何也傳曰旅取慎用刑與不留獄君子皆當然也其義明矣初九遇其配主雖旬無咎往有尚初與四皆陽兩剛非應者也在豐則不然離居明之初震居動之初明與動合則有用分則無為故初遇四遇其配主也以下並上也相須猶形影相資猶表裏雖旬而無咎也旬均也盈數也明之盈者動資之動之盈者明資之何咎之有傳曰非明則動旡所之非動則明無所用相資而成用同舟則胡越一心共難則仇怨協力事勢使然也絶好名理往有尚者往而相從則能成其豐而有可嘉尚也象曰雖旬無咎過旬災也傳曰聖人因時而處宜隨事而順理夫勢均則不相下者常理也然有雖敵而相資者則相求也初四是也所以雖旬而無咎也與人同而力均者在乎降己以相求協力以從事若懷先己之私有加上之意則患當至矣故曰過旬災也均而先已是過旬也一求勝則不能同矣謹按胡氏來氏皆以旬為十日一謂數之盈一謂日之象似亦有理六二豐其蔀日中見斗往得疑疾有孚發若吉傳曰明動相資乃能成豐二為明之主又得中正可謂明者也而五在正應之地隂柔不正非能動者乃才不足耳既其應之才不足資則獨明不能成豐既不能豐則喪其明功故為豐其蔀日中見斗之象本義云蔀障蔽也大其障蔽故日中而昏也或曰如樂廣之客見杯中蛇影遂致疾蓋因疑而得疾也亦通胡氏曰日中豈有見斗之理即暌載鬼一車之意正與疑疾合然則畏其疑不往而遂已乎有道焉積至誠以動之發其蔀而孚其疑可也發有感發啓發二意感發所以化之也啓發所以開之也牖其暗而使之明振其柔而使之強事君之善道故吉也傳曰古人之事庸君常主而克行其道者己之誠意上達而君見信之篤耳管仲之相桓公孔明之輔後主是也余謂孔明允當此爻管仲未也必也周公之于成王乎象曰有孚發若信以發志也柔暗之君皆因志不立信以發志者不二勿欺盟天地泣鬼神而謂不足感動其志乎此格心本領也九三豐其沛日中見沫折其右肱無咎程朱本王弼説沛作斾謂幡幔也焦氏云公羊傳草棘曰沛盂子沛澤多而禽獸至沛亦蔀之義也沫子夏以為小星薛氏謂斗之輔星故傳曰星之微小無名數者也二説俱有理豐其沛日中見沫蔽益近而昏益甚矣三與上六為應故也三剛正處離之上其才足以有為上隂柔無位動終而止掣肘甚矣如人之折其右肱也在禮子能食教以右手右便于左折其右肱欲效一臂之力不亦難乎然上之咎非三之咎也故原情而恕之傳作無所歸咎恐不必象曰豐其沛不可大事也折其右肱終不可用也凡成大事者以明為主明有所蔽則不能及逺欲濟大事其可得乎肱倚以為用斷折則無可用之理其終也已終不可言永為上所棄絶也士之懷才抱德未獲一售而束手坐困者此類是也九四豐其蔀日中見斗遇其夷主吉象與六二同二應五四承五也四居大臣之位近柔暗之君雖為動主而明無所資况不中不正乎傳曰豐其蔀蔀周圍掩蔽之物周圍則不大掩蔽則不明日中見斗當盛明之時反昏暗也幸與初同德相應若資之以為用戮力協心禆益非淺也下曰配不以耦上為僣上曰夷不以就下為卑同稱主者各為一卦之主也可以開其暗故曰吉也象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也不中正而在髙位非所宜也故曰不當位臣以陽居隂君以隂居隂幽暗未光明也故曰幽不明同是象也不于六二釋之而于九四釋之何也二之昏暗在五且有發蒙振懦之功有功無過故專釋有孚發若一句四不中正五之昏暗當平分焉功過各不相掩故詳釋之其義精矣傳云陽剛相遇吉之行也似以吉行為句看來遇其夷主吉爻辭也行也當為一句震體也震行則遇離之初明動相資故吉也史稱唐李吉甫不得在端亮之列位不當也謀于裴垍疏三十餘人數月之間選用略盡當時翕然稱為得人庶幾遇其夷主者矣六五來章有慶譽吉或以章為四曰五柔屈體下求四剛隂陽交錯成章也其説亦通但六二文明中正離之主也又能以誠意事君誠則形著動變而章美燦焉黻黼皇猷潤色太平此物此志也五能招徠之俾賁然來思則福慶集于身而名譽彰于外矣故吉也傳曰章美之才主二而言然初與三四皆陽剛之才五能用賢則彚征矣如此説始無遺意訂詁又本其意而廣之曰下四爻二應五四比五初則應四以從五者惟三為上所排擠無由自通于五今五既來章則上六之媒孽有所不行且將收之于廢棄之餘而資其一臂之用所不齒者惟上耳衆賢之進如茅斯拔大姦之去如距斯脫吉孰如之其義益暢矣象曰六五之吉有慶也人君為天下造福故曰有慶也天下蒙其福則有譽不待言矣上六豐其屋蔀其家窺其户閴其旡人三嵗不覿凶傳曰六以隂柔之質而居豐之極處動之終其滿溢躁動甚矣處豐大之時宜乎謙屈而處極髙致豐大之功在乎剛健而體隂柔當豐大之任在乎得時而不當位如上六者處無一當其義備矣豐其屋以所處太髙言蔀其家以所居不明言窺視也閴寂也窺其户閴其無人以昏暗髙亢自絶于人而人莫之與言三雖正應至于三嵗之久而不得見則亦終莫之見矣凶可知也或曰自三至上歷三位故曰三嵗傳曰不覿謂上不見人蓋不變也六居卦終有變之義而不能遷是其才不能也謹按來氏謂權臣得罪披離之後多有此氣象象曰豐其屋天際翔也窺其户閴其無人自藏也天際翔朱子云言其屋如翬斯飛髙大至于天際自藏傳承閴其無人説謂人以其昏暗自髙大故皆棄絶之自藏避而弗與親也本義就上六説謂障蔽也言上六尊大之極藏匿之深自視太尊人莫敢近豈人之絶彼哉彼自絶乎人耳如此説更確艮下離上旅小亨旅貞吉傳曰山止而不遷火行而不居為去其所止而不處之象本義因之或曰山止不遷有旅館象火行不居有旅人象亦好旅無大通大行之理故曰小亨傳曰如卦之才可以小亨得旅之貞正而吉也貞固卦所自有也本義曰可以小亨而能守其旅之貞則吉則似戒辭以卦德卦體觀之柔中矣而順剛內止矣而又外明卦固具有貞義傳説正與彖傳合本義又云旅非常居若可茍者然道無不在故自有其正不可須臾離也名言宜服蒙引本其意而廣之曰言亦必忠信行亦必篤敬必仁于僮僕必義于同侣必禮以律身必智以照物其義益備矣梁溪先生謫居揭陽嚴立課程靜坐讀書相資為用以小學近思録教來學者可謂得旅之時義矣彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也徐氏曰一柔在外而處二剛之中是羇旅之人交于強有力者蓋離從乾變坤之一柔得上卦之中而順乎乾之二剛自不至以卑而取辱以髙而招禍矣此釋小亨義徐氏又曰非賢不主非善不與止而麗乎明也則似以止屬己以明屬人非卦德矣內艮止外離明言靜專自守而外洞乎物情也此釋貞吉之義旅之時義大矣哉時義之大程朱只云難處夫難處者時也難盡者義也二義須兼言之考戴記或旅于館或旅于途或潔身而去或畏難而行或奉命而往或語或默或步或趨或進或退或存或亡俱有因時徙義之道正可發明大字之義吳氏謂旅非商旅之旅自天子諸侯大夫以至于聖賢皆有旅故一一援其人以實之蒙引獨以天子之旅為未然曰天王出居于鄭變例也故周公繫六五爻辭不取君象正以天子無旅故也若然則魯昭公之在楚唐中宗之在房州獨非變例乎即孔子之轍環孟子之歷聘亦自變例若得君行道烏用是栖栖者為哉大抵自天子以至于庶人皆有旅皆有旅則皆有其時義也象曰山上有火旅君子以明慎用刑而不留獄本義曰慎刑如山不留如火似未盡又語録云不干旅事非也丘氏曰山者火之所旅久則延燒獄者囚徒之所旅久則淹滯得之矣蓋明而不慎則必剛愎以輕民命慎而不明則必冒昧以殘民生明慎用刑而留獄則或以姑息養姦惡或以優柔誤善良君子所以明慎用刑而不留獄也不留獄亦有二義元惡大憝立置重典不至以逗遛貽意外之變一眚小過槩從寬政不至以濡滯傷好生之恩或曰留獄猶云懸案非留于獄中也亦通謹按案懸則留于獄中亦必然之勢也初六旅瑣瑣斯其所取災初以隂柔處旅之下如商賈一流匐匍于道路計較于錙銖固瑣瑣矣若夫役役客邸俯仰茍容搖尾以乞憐亦瑣瑣也鄙猥瑣細何足道哉災之來也斯其所自取耳災謂悔辱患害也傳曰當旅困之時才質如是上雖有援無能為也四陽性而離體亦非就下者也又在旅與他卦為大臣之位者異矣其意甚明象曰旅瑣瑣志窮災也象復本其志而責之凡人莫先于立志志立則雖處窮途落寞之中而屹然自若初六之災由其志氣窮蹙也志窮即災非别有災也六二旅即次懷其資得童僕貞二以柔順之德居中得正即次也有次舍可居則無假館之勞承三之剛懷資也有財貨可畜則無稱貸之苦乘初之柔得童僕也有童僕之貞良可任則小大一心奉命惟謹無防欺御詐之事處旅之善進退綽綽有餘裕者也傳曰柔暗在下者童也強壯處外者僕也又曰不云吉者旅寓之際得免于災厲則已善矣如此始無遺意象曰得童僕貞終無尤也象多以上句該下亦有以下句該上者得童僕貞之類是也即次懷資而又得童僕之貞雖厮役皆以正道相朂則主人因而寡過矣何尤之有九三旅焚其次喪其童僕貞厲傳曰處旅之道以柔順謙下為先三過剛不中故全與二反居下體之上近離則焚其次無置身之地與二之即次者異矣去初逺則喪其童僕貞無奔走服役之人與二之得童僕貞者異矣羇旅之人所憑依者童僕耳失其心則舟中敵國為可危也此本傳説貞字連上句為義與六二得童僕貞一例看極是木義則貞字連下句為義謂九三雖貞而厲也亦通象曰旅焚其次亦以傷矣以旅與下其義喪也焚其次則併其資而盡之困于窮途而不能前亦以傷矣傳曰以旅之時而與下之道如此義當喪也本義更不增減一字蓋君臣主義主僕亦然在平時且當與下以寬而况旅乎剛而寡恩喪其義故喪其童僕也九四旅于處得其資斧我心不快四以剛居柔又在上體之下得處旅之道也故曰旅于處按詩于時處處于時廬旅則處與旅不同只是止息之義得其資斧當如傳作兩件看陽實為資有所利賴也剛斷為斧有所防護也或曰資當作齎或曰資當作齊或曰只是資用之斧俱非也資自是懷其資之資四負剛明之才得君行道其心也徒旅于處而已雖得資斧四何快于是我四自謂也傳曰四以剛明之才為五所與為初所應乃旅而得貨財之資器用之利也雖在旅為善然四非正位上無剛陽之與下惟隂柔之應故不能伸其才行其志其心不快也其説最為顯切本義全用之特約其辭耳象曰旅于處未得位也得其資斧心未快也四近君宜居大臣之位而乃旅處中未得位也未得位三字承上一句起下二句故下但直述爻辭非若諸象傳之各自為解也若曰惟不得位而旅處故雖得資斧未快也夫得資斧而心猶未快况甫出門而瑣瑣乎然則四之心視初之志相去逺矣六五射雉一矢亡終以譽命傳曰離為雉文明之物射雉謂取則于文明之道而必合如射雉一矢而亡之發無不中則終能致譽命也譽令聞也命福祿也此理最見成但雉文明之物而亡之便是死雉何以有譽命朱子不取其説以為凡言終吉者皆是初不甚好也故以一矢亡作亡矢謂所喪不多也竊意雉得而矢將焉往若云矢雉俱亡不應有譽命矣訂詁云亡即出亡之亡離火炎上故有出亡象雉者文明之物射者君子之事射雉者謂取則于文明之道如以雉為質的然離從乾變六五舍乾之剛健而得柔之文明處得中道以斯德在羇旅之中終必有譽命逮之雖挾一矢而出亡旅不久矣此説斟酌程朱之間又得終字意固自有理又曰王者無旅旅則失位故此爻不取君位象然少康逃虞思之國宣王匿召公之家是亦旅也余謂唐自玄宗以至肅德諸君皆嘗蒙塵而卒不失舊物可不謂旅乎此論正不可少謹按此爻説者雖俱有理但五不取君位謂天子無旅似非通論蓋易中有無其事而有其象者况實有其事者乎試取來氏集注約言之離雉之象也錯坎矢之象也變乾居一雉飛矢亡之象也中爻兌巽兊悅也又為口以口悅人譽之象也巽以申命命之象也以用也五得中乎外而順乎四之剛又應二之中正如明皇之幸蜀肅宗之即位靈武德宗之幸奉天皆旅也可謂射雉矢亡矣後得李郭諸臣恢復故物終得其譽又得命令于天下如建中之詔是也此説于義似長併小象上逮二字亦有著落因録存之象曰終以譽命上逮也傳解上逮云上下與之是多却一字朱子云不得如伊川説是也但曰譽命聞于上恐亦未安訂詁曰逮及也以臣言則譽命者君所豫以君言則譽命者天所豫皆從上而及者也其説亦通上九鳥焚其巢旅人先笑後號咷喪牛于易凶離為飛鳥上九剛不中而處最髙又離體故取鳥象離為科有巢象而火又附焉有焚巢象鳥焚其巢則失其安而無所止矣特加旅人二字所以别于鳥也旅人始以髙亢鳴得意先笑也失安莫與求旅于次旅于處不可得後號咷也牛順物任重致逺旅所必賴也輕率躁慢則喪其順而無以為力矣困于旅故凶也離為牝牛又離火性上為躁易之象故曰喪牛于易象曰以旅在上其義焚也喪牛于易終莫之聞也義者宜也旅之義宜下不宜上以旅在上髙亢而不保其居故其義當有焚巢之事也凡事著一番畏難意思則始迷尚期終悟一味輕易視天下事無足以入其心者聽之不聰其終也已又安望其有聞知乎謂終身無覺悟之期也或曰浪迹天涯悠忽度日終不能有聞于世也亦通梁溪曰夫子去魯十有四年與二三子棲遲容與其進德修業有不可知之妙所以贊易大旅之時義巽下巽上巽小亨利有攸往利見大人傳曰一隂在二陽之下巽順于陽所以為巽也本義又加入字曰一隂伏于二陽之下其性能巽以入也象為風亦取入義其義愈詳矣陽大隂小以其從陽也故亨以其從陽者隂也故曰小亨一隂上從二陽初往二四往五無不利者故曰利有攸往初見九二之大人四見九五之大人皆能以陽剛之德濟隂柔之質引而入于中正之域也故曰利見大人彖曰重巽以申命合兩巽為卦故曰重巽傳曰君子體重巽之義以申復其命令故本義曰釋卦義也申重復也丁寧反覆之意非謂有兩命也讀書盤庚及多士多方之誥則可見矣剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人陽性以中正為志剛而巽乎中正其志行矣本義指九五以二中而未正也鄭氏曰九二巽乎中者也重巽則兼五言之故曰巽乎中正而志行如此則分曉矣又曰初六順乎剛者也重巽則兼四言之故曰柔皆順乎剛尤分曉蓋順乎剛則不至柔媚而為諂剛順乎中正則不至褊急而為邪此巽之所以為巽而小亨利有攸往利見大人者也象曰隨風巽君子以申命行事傳曰隨者相繼之義本義因之蓋巽為風風以繼風故曰隨風重巽之象也君子觀重巽之象以重申其命而又必行其所命之事不徒託諸空言也李氏曰天下有風姤所以施命若風相隨而至則是申命不一之象故君子之出命也必至再至三以先戒之然後其事可行于天下也文告勤懇而非出乎身以加諸民雖家諭户曉祗故事耳勵精圖治而不能使匹夫匹婦丕應傒志即發號施令何為也哉必如君子之德風而後可以申命行事也初六進退利武人之貞巽為進退為不果初以隂柔而居最下故有此象然利在武人之貞者所以鼓勵其志使之有進而無退也本義有以濟其所不及而得所宜句最精象曰進退志疑也利武人之貞志治也進退兩念交戰于胸中而不能自決志疑也把狐疑念頭整頓起來不使汚壞卑萎了志治也志治則確然自信而無所疑矣傳曰治謂修立也修者不汙之謂立者不卑之謂九二巽在牀下用史巫紛若吉無咎二以陽居隂而在重巽之下過于巽者也故曰巽在牀下古尊者坐干牀上卑者俯伏拜跪于牀下正其義也用史巫紛若句殊難理會向來以程朱為未安遍求諸家之説畢竟傳義較勝傳曰史巫者通誠意于神明者也紛若多也苟至誠安于謙巽能使通其誠意者多則吉而無咎謂其誠足以動人也由此言之如古之人有盛德及人而人皆代為祈福之類蓋至誠感人而因以格神也用史巫者史巫為二用非二用之也本義丁寧煩悉其辭以自道達亦未確余向有説云史用以占卜者也巫用以禱祀者也紛若者史不已而巫巫不已而史極言其小心慎畏不安之甚也誠敬如此可通神明是以吉而無咎也亦通存之象曰紛若之吉得中也傳曰二能使其誠意者衆多紛然由得中也陽居中為中實之象中既誠實則人自當信之以誠意則非諂畏也所以吉而無咎此説確不可易九三頻巽吝三以陽居陽過剛不中者也因處巽時而勉強以下人非其本心然巽豈可以聲音笑貌為哉故頻巽而頻失為可吝也象曰頻巽之吝志窮也傳曰三之才質本非能巽而上臨之以巽承重剛而履剛勢不得行其志故頻失而頻巽蓋巽者本非其志故窮困而不能常也六四悔亡田獲三品隂柔無援承乘皆剛宜有悔也以隂居隂在上體而能下故悔可亡田獲三品傳云遍及上下也朱子以為牽強但直作卜田之吉占恐未然焦氏云三品指下三爻四居五下巽順而盡事君之禮故初六九二九三莫不巽順之如田獵而有三品之獲也此説亦通三品之説舊矣一為乾豆一為賓客一以充君之庖又有三殺之説詩車攻篇自左膘達右腢為上殺達右耳本為中殺左脾達右䯚為下殺此即就田時所獲言之猶切象曰田獲三品有功也四居柔得正所謂範我馳驅者故有田獵之功豈與詭遇獲禽等乎以隂柔之才而遇上下之剛獲免于悔幸矣乃不惟無悔而且有功傳曰天下事茍善處則悔或可以有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉五居尊位為巽之主命令之所自出也以剛健之德居中正之位所謂剛巽乎中正而志行者也故貞貞則吉而悔亡無所不利矣五非有悔而居巽體巽為疑卦故戒之以其不善而變也故無初以其變而善也故有終所謂圖惟厥終也本義曰有悔是無初也亡之是有終也尤為明切先庚三日後庚三日傳曰甲者事之端也庚者變更之始也十干戊巳為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也本義云先庚三日丁也後庚三日癸也丁所以丁寧于其變之前癸所以揆度于其變之後二義俱不可少然先庚後庚反覆告人以欲變之意不一而足所謂重巽以申命也以此創制變法必獲美善之道吉可知已象曰九五之吉位正中也二曰得中未正也五曰位正中則無偏無黨無過無不及命令之出合天理而當人心矣故吉有獨歸焉上九巽在牀下喪其資斧貞凶上以剛居柔而處巽之極過于巽者也故與二同象失其所安矣資斧在旅作兩件看在巽作一件看蓋旅之時以懷其資為善故二物併需巽之時只取斷義喪其資用之斧失其所以斷也上九本剛非不能斷者特以巽極而喪之耳故只作一物易不可為典要也貞凶傳曰在正道為凶是也本義曰雖正亦凶亦説的去象曰巽在牀下上窮也喪其資斧正乎凶也居巽上而在牀下窮而反下也故曰上窮正乎凶也本釋貞凶二字本義直云必凶恐未是傳曰巽本善行故疑之曰得為正乎復斷之曰乃凶也如此方是釋辭且得乎字也字意出楊氏曰上九位極人臣愛其富貴權勢而患失之心生故以極其巽順阿譽以保其所有若然則漢張禹唐魏元忠蓋其人矣謹按此卦語多難解遍考諸家之説明白曉暢者絶少竊嘗臆揣之其所謂牀者象其形也巽一隂在下二陽在上牀之象也重巽疊牀之象也九二性主于入而上無正應故比于初巽在牀下之象也中爻上離為龜史所掌也下兌為巫祝所用也二雖陽剛在巽為不果紛若之吉教以決斷奮發不溺于下而返于上則得中而無咎也九三亦無正應且一巽方盡一巽復來故頻巽而窮吝也六四以柔居柔在中爻之兑悅以入之故田獲而有功也三品之説依本義為是來氏之説雖卦象皆有但雞羊皆家畜非田所獲者故不可從九五無初有終亦以二非正應而能相入之意上九居巽之極下應九三亦巽在牀下之象巽為近利市三倍資之象也極則必變上變六成坎為盜喪其資斧之象也變六雖成正應但坎為盜又水亦就下之物所以正乎凶也一隅之見不知有當萬一否存之以質明經者易酌卷九
