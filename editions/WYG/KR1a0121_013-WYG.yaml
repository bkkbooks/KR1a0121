body:
  text: 易酌卷十三祁州刁包撰說卦傳昔者聖人之作易也幽贊於神明而生蓍此章及次章明作易原繇通極乎道徳性命使學者進而求之也聖人兼伏羲文王周公言莫幽于神明莫神明于易故聖人作易為能幽贊于神明也幽贊神明所以贊天地也天地以神草應之為酬酢佑神之具則蓍生焉又所以贊易也焦氏以生蓍為創立用蓍之法逺矣參天兩地而倚數參天兩地其說甚多畢竟以朱子為的本義云天圓地方圓者一而圍三三各一竒故參天而為三方者一而圍四四合二偶故兩地而為二數皆倚此而起故揲蓍二變之末其餘三竒則三三而九三偶則三二而六兩二一三則為七兩三一二則為八范氏曰參天兩地五也數數者必以五雖窮乎十百千萬必以五數之所以倚數也此與丘氏一畫三分之說俱有理宜知之謹按參天兩地之說來註最為諦當其言曰周公之爻定陽九隂六者非老變而少不變之說也乃參天兩地而倚數也參兩之說亦非陽之象圓徑一而圍三隂之象方徑一而圍四之說也盖河圖天一地二天三地四天五地六天七地八天九地十一二三四五者五行之生數也六七八九十者五行之成數也生數五行之發端故可以起數成數五行之結果故不可以起數參之者三之也天一天三天五之三位也兩之者二之也地二地四之二位也倚者依也天一依天三天五而為九地二依地四而為六也若以畫數論之均之為三參之則三箇三兩之則兩箇三矣推之二萹之策至萬有一千五百二十總不出參之兩之之外此皆自然之妙非聖人之安排也若夫七八亦乾坤之策但二五為七三四為七是一地一天不得謂參兩一三四為八一二五為八是一地二天亦不得謂之參兩此周公之爻所以皆用九六也觀變于隂陽而立卦發揮于剛柔而生爻坤一變為震再變為坎為艮隂之變也乾一變為巽再變為離為兌陽之變也聖人觀隂陽之變而八卦而六十四卦于是乎立矣其數陽則為剛畫其數隂則為柔畫聖人取剛柔之義一一發明之而三百八十四爻于是乎生焉和順于道徳而理于義窮理盡性以至于命和无所乖戾也順无所拂逆也其規模之大直與三才之道兩儀之徳脗合无間和順于道徳也此統言其體也理條理也其節目之詳事事物物莫不秩然各得其宜理于義也此析言其用也天命之謂性性其隐㣲難見者乎然而天地萬物之理則燦然可見也窮其可見以盡其不可見則天之所以與我者莫之致而至矣此為作易者言非為學者言也本義窮天下之理盡人物之性而合乎天道此聖人作易之極功也最為妥切蒙引直以蓍當之恐未盡程子云三事一時併了元无次序張子云此說失于太快其間煞有事豈有一時併了看來張子之說為是右第一章昔者聖人之作易也將以順性命之理聖人作易全是把性命裏面的道理寫出來故曰順性命之理順字蒙引以發揮解之未確似宜還他固有意是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義性命之理者何隂陽剛柔仁義也每一才便包兩端物事隂陽以氣言天道所以立天之性命之理也剛柔以質言地道所以立地之性命之理也仁義以徳言人道所以立人之性命之理也其實天亦有質與徳地亦有徳與氣人亦有氣與質各舉其重者而為言耳仁主生故屬陽義主成故屬隂仁主方故屬剛義主圓故屬柔六者同體而異名者也朱子曰仁體剛而用柔義體柔而用剛揚子雲謂君子于仁也柔于義也剛此又是一義便是這箇物事不可以一定名之看他用處如何此理又不可不知兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章隂陽剛柔仁義皆曰與言其交相為用也不相為用便不成三才必兼而兩之故卦自三畫倍而為六畫立天立地立人之道也分隂分陽以位言凢卦二四上為隂位初三五為陽位自下至上隂陽各半故曰分迭用剛柔以爻言九陽位剛居之柔亦居之六隂位柔居之剛亦居之或柔或剛更相為用故曰迭分者為經迭者為緯經緯錯綜而文章燦然出焉皆所以順性命之理也總而言之陽也剛也仁也隂也柔也義也雖不言仁義而仁義在其中矣人道所以與天地並立也右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數年前閲易筌引黄東發歸熙甫之言反覆辨析以先天後天為邵子之易非伏羲文王之易也亦似有理遂從之近反覆本義又見蒙引逐端發明始知其說果有不可易者按伏羲始畫八卦乾一兌二離三震四巽五坎六艮七坤八此是横圓乃作易之根源也乾南坤北離東坎西兌東南震東北巽西南艮西北此伏羲規而圓之以象渾天之形備隂陽消息之數所謂先天之學也項氏曰天地以上下直對水火以東西横對雷風山澤以四角斜對所謂天地之間旡獨必有對者也發明先天之易可謂簡盡以其義釋之乾上坤下尊卑之位有一定而不可易者艮山兑澤一髙一下水脉灌輸而其氣實相通通之為言貫也震雷巽風一迅一烈氣勢翕合而其情實相薄薄之為言逼也坎水離火一寒一熱宜若相息滅而下燃上沸以成既濟之功乃不相射不相射者言不如射者之相射害也八卦相錯者隂陽交錯而成六十四卦也蒙引云如乾之未交止于乾也交于坤兌則成泰成夬矣交于離震則為大有為大壯矣交于巽艮則為大畜小畜也云云坤之未交止于坤也交于乾兌為否也為萃也交于坎艮則比也剥也云云析而觀之一卦各與八卦相交合而觀之但見乾坤坎離相為上下震兌巽艮互為錯綜而成六十四卦之相交耳最為明曉數徃者順知來者逆是故易逆數也數徃知來一段向來但云易藏徃知來已徃者順而數之未來者逆而度之逆也者迎其先而知之也曰占事知來曰遂知來物曰以前民用皆逆之謂也數徃者順盖因下句而竝舉之豈謂易有數徃之順數哉如此看亦通近反覆本義則獨用邵子之說蒙引又因陳氏之說而益詳之謂圓圗從中起左方起震一陽而厯離兌二陽以至于乾三陽繇是四而三三而二二而一皆進而得其已生之卦猶自今日而追數昨日數徃者順也右方自巽一隂而厯坎艮二隂以至于坤三隂繇是五而六六而七七而八皆退而得其未生之卦猶是今日而逆計來日知來者逆也夫㨿此圗而言則一順一逆固如此矣然本易之所以成則其先後始終一如横圖及圓圖右方之序而已即所謂乾一兊二離三震四以至于坤八者也本義發邵子之藴蒙引又發本義之藴其理最為明曉然後弱侯諸公无所置喙矣右第三章雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之上章繇乾坤而推之六子互相為用也此章繇六子而歸之乾坤還相為本也蒙引釋本義云此卦位相對與上章同者謂其卦位之相對同也非謂卦位同析義精矣萬物之性不鼔盪則不開雷為之也不吹嘘則不和風為之也此物之所以生也萬物之性不灌溉則不滋雨為之也不暴照則不榮日為之也此物之所以長也萬物之性不凝結則不實艮之止也不暢遂則不茂兌之說也此物之所以收也然非乾以君之孰主宰是非坤以藏之孰根底是物之所以歸根復命者其在斯乎乾坤之功用大矣哉易之功用大矣哉按乾坤初爻相交而為震巽中爻相交而為坎離終爻相交而為艮兌故其言先後内外皆有次第朱子云震巽坎離取象義多故以象言艮兌乾坤取卦義多故以卦言湏如此說明纔知聖人贊易一字不輕下右第四章帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮上章言圓圖盖開天所未有而伏羲創為之故曰先天之學此章言方圖則文王因伏羲八卦而更列布置之故曰後天之學也程𫝊云以主宰言謂之帝故本義云帝者天之主宰帝字㫁句統下八句說帝出乎震言帝以震出萬物也若作帝自出則非矣出乎震言萬物發生出來齊乎巽則一齊發生矣猶農家云出齊也出者齊則光輝發越人皆見之故曰相見乎離帝委其事于坤而无所與故曰致役乎坤坤供乾之使令者也物遂其生則欣欣向榮而說故曰說言乎兌乾當隂陽之交隂疑于陽故戰勞字或云慰勞或曰勞而不伐之勞作功勞字為是萬物歸根坎于是乎有成功矣故勞艮止而能生止為坎之終而生又為震之始也所以成始而成終也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮前一段是題此一段是註疏故開口便以萬物易帝字本義云上言帝此言萬物之隨帝以出入也潔齊也治也物之齊一若修而治之者然故曰萬物之潔齊也聖人臨照四方如日中天故取諸離乾君也坤臣也前曰致役以君臣言也地母也物子也後曰致養以母子言也聖人下字之妙如此徐進齋曰坎離天地之大用也得乾坤之中氣故離火居南坎水居北也震動也物生之初也故居東兌說也物成之後也故居西此四者各居正位也震屬木巽亦屬木震陽木也巽隂木也故巽居東南兌屬金乾亦屬金兌隂金也乾陽金也故乾居西北坤艮皆土也坤隂土艮陽土坤居西南艮居東北者所以均旺於四時也此四者分居四隅也八卦以震巽離坤兌乾坎艮為次者震巽屬木木生火故離次之離火生土故坤次之坤土生金故兌乾次之金生水故坎次之水非土亦不能以生木故艮次之水土又生木木又生火八卦之用五行之生循環无窮此所以為造化流行之序也右第五章神也者妙萬物而為言者也天地定位及雷動章言先天帝出乎震章言後天此章則繇文王後天流行之用而推本于伏羲先天對待之體也項氏曰茍无此章則文王為无體而伏羲為无用矣學易者不可不深玩也不言乾坤而謂之神者鄭康成曰乾坤共成一物不可得而分故合而謂之神張子曰合一不測之謂神程子曰以妙用言謂之神皆此理也神也者生成萬物而莫知其所以然故曰妙萬物而為言也下面雷動風撓之類皆神之所為也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮雷以鼔萬物故曰動風以撓萬物故曰撓火以鑄萬物故曰燥澤以娱萬物故曰說水以滋萬物故曰潤艮以成萬物故曰終始五卦皆言象而艮不言者終始萬物義不係于山也程子曰萬物盛乎艮此盡神妙湏研窮這箇理明乎程子之說者知止主静之學思過半矣故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也水火不相射故相逮水火得其偶也雷風相薄故不相悖雷風得其偶也山澤互相灌注故通氣山澤得其偶也六子各得其偶然後動撓燥說潤止諸用皆以發育萬物生息而无端完全而无虧欠也大矣哉六子之功乎六子不有其功歸之造物造物㝠㝠不得而名惟有想象其妙萬物之理而已矣右第六章乾健也坤順也震動也巽入也坎䧟也離麗也艮止也兌說也本義云此言八卦之性情吳氏云此言八卦之徳其下三節乃以物以身以家依八卦之徳而分主之也然徳即性情之徳豈有他哉乾純陽陽剛故健坤純陰陰柔故順震坎艮陽卦生于二陰之下則剛而進故動在二陰之中則剛為隂所溺故䧟出二隂之上雖剛亦無所往矣故止巽離兌隂卦隂成于二陽之下以順而伏故入在二陽之中以順而附故麗在二陽之上以順而見故說此八字註疏也學易者反而體之於身有一毫柔懦之心非乾矣有一毫乖拂之心非坤矣有一毫宴息之心非震矣有一毫浮溢之心非巽矣知坎之䧟宜思處憂患之道知離之麗宜思慎交遊之道知艮之止宜思定性之學知兌之説宜思樂天之學不然未可云學易也右第七章乾為馬坤爲牛震為龍巽為雞坎為豕離為雉艮爲狗兌爲羊本義云此所謂逺取諸物也周公以乾為龍而孔子以為馬文王以坤為牝馬而孔子以為牛聖人取象不同如此學易者亦可推類而知其餘矣或曰荀九家易乾為龍震何以亦為龍曰乾全體震得乾之一體者也乾健而行不息故為馬坤順而性重載故為牛震之體雷也雷需電而𤼵故為龍巽之體風也風應時而變故為鷄鷄時至則鳴者也又飛而善伏亦風象醫書云鷄為風多食能令人𤼵作亦其驗也體汚濁而中剛躁故為豕上下二隂中一陽也體文明而中柔怯故為雉上下二陽中一陰也外剛能止物而中内柔媚故為狗外柔能悦草而中内剛狠故為羊竊意狗司守禦雖餓死而不去其主其得艮之義乎羊之口能鳴及殺之却不鳴其得兌之義乎窮物之理盡物之性以至於命則聖人言外之㫖也錢氏云人而失其健順則馬牛之不如失其所止而不得其悦則犬羊之不如聖人取象之意深切矣哉右第八章乾爲首坤爲腹震為足巽為股坎爲耳離為目艮爲手兌為口此所謂近取諸身也從八體而推之則百體皆易也乾統諸陽尊而在上故為首坤統諸隂大而能容故為腹丘氏曰震陽動於下為足艮陽止於上爲手手上而足下也巽隂兩開於下為股兌隂兩拆於上為口口上而股下也坎上下二隂其竅内空中一陽實而能聰故為耳離上下二陽其睛外附中一隂虚而能明故為目其寤寐如日月之明晦其開閉如乾坤之闢闔耳目之用大矣哉學者不能效乾則負此首矣不能法坤則負此腹矣動之不臧則負此足與股矣外不能逺觀内不能返照則負此耳與目矣執不能擇善則負此手矣言不能擇物則負此口矣踐已之形盡已之性以至於命則聖人言外之㫖也錢氏云聖人固以人身取象亦要知得一人之身有首有腹有足有股有耳有目有手有口此等形軀㑹有弊壞時何足為貴須要體認得乾為我之首我如不能自强不息而頫屈於物欲之下是无首者也坤為我之腹我如不能厚徳載物而隘陋以居之是无腹者也震為我之足我如不能恐懼修省出門一歩遂不能无失脚是无足者也巽為我之股我如不能申命行事而隨足妄動是无股者也坎為我之耳我如不能常徳行習教事而天聰以為聰是无耳者也離爲我之目我如不能繼明照四方而天明以為明是无目者也艮為我之手我如不能思不出其位而執守之不堅是无手者也兌為我之口我如不能以朋友講習而朶頤之是觀是无口者也易有聖人之道四而云以制噐者尚其象人而至於首不首腹不腹足不足股不股耳不耳目不目手不手口不口象乎不象乎此段話頭當書座右以自警右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女本義作揲蓍求卦説似无謂胡氏以為朱子未改正之筆良是易筌云此以家人之八位擬八卦也易㑹云此推明乾坤生六子之故蒙引云此取諸人倫也俱有理余獨以為𤼵明天下一家萬物一體之義乾知大始有父道焉故稱乎父坤作成物有母道焉故稱乎母乾坤為萬物父母則父母為一家乾坤可知索求也謂乾坤相求也坤求於乾得初畫為震則長男也得中畫為坎則中男也得終畫為艮則少男也乾求於坤得初畫為巽則長女也得中畫為離則中女也得終畫為兌則少女也三陽皆男兄弟三隂皆女兄弟但有先後之異而長㓜繇此定而尊卑繇此分而天秩天叙繇此生矣天下為一家萬物為一體也西銘云乾稱父坤稱母太極云乾道成男坤道成女其義皆本諸此孔子曰老者安之志在長男長女也震巽之義也朋友信之志在中男中女也坎離之義也少者懐之志在少男少女也艮兌之義也加我數年葢不欲辜負此一家一體之人耳故必如孔子而後可以學易右第十章乾爲天爲圜爲君爲父爲玉爲金爲寒爲冰爲大赤爲良馬爲老馬爲瘠馬爲駁馬爲木果此章明聖人作易其道甚大百物不廢也所謂逺觀近取以類萬物之情也乾爲天以氣之廣漠言也爲圜以氣之周流言也蕩蕩上帝下民之辟故爲君大哉乾元萬物資始故爲父其徳純粹不雜玉也堅剛不貳金也乾居西北其氣凛冽故爲寒當立冬之時水始凍故爲冰焦氏云乾尊在上髙則寒也亦通乾始於子坎中陽爲赤極於已純陽也故乾爲大赤加大以别坎也乾健不稱其力而稱其徳爲良馬老陽爲老馬純剛為瘠馬言其骨峻非羸馬謂也駁馬鋸牙食豹健而最威猛者也又色相雜曰駁果繋於木葢一㸃真陽凝結團聚而陰不能剥也楊氏曰如剥之碩果不食是也蔡氏云圓而在上恐與爲圓意重坤為地爲母爲布爲釜爲吝嗇為均為子母牛爲大輿爲文爲衆爲柄其於地也爲黒坤為地以形之博厚言也或曰積隂故為地至哉坤元萬物資生故爲母吳氏曰旁有邊幅而中寛平南北經東西緯布象也徐氏作帛布之布未確其云虚而容物熟物以養人爲釡靜翕不施爲吝嗇則確論也南軒曰均者其勢均平而无偏陂也蒙引引无平不陂之説非之取動闢而廣之義亦是牛而母牝也母牛而子犢也順之至也无不持載故為大輿向來看文與衆俱就物説不如坤畫耦爲文耦畫多爲衆之說較爲明切爲柄或云操生物之權或云勤於造事而不名其功蒙引俱以為傷巧獨取在下而承物於上萬物依之爲本之說亦是土五色獨言黒者以其純隂也震爲雷爲龍爲𤣥黃爲旉爲大塗爲長子爲决躁爲蒼筤竹爲萑葦其於馬也爲善鳴爲馵足爲作足爲的顙其於稼也爲反生其究爲健爲蕃鮮一陽伏於二隂之下而陽不得出故奮動衝擊而為雷以動奮之身而靜息於地勢重隂之下故為龍或以龍作駹是不解經而改經也乾坤初交而生震故兼得天地之色孔䟽謂𤣥黃雜而成蒼色也旉作敷與華通花蔕下連而上分爲花出也爲大途一竒動於内而二偶開通前无壅塞也為長子震一索而得男也爲决躁陽生於下而上進以决隂躁者陽之動也爲蒼筤竹蒼深青色筤謂色之美盖竹之筠也爲萑葦萑荻葦蘆竹萑葦皆下本實而上幹虚也善鳴者陽在内爲聲上畫偶口開出聲也馵足足骹白陽之色作足超起陽之健皆言下畫之陽也的顙額有旋毛中虚如射者之的言上畫之虚也稼諸穀之類反生萌芽自下而上反勾向上陽在下也其究爲健中上二畫變則為乾也蕃即草木蕃之蕃鮮即奏庶鮮食之鮮物出震陽氣浸盛故蕃盛而鮮美也巽爲木爲風爲長女爲繩直爲工爲白爲長爲髙爲進退爲不果爲臭其於人也爲寡髮為廣顙爲多白眼爲近利市三倍其究爲躁卦巽入也物之善入者莫如木又幹陽而根隂故巽爲木或曰風巽之本象也七卦皆先本象獨巽以木先風者伏羲以木徳王不忘其朔之意也亦有理一隂伏於二陽之下而陽不得入故盤旋不舍而為風巽一索而得女故爲長女一隂爲主二陽引之而出以達於外有制物之功故爲繩直有善事之能故爲工所謂巽徳之制也巽居東南金方故為白木下入而上升故為長為髙進則果於進退則果於退惟剛决者能之巽多疑而少决故為進退爲不果隂伏於下氣鬱不散故為臭髮屬隂隂血不上行故髮少二陽在上故顙廣眼之白屬陽黒屬隂離目上下白而中黒黒白相間而停均巽目上中白而黒者居下故為多白眼二陽爲一隂所有故爲近利市三倍或曰離日中為市而巽近之故有此象吳氏曰義理陽也利欲隂也震陽在内義理主於内也故一剛爲主於内之卦爲无妄巽隂在内利欲主於内也故曰近利曰市三倍者猶詩言賈三倍謂市物而得利三倍近利之至甚者也此理尤長震為决躁巽三爻皆變則為震故其究爲躁卦震變乾而不變巽巽變震而不變坤葢喜陰卦爲陽為純陽而不欲陽卦爲隂爲純隂也乾鑿度曰物有始有壯有究震得陽氣之先巽得隂氣之先故其卦皆有究極之義坎為水爲溝瀆爲隱伏爲矯輮爲弓輪其於人也爲加憂爲心病爲耳痛爲血卦爲赤其於馬也為美脊爲亟心爲下首爲薄蹄爲曵其於輿也爲多𤯝爲通爲月爲盗其於木也爲堅多心坎一陽在内而明二隂在外而暗内明外暗故爲水陽為水二隂夾之故爲溝瀆又溝字水從冓搬棄之意所以行水而為澇之備也瀆字水從賣韞櫝之意所以停水而爲旱之備也陽匿隂中故為隱伏徐氏曰陽在隂中抑而能制故為矯輮矯者矯曲而使之直輮者輮直而使之曲也此說極是但合弓輪爲一則非矣諸卦固無此體宜各取象為是或云坎中剛象弓弣上下柔象弓之弰中竒象輪軸上下偶象輪之幅牙亦有理陽䧟隂中故爲加憂素問金在志爲憂水在志為恐恐視憂則有加矣心耳皆以虚為體坎中實則為病爲痛鄭氏曰火藏在心坎水勝之故爲心病此恐未然火勝水則心病水勝火何病之有又曰水藏在腎開竅於耳而水在志爲恐恐則傷腎故為耳痛此亦有理而蒙引以為推之使逺鑿之使深恐過矣氣為陽運動常顯血為隂流行常幽血在形如水在天地間故為血卦得乾中畫之陽故為赤純則為大赤矣脊者外體之中心者内藏之中坎剛在中故為美脊剛在内而躁故為亟心前畫柔故首下而不昂下畫柔故蹄薄而不厚坎於馬為曳者䧟則失徤也其於輿為多眚者謂有䧟險而多阻礙也蓋行於險道不若坤輿之行於平地者易且安也為通向来俱取維心亨之義蒙引云此通字全就人心說狹矣其取上下皆虛義而以水流不盈解之則又與溝瀆同矣王䟽云行有孔穴故為通亦是為月向來與水同解亦取外明内暗之義蒙引云月魄本暗得日之光而明是明繇外也何以謂内明外暗此說極有理只當云月者水之精也為是為盗向來與隠伏同解亦取陽匿隂中之義但所云盗太𤣥以水為盗隂陽以𤣥武為盗以其皆屬北方之坎也則更進一步矣若夫於木為堅多心則以其剛在中故无他義也離爲火爲日爲電爲中女爲甲胄爲戈兵其於人也爲大腹爲乾卦爲鱉爲蟹為蠃為蚌爲龜其於木也爲科上槁離一陰在内而暗二陽在外而明内暗外明故為火此不可易也為日向來亦與火同解蒙引云日者太陽之精安得有内暗之理日與電大抵只取明象愚謂火也日也電也皆取明象而亦兼附麗之義離麗也火麗木日麗天電麗雲常明者火大明者日暫明者電也再索得女故為中女甲胄外剛離之形也戈兵上鋭離之性也愚謂一柔在内而二剛在外有䕶衛之象故爲甲胄有擊刺之象故為戈兵大腹中虚也坤爲腹離得坎之中畫乃稱大腹焦氏云非離反大於坤葢疾證也鑿矣愚謂坤為腹取柔能容物之義離爲大腹則以其中懷隂物而二陽包之故爲大腹也火與日燥物者也故爲乾卦楊氏云鱉性静取其中畫之柔蟹性躁取其上下二畫之剛蠃取善麗之象蚌取中虚之象龜取文明之象蒙引歴辨其非固自有理但五物皆以外剛内柔了之恐无謂矣科鳥巢如水盈科之科葢結構木枝而成者此本張子剛而躁之説也蔡氏曰科空也木既中空上必枯槁矣尤為明切艮爲山爲徑路爲小石爲門闕爲果蓏爲閽寺爲指為狗爲䑕爲黔喙之屬其於木也為堅多節二陰土也一陽隆起於地上靜而止故爲山山險阻不能闢大途而成蹊故爲徑路一剛堅而在坤土之上故為小石一陽連亘二隂雙峙故為門闕闕門之出入處果木實蓏草實一剛在上象木果二柔在下象草蓏乾純陽故但為木果艮一陽二陰故為木之果又為草之蓏閽禦止於外象剛寺給使於内象柔艮爲手而所用以止物者又在指也狗或作豿謂虎子也殊不必只依第八章解為是以其外剛能止物也詩曰誰謂䑕无牙何以穿我屋䑕前剛與狗同黔喙之屬山居猛獸牙齒堅利能食生物者也或以黔作鈐取鐵義或以黔作黎取黒義然既云能食生物取如鐵之義為是屬者不指定而泛言其類之辭也坎陽在中爲堅多心艮陽在上故爲堅多節兌為澤爲少女爲巫爲口舌爲毁折爲附决其於地也爲剛鹵爲妾爲羊易㑹云上偶象土二陽象水聚若然是土在水上也按兌一隂停於二陽之上上虚下實水聚之象也故爲澤朱子所謂取坎水而塞其下流之象最為明切三索而得女故爲少女兌上拆口象故為巫爲口舌巫通乎幽以言悦神者也口舌交乎顯以言悦人者也兌正秋金氣始凝條枯實落故為毁折一陰不能自决而附陽以决故謂附决折毁謂槀稈之屬附决謂果蓏之屬也氣潤爲鹵使下土不堅則鹽水虚漏而不可煎故鹵土必剛說文云鹵西方鹹地兌正西又金也故爲剛鹵又下土堅硬而上鹵濕兌二陽在下一陰在上之象也少女從姊為娣故曰妾羊或作陽謂无家女也殊不必只依第八章解爲是以其内狠外悦也八卦之象推而廣之至百十有一自天文地理人事物類以至性命心氣之㣲形色聲容之顯无所不具或取諸彖象或取諸爻象或孔子自取皆聖人敎人格物處學者觸類而通之如乾為君坤為臣乾爲圓坤為方離為乾卦則坎為濕坎為血卦則離爲氣舉一隅反以三隅知天地閒隨事隨物莫不具有八卦之理也若遇一件只作一件物事放過无所貴乎讀易矣或者謂諸象定自伏羲至文周繫易不能盡取故孔子悉録以垂後未知然否右第十一章易酌卷十三
