body:
  text: 易酌卷十四祁州刁包撰序卦傳或謂序卦非聖人之書或謂非易之蘊此韓退之所謂坐井觀天者也得朱子之辨而始明葢六十四卦之義彖傳言之詳矣至是復合而爲一或相因或相反都有妙義在所謂信手拈來頭頭是道也觸類而通其餘其唯程傳乎有天地然後萬物生焉无天地則萬物何繇生此乾坤所以爲上經之首也資始資生之義也盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也天地虚而萬物實其中則為盈盈有屯聚之義故受之以屯屯者其氣團聚包絡盈其中未散其外也凡物受生之始類如斯也物生必蒙故受之以蒙始生則必蒙昧如在混沌中故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也蒙只還他蒙字如比如剥皆然子瞻所謂義盡於名者也物穉弱未到壯盛時不有以養之則生意索然矣故受之以需人之所需莫亟於飲食故曰需者飲食之道也飲食必有訟故受之以訟飲食者人之大欲存焉春秋公子宋以不食黿之故而弑其君華元之僕以不食羊之故而賣其主甚於訟矣詩曰乾餱以愆禮曰豢豕為酒非以爲禍也而獄訟益繁則酒之流生禍也皆此意訟必有衆起故受之以師師者衆也衆必有所比故受之以比訟者勝負所繇分也好勝而耻負勢必呼朋引類合力以相攻衆於是乎起矣萬二千五百人爲師言衆也衆以情合未有漠然无所親附者故比次之比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履傳曰物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜意即在比字内看出又曰夫物之聚則有大小之别髙下之等美惡之分是物畜然後有禮也禮所以序其聚使不亂也如此看固是向來有說云比而无以畜之則狥私情滅公義矣畜即畜君何尤之畜節制之意也節而制之則止而不過和而不流禮所繇生也人之履莫大於禮故履次之此說亦通姑存之履而泰然後安故受之以泰凡事在䂓矩凖繩中无妄動无過舉則理得而心安矣故泰次之禮曰人有禮則安无禮則危此之謂也泰者通也物不可以終通故受之以否泰者通達无碍之謂也泰極則驕逸之心生而通者塞矣故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有否極則畏懼之心生而塞者通矣故受之以同人同人者所以轉否而為泰也與人同者人亦同之在下有天下歸仁之理在上有四海歸心之道所有不既多乎故受之以大有有大者不可以盈故受之以謙恃其有而侈然自大則盈矣盈者天地神人之所忌也故受之以謙有大而能謙必豫故受之以豫謙者不自有其有也不自有其有則能保其所有而樂也故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱鄭康成曰喜樂而出人必隨從是人隨己也看下以喜隨人則其說非矣竊意豫悅之後往往不能自持輕易隨人故受之以隨朱氏曰以喜隨人者臣事君子事父婦事夫弟子事師皆樂於所事而後隨也若然則无事矣又何以云有事云蠱乎雜卦云豫怠也又云隨无故自是不好字様葢一意容悦而胸中漫无主張者也唯諾如此天下事安得不壞故受之以蠱蠱者事也有事而後可大故受之以臨世道人心之壞必於是乎徴之故曰蠱者事也有事而後聖賢見其道徳豪傑見其功名掀揭之業繇此生焉故曰可大韓註云可大之業繇事而生張子云禍患之作天之所以開英雄也即此意臨者大也物大然後可觀故受之以觀項氏曰臨不訓大大者以上臨下以大臨小凡稱臨者皆大者之事也故以大稱之若豐者大也則直訓大也是以六十四卦有二大而不相妨焉須如此分别始得山之可觀者无如泰山水之可觀者无如東海此物大然後可觀之説也故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁物无可觀望之者引而去矣其能有合乎唯可觀則嚮往儀型悦而服之是以有合噬嗑者齧其間而合之也自朝廷家庭以至親戚族黨之間直情而徑行之未有不相凟者是故君臣之合也則以弓旌賁之賓主之合也則以介紹賁之夫婦之合也則以六禮賁之賁者致敬盡禮而不敢茍也賁者飾也致飾然後亨則盡矣故受之以剥外有文彩可著見故曰飾使一意著見則其飾爲粉飾爲塗飾厚貌深情多而赤心白意少嘉㑹之徳澌滅无餘亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄萬物剥落而不食之碩果孤存物可終盡乎哉是虚者盈之基消者息之本陽窮於上而還反於下生生之元從此始焉故受之以復復則天理見而人欲退聽矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頥有妄則私私則狹狹則物不能容无妄則公公則溥溥則物不能外有兼容併包之徳故受之以大畜畜聚者廣則可以澤民利物而不匱故受之以頤頤者養也不養則不可動故受之以大過或以恵養或以善養皆養也不養之於平時而一旦創非常懼黎民其可乎不養則不可動見養則可動也故受之以大過頤字就養人説按程𫝊曰徳既畜聚於己然後可以優遊涵泳而充養之矣故大畜繼以頤有大涵養而後有大抱負有大抱負而後有大設施頤養還就己說劉氏亦云養者君子所以成已動者君子所以應物物不可以終過故受之以坎坎者䧟也䧟必有所麗故受之以離離者麗也大過之事偶一為之耳非所以為訓也故曰物不可終過過則易䧟故受之以坎坎次大過所以危之也繇經而及於權故危之䧟則思麗故受之以離離次坎所以安之也繇權而歸於經故安之聖人誨人之意深矣右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯天地之生萬物夫婦生之也此咸恒所以爲下經之首也下經不言咸猶上經不言乾坤也爲主故不言受也未有夫婦以前天地之事既有夫婦則聖人之事不然萬物紛紜男女不分恐天地亦罔識其上下而人類滅矣惟是有男女則制為婚姻嫁娶之禮而以倡隨爲義有父子則制為定省問侍之禮而以慈孝為義有君臣則制為朝覲宴饗之禮而以明良為義推而至於辨等級殊名號異服色利器用莫不有因時制宜者焉則上下之禮也禮義錯天下然後天尊地卑各安其位而不易大矣哉聖人之功乎夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯夫婦之道如天地之无可易如君臣之无所逃百年偕老其願也故受之以恒雖然夫婦之道可久也物則不可久物而久居其所則有朽敗之虞故受之以遯韓註云物之所居不可以恒宜其與世升降有時而遯也便是功成身退意遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉或退而逃名或退而辭位或退而謝事皆退也退則處其衰矣衰則必盛消息相因之理故受之以大壯大壯者陽之壯盛也壯盛恐其恃壯用罔故受之以晉易㑹云好剛者進以學尚勇者進以義二語頗好晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人知進而不知退則傷之者至矣故受之以明夷閻氏曰以利合者廹窮禍患害相棄也以天屬者廹窮禍患害相收也明夷之傷豈得不反於家人乎家道窮必乖故受之以睽齊家之難也以漢髙祖唐太宗之賢而不免焉况其他乎窮於道者乖於家所謂身不行道不行於妻子也故受之以睽韓注云家人之義惟嚴與敬樂勝則流禮勝則離可作家箴睽者乖也乖必有難故受之以蹇和氣致祥乖氣致殃睽而乖則家難作矣故受之以蹇項氏曰屯與蹇皆稱難屯者行乎患難者也蹇但有所阻而不得前耳非患難之難也恐未然竊意屯之難在世道故利用經綸蹇之難在家庭故利用解安得謂屯難蹇非難乎蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損處難者未有不多方求解者也解者散而去之之謂如周成王懲毖多難韓魏公調和兩宫之類難未甚則思解既解則悠忽踈畧之心生焉故下又以解作緩怠緩則廢事縱緩則生奸能无失乎故受之以損損而不已必益故受之以益益而不已必决故受之以夬損極則必虧虧則利用益益者長而裕之也益極則必盈盈則利用决决者開而通之也天道虧盈如環无端聖人因其勢而利導之故益次損夬次益也夬者决也决必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升决者去其隄防釋然莫之能間故有所遇遇則凑成一處聫絡㑹合故聚散則勢分聚則勢合聚而上者謂之升積其勢以髙大也凡物未有不積累於下而能崇隆於上者也升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革力久則竭位髙則巅此升而不已者之所困也困乎上者必反下前此不得遂其進勢必退却也物之在下者莫如井井所以次困也井舊不食則汚穢生焉革者除而去之也革物者莫若鼎故受之以鼎主噐者莫若長子故受之以震革乎故以再造乎新者莫若鼎也鼎者宗廟之器主之者震震長子也馮氏曰自乾坤四十有九卦而革去故五十卦而鼎取新震乃長男代父易之序也震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹動極則宜反而歸之於静故艮次之止極則宜引而掖之以行故漸次之晉者進也晉必有所傷爲其一於進也漸者進也漸必有所歸爲其進而不驟進也妹字義輕得其所歸者必大故受之以豐循序而進得所歸宿學問乃逢淵源功名乃有結果徳業盛大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽窮大者必失其居謂失其所安也如富貴之極驕盈不留餘地是以溧泊流落靡所止居而至於旅寓也旅則无容身之地孤立而寡親欲不巽順得乎巽者入也入而後說之故受之以兌人之情判然不相入則怨尤生焉入而後説可知也兌之所以次巽也兌者説也説而後散之故受之以渙人之情怒則廹促而不裕憂則鬱結而不開説者怒與憂之反心氣和樂則有𤼵舒流暢之意是以散也渙之所以次兑也渙者離也物不可以終離故受之以節凡人蕩而无節則爭爭則矛盾故離假令截然有限制於其間何至是耶故節者所以合離而萃渙也節而信之故受之以中孚節須𤼵於中心不獨在外貌上簡束故曰節而信之中孚所以信其節也有其信者必行之故受之以小過信近於義而已若使自恃樸誠必如其意而後已則行之果而過於中矣故受之以小過有其信即有其善䘮厥善之有言自矜負也有過物者必濟故受之以既濟韓註云行過乎恭禮過乎儉可以矯世勵俗有所濟也此本小過説亦有理張子云能髙於人而過之然後可以濟天下此專就過物取義葢言才徳度越尋常乃克有濟也觀歸妹不取妹義則濟物不取小義爲是物不可窮也故受之以未濟終焉至於既濟而天下事畢矣聖人曰未也理本无極道何有盡既而歸之以未實終而反之於始也然則易之濟天下與來世也其至矣乎周氏曰按序例有數欵曰然後曰而後曰不可曰不可以曰不可不曰必曰必有曰必有所曰莫若各有取義約之不外一中不問天道人事髙者抑之下者舉之得中者順之隨時從道以趨中而己最得聖人序卦之㫖右下篇雜卦傳序卦取流行之義雜卦取對待之義雜者不拘卦序分類而言之兩兩相對也或雜前卦於後卦或雜後卦於前卦雜也或雜上經之卦于下經或雜下經之卦於上經雜也兩句之中或以上卦先下卦或以下卦先上卦雜也然就兩句讀之必以類相從无後先移易者自乾至困三十卦當上經三十卦之數雜下經十二卦於其中自咸至夬三十四卦當下經三十四卦之數雜上經十二卦於其中恁地整齊无上下參差者以爲不雜也而有雜者在以爲雜也而有不雜者存聖人立言之妙如此乾剛坤柔比樂師憂乾健而實故剛坤順而虚故柔親比則渾其爾我之閒故樂動衆則驅之鋒鏑之下故憂謹按此篇分合照應起伏叚落无法不備乃聖人全副精神所注爲文章之鼻祖讀者不可以其終卷而忽之也乾坤兩卦不與序卦一例所謂首也大過以下尾也細觀樞紐自見又乾卦自爲首與夬卦變乾暗應天无所不包故也臨觀之義或與或求本義以我臨物曰與物來觀我曰求本韓註竊意以上臨下必有以益乎下故曰與以下觀上必有以仰乎上故曰求屯見而不失其居蒙雜而著本義屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也吳氏曰屯蒙皆二陽之卦屯九五見於上卦二隂之中而為主其下一陽則動於坎險之内而固守故曰不失其居蒙九二雜於二隂之中而為主其上一陽則止於坎險之外而光明故曰著其義尤顯震起也艮止也損益盛衰之始也震一陽動於下故曰起艮一陽静于上故曰止損者自以為不足矣而不知乃盛之始益者自以為有餘矣而不知乃衰之始明乎盛衰倚伏之數則損者可以自力益者可以自警矣謹按損益否泰交所謂樞紐也除去乾坤為首皆在第十卦大畜時也无妄災也剛健難畜而能畜之適當剛止之時也故本義曰止健者時有適然无妄宜福而反得禍偶值意外之災也故本義曰无妄而災自外至然則天下事盡其在我而己時何可自恃災亦何可自沮乎謹按此兩卦之後交萃升與大壯兩卦之後交大有同人所謂對待之合也萃聚而升不來也謙輕而豫怠也水聚而下不往也木升而上不來也謙則有欿然卑下之心不敢以尊重自擬故曰輕豫則有侈然豐大之心恒至以偷惰自安故曰怠蘇氏曰輕者鋭於有爲怠者安於无事非也噬嗑食也賁无色也頤中有物曰噬嗑故言食本義云白受采受采則有色矣白則无色也此亦繪事後素之意兌見而巽伏也兌一陰居上故曰見巽一陰居下故曰伏謹按自此至困下經六卦與後自離至訟上經六卦所謂錯綜之合也隨无故也蠱則飭也意在於隨而己漫不事事故曰无故蠱者如人家房屋頽壞須要整頓修飾起來肯付之不理乎項氏曰聖人不畏多難而畏无難剥爛也復反也剥爛者一陽消於上也復反者一陽生於下也一陽自上而下有刻不容停者焉或曰如果之爛墜於下可種而生恐遲晉晝也明夷誅也明出地上如日在天故曰晝明入地中如日食既故曰誅誅者夷傷之意井通而困相遇也往來井井故其道通困者剛柔相遇而剛見揜也其能通乎自乾至此三十卦雜下經十二卦震也艮也損也益也萃也升也兌也巽也晉也明夷也井也困也謹按自乾坤至此三十卦所謂界限分也自坤卦至此皆兩卦為一卦故亦爲十五卦與咸以下同咸速也恒久也謹按自此至訟卦唯小過離坎各為一卦其餘皆兩卦爲一卦故云十五卦咸无心故感之神神則速一刻而千里也恒立心故守之固固則久百年而一日也渙離也節止也渙則收攝不住故離節則範圍不過故止或曰離風散水也止澤瀦水也解緩也蹇難也難既解則寛舒而无廹促之象故緩時方蹇則艱險而无平易之地故難睽外也家人内也暌踈也踈則異室故外家人親也親則同堂故内否泰反其類也君子小人各從其類否則小人進而君子退陰勝陽也泰則君子進而小人退陽勝陰也陰陽迭爲勝負相反故也謹按此與損益交合大壯則止遯則退也壯不可恃量力而止則无冒進之嫌遯不可待見幾而退則无濡滯之失宜止而止宜退而退无徘徊觀望之心故曰則謹按此與大畜兩卦對待大有衆也同人親也大有者民胞物與不亦衆乎同人者聲應氣求不亦親乎此汎愛衆而親仁之意謹按此與萃升對待革去故也鼎取新也革即革命之革歴數所由告終故曰去故鼎即定鼎之鼎基業所由創始故曰取新或曰去故者革以火鎔金也取新者鼎以木鑽火也小過過也中孚信也過雖小小亦過也見以為小而忽之則過䧟於惡矣孚必中中斯信也襲於其外而貌之則信流於僞矣改過存誠可忽乎豐多故親寡旅也本義云既明且動其故多矣楊氏云昔華封祝堯而堯曰辭以豐則多故耳韓註云髙者懼危滿者戒盈豐大者多憂故也三説俱一意竊意作舊故之故亦通豐盛之時賓客盈故曰多故羇旅之時親戚背畔故曰寡親此為世態炎涼言也項氏曰卦名皆在句上旅獨在下者取韻協也或曰作旅寡親正與上新信韻叶信音伸未知孰是離上而坎下也火曰炎上離為火故上水曰潤下坎為水故下謹按自此至訟與下經六卦錯綜相合小畜寡也履不處也一陰畜五陽勢不侔也故曰寡一陰履五陽位不安也故曰不處需不進也訟不親也需必有所待待則觀望切故不進訟必有所爭爭則戈矛起故不親本義云自大過以下卦不反對或疑其錯簡今以韻協之又似非誣未詳何義蔡氏依例改正之大過顛也頤養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛决柔也君子道長小人道憂也以反對之義推之似確不可易胡氏曰以中四爻互體言也又别是一理竊意易之道陰陽而己矣陰陽之道奇偶而已矣雜卦之義兩兩反對偶也若始終一律是有偶而无竒矣是故既合上下兩經錯綜之而以兩句為偶末又合兩句錯綜之而以八卦為竒奇而偶偶而竒變化无窮正所謂一陰一陽之道也且卦之序也不外相因相反二義雜卦義取相反今以末八卦推之却亦相因如大過繼之以姤顛則宜遇也漸繼之以頤行則宜正也既濟繼之以歸妹定則宜歸也未濟繼之以夬窮則宜决也然則序卦相因也而未始不相反雜卦相反也而未始不相因交易變易之義益於斯可見矣此亦一說姑存之謹按至此暗分界限以下爲結尾又自上下經皆十八卦之説例之自恒卦至此爲十五卦與前自坤以下相同所謂小叚落也大過顛也顛者顛倒其常也先儒所云反經合道是也或曰本末柔故顛也謹按此卦與頤卦相鈎連姤遇也柔遇剛也姤以一陰遇五剛而不以爲嫌可謂遭逢之不偶矣謹按此卦與夬卦相鈎連漸女歸待男行也漸長女歸少男故有待而行也守十年乃字之貞者也伊尹之待於有莘孔明之待於南陽其得漸之義乎謹按此卦與歸妹相鈎連頤養正也以理養心以善養人養賢養民養之正者也否則以小害大惡乎正吳氏曰頤上九爲主而下養九三以上養下所以為正也既濟定也陽居陽位隂居陰位一定而不可易者也謹按此卦與未濟相鈎連合觀此八卦上下兩經前後鈎連顛撲不破所謂以分為合也歸妹女之終也少女歸長男則從一而終矣王蠋曰烈女不更二夫忠臣不事二君知終終之者也或曰女未嫁之稱既嫁爲歸則女道終矣謹按此卦與下卦文法相對合而分也未濟男之窮也三陰三陽皆失位失位則窮矣獨言男而不及女者男統女也夬决也剛决陰也君子道長小人道憂也夬以五陽决一陰决盡則為乾矣此終則有始之義也君子道長小人道憂天下何患不太平潘氏曰治天下有道親賢逺奸明而已矣孔明曰親君子逺小人此先漢所以興隆親小人逺君子此後漢所以傾頽也孔子繋易而以君子小人二語結之旨深哉謹按此卦變而為乾首尾合一也自咸至此三十四卦雜上經十二卦需也訟也小畜也履也否也泰也大有也同人也坎也離也大過也頤也謹按大過以下八卦不反對本義以爲未詳嘗反覆推求夫乃知雜卦之妙也易之有序卦也學之始也博文約禮有序而不可雜也易之有雜卦也學之成也變化從心雖雜而不失序也序卦分也雜卦合也由分可以得合既合其中仍分也何以合而分也首以乾坤乾坤一大男女也而萬事萬物无不在其中矣終之以男女男女一小乾坤也而類聚羣分不能外乎是矣此起止之合也然上經三十卦下經三十四卦其界限未嘗不分自師比八卦而以下經之損益交合之自咸恒八卦而以上經之否泰交合之此樞紐之合也損益後歴大畜无妄而合之以萃升否泰後歴大壯遯而合之以大有同人此對待之合也列震艮於前而以兌巽等六卦分足三十卦之數留大過頤於後而以離坎等六卦合居三十四卦之中此錯綜之合也至大過以下則以分爲合矣易者敎人寡過之書也女過莫如遇以女遇男其過大矣故特書曰柔遇剛也女之无過莫若歸歸而待男以行職司中饋以供頤養道之正也宜室宜家如水火之既濟守之定也故曰歸妹女之終也女道於此終婦道於此始而女過寡矣男子之事六十四卦言之己盡所不能保其无過者窮耳維窮何病窮者天之所以玉汝於成也試觀耕莘釣渭版築魚鹽磨煉出多少聖賢豪傑祗是窮於身而不窮於心窮於遇而不窮於學又必剛克而果决則君子道長小人道憂而修齊平治一以貫之何有過之不可寡哉又按不曰小人道消而曰道憂則聖人為天下後世思深慮逺恐其决小人之後自謂髙枕无憂不爲戒備如唐之五王不旋踵而身受其毒故不曰消而曰憂也聖人之一字不茍如此真是韋編三絶之後融㑹貫通而復以細心密理出之故有頭有尾有関鍵有鈎連合而有分分而實合玲瓏貫串帶鎖鈎連至精至妙无以復加學者得其法而通之以之為學以之為文以之治身心家國天下而无不宜大哉孔子其真萬世師也己易酌卷十四
