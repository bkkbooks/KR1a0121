body:
  text: 易酌卷五祁州刁包撰周易上經坤下艮上剥不利有攸往五陰進而一陽孤存于上為君子者幾无以自容矣故不利有攸往非絶世也傳謂巽言晦迹隨時消息以免小人之害至矣彖曰剥剥也柔變剛也剥訓落即七月剥棗之剥柔變剛傳曰柔長而剛變也夏至一隂生而漸長一隂長則一陽消至于建戌則極而成剥是隂柔變剛陽也此以五隂變五陽言本義曰柔進于陽變剛為柔亦與傳同而蒙引以剛上九方盛長而剥消于隂誤矣不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也陰為小人必將聚勢合黨以為善良憂動輒得咎所以不利有攸往也坤順艮止卦之徳也非象則无由見徳故傳曰卦有順止之象乃處剝之道君子觀而體之言以卦之徳為身之徳也或以五消觀成剝故曰觀象謬矣天運流行理不可易君子進退出處與造化合符而不以已意㕘之故傳曰理有消衰有息長有盈滿有虚損順之則吉逆之則凶君子隨時敦尚所以事天也說的最明盡剝之時順其消而止以待息順其虚而止以待盈故不輕往也象曰山附于地剝上以厚下安宅山附着于地傾塌之象故為剥為人上者觀其象而知上剥自下下食厚徳上乃獲免于剥也故以厚下法坤之博厚也安宅法艮之安止也傳曰下者上之本未有基本固而能剥者末引書民惟邦本本固邦寧結之最透唐太宗曰為君之道必須先存百姓而借喻于剖腹藏珠正合剥象之意豈惟君哉凡官長之臨民將帥之治軍皆是也初六剥床以足蔑貞凶卦一陽五隂上實下虚有床象在剥之初有剥床以足象葢身以床為安剥床者剥身之漸也剥床以足則正人无以安其身故曰蔑貞凶或曰剥足未至蔑貞非也辟如掊擊人者及其身未必動及其足則自然偃仆而可以惟所欲為矣此小人害正險着何云未至蔑貞乎凶字以六三例看是指君子說看來還作戒小人之辭為是象曰剥床以足以滅下也剥床以足則本先撥矣故曰以蔑下也大象厚下而後安居爻初剥下而居不安可知也六二剥床以辨蔑貞凶辨在床之下足之上傳云分隔上下床之幹也剥至此則床益􅆆立不起而中正失位矣則有蔑貞之凶貞益蔑凶益甚也象曰剥床以辨未有與也傳云陽未有與本義云陰未有與當以傳為是君子豈无徒只因小人道長雖君子一流人下焉者易操改節背君子而甘心小人之黨上焉者全身逺害謝君子以不犯小人之怒徒類孤矣若使合志同方之士齊心禦之猶或可免于害也此聖人戒小人又或以望君子也六三剥之无咎三居剛應剛以一陰處四隂之中而不為所染葢視羣隂非我族類而左袒善良故雖當剥之時而能无咎也傳曰三之為可謂善矣不言吉何也方衆隂剥陽衆小人害君子三雖從正其勢孤弱所應在无位之地于斯時也難言免矣安得吉也其義為无咎耳言其无咎所以勸也此義甚好但于貞則吉不貞則凶其理有礙象曰剝之无咎失上下也與上下四隂相失則與上九一陽相得傳曰東漢之吕强是也余謂唐張說聽宋璟之言而不附二張宋石工鐫司馬光黨人碑而不書安民二字亦其人矣六四剥床以膚凶初之剥以足二之剥以辨四則直及其膚隂愈盛而剥愈盛凶可知已傳曰貞道至此已消故更不言蔑貞直言凶也本義云隂禍切身可見君子當是時操心不可以不危慮患不可以不深矣象曰剥床以膚切近災也剥及其膚大異乎床之足與辨矣故曰切近災也六五貫魚以宫人寵无不利傳曰剝及君位剥之極也其凶可知故不更言剥而别設義以開小人遷善之門其義固確竊意六三應陽者也故不與羣隂為黨六五比陽者也故率衆隂以承陽象中自具此義聖人特因而著之耳五君位以其為衆隂之主故不言君而言王后五綂衆隂如后綂衆妾之象五隂共承一陽如后以衆妾進御而荷寵愛之象禮天子三夫人九嬪二十七世婦八十一御妻王后别其等級順序以進御于君如貫魚然魚隂物宫人陰人以之者后也寵之者君也五隂俱獲其利故曰无不利也象曰以宫人寵終无尤也隂剥陽則有尤者其始也五能改過自新率其剥陽者而助陽則為之録其功以宥其過故曰終无尤也然則人果善終雖有尤皆可勿論此聖人勸勉小人正以保全君子也上九碩果不食君子得輿小人剥廬傳曰諸陽消剥已盡猶有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純隂矣然陽无可盡之理變于上則生于下无間可容息也聖人發明此理以見陽與君子之道不可亡也或曰剥盡則為純坤豈復有陽乎曰以卦配月則坤當十月以氣消息言則陽剥為坤陽來為復陽未嘗盡也剥盡于上則復生于下矣故十月謂之陽月恐疑其无陽也隂亦然聖人不言耳隂陽之義僃矣余謂果有核核有仁仁者天地生物之心也不曰未食而曰不食天葢特留此種以為生生之元也又曰隂道盛極之時其亂可知亂極自當思治故中心願載于君子君子得輿也詩匪風下泉所以居變風之終也此指檜曹二風言按檜之終篇曰匪風發兮匪車偈兮顧瞻周道中心怛兮曹之終篇曰冽彼下泉浸彼苞稂愾我寤嘆念彼周京皆亂極思治之詩也或曰君子謂一陽坤為輿五隂共承上九一陽如人之在車上也小人謂上九變為柔也一陽上覆五隂有廬之象竒變為偶則如廬之破壊穿漏其上而无以葢覆其下故曰小人剥廬也朱子曰且看自古小人欲害君子到害得盡後國破家亡其小人曽有存活得者否嘗試舉其最者如秦之李斯趙髙漢之梁冀唐之李林甫楊國忠宋之蔡京童貫賈似道韓􅇑胄皆其鍳也胡雲峰曰牀上之藉下以安者也廬下之藉上以安者也始而剥牀欲上失所安今而剥廬自失所安亦豈小人之利哉象曰君子得輿民所載也小人剥廬終不可用也輿所以載者也君子得之不自利而公諸人民皆賴之以載故曰民所載也言君子乘時而駕綏安一世也此與舊說少異以猶有理小人當剥之始以滅消君子為事及其終也遂至剥廬欲求一容身之地不可得而又何可用哉蘇君禹發明隂陽之理而推之于吾心曰理為陽欲為隂未有不培吾心之君子而能培世道之君子未有不去吾心之小人而能去世道之小人此理不可不知震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往泰則繼之以否危之也危其否所以保泰也剥則繼之以復喜之也喜其復所以救剥也前陽為隂浸而失位今一陽動于五隂之下還反本位故曰復萬物生生之氣由茲始故為亨傳亨訓盛此時一陽甚微恐未至盛處只訓通為是傳曰出入无疾出入謂生長復生于内入也長進于外出也先云出語順耳陽生非自外也來于内故謂之入物之始生其氣至微故多摧折春陽之發為隂寒所折觀草木于朝暮則可見矣出入无疾謂微陽生長无害之者也或曰出者剛長也入者剛反也又曰无疾即臨卦剛浸而長之浸言陽生有漸而不遽也頗有理朱子云陽无驟生又云一氣不􅉐進二形不􅉐虧即是此意以一身言善念始萌須循序積累而後可不然恐有進銳之患以朝廷言正人始進須漸次整􅉐而後可不然恐有激變之憂大象安靜以養㣲陽亦此意也孤陽无朋豈能便勝羣隂須待諸陽以漸而來乃能勝羣隂而發育萬物故曰朋來无咎以一身言要刻勵做人須得良朋好友乃有長進李延平晚得朱元晦曰昔于羅先生得入處後无朋友幾放倒了得渠如此極有益此審于朋来无咎之義也以朝廷言要刻勵做事須衆正戮力同心乃有功效如東漢竇李諸公羣賢在外不能收攬入内只有張奐一人又棄之為羣小用此不審于朋來无咎之義也隂陽迭為消長往來循環不已故曰反復其道七日來復其解頗多傳義俱取自姤至復之說姤陽之始消也自五月姤一隂生至于十一月一陽生歴七爻七變而成復故曰七日猶詩所云一之日二之日也在天時則陽氣發越生生不窮在人則陽道昌明進進不已故利有攸往也愚按七日之說折衷獨主陸氏甚為有理詳見臨卦彖曰復亨剛反剛窮上而反下故亨反即復意但自其回頭言之曰反自其還元言之曰復動而以順行是以出入无疾朋來无咎震動于下而坤以順行于上是以出入无疾朋來无咎出入朋來陽之動也无疾无咎以順行也傳曰卦才本義曰卦徳其義一也反復其道七日來復天行也二氣如環而往數不可易也一陽應候而來數不能違也葢消長相因天運自然之理也利有攸往剛長也剥曰小人長陰長也故不利有攸往復曰剛長君子長也故利有攸往剥順以止而復順以行亦其義也復其見天地之心乎復非天地之心復乃見天地之心見字要看傳曰一陽復于下乃天地生物之心也先儒皆以靜為見天地之心葢不知動之端乃天地之心也非知道者孰能識之至哉言乎自古未有說至此者從此理會兼取邵朱二詩讀之復之義无餘藴矣邵子曰冬至子之半天心无改移一陽初動處萬物未生時𤣥酒味方淡大音聲正希此言如不信更請問庖羲朱子曰忽然夜半一聲雷萬户千門次第開識得无中含有處許君親見伏羲來讀二詩豈特見庖羲哉併文王周公孔子皆見之矣象曰雷在地中復先王以至日閉闗商旅不行后不省方雷在地中一陽始復之時也陽始生于下而甚微安靜而後能長先王順天道故以冬至之日閉闗使商旅不行后不省視四方既曰先王又曰后后謂後王也葢先王之制如此舜十一月朔巡狩而此言不省方葢巡狩者是月也不省方者是月之至日也月令云齋戒掩身以待隂陽之所定正是此意如萌芽方生須用培養如胚胎方成須用保䕶大抵收歛閉藏凡事不肯輕洩些子象特舉其大者而言耳按至日震一陽象闔戸又一陽橫亘于下閉闗象震為大塗坤衆商旅象闗閉矣不行象震為君后象坤為土方象君不居五而居初潛居深宫不省方象愚按今考來註每卦皆如此取象深為有理宜詳之初九不逺復无袛悔元吉傳曰復者陽反來復也陽君子之道故復為反善之義初陽剛來復處卦之初復之最先者也是不逺而復也失而後有復不失則何復之有唯失之不逺而復則不至于悔大善而吉也聖人不貴无過而貴改過故以元吉為大善而吉无袛悔不至于悔也本義因之又曰顔子无形顯之過夫子謂其庶幾乃无袛悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至于悔乃不逺復也解繋辭最為詳明象曰不遠之復以修身也修身必先正心復者天地之心也以天地之心為心而身安有不修者乎修如修我墻屋之修去其疵累還吾粹精之夲體也傳曰學問之道无他也唯其知不善則速改以從善而已二語極精六二休復吉學以親仁為要得仁者而親之則日躋于美善故曰休復吉胡雲峯曰遯貴遠遠莫逺于上九而九五能比之故曰嘉遯遯之美者也徳貴不逺初九曰不遠復而六二能比之故曰休復復之美者也里仁為美亦此意與引喻甚確象曰休復之吉以下仁也克已復禮為仁不遠復復于仁也傳曰仁者天下之公善之本也初復于仁二能親而下之葢以初之修身者修其身故美而吉也六三頻復厲无咎三隂躁不中正而處動之極故為頻復傳曰復之頻復而不能固者也既曰頻復則必頻失故言厲以儆之雖曰頻失猶幸頻復故言无咎以勸之在常人或以屢失而掩其復在聖人則以屢復而恕其失皆所以開遷善之門也高順嘗謂呂布曰舉動不肯諦思動輒言誣誣事豈可數慎毋恃改過為盛徳而漫无絶私勝已之力此又六三之藥石不可不知也象曰頻復之厲義无咎也㸃出義字義者宜也屢失則不宜屢復則宜知義則漸進于仁矣故雖厲而无咎也六四中行獨復以四為中取上下各二隂為義所謂時中也傳善矣本義似尤精本義云四處羣隂之中而獨與初應為與衆俱行而獨能從善之象當此之時陽氣甚微未足以有為故不言志然理所當然吉凶非所論也董子曰仁人者正其誼不謀其利明其道不計其功于剥之六三及此爻見之比傳何等醒豁何等精透按後世如徐庶身陷曹操而終身不畫一謀心乎漢也庶幾中行獨復者矣象曰中行獨復以從道也所從者陽剛君子也故曰從道六五敦復无悔五居坤之中體載有厚徳者也故為敦厚復善之象傳曰雖本善戒亦在其中矣陽復方微之時以柔居尊下復无助未能致亨吉也能无悔而已葢五居君位與六二繋應僅自厚于復故爻辭如此蒙引好善慕徳等語俱未是胡氏以為善行之固以為成徳之事亦是但不當借初來相形謂五勝初也蒙引既發明此義而又曰无悔尤勝无袛悔相矛盾矣象曰敦復无悔中以自考也傳義考俱訓成余意中謂五考即視履考祥之考言内自省考動不失中故无悔也若合六二之中而共考之則亨吉矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征爻辭未有如是之詳且凶者以夲心喪失故无施而可也傳曰以隂柔居復之終終迷不復者也本義因之徐進齋曰地絶既无下仁之羙剛遠則失遷善之機隂重已有難開之蔽柔終安望改過之勇迷復之義僃矣傳災天災自外來眚已過由自作兼兩意說極是朱子獨作過誤恐未的書眚災肆赦亦是兩意傳曰迷道不復用以行師則終有大敗以之為國則君之凶也十年者數之終至于十年不克征謂終不能行既迷于道何時而可行也此以行師治國對言固是余意師必明紀律明賞罰而後可行迷復者㝠昧而不自振必有覆軍之禍故曰大敗兵敗則及其國國敗則及其君至于十年不克征不克征謂不能行師也正見終有大敗終而不返安有雪恥之日乎如此一律說亦通象曰迷復之凶反君道也爻有國君之辭故象曰反君道或謂不連上說非是傳曰復則合道既迷于復與道相反也其凶可知以其國君凶謂其反君道也人君居上而治衆當從天下之善乃迷于復反君之道也非止人君凡人迷于復者皆反道而凶也既從反道說到君上去又從君道廣推之何等周宻震下乾上无妄元亨利貞其匪正有眚不利有攸往卦上乾下震故傳曰動以天為无妄動以人欲則妄矣二句便盡卦義又曰无妄者至誠也至誠天之道也天之化育萬物生生不窮各正其性命乃无妄也從天說來无妄的源頭纔明了又曰人能合无妄之道則所謂與天地合其徳也无妄有大亨之理君子行无妄之道則可以致大亨矣无妄天之道也卦言人由无妄之道也如此說到人身上來卦義乃有着落又曰法无妄之道利在貞正失貞正則妄也雖无邪心苟不合正理則妄也乃邪心也故有匪正則為過眚如此說纔是无妄的匪正又曰既已无妄不宜有往往則妄也此則因彖傳无妄之往一句發也朱子發明无邪心而不合正理一句以為賢知之過又曰佛氏亦豈有邪心哉又兼動靜言何其詳以盡也非朱子不能發明程子之義至此由此推之則申生之死于父子路之死于衛皆无邪心而不合正理者也理學素用莊敬持養功夫若應事接物有一不恰好處便犯此卦的戒了彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不佑行矣哉傳曰謂初九也坤初爻變而為震剛自外而來也本義曰自訟而變九自二來而居于初也或曰乾為外卦震之剛自乾來亦通初九為成卦之主而居内之第一爻故曰為主于内卦之主正无妄之主也以卦徳言之震動乾健是其動剛健内外皆无妄也以卦體言之五剛健中正二柔順中正二五相應上下皆无妄也所謂元亨者言大亨之道祇是以正此非人私智所能為也天之命也天命即天道所謂天道无妄而已夲義曰其有不正則不利有所往欲何往哉只一直說傳則曰所謂匪正葢由有往若无妄而不往何由有匪正乎无妄者理之正也更有往將何之矣如此纔說的无妄之往意出胡氏附會本義以此句與泰卦包荒得尚于中行例看誣矣天命只是无妄无妄而又往則逆天之命矣天尚不佑其何以行之哉聖人之言特加婉曲曰行矣哉仍是何之矣語氣无妄匪正特眚耳何以便云天命不佑張南軒云一念纔不是便致上帝震怒正此意也在常人一念之正則誘而進之如頻復而許以无咎之義是也在至人一念之不正則危而懼之如匪正而戒以不佑之天是也易之教人至矣謹按剛自外來而為主于内說者不一卦變謂訟卦九二來居于初若然則是自内來非自外來矣其說固不可從其餘若王氏胡氏何氏之說雖不甚相逺而殊无義意與來氏耑言卦綜者正同折𠂻獨取趙氏之說以謂在卦為震得乾最初之畫在人為吾心得天最初之理此所以為无妄也天理非由外鑠我者此特卦象言之見自乾來之意極是竊意諸卦但言往來上下已耳此獨言自外來者何居葢彖言不利有攸往以其自外來也程子所謂動以人者是也初言往吉以其為主于内也程子所謂動以天者是也夫一剛也外來則不利為主則往吉易之不可為典要如此其教人之意亦深切矣象曰天下雷行物與无妄先王以茂對時育萬物雷行于天下則萬物竦然震動无復私邪之萌是物物與之以无妄也程朱俱說到各正性命處其意深矣先王觀天下雷行發生賦與之象而以茂對時使四時之行无妄也育萬物使萬物之生无妄也時曰茂對言盛其精神有與天時相匹敵者矣萬物曰育則海隅蒼生罔不率俾暨鳥獸魚鱉咸若也葢雷未行先王事天以靜則有閉闗却行之事雷既行先王事天以動則有對時育物之功故程子曰先王无事不順天時也初九无妄往吉九乾體初震始居内而為无妄之主者也无妄誠也至誠能動故曰往吉葢正而匪眚利有攸往與卦辭異矣卦言往不利以其既无妄而又有往出于无妄之外也爻言往吉即以其无妄往生于无妄之内也程傳立義精矣象曰无妄之往得志也无妄者已也往而吉則人物皆无妄矣故曰得志也傳曰以之修身則身正以之治事則事治以之臨人則人感而化无所往而不得其志也盡之矣六二不耕穫不菑畬則利有攸往坊計引易曰不耕穫不菑畬凶不知何所本而與此相反也傳分三層說甚晦難解朱子謂耕穫菑畬四事都不做本義云因時順理而无私意期望之心故有不耕穫不菑畬之象較傳固為現成但全不事事而利有攸往豈不起人徼倖之心非聖人立教之意也又云如聖人之无為而治如學者之不要人爵而人爵從之若然則是聖人之无為而治果真一无所為同于老氏之无為矣學者不要人爵而人爵從之豈遂不修天爵耶于理未確訂詁曰不方耕而即望其有穫也不方菑而即望其成畬也此解甚好但方字即字未是不方耕而即望其穫豈既耕而可望其穫耶不方菑而即望其畬豈既菑而可望其畬耶余謂二柔順中正盡其在我與五為應而不責報不耕穫者不以耕而望其穫也不菑畬者不以菑而望其畬也此即先事後得之意所謂正其誼不謀其利明其道不計其功也復之六四本義引董子之言為作易之聖人言也此又引董子之言則為六二言也夫有春之耕則有秋之穫有一嵗之菑則有三嵗之畬此情理之必然者也二雖不以耕而望穫然耕矣豈有不穫者二雖不以菑而望畬然菑矣豈有不畬者故利有攸往特加則字言不如此即如此所謂无妄之福也象曰不耕穫未富也傳曰未者非必之辭言非必以穫畬之富而為也只此二句足矣夲義曰富如非富天下之富言非計其利而為之也亦好余向謂爻辭即君子謀道不謀食之意象辭即孔明所謂臣死之日不使家有餘財廩有餘粟之意亦是一說姑存之六三无妄之災或繋之牛行人之得邑人之災傳以為有得必有失訂詁以三不宜應上為行人則得牛為邑人則失牛非也唯夲義行人牽牛以去而居者反遭詰捕之擾二語極好但其說未暢耳余意无其事而有其害曰无妄之災此一句為主下三句總解此句或繋之牛謂上九也上與三為正應故繋其牛于三之邑也然相去甚遠行人因利乘便而牽之以去與三固无與也上以牛在其邑又疑其隂邪不中正故捕而詰之此所謂无妄之災也在三則諺所謂人偷牛他拔橛在上則律所謂誣指平人為盗也故上九曰行有眚然六三災雖无妄實素行不正有以取之此亦聖人惡居下流之意與謹按易之取象皆以八卦之象為主即如此卦六三乃坤之三爻也坤為子母牛故以牛取象然變為震之三爻處動之極故又為繋而復失之象且三與二皆隂二柔順中正故有无妄之福三以柔居剛不中不正故有无妄之災騐之人事莫不皆然聖人作易所為取萬世之人情物理无不總括而兼貫之也又此爻即大畜之六四然大畜六四乃坤之初爻也故亦曰牛而為童牛變艮為止故又為加牿之象易之取象明顯如此必欲刻而求之謂某為䋲某為鼻某為手某為邑某為盜且于本卦互卦之外搜及旁卦擬議以求合未免雕鑿象曰行人得牛邑人災也爻外不加一語但取其辭以重述之言外便見得災生无妄意聖人註經之妙如此九四可貞无咎凡卦莫不以相應為善无妄獨不取應義以有所繋應則妄也故二應五則疾三應上則災惟四與初无應故初吉而四无咎也四以陽剛居乾體復无應與无妄者也可猶當也言當堅確守之不少移易則无咎也或曰可貞者恐其未必貞也故决之象曰可貞无咎固有之也傳義有俱訓守言固守其剛健之本體也九五无妄之疾勿藥有喜五陽剛中正而居尊位二復以中正應之无妄之至也如是而有疾不煩藥石攻治行當自愈而有喜矣疾則憂疾愈故喜也傳曰无妄之所謂疾者謂若治之而不治率之而不從化之而不革以妄而為无妄之疾舜之有苖周公之管蔡孔子之叔孫武叔是也然則至誠无妄其正療病之善藥乎象曰无妄之藥不可試也傳曰既无妄矣復藥以治之是反為妄而生疾矣故曰不可試試謂少嘗之也夲義全用之上九无妄行有眚无攸利天地間原有恰好道理在過當反不是上居无妄之極不可以有行也行則過于正而有眚何利之有卦所謂匪正有眚不利有攸往正謂此也張中溪曰漢武漠北之征唐皇雲南之師此爻之謂矣蒙引曰尾生孝已之行也俱有理象曰无妄之行窮之災也本義云上九非有妄也但以其窮極而不可行耳行則傳所謂窮極而為災害也二義合㕘之始得乾下艮上大畜利貞不家食吉利涉大川均一乾也畜之以巽隂畜陽也畜之以艮陽畜陽也故有小畜大畜之分以畜聚言則其藴大以畜止言則其力太以畜養言則其徳大傳曰在人為學術道徳充積于内乃所畜之大也大畜而不以正或馳于詞章或染于功利或溺于虚无傳所謂異端偏學是也畜雖大亦奚以為故曰利貞利貞者正已以正天下也共天位享天禄則不食于家然後可以行其所學也故曰不家食吉畜極而流其大也行與天下共之可以拯溺可以濟險故曰利涉大川傳曰此只據大畜之義而言彖更以卦之才徳而言諸爻則惟有止畜之義葢易體道隨宜取明且近者此義須知彖曰大畜剛健篤實輝光日新其徳剛健謂乾體篤實輝光謂艮體日新其徳兼兩體言進進不已也若蹈常襲故則其畜日竭而不大矣剛上而尚賢能止健大正也本義以剛上為卦變謂此卦自需而來九自五而上傳則謂剛上陽居上也陽剛居尊位之上而二柔奉之為尚賢之象此理自好不曰健而止而曰能止健艮上乾下也乾天下之至健而艮能止之非大正不能大正指上九一陽言按爻義夲取二柔畜剛彖傳獨歸功一陽而二柔之小不與焉其義深矣不家食吉養賢也不家食吉謂朝廷隆大烹之奉以養賢而賢者出而有為也利涉大川應乎天也利涉大川應乎天者傳謂六五君位下應乾之中爻乃大畜之君應乾而行也所以發明卦才也或曰此取上下兩卦體相應不耑指一爻言亦通象曰天在山中大畜君子以多識前言往行以畜其徳天包地外如何在山中故夲義曰不必寔有是事但以其象言之也唯天為大而為山所畜至大之象也君子觀大畜之象而從事于學問所謂道問學以尊徳性也傳曰人之藴畜由學而大在多聞前古聖賢之言與行察言以求其心考跡以觀其用識而得之以畜成其徳乃大畜之義也數語可作畜徳箴愚謂前言往行徳之資也多識前言往行畜之功也此正多聞多見一証也陽明之徒每謂聞見為心累欲掃而去之是天不在山中而徳不在言行中也无實修而言虚悟豈大畜之君子哉是故多識前言往行而不以畜徳玩物喪志俗學也鄭康成張茂先一流是也畜其徳而不多識前言往行躭空守寂禪學也楊􅄌湖王龍溪一流是也初九有厲利已初陽剛又乾體而居下利于進者也然上應四而為其所畜四在上得位有不可犯之勢初若不量而進其能免于厲乎故不利進而利已也𫝊曰大畜艮止畜乾故乾三爻皆取被止為義艮三爻皆取止之為義在他卦則四與初為正應相援者也在大畜則相應乃為相止畜此義正須識得謹按程子云凡卦皆從乾坤二卦變來即如此卦初九乃乾之初九也在潛而勿用之地又為六四所畜故利于已則不犯災九二為六五所畜故雖在田而徳施不能普為輿説輹之象三則健極而進又應上之畜極而通故為良馬馳逐之象且艮為徑路為門闕上又為天衢故利有攸往此皆卦中現具之象不待搜索于錯卦綜卦而得者試以无妄上三爻類推之亦然因黎明時思索此爻並及无妄上九象傳何以全用乾卦上九文言之句益信程子之言葢確有所見云象曰有厲利已不犯災也厲災也已則不犯矣故利九二輿説輹二之受畜于五與初之受畜于四同則有厲亦同但二居中得正故不須以厲戒之而自已為輿說輹之象輿說輹安止不前也按輹與輻不同輻車輪之轑凡三十六條者也輹車上伏兎葢所以承輻者也故小畜之說輻葢為隂所止所說者重乆住之計也大畜之說輹葢自止而不進所說者㣲暫止而可旋起者也如此分别纔是象曰輿說輹中无尤也輿說輹者見㡬而无觀望兩可之心葢其處得中道動不失宜故无過尤也傳說極是或作中心之中非矣九三良馬逐利艱貞曰閑輿衛利有攸往三健極而進上畜極而通俱有不可禦之勢且兩剛同體不相畜而相應進不留行故為良馬馳逐之象言其速行也傳曰雖其進之勢速不可恃其才之健與上之應而忘僃與慎也故宜艱難其事而由貞正之道如此說始妥註言不憂險阨則貞字說不去或以艱貞對說亦未是有馬則有輿有輿則有衞都是相因物事閑習車輿範我馳驅也閑習防衞用戒不虞也曰字宜如程朱作日月之日或云如字讀作嘆辭鑿矣日閑輿衞其堅貞之寔乎利有攸往其日閑輿衞之效乎象曰利有攸往上合志也四畜初則志不合五畜二則志不合上不畜三而應三故曰合志合志者同心一徳之謂也六四童牛之牿元吉凡遏惡者禁之于已然則難為力防之于未然則易為功四畜初防于未然故有大善之吉也初以一陽居最下之位故曰童牛傳以童牛為始角本義以童牛為未角若未角恐无所施其牿矣况本義明云牿者楅衡施橫木于牛角以防觸者乎固知傳說為是傳解爻既明又曰槩論畜道則四艮體居上位而得止是以正徳居大臣之位當畜之任者也大臣之任上畜止人君之邪心下畜止天下之惡人人之惡止于初則易既盛而後禁則扞格而難勝故上之惡既甚則雖聖人救之不能免違拂下之惡既甚則雖聖人治之不能免刑戮莫若止之于初如童牛而加牿則元吉也推廣之義大矣謹按此爻之義傳義言理精矣若言象猶未允恊也何也以牿為楅衡謂施横木于牛角以防其觸夫童牛未角横木施于何處即有可施亦不過防其觸耳非能禁之使不得觸禁其角使不得長也于畜止之義未甚切當且細味此卦彖辭大象爻辭似不耑言畜止也畜養意亦不可少其在周書費誓篇曰今惟淫舍牿牛馬註曰牿闈牧也夫牛之性順閑之易易也童牛而加閑更易為力矣此則于畜止畜養義皆可相通且于禁于未然之理亦不相悖象曰六四元吉有喜也上不勞禁制下不傷刑誅而惡人馴習坐獲大善之吉上治于此再見矣故可喜也六五豶豕之牙吉二陽已壯而畜之較初之用力難矣故以豕牙取象牙者剛躁之物也然鋤強戢暴都有要領在傳所謂物有總攝事有機會是也六五柔中居尊能直尋受病根因一刀斬斷則剛躁自止故以豶豕取象葢豕去其勢則牙无所肆其毒矣但視四之畜初已落第二着故言吉而不言元也傳曰君子法豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑罰嚴峻而惡自止也且如止盜民有欲心見利則動苟不知教而廹于飢寒雖刑殺日施其能勝億兆利欲之心乎聖人則知所以止之之道不尚刑威而修政教使之有農桑之業知亷恥之道雖賞之不竊矣此治天下之大道也不可不知謹按此爻以豕牙取象程傳遂謂豕剛躁之物而牙為猛利豶去其勢也去其勢則牙雖存而剛躁自止以喻治民者不尚嚴刑而修政教其理自好而于物理未之察也來註解牙字極是乃以豶為騰謂是走豕又引互卦變卦錯卦以明之未免扭揑牽强沾滯不通非聖人逺取諸物近取諸身自然而然无所安排之義矣竊意豕牙雖剛不聞嚙人養豕之家不問牝牡俱皆豶之豈為其牙而然乎則牙之非齒牙也斷可知矣埤雅云牙者畜豶豕之杙也葢豕性猛突而又善逸豕而豶則不逸而易養且繋豕以杙江淮之間所在有之聖人取象大約夲此葢近而易見故也且于畜止畜養二義相通于不尚嚴刑之理亦不相悖也象曰六五之吉有慶也人心革惡從善風俗革薄從忠人君之慶亦天下之慶也上九何天之衢亨傳夲胡先生之説曰何字衍本義作賛嘆語曰何其通逹之甚也固有理訂詁云何儋也負也與詩何天之寵百禄是何義同又别王延壽賦荷天衢以元亨句為証言上九畜極而通肩鴻任重以翺翔于天路而不為羈勒之所制也其説更暢葢五天位也上位乎天之上又艮為徑路有天衢象傳曰天衢天路也謂虚空之中雲氣飛鳥往來故謂之天衢天衢之亨謂其亨通曠濶无有蔽阻也夲義豁逹无碍亦是此意象曰何天之衢道大行也傳以象有何字為設問辭此本註説非也不如直作負荷意為是葢道即道徳之道得諸心曰徳逹諸外曰道徳大畜故道大行也彖所謂不家食吉利涉大川者正指此爻震下艮上頤貞吉觀頤自求口實卦體上下二陽内含四隂外實内虚上止下動為頤之象養之義也此夲義全用程傳也傳言頤道之正兼養徳養身養人養于人數義始盡葢養身而不以正則為口腹之奉養徳而不以正則為黄老之學養人而不以正則有素餐之譏養于人而不以正則有餔啜之羞故頤曰貞吉統言一卦之義也頤自求口實統言觀人觀已之道正則吉不正則凶也不言善惡吉凶欲學者諦審而究圖之也傳為指出發明聖人言外之意耳傳又有養生養形養徳養人之説曰動息節宣以養生也是要靜飲食衣服以養形也是要儉威儀行義以養徳也是要敬推已及物以養人也是要恕靜儉敬恕四字學者缺一不可彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也頤貞吉養得其正則吉也觀頤觀其所養之道于人也自求口實觀其自養之道于已也觀下句言自則上句當属人項氏曰養人指上九言自養指初九言初上二陽上下兩卦之主爻也非孔子贊辭明白則後儒必不分作養已養人兩條看極是朱子不作養人説故本義云觀其所養之道及其答門人則已有程傳似勝之説矣又以下體三爻皆是自養上體三爻皆是養人証程傳之確固知夲義亦有未訂正者天地養萬物聖人養賢以及萬民頤之時大矣哉推養之義天地養萬物養以正也養以正故萬物育焉聖人養萬民亦猶天地之養萬物也若只従百姓做起焉得人人而養之故須用賢圖治賢之未成也廩糈養之于學校賢之既成也爵禄養之于朝廷或育養或培養然後人才出政教立而膏澤下于民矣養賢正所以養萬民也是謂徳配天地養之至也頤之時大矣哉綂贊天地與聖人之功也傳曰或云義或云用或云時以其大者言也萬物之生與養時為大故云時此皆確不可易也象曰山下有雷頤君子以慎言語節飲食以卦義言之上止下動頤頷之象以卦形言之外寔内虚頤口之象君子觀其象而得養身之道焉慎言語以養其徳節飲食以養其體傳徳體二字極盡如何易的故夲義但以切務賛之而又由一身之言語推之于號令政教由一身之飲食推之于貨資財用養徳養天下之道皆具焉其㫖深矣不然以謹勅為慎以儉嗇為節未足以盡大象之義也或引諺禍從口出病從口入二語而言曰言語一出而不可復入故君子慎之飲食一入而不可復出故君子節之言語飲食動象曰慎曰節止象其理自好愚謂慎言語立誠之學也節飲食无欲之學也昔温公告劉安世以誠曰自不妄語始安世􆀃括七年而後成羅仲素初見龜山告以飢者甘食渴者甘飲人能无以飢渇之害為心害則不及人不為憂矣令仲素思索且云此語若易知易行而有无窮之理仲素思之數日疏其義以呈龜山云更于心害上一着猛省仲素一生服膺此語此二事可為慎言語節飲食者一大榜樣初九舍爾靈龜觀我朶頤凶戴記以龜為四靈之一故曰靈龜龜咽息不食非待養于人者所謂人人有貴于已者良貴也舎此而朶動其頤于四則為埀涎之狀矣傳曰迷欲而失已以陽而從隂則何所不至是以凶爾謂初外之也我謂四愧之也假設之辭正教誨之道也蒙引云此爻如東漢之華歆最妙象曰觀我朶頤亦不足貴也初之才剛健明智者也剛不能自立而屈于欲焉得剛明不能自照而失其正焉得明不明不剛而役于口腹飲食之人則人賤之矣故曰亦不足貴也六二顛頤拂經于丘頤征凶居上養下不可易之經也傳曰天子養天下諸侯養一國臣食君上之禄民賴司牧之養其義僃矣二在初之上而求養于初顛倒而拂其常經矣程朱俱一串説下惟胡雲峯以拂經為違正應亦是下既不能養將轉而之于上則為丘頤丘指上九也上在外而髙有丘象不相應豈能相養非道妄動是以凶也傳曰今有人才不足以自養見在上者勢力足以養人非其族類妄往求之取辱得凶必矣又曰六二中正在他卦多吉而凶何也曰時然也隂柔既不足以自養初上二爻皆非其與故往求則悖理而凶也可謂曲盡矣謹按項氏曰頤卦惟有二陽上九在上謂之由頤固為所養之主初九在下亦足為自飬之賢靈龜伏息而在下初九之象也朶頤在上而下埀上九之象也上九為卦之主故稱我羣隂從我而求養固其所也初九夲无所求乃亦仰而觀我有靈而不自保有貴而不自珍宜其凶也折𠂻取之以為可僃一説今即此爻及逐爻細味之項氏之説其理甚長何也以此爻為求賢于初而以于丘為上九似多一轉不若從來氏之説以顛為項謂上九居艮之極上乃山顛之象亦自有理葢養道宜静不宜動初可自養而為動之主是失其良貴而求貴于趙孟者也故不足貴而得凶六二中正而亦凶者葢違正應而往求于上是趨炎附勢奔走權貴以求養者故失類而征凶也六三與上夲為正應其求養于上宜矣然六三隂柔不正居多凶之位而為動之極恃其正應必有非所求而求者故于養之道大悖而終无所利也四與上非其正應而顛頤吉何也來氏云艮為虎故取象于虎天下之物自養于内者莫如龜求養于外者莫如虎龜自養于内内卦初舎之故凶虎求養于外外卦上施之故吉葢虎見物將捕之必先伏其身而注視之故有眈眈之象眈耽者視之專也其欲逐逐者所欲之物東轉則目隨之東西轉則目隨之西也四居大臣之位下應初九之賢得養于上而施及于下養賢及萬民者也可謂施禄及下而施之有光者也五上兩爻傳義俱極明確故茲不復贅象曰六二征凶行失類也行失類傳專指上九言本義則兼言之曰初上皆非其類也玩象辭六三征凶則顛頤拂經全辭皆在其中矣夲義為是六三拂頤貞凶十年勿用无攸利頤之道唯正則吉得頤之正求養養人則合于義自養則成其徳故所養皆吉三以隂柔之質而處不中正又在動之極是柔邪不正而動者也其養如此拂違于頤之正道是以凶也夲義云既拂于頤雖正亦凶六三不中正恐无庸此一轉主傳為是勿用言為時所棄十年數之終十年勿用則終不可用矣何利之有象曰十年勿用道大悖也道者養正之道也拂于正則大悖于道矣是以遷延至于十年之乆而不見用也六四顛頤吉虎視眈眈其欲逐逐无咎四居大臣之位隂柔不足以濟而求養人之道于初顛頤也二與初非應而志在自養故顛而凶四與初正應而志在養人故顛而吉所居之位異而公私不同也虎視眈眈其欲逐逐二句最難解朱子亦以為理會不得只是敷衍解去程傳立威嚴之說晦矣不如作下賢説按荀九家易艮為虎故四以虎取象虎埀首下視更不回轉眈眈其視極狀任賢勿貳唯恐失之之意夲義所謂下而耑也逐逐其欲極狀心乎愛矣乆而不渝之意夲義所謂求而繼也用賢以養人耑而且乆故可以无咎也傳曰自三以下養口體者也四以上養徳義者也以君而資養于臣以上位而賴養于下皆養徳也吉凶之辨昭然矣又下三爻震體主動故凶上三爻艮體主止故吉以此見處頤之時宜靜不宜動明矣象曰顛頤之吉上施光也居上位而無徳以施于人无色甚矣得初陽剛之賢共濟其事則膏澤下于民榮施不既多乎此顛頤所以吉也六五拂經居貞吉不可涉大川五與二正應也拂二以求養于上拂經矣然上九以陽徳居師傅之位五能順而從之正也堅守正道坐享上九之成功故不可涉大川耳不利涉大川莫説壊了傳曰能持循于平時不可處艱難變故之際朱子曰猶洪範用靜吉用作凶守常則吉涉險阻則不可也毛氏曰无事猶可以分相縻欲有所為則難以濟矣皆非也五操養人之權不自用而歸諸上九所謂聖人養賢以及萬民者也養賢者无煩勞力為養民之事豈必冒險而往乎故曰不可涉大川也涉大川者上九之事非六五之事也故上九一爻曰利涉大川且五不言頤而上曰由頤其說益明矣象曰居貞之吉順以從上也傳曰居貞之吉者謂能堅固順從于上九之賢以養天下葢舉國以聽惟所欲為而不復從中制也上九由頤厲吉利涉大川以六五之君柔順而從上九之臣是上九當天下之任天下皆由之以養也故曰由頤任大責重使非慄慄常懐危懼能勝厥任乎故曰厲吉伊尹抱納溝之恥周公厪待旦之勤用是道也以陽剛之才兢業之徳居上位而養天下舉凡風波險阻六五所不可涉者以一身涉之而裕如故曰利涉大川昔冦萊公澶淵之役可謂利涉大川矣所少者厲之一字故小人乘間而入而天下不得邀大慶焉非知易者也象曰由頤厲吉大有慶也養天下而不有其功斯民庶幾乎含哺而鼔腹矣故曰大有慶也巽下兊上大過棟橈利有攸往亨大過者陽過也故為大者過傳云聖賢道徳功業大過于人凡事之大過于常者皆是也非有過于理也朱子語類問大過小過先生與伊川之説不同曰然伊川此論正如以反經合道為非相似不知大過自有大過時節小過自有小過時節處大過之時則當為大過之事處小過之時則當為小過之事在事雖是過然適當其時合當如此做便是不過于理此朱子所以有功于程子也四陽居中過盛上下二隂皆弱故為棟橈之象葢棟取其勝重四陽聚于中可謂重矣九三九四取象于棟謂任重也棟橈似不利有攸往矣然隂弱陽强正小人衰君子盛之時故利有攸往而亨也彖曰大過大者過也不曰過之大而曰大者過大者陽也大者過陽倍于隂故過也棟橈夲末弱也初夲也上未也上下俱隂不堪四陽之任故曰弱剛過而中巽而説行利有攸往乃亨四陽過剛而二五却得中處不失中道卦之體也下巽上兌巽順和說而行卦之徳也中道而巽説則可以抑過剛之弊而扶夲末之弱故利有攸往亨義即在其内葢利有攸往乃其所以亨也大過之時大矣哉傳賛大過之時之大而曰如立非常之大事興不世之大功成絶世之大徳皆大過之時之事也愚謂有絶世之大徳而後能樹不世之大功有不世之大功而後能勝非常之大事三者又有相因之序焉是故有其時而无其事者陋也有其事而无其時者妄也堯舜揖讓湯武征誅君道之大過也霍子孟廢昏立明狄梁公反周為唐臣道之大過也程子所謂常事之大者非有過于理也象曰澤滅木大過君子以獨立不懼遯世无悶兌為澤澤在下者也巽為木木在上者也今澤在木上則澤㓕木大過之象也然木雖没于澤而植立不撲者自在故君子觀其象而以獨立不懼遯世无悶焉獨立不懼者卓爾自立不以利害禍福為念孟子之不動心是也遯世无悶者確乎自信不以是非毁譽為心孔子之不怨天不尤人是也兩者皆大過之行也或以上句属用巽木象周公當之下句属舎兑説象顔子當之初六藉用白茅无咎初六以隂柔而居巽之初有藉用白茅之象初所應者四之剛錯諸地可也而必藉以茅示不敢䙝也藉用茅可也而必藉以白茅示不敢飾也過于敬慎故可以无咎也繋辭云苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣只閲此便明象曰藉用白茅柔在下也柔茅象在下藉象柔在下藉用白茅象或曰此示人以取象之義是也傳曰以柔在下為以茅藉物之象敬慎之道也九二枯楊生梯老夫得其女妻无不利當大過之時以陽居隂則過而不過以陽居陽則過矣故二四皆吉而三五皆凶也他卦以相應為義此獨以相比為義九夲剛而居中用柔下比初隂隂陽相濟故不至于大過也陽過則枯故為枯楊初以柔濟之過而不至于極故生梯根𤼵于下則幹榮于上矣又九二以剛居柔之上老夫也初以柔順承其下女妻也老夫得其女妻以言乎婚姻之時則過矣以言乎男女之正則非過也能成生育之功故曰无不利无不利𦂳根老夫女妻來與下爻无咎无譽一例象曰老夫女妻過以相與也過以相與者九二老陽初六少隂唱和之情過其常分也九三棟橈凶三四皆棟象也四在三之上故隆而不橈三在四之下故橈而不隆所處之位異也三以剛居剛過剛則折故有棟橈之象傳曰以過甚之剛動則違于中和而拂衆心安能當大過之任乎故不勝其重如棟之撓傾敗其室是以凶也或曰三巽體而應于上豈无用柔之象乎或曰三居過剛而用剛巽既終而且變豈復有用柔之義應者謂志相從也三方過剛上能繋其志乎説至此纔曲盡象曰棟橈之凶不可以有輔也三以剛自居而過剛既不受輔于人與上為應又以柔居柔不能輔人故曰不可以有輔也如項羽剛愎自用教人如何輔他雖匹夫才愈上亦與之同受橈敗之凶矣九四棟隆吉有它吝四居近君之位當大過之任者也以剛居柔能勝厥任故有棟隆之象若更有他志與初六之隂相應則過于柔為可吝也傳曰吝為不足之義謂可少也或曰二比于初則无不利四若應初則為吝何也曰二得中而比于初為剛柔相濟之義四與初為正應志相繋者也九既居四剛柔得宜矣復牽繋于隂以害其剛則可吝也說至此纔曲盡象曰棟隆之吉不橈乎下也傳曰不橈曲以就下謂不下繋于初也或曰不橈正貼隆字隆則高立不堕故曰不橈乎下然不若傳意渾全能盡一爻之意也九五枯楊生華老婦得其士夫无咎无譽九五當大過之時夲以中正居尊位者也然陽過之極下无應助而比過極之隂故有枯楊生華老婦得其士夫之象按訂詁以枯楊為九五生華為上六馮厚齋曰依上爻則九五宜為陽而今以上六為枯楊老婦九五反為生華士夫何也易之意葢以枯象老在陽爻為夫在隂爻為婦不拘于隂陽之爻也從來解未到此无咎傳云无罪咎胡氏曰隂欲陽非陽之咎也然亦非美矣只用傳一句更好謹按二與五皆陽皆以枯楊取象而有得妻得夫之不同故說者遂異不知易之取象不拘一定隨時取義而已如此卦以相比為義二之比初陽老而隂少何也初為生而方穉之隂二乃長而已甚之陽陽在上而隂在下故有生梯之象而為老夫得女妻也五之比上隂老而陽少何也上為極而將盡之隂五乃盈而正盛之陽陽在下而隂在上故有生華之象而為老婦得士夫也夫夫雖老而得女妻則是夫係繼娶女則初婚年齒總有不齊而以男求女得婚姻之正有生育之功故无不利而過以相與也若婦已老而得士夫則是婦方衰寡士悦縞綦配合雖各適願而以女欲男當就木之年復修容以媚悦已絶生育之望徒喪節以負後人故不乆而可醜也讀者可拘文牽義以解易哉象曰枯楊生華何可乆也老婦士夫亦可醜也枯楊生華朝榮夕瘁其能乆乎傳曰老婦而得士夫豈能成生育之功未説可醜意出余意可醜言配合非偶也先儒謂二五兩爻僃極人倫之變竊以其意推之老夫得女妻未嫁而夫則再娶也曰无不利于以見男子有再娶之義為嗣續計也老婦得士夫未娶而婦則再嫁也曰可醜于以見婦人无再嫁之理程子所謂餓死事小失節事大也則事君者亦可以此意通之矣又九二剛為主而柔輔之則利九五柔為主而剛輔之則醜于以見剛唱柔隨剛先柔後之序學易者逐卦如此推去其理亦可盡也上六過涉滅頂凶无咎夲義以上六為殺身成仁如東漢諸賢之類其說原夲註疏註云志在救時疏云猶龍逢比干竊意上以隂柔之質而處過極之時與位如何便會殺身成仁葢以爻曰无咎象曰不可咎故有此說程傳則以為小人過常越理不恤危亡履險蹈禍无所過咎又云小人狂躁以自禍葢其宜也其理似乎較勝折𠂻云此爻程傳以為履險蹈禍之小人夲義以為殺身成仁之君子夲義之説固比程傳為長然又有一説以為大過之極事无可為者上六柔為説主則是能從容隨順而不為剛激以益重其勢故雖處過涉滅頂之凶而无咎也如東京之季范李適足以推波助瀾非救時之道况上六居无位之地委蛇和順如申屠蟠郭泰者君子弗非也此説亦可並存按此因外卦之象以取理程傳因夲爻之象以取理夲義則會全卦大象及爻象之辭以取理雖各有取爾然因大象澤㓕木故此爻以㓕頂取象夫涉而滅頂其凶必矣而獨立不懼遯世无悶何咎之有故當大過之世與其依違兩可觀望摸稜猶不如激昂慷慨奮不顧身者之為愈也總謂上六隂柔无位才弱不足以濟亦當如齊㐮公之卧床嬖人戰堦御者雖不得與于死節之土而一段忠愛之心正有不可冺滅者則亦獨立不懼之謂也且彖傳言本末皆弱則上之過于勇與初之過于慎正自相等固有未可厚非者象曰過涉之凶不可咎也言過涉之凶不可得而咎之也謹按過涉而至于滅頂雖不量其淺深以取禍然有死難之節而无苟免之羞則聖人之言或亦原心之論也與坎下坎上習坎有孚維心亨行有尚一陽䧟于二隂之中故曰坎坎而又坎故曰習坎傳曰習謂重習他卦雖重不加其名獨坎加習者見其重險險中復有險而義大也項平菴曰坎卦在離震艮兌巽之先故加習字以示五子皆當以重習起義也乾坤不加習字者六爻祇一爻故也二説俱好一陽中實故曰有孚蓋渾然一圑實理也維心亨即以有孚之心亨也傳曰維其心誠一故能亨通至誠可以通金石􅌃水火何險難之不亨也或曰身雖陷而心不可陷故亨大凡遭際之阨恒歸造物造物所以使我不能亨者身而已不能使我心不亨也心亨則造物失其權矣行有尚即以心之亨行也不行則在險中行則出險自下而上故曰行有尚傳謂有可嘉尚以言乎其亨之徴也心亨而行亦亨也隆山李氏曰乾坤三畫以初相易而成震巽以中相易而成坎離以三相易而成艮兑故乾坤者隂陽之祖而坎離則天地之中也坎居正北于時為子為夜之中離居正南于時為午為日之中夜之中而一陽生焉故坎之三畫一陽居中日之中而一隂生焉故離之三畫一隂居中天地隂陽之中此乃造化張夲之地故易上經始乾坤而終坎離貴其得天地隂陽之中而為易之用也且天一下降坎中在物為水在人為精以畫觀之坎之一陽居中而中實即精藏于中而水積于淵之象也地二上兆離中在物為火而在人為神以畫觀之離之一隂在中而中虚即神寓于心而火明于空之象也坎之中寔是為誠離之中虚是為明中寔者坎之用中虚者離之用也作易者因坎離之中寓誠明之用誠明起于中者易之妙用而古聖人之心學也此又發𫝊所未僃凡為學者皆不可不知此理彖曰習坎重險也一坎一險習坎者重險也謂兩險相重也水流而不盈行險而不失其信水字斷通貫下兩句一陽動于中流也陷于二隂而未能出不盈也逝者如斯夫不舍晝夜行險而不失其信也上句釋坎字之義下句釋有孚之義也維心亨乃以剛中也行有尚往有功也𫝊曰坎中寔水流下皆為信義有孚也以剛中謂二五之徳剛而得中也往有功謂有出險之功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉仰而觀象于天无形之險也俯而觀象于地有形之險也王公有國者建立城郭疏通溝池以安民人以固社稷法天地之險為人險也險之時有恁大作用故極言而賛之也傳曰山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡所以杜絶陵僣限隔上下者皆體險之用也如此始盡用險之義按春秋書城虎牢而不繋于鄭胡傳曰譏鄭之失險也其得王公守國之義乎觀文王彖辭耑言處險之道使險者失其險以二陽有中寔之象而推之也孔子彖傳既明處險之道又進言用險之方使險者得其險以四隂有陷險之象而推之也象曰水洊至習坎君子以常徳行習教事下坎一至上坎再至故曰水洊至言相仍而至也流而不息亦漸而不驟故觀其象而以常乆其徳行熟習其教事傳曰人之徳行不常則偽也故當如水之有常余謂常徳行者无進鋭而退速无有初而鮮終歴畢世如一日如水之過而復續也傳曰夫發政行教必使民熟于聽聞然後能從故三令五申之若驟告未喻遽責其從雖嚴刑而驅之不能也故當如水之洊習余謂習教事者不輟其所已能不驅其所未至往復以謨訓浸灌以嵗月如水之盈科而後進也夲義曰治已治人皆必重習然後熟而安之言治已則已重習使已熟而安之治人則人重習使人熟而安之也初六習坎入于坎窞凶初居重險之下習坎也然隂柔不能自拔又上无應援故有入于坎窞之象窞坎之險處即諺云跌坑也陷溺益深其凶可知象曰習坎入坎失道凶也失其所行之正道則淪于下流故凶也學者得道則吉貧賤流放却占地步失道則凶富貴榮華都是坎窞九二坎有險求小得二以一陽為二隂所陷是坎有險也然剛而得中所求亦足自濟未至如初益深入于坎窞故曰求小得言所得无多也傳曰君子處險難而能自保者剛中而已剛則才足自衛中則動不失宜也象曰求小得未出中也求小得以其未出險中也出險則所得也大矣六三來之坎坎險且枕入于坎窞勿用三處下坎之上隂邪而不中正來于下則有同體之坎陷其前也往于上則有全體之坎陷其後故曰來之坎坎進退皆險不遑寧處險且枕也枕程朱俱謂倚著不安之意竊意乗其上有覆壓之象故曰枕枕于上則益陷于下故入于坎窞與初六无異勿用戒辭言无庸如此來往為也夫亦别求濟險之道而靜以俟之可矣象曰來之坎坎終无功也來之坎坎終不能出險也何功之有卦所謂往有功者豈若是六四樽酒簋貳用缶納約自牖終无咎處上坎之下柔而得正上比九五之君故言處險之道樽酒簋貳用缶與漢君臣豆粥麥飯意同納約自牖與遇主于巷意同如是則雖在險難之時終可保无咎也傳曰燕享之禮不尚浮飾惟以質寔所用一樽之酒二簋之食復用瓦缶為器質之至也其說自確註疏皆與此同訂詁云樽酒句簋貳句用缶句葢用缶通頂上意言樽簋之器皆瓦也詩曰陳饋八簋易損卦二簋可用享皆確有証據夲義獨用晁氏之說讀樽酒簋為一句貳用缶為一句謂二為副益之意言薄禮而益以誠心也夫上既云樽酒矣下簋字如何觧且缶夲瓦器而以為誠心可乎至象辭説不去又謂釋文夲无貳字是改易經文也過矣畢竟伊川之説為是納約自牖傳曰納約謂進結于君之道牖開通之意室之暗也故設牖所以通明自牖言自通明之處以况君心所明處詩云天之牖民如塤如箎毛公訓牖為道亦開通之謂人臣以忠信善道結于君心必自其所明處乃能入也人心有所蔽有所通所蔽者暗處也所通者明處也當就其明處而告之求信則易也且如君心蔽于荒樂惟其蔽也故爾雖力詆其荒樂之非如其不省何必于所不蔽之事推而及之則能悟其心矣自古能諌其君者未有不因其所明者也故訐直强勁者率多取忤而温厚明辨者其説多行且如漢祖愛戚姬將易太子是其所蔽也羣臣爭之者衆矣嫡庶之義長幼之序非不明也其如蔽而不察何四老者高祖素知其賢而重之此其不蔽之明心也故因其所明而及其事則悟之如反手且四老人之力孰與張良羣公卿及天下之士其言之切孰與周昌叔孫通然而不從彼而從此者由攻其蔽與就其明之異耳又如趙王太后愛其少子長安君不肯使質于齊此其蔽于私愛也大臣諌之雖强既曰蔽矣其能聽乎愛其子而欲使之長久富貴者其心之所明也故左師觸讋因其明而導之以長乆之計故其聽也如響非惟告于君者如此為教者亦然矣教必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成徳逹才是也此可為萬世事君立教者法矣竊謂前朝劉瑾之誅借牖于宦寺嚴嵩之敗借牖于巫蠱其亦納約自牖之義乎象曰樽酒簋貳剛柔際也樽酒簋貳該全義剛謂五柔謂四君臣交際有明良氣象故禮薄器朴可以獻旁引曲喻可以通也傳曰君臣之交能固而常者在誠寔而已語雖淺近至理存焉漢高祖唐太宗皆有愧色九五坎不盈祇既平无咎九五處重險之中一隂在上是未能出險也故曰坎不盈不盈未平也既平則盈矣盈則可以出險而无咎傳曰以九五剛中之才居尊位宜可以濟于險然下无助也二陷于險中未能出餘皆隂柔无濟險之才人君雖才安能獨濟天下之險居君位而不能致天下出于險則為有咎必祇既平乃得无咎也象曰坎不盈中未大也夲義曰有中徳而未大傳曰是其剛中之道未光大也大則盈而險難可平矣又曰險難之時非夫君臣恊力其能濟乎五之道未大以无臣也人君之道不能濟天下之險難則為未大不稱其位也謹按此爻之辭與夫象辭諸家之説俱不能暢發其義折衷以程傳未能盈科出險之義與彖傳異指良有然矣然而俞氏何氏之説亦未得明白曉暢也嘗合一卦之彖爻傳及諸家之説反覆㕘訂竊意坎之所以不盈者以其流也彖傳所謂水流而不盈是也然而有源之水不舎晝夜雖不見其盈未始不至于平也平則可以出險矣所謂行有尚而往有功者也何咎之有葢水原不可盈盈則横流泛溢又為險矣故不盈而平則无咎也中未大者以五有中徳不侈然以自大以明不盈之意也當險難之時兢業自矢翼翼小心所以卒成濟險之功而有孚心悖亨而行有尚也如此説方與彖傳之指不上六係用徽纆寘于叢棘三嵗不得凶上六居卦之終理當出險乃以柔暗而乗五剛是有意陷陽而沈溺不反其罹于罪凶宜矣故有係用徽纆寘于叢棘之象徽纆皆索也三股曰徽兩股曰纆所以拘攣罪人也叢􅁄荀九家易坎為叢􅁄又今之囹圄以棘刺圍墻故曰叢􅁄寘者囚禁于其中也傳曰隂柔而陷之深其不出宜矣故曰至于三嵗之乆不得免也其凶可知折𠂻云不得者不能得其道也如悔罪思愆是謂得道則其困苦幽囚止于三嵗矣聖人之教人動心忍性以習于險者雖罪罟已成而猶不忍棄絶者如此象曰上六失道凶三嵗也道者濟險之道也卦所謂有孚維心亨是也失其道則失其孚而心不亨无所不至矣故陷于獄至三嵗之乆而不得免焉終凶之辭也傳曰言久有曰十有曰三隨其事也陷于獄至于三嵗久之極也他卦以年數言者亦各以其事也如三嵗不興十年乃字是也極為明曉離下離上離利貞亨畜牝牛吉離一隂麗于二陽之中故曰離離夲别離之離卦獨主麗與明二義古人用字各有取爾也凡物以有所麗而亨然非得其正不可學術不正麗之則不免于誣人名義不正麗之則不免于失身故離利貞亨傳曰有形必有麗在人則為所親附之人所由之道所主之事皆其所麗也盡之矣夫麗于正者順于正也欲順于正非涵有薰陶則无以成其徳故取畜牝牛為義坤為牛離一隂坤之中畫也故曰牝牛夫牛之性順而又牝焉順之至也順徳須養而後成故曰畜牝牛吉畜者抑其炎上之躁性也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下離附麗也丘建安曰五為天位故離上有日月麗乎天之象此以氣麗氣者也二為地位故離下有百穀草木麗乎土之象此以形麗形者也其解最妙亦舉大者以例其餘也重明謂上下兩體也麗乎正謂二五兩爻也君臣同明而又大居正則可以化天下而成文明之治矣柔麗乎中正故亨是以畜牝牛吉也上曰麗乎正下曰麗乎中正言二五麗乎正者以其麗乎中故正也麗乎中正而曰柔者指兩隂畫言為畜牝牛張夲也此句雖釋利貞却亦起下故加是以二字項氏曰柔附本非令徳以能附麗乎中正是以吉也言牝牛本柔唯畜之然後有中正之吉也傳曰或曰二則中正矣五以隂居陽得為正乎曰離主于所麗五中正之位六麗于正位乃為正也學者知時義而不失輕重則可以言易矣中正二字須如此詳悉象曰明兩作離大人以繼明照于四方傳曰明兩朱子云明兩作以水洊至例之故夲義云作起也其解甚確水潤下故曰至火炎上故曰作明而又明繼明之象也彖傳言君臣故曰重明大象言父子故曰繼明後先輝映之意照四方即書所謂光被四表也易六十四卦惟離稱大人傳曰大人以徳言則聖人以位言則王者如堯欽明而舜又文明文丕顯而武又丕承至矣周云成康斤斤其明其亦庶幾乎初六履錯然敬之无咎初居離最下之地故曰履以陽居陽恃剛妄動又明體而炎上易至躁進故有錯然之象錯然者紛紜交錯无所純一也敬則主一无適小心而畏慎焉故可使錯然者漸次就理而无咎也易動而靜易躁而恬傳曰初在下无位者也明其身之進退乃所麗之道也傳解敬字只是謹守其分而不敢進意余意即作主敬説亦是折衷云履錯然者處應物之初也敬者養明徳之本也人心之徳敬則明不敬則昏于應物之初而知敬其即于咎者鮮矣象曰履錯之敬以辟咎也履錯則有咎矣敬者所以避而逺之謹身寡過之道也傳曰居明而剛故知難而能避不剛明則妄動矣此理亦好祇是不惹事意六二黄離元吉二畫即坤之中爻故坤六五曰黄裳元吉離六二曰黄離元吉彼居君位而順此居臣位而明也離黄中央土之正色月令土无偏属以其統僃四時之徳也其文足潤色而明能光照故曰元吉所謂柔麗乎中正故亨畜牝牛吉正謂此也象曰黄離元吉得中道也黄離得至中之道故元吉也不偏之謂中中者正也故言中而不及正傳曰不云正者離以中為重所以成文明由中也正在其中矣九三日昃之離不鼔缶而歌則大耋之嗟凶離初爻日初象二爻日中象三爻日昃象傳曰九三居下體之終是前明將盡後明當繼之時人之始終時之革易也故日昃之離日下昃之明也昃則將没矣以理言之盛必有衰始必有終常道也逹者順理而為樂缶常用之器也鼓缶而歌樂其常也不能如是則以大耋為嗟憂乃為凶也大耋傾没也人之終盡逹者則知其常理樂天而已遇常皆樂如鼓缶而歌不逹者則恐恒有將盡之悲乃大耋之嗟為其凶也此處死生之道也然而知命之學具此矣人亦何可為日暮途窮之悲哉昔韓持國常嘆今日又暮矣程子曰此常理往來如是何嘆為曰老者行去矣曰公勿去可矣曰如何能勿去曰不能則去可矣程子此言正可與此爻相𤼵折衷以梁氏之説獨得爻義今按梁氏曰三居下離之終乃日昃之時也夫持滿定傾非中正之君子不能三處日之夕而過剛不中其志荒矣故不鼔缶而歌則大耊之嗟其歌也樂之失常也其嗟也哀之失常也哀樂失常能无凶乎君子值此之時則思患之心與樂天之誠並行而不悖是故不暇于歌矣而亦何至于嗟乎此則不字則字皆有着落象曰日昃之離何可乆也日昃之離其能乆乎宜有以自處矣愚謂以一日之日計之日何可乆也以千歲之日計之日何不可乆也知日昃之離不可乆而早為不朽地焉將天地與之同乆又豈至有大耋之嗟哉九四突如其來如焚如死如棄如四居上離之下後明始繼之時也如人元氣纔屬正宜悠悠温養而四以陽居隂剛猛而不中正有凌逼于五之象故曰突如其來如言鹵莾滅裂而來也天下事從容詳審則可以奏功輕率躁易則易于賈禍而况相繼之始乎折𠂻云離明徳也繼明者所謂有緝熙于光明其明不息也與繼世之義全无交涉先儒有以明兩為繼世者故程傳用説九四爻義于經意似逺今概不録竊嘗以來註推之火性炎上三之舊火既然四之新火又發五得中居尊既不敢上犯于五又不能下囘于三上下皆无所容而燎原之勢剛猛暴烈有不可遏者不戢自焚故必至于焚如死如成灰棄如而后已也如者助語辭水性潤下坎之六三在下卦之上故曰來此來而下者也火性炎上離之九四在上卦之下故亦曰來此來而上者也來而下必至坎窞而後已來而上必至死棄而后已其説最為曉暢有理故併録之象曰突如其來如无所容也焚死棄故无容身之地也愚謂言不能以順徳養其明而猛烈燥暴上既不能見容于四下又不能見容于三故始之突如其來如者卒至于焚死棄而后已焉是皆昏暴之有以自取而欲容身无所也六五出涕沱若戚嗟若吉柔居尊中而不正廹于上下之二陽故有出涕沱若戚嗟若之象出涕沱若涕泗如雨之滂沱也戚嗟若悲戚而愁嘆也極狀其畏懼憂虞不能為情之甚也此與大耋之嗟何以異然一凶而一吉者彼以貪生怖死為心此以憂深慮逺為意也𫝊曰居尊位而文明知憂畏如此故得吉若自恃其文明之徳與所䴡中正㤗然不懼則安能保其吉也為戒深矣象曰六五之吉離王公也六五居不當位而吉者以其操心危慮患深故得麗于王公之正位也蒙引以離王公在憂懼之後信然上九王用出征有嘉折首獲匪其醜无咎按離為戈兵為甲胄故上稱王用出征爻居卦上閫外之象也王謂五用出征用上九也上九恭行天罰敵王所愾故王嘉之如嘉乃丕績之嘉也𫝊曰九以陽居上在離之終剛明之極者也明則能照剛則能斷能照足以察邪惡能斷足以行威刑故王者宜用如是剛明以辨天下之邪惡而行其征伐則有嘉美之功也征伐用刑之大者葢以有嘉為句也訂詁亦如之朱子獨連折首為句恐未自然折首折取其魁首殱厥渠魁也執獲不及醜類脅從罔治也兵以義動而刑以仁施无咎可知若株連蔓引則非王者之師矣傳曰去天下之惡若盡究其漸染註誤則何可勝誅所傷殘亦甚矣故折首獲匪其醜則无殘暴之咎也尤為明曉本義云剛明及逺兵用而刑不濫精甚象曰王用岀征以正邦也王用岀征非窮兵黷武也以正邦耳正邦者使邦國之人共麗于正也詩云周公東征四國是皇孟子云征之為言正也皆正邦之義也所謂重明以麗乎正乃化成天下者正指此也易酌卷五
