body:
  text: 易酌卷二祁州刁包撰周易上經震下坎上君道以濟世安民爲事屯建侯作之君也師道以輔世長民爲事蒙求我作之師也君道立而生養遂師道立而教化行此屯蒙之義所以繼乾坤而起也屯元亨利貞勿用有攸往利建侯傳曰天下屯難未亨㤗以其時言也本義曰如屮穿地始出而未申以其象言也盖乾坤之後繼之以屯是就混沌初開時說乾坤四徳屯亦云云何也屯者人道之始也上天下地而人鼎立乎其中故其始原與乾坤合徳也震具有爲之才可以濟世安民故大亨然前遇坎故利貞也時方屯而在險中非堅守正道鮮克有濟也勿用有攸往非不徃也不輕往耳震好動故戒之欲其安詳審顧也利建侯本義直作立君說甚是伊川序春秋曰天生萬民必有出類之才起而君長之須是立起君來爲乾坤主然後可以濟屯而収出險之功也彖曰屯剛柔始交而難生傳以雲雷之象爲始交不如本義始交謂震難生謂坎爲是蓋震屯下體也一陽動于二隂之下故曰剛柔始交坎屯上體也一陽陷于二陰之中故曰難生動乎險中大亨貞震動也坎陷而險也震坎合而爲屯是動乎險中也在險能動便有濟屯的本領故大亨然非貞則陷亦何以亨且大哉故大亨之道必在于貞固也雷雨之動滿盈天造草昧宜建侯而不寧雷震象雨坎象雷雨之動滿盈疏連上句爲義曰覆釋亨也本義獨連下句爲義曰陰陽交而雷雨作雜亂晦㝠塞乎兩間此解雷雨滿盈即天造草昧之象也天造解天運未盡造者剙闢之意書曰草竊是亂意故傳曰草亂无倫序㝠昧不明本義因之建侯不寧進一歩說爲是盖草昧易而文明非建侯不爲功然非曰侯一建而遂弛其擔也未建侯之先天心人望廹之矣故須正其位號以凝命既建侯之後天經地義屬之矣故須竭其股肱以効忠不寧者卧薪嘗膽之義也傳曰雖建侯又當憂勤兢畏不遑寧處聖人之深戒也本義曰天下未定名分未明宜立君以統治而未可遽謂安寧之時也俱是進一歩說蒙引發明本義曰如更始諸將一立了更始便即日夜縱情于聲色識者知其不終矣引証極好象曰雲雷屯君子以經綸雲氣四合變化之象也雷震百里鼓動之象也造化之功用從此著矣君子法其象以經綸所以變化鼓動一世而爲君子之功用也按經綸者治絲之義經引之即今之治牽絲也綸理之即今之治刷絲也牽而引之使不斷綸而理之使不亂也蒙引曰此與經綸天下之大經解不同經綸天下之大經以五倫言此只就濟屯上說所謂治亂民猶亂繩也柝理精矣初九磐桓利居貞利建侯初以剛居剛易于動故說者多以磐桓爲戒辭呂東萊曰不然蓋初以剛明之才乃能與時消息自制其剛磐桓而不敢騁此正所謂自勝之强也此正所謂剛也惟剛然後能磐桓孰謂以剛爲戒乎此說甚確傳曰初以陽在下未能便徃濟屯故磐桓本義曰初以陽在下又居動體而上應陰柔陷險之爻故磐桓皆以象言也傳曰方屯之初不磐桓而遽進則犯難矣故宜居正而固其志凡人處屯難則鮮能守正苟无貞固之守則將失義安能濟時之屯乎此處屯者守身格言也如揚雄際王莽之屯而不能守正荀彧際曹操之屯而不能守正傳所謂失其義者夫剛明既足有爲居貞又復有守有爲有守人君之度故利建以爲侯也初爲成卦之主爻之磐桓即卦之勿用有攸徃也爻之利居貞即卦之居貞也爻之利建侯即卦所利建之侯也但卦言利建侯指已建人爻言利建侯指人建已辭同而意異不可不知也象曰雖磐桓志行正也以貴下賤大得民也初雖盤桓非曰獨善其身而已也盖將以兼善天下大行其濟世安民之正志傳曰有濟屯之志釋正意又曰有濟屯之用釋行正意也此二句釋磐桓利居貞陽貴陰賤一陽處二陰之下以貴下賤也下賤則謙謙君子萬民服也民心所服即天命所歸此二句釋利建侯又曰或疑方屯于下何有貴乎夫以剛明之才而下于陰柔以能濟屯之才而下于不能乃以貴下賤也貴指才徳出類說若以位言便于立君有礙故傳又特申此一轉也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字柔順中正上與五爲正應乃爲二陰所隔下與初比受其逼脇是以屯難邅回傳曰如助辭也乘馬欲從正應而又班如不能進有所掣肘故也疏引子夏傳云班如謂相牽不進也較傳義分布更顯亮傳曰二逼近于初陰乃陽所求柔者剛所陵柔當屯時固難自濟又爲剛陽所逼故爲難也設非逼于冦難則往求于婚媾矣婚媾正應也冦非理而至者正應謂五冦謂初註疏原如此解朱子以爲費力但云匪冦也乃求與已爲婚媾耳觀此卦兩言婚媾一在四以與初爲正應也一在二以與五爲正應也女子謂二也中正故貞待五之婚媾而以初爲冦故不字伊川所謂餓死事小失節事大也遲之又久乃至十年獲正應而始字矣傳曰初爲賢明剛正之人而爲冦以侵逼于人何也曰此自據二以柔近剛而爲義更不計初之徳如何也易之取義如此正須曉的謹按易言匪冦婚媾者三屯二賁四暌上也本義程傳說各不同故折中欲學者擇而取之竊嘗細味傳義未嘗不合但其說不甚暢耳蓋此卦之義當屯難之時二爲初剛所逼故有邅回不進之象然陰者陽所求也故在初以爲求婚媾而匪冦初非二之應也故二以爲冦而不與爲婚媾爻辭自明象傳亦顯若賁之六四則謂其徃應初九與此卦之六四同暌之上九則與六三始離而終合謂其張弧欲射者匪冦也乃因其爲已之婚媾故耳遇雨則合矣取象于馬說見明夷二爻下班如者凡馬按班排對皆按斾徐行故也象曰六二之難乗剛也十年乃字反常也受制于冦愆期不行六二之患難也揆厥所由以其居初之上乘剛故耳傳曰十年數之終也本義曰數窮理極數窮則變理極則通嘗讀春秋傳曰天道十年一周人事十年一變所謂屯極而通之時也反其常道斯免于難而與五爲婚媾矣難于初者其變也反于五者其常也有變必有常此天道之不易者也甄濟正應在唐而不以安冦之剛失不字之貞管寧正應在漢而不以曹冦之剛失不字之貞其善處屯者乎厥後唐反常而甄字之漢不反常管卒于魏亦所遇有幸有不幸焉耳六三卽鹿无虞惟入于林中君子幾不如舎往吝六三其體本柔其位不中不正又上无正應无一足恃徒以居剛妄動希圖非分祇取敗耳故爲即鹿无虞陷入林中之象傳曰入山林者必有虞人以導之无導之者則惟陷入于林莽中朱子曰鹿陽物也指五言昔人云秦失其鹿天下共逐之然則三之逐鹿明以九五自擬而不能得賢人相助爲理其有幸乎徒勞罔功如項羽更始劉盆子之類是也傳曰君子見事之幾微蓋秉幾先之哲權衡其間惟有舎而勿即一着庶免于難不然或承之羞耳如范増知䜿子不足與謀未能見幾而作卒以憂危其亦可咎哉謹按朱子語類謂沙隨盛稱唐人郭京以爲鹿當作麓云得之王輔嗣與韓康伯易注近見來註亦以作麓爲是竊意此卦中爻上體爲是三乃其初畫正當艮山之足所謂麓也易之取象或者以此若以爲逐鹿則象傳從禽一句成複語矣學易者檡取之可也象曰即鹿无虞以從禽也君子舎之往吝窮也從禽謂心貪乎禽也蒙引所謂禽荒所謂以身殉物是也詭遇獲禽君子不爲故決然舎去安肯冐昧而往以致羞吝且蹈窮困之災也按初九宜建侯而不宜舎也六三宜舎而不宜建侯也建侯之不可不愼也如此六四乘馬班如求婚媾往吉无不利六四居近君之位无濟屯之才故亦有乘馬班如之象然已之才不足而求賢以自助亦濟屯之善道也傳曰初陽剛之賢乃是正應已之婚媾也若求此剛陽之婚媾往與共輔陽剛中正之君濟時之屯則吉而无所不利也此說又爲居公卿之位而短于才者開一法門如畢士安之于冦準盧懷愼之于姚崇宋璟以至李吉甫使裴垍疏三十人薦于朝數月之間選用畧盡皆可謂求婚媾而往者也象曰求而往明也求賢而往共濟國事不䕶已之短不没人之長非有過人之識不能也故曰明居得濟之地已不能而遂已至暗者也象正言之許其明傳反言之戒其闇皆所以爲六四之良劑也九五屯其膏小貞吉大貞凶九五陽剛中正居尊位可以濟屯矣乃上下爲二隂所蔽陷于險中雖有六二正應而陰柔才弱不足以濟屯有君无臣故爲屯其膏之象本義曰五坎體有膏潤而不得施此以象言也傳曰施爲有所不行徳澤有所不下此以理言也大貞凶傳以魯昭公高貴郷公之事証之謂威權去已而欲驟正之求凶之道也小貞吉傳以盤庚周宣証之謂以道馴致爲之不暴也胡傳曰哀公欲去三桓張公室問社于宰我宰我對以使民戰栗蓋勸之斷也仲尼曰成事不說既往不咎蓋在聖人則能處變而不失其常在賢者必有小貞吉大貞凶之戒矣至昭公遜齊一傳又全引九五爻象明之此說正用程傳蓋春秋與易互相發明其理不可易也按魯昭公欲伐季氏子家子曰季氏得民久君无多辱公不從意如登臺請罪弗許子家子曰君其許之政自之出久矣日入慝作弗可知也弗聴于是叔孫氏孟氏遂伐公徒公與臧孫如謀出奔齊卒以客死髙貴鄉公魏主曹髦也見威權日去不勝其忿謂羣臣曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿等自出討之王經曰昔魯昭公不忍季氏敗走失國爲天下笑今權在其門爲日久矣朝廷四方皆爲之致死不顧順逆之理非一日也且宿衞寡弱陛下何所資用而一旦如此无乃欲除疾而更深之耶髦曰行之決矣遂拔劍升輦率殿中宿衞蒼頭官僮鼓譟而出太子舎人成濟以賈充命抽戈前刺髦殞于車下以上二君所謂不忍一朝之忿求逞其私欲而以羣小謀之其及也宜矣威權去已而欲驟正之者是也大貞凶之謂也按盤庚承商九世之亂諸侯莫朝乃脩先王之法則以成徳自勉讀盤庚三篇雖其民怨誹逆命終不之怒惟引咎自責益開衆信此商之不亡而復興也周宣承厲王之亂天下不復宗周乃更失理布徳教舉遺士早朝宴罷卒成中興之名以上二君傳所謂明乎消息盈虚之理正身率徳擇任忠賢待時以道馴致爲之不暴者是也小貞吉之謂也象曰屯其膏施未光也膏所以施也施所以光也屯則有施之具无施之實所以未光張中溪曰光陽徳也五陽體本明以陷于坎中爲二隂所揜故曰施未光也最切象意上六乘馬班如泣血漣如上六以隂柔處屯之終險之極又下無正應退旡所依進无所往故爲乘馬班如泣血漣如之象蓋言其屯極而莫可誰何也竊意此爻唐之文宗頗爲似之援周赧漢獻以自比泣下沾襟正是此象又嘗因是而有感于蘇武李陵也武在沙漠衞律等多方降之不少屈所謂女子貞不字也越十九年歸漢以爲典屬國所謂十年乃字也陵降則字于沙漠矣屢思歸漢而未能也所謂乘馬班如也毎對武泣數行下所謂泣血漣如也二子皆濟屯之才一爲六二流芳百代一爲上六貽臭萬年何可不愼所字也象曰泣血漣如何可長也聖人無棄人曰何可長也者慨嘆之辭教之自尋出路不可徒爲无益之泣也東萊屯極而通之說當矣傳曰夫卦者事也爻者事之時也分三而又兩之足以包括衆理引而伸之觸類而長之天下之能事畢矣梁溪所謂无之而不可見易者正謂是也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞山上水下則下爲上所蔽内險外止則内爲外所遏蒙之象也混沌未鑿情識未開儘自充拓得去故有亨道焉屯言元蒙不言元何也屯者物之始生也始生而穉爲蒙蒙次屯故言亨而不言元也蒙亨就卦之全體言以下則指九二也二懷徳以中正自守故无求于五五才徳未成下與二爲正應故俯躬求之傳云賢者在下豈可自進以求于上苟自求之必无能信用之理古之人所以必待人君致敬盡禮而後往者非欲自爲尊大蓋其尊徳樂道不如是不足與有爲也伊川于易言如是行亦如是故被朝命爲講官三辭而後就職既就職不請俸不求封唯力争坐論之禮舉朝以爲迂濶以爲倨傲而不知匪我求童蒙先生善用易也傳曰筮占決也本乎初心純一无他故告之再三則非其初矣凟慢不敬彼无以受之而此何以施之故不告也利貞者養蒙之道利在則貞正固蒙者本色也發蒙之道即以蒙發之豈有他哉彖曰蒙山下有險險而止蒙艮在上爲山坎在下爲險此卦象也坎險而艮止此卦徳也蒙則其名晦昧不明則其義也蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也蒙以養正聖功也傳云蒙之能亨以亨道行也所謂亨道時中也時謂得君之時中謂處得其中也本義云二以可亨之道發人之蒙而又得其時之中謂如下文所指之事也二說俱確宜參看匪我求童蒙童蒙求我五之志應于二也五求二非二求五何以言應見二顯未有以招之然實有以感之也呂東萊曰說者多謂發蒙者不可自屈必待先來求我志與我相應然後可教苟急于教人不待學者有志而强告之必不能入也此固是正理然人或不善㑹此說亢然不復與學者相接學者亦望風不敢近寡徒少與道卒不明要須詳玩志應二字此无以感之彼安得而應之應生于感也古之教人雖不區區先求學者然就不求之中自有感應之理不然學者之志何自而應乎此說最得聖人與人爲善之心九二剛中以剛中者以全體開示之所謂无隱也再三瀆蒙之瀆也若不問其誠否而告之非惟不能信受益滋煩聒我又瀆蒙矣蒙不可瀆故不告也貞者正也罔念作狂只是不正克念作聖只是正利貞者利以正作聖也然非蒙則无以養之傳曰未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正于蒙學之至善也大抵孩心未喪是學者大基本從此培植起來自㑹長進有志聖人之學者不可不察也象曰山下出泉蒙君子以果行育徳山下出泉其所淵源者深矣盈科放海之𫝑具足于此而不能自達故爲蒙君子觀其象而以之剛果其行勇往直前更無廻避如水之動晝夜不舎也涵育其徳薰陶鎔鑄更无躁急如山之静艮止不遷也源流合而體用兼該矣初六發蒙利用刑人用說桎梏以往吝初以隂暗居下民之蒙而待發者也或開發或啓發皆所以正蒙也發蒙之道云何利用刑人即書扑作教刑之刑記所謂夏楚二物是也傳曰自古聖王爲治設刑罰以齊其衆明教化以善其俗刑罰立而後教化行雖聖人尚徳而不尚刑未嘗偏廢也故爲政之始立法居先治蒙之􅀄威之以刑者所以說去其昏蒙之桎梏桎梏謂拘束也不去其昏蒙之桎梏則善教无由而入既以刑禁率之雖使心未能喻亦當畏威以從不敢肆其昏蒙之欲然後漸能知善道而革其非心則可以移風易俗矣此理極好蓋心爲斧斤所伐則身爲桎梏所縛昏蒙之極自囚自束如桎之在足梏之在手惟刑罰得中然後斯民有所措手足矣本義不然但云發之之道當痛懲而暫舎之以觀其後蓋明刑勅法又就中放寛一歩刑威中具有徳威也此理亦好當與傳並行不可偏廢以往吝言一意用刑則革面不革心非發蒙之道爲可羞吝也謹按此爻之義傳與義雖俱有理而各不同若王氏介甫與王氏宗傳則謂此節只是一反一正口氣如師出以律失律凶之比折中若有取焉竊謂以上諸說理雖長而俱欠順適若以用說爲句桎梏連下文讀則順矣盖初之蒙所謂氓之蚩蚩者也故用發以開𨗳之𨗳之而有不從者則利用刑人所謂扑作教刑是也蓋刑以弼教凡以使人說其舊染之愚蒙也用說者謂其人能改即止不治亦敬敷在寛之意也不然而束縛之拘廹之如加桎梏以往則民无所措手足或革靣不革心或苟免而无恥吝道也故象傳曰利用刑人以正法也蓋謂發蒙之所以利用刑人者以正其法使人知畏而已不必過于嚴急也鄙俚之見存之以質高明象曰利用刑人以正法也傳曰治蒙之始立其防限明其罪罰正其法也使之由之漸至于化也數語發蒙意盡矣又恐人誤認正法二字曰或疑發蒙之初遽用刑人无乃不教而誅乎不知立法制刑乃所以教也蓋後之論刑者不復知教化在其中矣得此一轉其理益明又爲末世用法者下一針砭也九二包蒙吉納婦吉子克家九二剛中上下五爻不分隂與陽皆在含蓋之中有包蒙象發蒙養蒙猶與蒙爲二包則直合羣蒙爲一體而發之養之易易矣故吉也四爻皆隂有婦象二以陽受隂有納婦象婦人陰柔昏暗蒙之極也納婦者采及芻蕘工瞽之意納與包當有别包者量足以容物也在宥之徳大納者謙足以受益也好善之徳優徳懋懋功臣克國猶子克家也五居尊有父象二承五有子象下任上事而剛中之徳時措咸宜有子克家象鐘鼎之勲直視爲箕裘之業者言是家常本分事不敢自有其功也傳曰堯舜之聖天下所莫及也尚曰清問下民以君道釋納婦之義也二臣位宜以臣道之發蒙者言之孔明集衆思廣忠益亦庶乎包蒙納婦之吉矣鞠躬盡瘁成鼎足之業則子克家也昭烈順巽其六五之童蒙乎象曰子克家剛柔接也以二五之分言之上剛也下柔也以二五之徳言之下剛也上柔也又五求二故柔二匪求五故剛剛柔接言情也情發乎志志相應故情相接自古未有上下之情否隔不通而能成治蒙之功者也六三勿用取女見金夫不有躬无攸利六三以陰居陽不中不正去上九正應尚逺而下比九二見其得時爲羣陰所歸遂舎正應從之勿用取女拒之而不納也金夫傳作多金之夫是也見金夫不有躬只是見富貴人動了心遂不自愛惜虧體而失身也以身徇金夫唯利是從而不知其无所利也視屯二女子守不字之貞當愧死矣五爻皆言蒙此獨不言蒙者以其蒙心盡䘮也按蔡子英元進士也太祖授之官固辭曰臣事君猶女適人一與之醮終身不改可謂見躬而不見金夫者也危素授官未幾即以余闕愧之其勿用取女之明鑑乎馮道以五朝爲金夫范質以宋爲金夫皆不有其躬者也嘗試譬之有二女于此其一善以禮自防日切感帨吠尨之懼其一鑚穴隙相窺取女者宜何從焉吾知必取其守身者而舎其失身者勿用取女人有同心而當局則迷謂之何哉象曰勿用取女行不順也不順當如傳作邪僻之行說若依本義作慎則五曰順以㢲上曰上下順皆言順曷獨于此遂通用古字也六四困蒙吝以隂居陰上下又皆隂又无正應蒙而困者也困蒙者正如桎梏在身而不能說故可羞張中溪曰隆師親友則困知與學知生知一也抑思上逺上九下逺九二雖欲隆而親之得乎夫亦尋師訪友焉可矣象曰困蒙之吝獨逺實也陰虛陽實逺實者逺于陽剛之賢而无所資也四之上爲五五陰也而近上九四之下爲三三隂也而近九二四與五三隂所同也逺于陽所獨也六五童蒙吉五以柔中居尊下求剛明之賢付以天下之蒙而已不與吉可知也傳與本義俱以童爲純一未發而資于人蓋元􅀄面目未或彫䘮所謂赤子之心不失而可以爲大人者也太甲成王及漢昭帝殆其選乎象曰童蒙之吉順以㢲也順謂從善弗咈巽謂卑以自牧也傳曰舎已從人順從也降志下求卑巽也能如是優于天下矣何等確妥上九擊蒙不利爲寇利禦寇上九居髙過剛不中故不能包蒙而其象爲擊䝉也擊者摶擊之意恐渉亢暴故戒之云不利爲冦利禦寇也傳曰治人之蒙乃禦冦也若舜之征有苗周公之誅三監是也肆爲貪暴乃爲寇也若秦皇漢武窮兵誅伐是也明其道則朝廷之待叛臣中國之待四譯君子之待小人皆可以𩔖推矣朱子云作用兵說恐只當得一事用竊意未然按綱目書法曰某入冦曰遣某將兵擊之讀爻辭自當作用兵說但用時不妨随事變通耳本義别立說以爲擊蒙之道攻治太深取必太過則反爲之害惟捍其外誘以全其眞純則雖過于嚴密乃爲得宜試從其意推之外誘者聲色貨利之私也捍之使不入也眞純者粹然至善之性也全之使不虧也是以外誘爲寇以捍爲禦以全爲眞純爲正蒙也又曰凡事皆然不止爲誨人也此理極好與傳亦不相悖按書有苗弗率帝命禹徂征苗民逆命帝乃誕敷文徳舞干羽于兩階七旬有苗格此舜之禦冦也按書三叔監紂子武庚故曰三監管叔蔡叔霍叔也當時或致辟或囚或降不一其罰傳統曰誅者如舜流放殛殺不一其刑孟子統曰誅不仁是也大義滅親周公之禦冦也按秦始皇聽盧生之䜟命蒙恬將兵三十萬北伐生事邊陲所謂爲寇也按漢武帝窮兵黷武海内虛耗所謂爲寇也象曰利用禦寇上下順也上不苛其下上順下也下不逆其上下順上也上下交順擊蒙者亦庶乎可以包蒙矣乾父也坤母也震長子也故爲一卦之主而建侯坎次子也故爲一卦之主而克家艮少子也故稱童蒙以家事付之次子而安享其成焉至于乾之言君坤之言臣屯蒙之言婚媾婦女則又旡不詳且盡也生人之道于是乎盡矣乾下坎上需有孚光亨貞吉利渉大川下乾三陽其𫝑自足以進上遇坎險故停待不前需之象也五居尊位爲需之主以陽剛中正之徳信其民故有孚孚者至誠之積于中者也中不孚則形之外者更暗昧暗昧將到處成碍矣惟有孚然後由光明以至于亨通也孚而光子思所謂誠則明也光而亨濂溪所謂明則通也至此則得正而吉可知得正則渉大川若履平地无不利矣時方險人恒遷就以求濟不知正者濟險之具也只是一箇正恁地陷他不得蓋需以孚爲主孚字貫到底有則俱有也傳曰凡貞吉有既正且吉者有得正則吉者當辨也需其得正則吉者乎彖曰需須也險在前也剛健而不陷其義不困窮矣需不進非不進也有所需而不輕進也須即詩卭須我友之須坎在前故險險在前故須也柔而不剛順而不健則陷于險矣乾三陽坎一陽皆剛健而卓有樹立故不陷也陷則困窮不陷何困窮之有夫子贊之必云其義者剛健之徳原從集義也需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需有孚光亨貞吉者以其位又以其徳也九五天位代天出治而以正中行之故坐収有孚之效也大川坎也利渉乾也往有功乾往而有出坎之功也或出險而能不隨波或入險而能不濡足所謂一任中流自在行也象曰雲上于天需君子以飲食宴樂雲氣蒸而上升于天雨澤將降之時也所待者隂陽和洽耳故其象爲需君子才徳既成待時而出正與雲行而兩未施一般故飲食宴樂以需之見其寛裕自得不馳心于功名也傳曰懷抱道徳安以待時飲食以養其氣體宴樂以洽其心志所謂居易以俟命也此理甚確本義云无所復爲恐淪閒曠一流矣髙子曰夫飲食者道腴也宴樂者道眞也足于已而施及于天下故曰需于酒食天下將醉飽之矣從大象說到五爻極親切有味初九需于郊利用恒无咎一陽在下去險尚逺故爲需于郊之象郊者曠逺之地也傳曰處于曠逺利在安守其常則无咎也不能安常則躁動犯難豈能需于逺而无過也此是戒辭本義曰􅀄九陽剛又有能恒于其所之象則􅀄自能恒无庸戒矣或謂此爻如太公居東海之濵以待天下之清者亦近似象曰需于郊不犯難行也利用恒无咎未失常也郊者平坦易行之地需于郊故不犯所難行也利用恒无咎者未失其安守之常道也傳曰雖不進而志動者不能安其常也君子之需時也安靜自守志雖有須而恬然若將終身焉乃能用常也此又守身者所當知九二需于沙小有言終吉傳曰坎爲水水近則有沙二去險漸近故爲需于沙視需于郊者異矣小有言傳義俱以爲言語之傷災害之小者余意未然小字𦂳貼言字說謂二以剛陽之才居柔守中雖有小疵而不能以大惡相告也然究不能累其中正之體故終􅁻或謂此爻如郭有道不爲危言激論以取禍是也余謂陳太丘送張讓之䘮亦似之象曰需于沙衍在中也雖小有言以吉終也衍者寛平自如不以人言動心也雖小有言終當自愧而消釋矣傳曰雖小有言語及之終得其吉善處者也九三需于泥致冦至三逼近坎水故爲泥需于泥視需于沙者又異矣故不特受言語之傷而致冦難之至也盖三剛而不中又處二陽之上有進而逼險之象故如此或謂此爻爲陳蕃竇武及范滂等之互相標榜皆以不敬愼而敗也亦近似象曰需于泥災在外也自我致冦敬愼不敗也傳曰災者患難之總稱對𤯝而言則分也以其險故曰災以其在卦之外故曰災在外災在外而致之者原在内爻不曰冦至而曰致冦至責有攸歸矣故象斷之曰自我也春秋書齊國書帥師伐我胡傳曰欲省致師之由而躬自厚也三言自我豈非欲省致冦之由而躬自治哉敬慎者擇地而蹈不敢失足于外也以此禦冦得致勝之策矣又何敗乾之三言􅅥需亦三乾故三言敬愼詩所謂戰戰兢兢如臨深淵如履薄冰者乎不敗謂不敗于泥塗也六四需于血出自穴坎爲血卦故四稱血本義云血者殺傷之地穴者險陷之所四交坎體入乎險矣故爲需于血之象然柔得其正需不進故又爲出自穴之象此說極確傳曰四以陰柔之質處于險而下當三陽之進傷于險難者也故云需于血既傷于險難則不能安處必失其居故云出自穴穴物之所安也註曰凡稱血者隂陽相傷者也隂陽相近而不相得陽欲進而隂塞之則相害也穴者隂之路也處坎之始居穴者也九三剛進四不能拒見侵則避順以聽命者也故曰需于血出自穴也傳註正同亦皆有理象曰需于血順以聽也或曰順五命以聽三陽之進也蓋四以柔居柔惟不剛暴與物无競是以順而聽之不敢生事召禍也凡險難之来若以平心和氣處之亦可保無虞矣余嘗有說云血者殺傷之地四近君此君父之險所當安意以需之也若規避逃匿爲穴中之藏則非臣子矣出自穴者挺身以赴臨難无苟免也四隂雖柔然上懐人君醉酒飽徳之思下有三陽爲友夙以名節相砥礪是以爾爾夫子贊之曰順以聽也即順受其正之意蓋上不負中正之君而下不愧陽明之友也如此則此爻當是方孝孺景清鐵鉉一流人其說特異然亦有理姑存之九五需于酒食貞􅁻五以一陽位天位而不陷于二隂又下三陽漸次上進爲同徳之援治成而人人樂其樂矣故爲需于酒食之象酒食宴樂之具徐氏曰優㳺宴樂與天下相安于太平醉飽之福也向來如此說固好近又仔細看來宜重講貞吉二字若二字只于上句𢃄言之便无闗係胡氏曰開闢以來生民有欲莫大于飲食男女屯蒙卦爻既于婚娶之正三致意焉此復以飲食之正言之五有剛中之徳時乎當需且宜需于酒食以待之况在下者乎五需于酒食惟正乃􅁻况在下而可宴酣无度乎極得聖人立言之旨依前說則宋太宗賜天下大酺三日庶幾此爻之義依後說則禹惡旨酒宋仁宗夜半思食燒羊肉既傳命而亟止之曰恐後遂以爲例也可謂需于酒食貞吉矣象曰酒食貞吉以中正也象不曰需于酒食而直曰酒食貞􅁻益見聖人意在得酒食之正矣傳曰以五得中正而盡其道酒食之需必有道焉而可不正乎上六入于穴有不速之客三人來敬之終吉上六居險之終无所復需矣故不曰需于穴而曰入于穴穴者隂闇不明之象也其何以出之上與九三爲正應三合下二陽需極必進可不召致而來若曰能敬之尚可資其力以出穴也故終􅁻傳曰隂止于六乃安其處故爲入于穴得所安也上六既需得其安處羣剛之來苟不起忌疾忿競之心至誠盡敬以待之雖甚剛暴豈有侵陵之理故終吉也胡氏炳文曰入于穴險極而陷之象速者主召客之辭三人乾三陽之象下三陽非皆與上應也有不速之象上柔順有敬之之象上獨不言需險之極无復有需也外卦險體二隂皆有穴象四出自穴而上則入于穴何哉六四柔正能需猶可出于險故曰出者許其將然也上六柔而當險之終无復能需惟入于險而已故入者言其已然也然雖已入于險非意之來敬之終吉君子未嘗旡處險之道也象曰不速之客來敬之終􅁻雖不當位未大失也傳曰不當位謂以隂而在上也註曰處无位之地不當位者也未大失者大扺天下事雖當極險時若能小心謹慎尊禮好人亦自救濟得一半故即有失而未至于大也謹按小象言不當位者極多然皆以陰居陽或以陽居陰上六以隂居陰而亦云不當位者蓋上當需極而進之時乃陰柔不能自進而反入于穴故云云也然雖不當位而猶能謹慎故未至大失觀于此爻可以知處横逆之有道矣坎下乾上訟有孚窒惕中􅁻終凶利見大人不利渉大川古人制字從言從公便是垂戒無情之意故徐氏曰不公則爲誣爲詐非訟也卦中六爻雖訟而終必以不訟爲吉訟則凶矣此聖人所以无訟爲上理也坎一陽中實有孚象上下二隂夾之有窒象又爲加憂有惕象信在中而窒塞不通故訟訟而憂懼不安則得中而吉也此卦變之象也終極其事悍然无所忌憚非惕也蓋窒而䘮其孚故凶此上九過剛之象也利見大人以其孚而免于窒惕此九五剛徤中正居尊之象也不利渉大川者不向安穏路上走變幻叵測行險以求勝也此乾乘坎之象也本義云以剛乘險以實履陷故不利精甚彖曰訟上剛下險險而健訟乾在上則爲剛不能容乎其下坎在下爲險不肯安乎其上傳曰若健而不險不生訟也險而不健不能訟也險而又健是以訟也說得甚是分曉訟有孚窒惕中􅁻剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也剛來得中稽之卦變之說程朱互異竊思卦變之說于易理既无所發明質之聖人畫卦之初恐亦未必及此不如勿泥其說爲是盖彖傳之意謂文王所謂訟有孚窒惕中􅁻者以其剛來而得中其彖云云也終則成其訟矣訟成則有害身累名亡國殘家之凶可乎哉傳曰成謂窮盡其事也此戒辭也大人中正故可尚而利見之此勉辭也虞芮質成其尚文王之中正乎䑕牙雀􅊁其尚召伯之中正乎入于淵者其何能淑載胥及溺之意蓋冐險興訟與陷身深淵者无異此危辭也所以開其窒意而動其惕心也象曰天與水違行訟君子以作事謀始天一生水本不相違也縁天道上行亢而不能下水𫝑下行溺而不能上二體背戾訟所由興也君子觀于訟之象而欲絶其端故凡所作事必謀其始天下事初間愼重後來省多少氣力初間分明後來省多少葛藤此始之所以不可不謀也𫝊曰謀始之義廣矣若愼交結明契劵之𩔖是也夫亦盡其大較矣初六不永所事小有言終吉初以隂柔居下位才弱則不能訟位下則不敢訟故不永所事者纔開手便求罷休也胡氏炳文曰不曰不永訟而曰不永所事事之初猶冀其不成訟也小有言雖形于口而不盡其辭也此與需之小有言不同需之有言近坎也人不能不小有言也訟之有言坎也我不得已而小有言也分别最是蒙引以爲无異同過矣終吉者以其不終訟也若終訟則終凶矣初與上之分也象曰不永所事訟不可長也雖小有言其辨明也訟永則長矣訟長則成矣故不可也不可長即不可成但不可成者誨其終也不可長者戒其始也雖小有言一辨而明豈眞有不可解之仇怨哉蓋上有剛陽之正應故事甫起而旋解終得􅁻耳九二不克訟歸而逋其邑人三百戶无𤯝二與五兩剛相敵訟所不免然居柔得中故未幾逃避不敢遂非其情固有可恕者矣不克訟即春秋所謂弗克納善之之辭也二與四不克訟同但剛柔異地故去就異宜耳不克訟歸而逋者明于尊卑之義歸而逋逃以自全也蔡氏曰隱兩柔之中有逋象是矣三百戶邑之小者其邑人三百戸无𤯝以寡約自處視臧武仲以防求爲後于魯者異矣傳曰若處强大是猶競也能无𤯝乎𤯝過也處不當也傳義有所謂卦辭善爻辭不善者亦自有說盖二自外來以剛處險爲訟之主是主訟者也聽訟首罪主謀故本義曰本欲訟胡氏曰誅其心而言之九二剛中未有不善者獨訟則不善以其所處之時異耳又學易者不可不知象曰不克訟歸逋竄也自下訟上患至掇也竄字正釋歸逋意項氏曰上二句俱是爻辭誣矣下二句又原其所以歸逋之故也若曰竄其身者嫌于以下訟上而汲汲避患也若不問上下恃剛妄動則患之至也如拾掇而從之又安能无𤯝哉此二之所以不爲也春秋元咺搆訟上下之分亡矣此又九二之罪人也六三食舊徳貞厲終吉或從王事无成傳曰三雖居剛而應上然質本陰柔處險而介二剛之間危懼非爲訟者也數語盡六三之情狀矣本義守舊居正四字宜玩盖守舊則无所覬于人居正則无敢肆于已訟何由興故雖處危地而終􅁻也或從王事无成本義以爲或以出而從上之事則亦必无成功是戒人不可從王事也殊與象傳不合程傳謂從上而成不在已也頗似有理學者酌之謹按二三或以剛居柔或以柔居剛皆不當位而爻辭皆善何也盖聖人貴无訟二不克訟三不爲訟故善之也然二爲成卦之主又以剛應剛宜其健訟矣乃以剛來得中故不克蓋剛者孚之象陷于二隂之中窒之象居柔故惕不克訟故吉也至邑人三百戶无𤯝句謂處約可以免災說本王弼雖傳義皆用之而終不敢信其然者盖二爲士位安得有邑藉曰有之且不免武仲之要君矣况謂三百户爲小邑彼十室之邑又何稱焉竊意剛來而得中謂剛來推柔而得中爲主即今之訟師謀主也夫邑有此人皆相習于告訐之風故多眚今既逋竄則是惕于九五之剛明而逃遁逺去矣邑无此等人則无唆訟健訟者矣所以无𤯝也至于三雖居卿大夫之位而守舊居正非爲訟者特與上之終訟者爲正應未免爲所株連故厲然而終吉者以其爲從上之事非成之于已也故象傳曰食舊徳從上􅁻也若曰以其食舊徳而從上故終得􅁻也象曰食舊徳從上􅁻也三本心祇是食舊徳或從王事則非其舊矣无成者仍无改于其徳也蓋一切聽命于上而不敢有所違悖故終得其􅁻也九四不克訟復即命渝安貞吉本義曰九四剛而不中故有訟象以其居柔故又爲不克而復就正理渝變其心安處于正之象義何約也傳曰四以陽剛而健體不得中正本爲訟者也承五履三而應􅀄五君也義不克訟三居下而柔不與之訟􅀄正應而順從非與訟者也四雖剛健欲訟无與對敵其訟无由而興故不克訟也又居柔以應柔亦爲能止之義既義不克訟若能克其剛忿欲訟之心復即就于命革其心平其氣變而爲安貞則吉矣命謂正理失正理爲方命故以即命爲復也方不順也書云方命圯族孟子曰方命虐民夫剛健而不中正則躁動故不安處非中正故不貞不安貞所以好訟也若義不克訟而不訟反就正理變其不安貞爲安貞則吉矣傳之曲折周至又如此此傳之博本義之約所以不可偏廢也象曰復即命渝安貞不失也剛而不中能無失乎復即命渝安貞則改過遷善以柔濟之又何失之有焉九五訟元􅁻傳義俱以元爲聽訟得平亦是近見高子說此爻獨以爲使民无訟此不易之論也􅀄不永三不訟二四不克訟凡在九五宇下者皆无訟故以元􅁻歸之蓋人君之職莫大于體元體元之事莫大于无訟故惟无訟而後可稱元􅁻也傳曰元􅁻大􅁻而盡善也􅁻大而不盡善者有矣愚謂􅁻大而盡善者使民无訟之謂也象曰訟元􅁻以中正也本義中則聽不偏正則斷合理二語精甚然未說到无訟處无訟之中正則所謂中心无爲以守至正而大畏民志也上九或錫之鞶𢃄終朝三褫之上九過剛處訟之終健訟之凶人也窮極其訟不勝不已三在其下又柔不能自明其强力可以取勝故有錫命受服之象罔上受服公論所不容也故又有終朝三褫之象旋得旋失曽何足恃所謂枉做小人也象曰以訟受服亦不足敬也服者章身者也以訟受服適足彰其身之凶悍耳賤惡殊甚而况敬之乎不褫尚不足敬而况終朝三褫乎蒙引以此爻爲不義侯之𩔖蓋謂蒼頭子密函彭􅃂夫婦之首以獻光武而錫命受服也謹按蒼頭子密以奴而賊其主雖則受服不𩔖此爻嘗閲歐陽文忠全集見彼時􅊶孝肅弹劾某官去其人而補其缺文忠劄奏云包某素性剛直故時人以其笑比黄河清今日之于某官本無利其美缺之心然劾去其人而承接其任受之不辭无以服朝野之心伏乞収回成命以全其直云云頗與此爻相似故及之坎下坤上師貞丈人吉无咎訟卦司刑者之事師卦司兵者之事皆治天下之大經大法也本義曰九二一陽居下卦之中爲將之象上下五隂順而從之爲衆之象九二以剛居下而用事六五以柔居上而任之爲人君命將出師之象故其卦之名曰師全用傳義而統括之精甚師獨言貞何也不得已而用非先務說不得元死生存亡係焉說不得亨貪功兵家大忌說不得利只是要貞孟子曰征之爲言正也即師貞之說也傳曰丈人尊嚴之稱本義曰長老之稱蓋老成持重之人也傳以司馬穰苴淮隂侯當之謂才猷謀爲衆所尊信畏服便是丈人不必夙居崇高也余意尚父之暮年興周方叔之元老壯猷趙充國之无踰老臣尤爲近之傳曰有􅁻而有咎者有无咎而不吉者􅁻且无咎乃盡善也彖曰師衆也貞正也能以衆正可以王矣萬二千五百人爲師故曰衆兵家有不厭詐之說故用竒用間往往以詭道行之聖人談兵只用正故貞之一字古今兵法要畧也然此言行兵之道耳若夫出兵之義則必行一不義殺一不辜而得天下弗爲然後可以言貞也以字朱子取春秋能左右之曰以解之極確謂五隂俱爲一陽所以也五衆也隂不正也統歸一陽則衆正矣可以王謂為天下所歸往也剛中而應行險而順以此毒天下而民從之吉又何咎矣剛中而不應李岳所以无成功九二剛而得中道六五應之上下同心所謂閫以内寡人制之閫以外將軍制之也行險而不順春秋所以无義戰兵凶戰危坎之險也以濟世安民爲主坤之順也所謂奉天討罪爲匹夫匹婦復仇也在王者如傷之心視民如毒然謂鋒鏑之苦供億之煩騷擾之難堪也然上以爲毒下以爲雲霓民共翕然嚮往之矣其民從其衆正故吉且无咎也傳曰吉謂必克无咎謂合義又何咎矣其義故无咎也説的甚分曉象曰地中有水師君子以容民畜衆水由地中行兵自民間出其道不可易也後世兵農分而為二于師之義何居君子觀其象而一意撫循噢咻吾民在无事爲比閭族黨在有事為伍兩卒徒容保其民正所以蓄聚其衆也如地中之水平時安瀾自若一旦盛長波濤洶湧便有沛然莫可遏之勢此古寓兵于農之法有不戰戰必勝也初六師出以律否臧凶二爲師主初受其節制故有師出以律之象耑指行師言也律字指號令節制說如甘誓之攻左攻右牧誓之步伐止齊周公司馬法之坐作進退皆師出以律之明騐也三代而後周亞夫細栁之軍亦庻幾矣若棘門霸上之兒戯何律之有不特此也淮隂稱善將漢髙祖直入卧内奪其印符可謂以律乎故否臧凶傳謂制師无法雖幸而不敗亦是凶道正指此𩔖象曰師出以律失律凶也爻曰師出以律不言吉而􅁻在其中矣故象只還他本文爻曰否臧凶言失律者雖臧亦凶矣象則直言其凶更不問其臧否也九二在師中吉无咎王三錫命傳曰師卦唯九二一陽爲衆隂所歸五居君位是其正應二乃師之主專制其事者也居下而專制其事唯在師則可自古命將閫外之事得專制之在師專制而得中道故吉而无咎蓋恃專則失爲下之道不專則无成功之理故得中為吉凡師之道威和並至則吉也然則人臣而兵柄在握夫亦可以審所處矣蓋處之盡其善則能成功而安天下故王錫􅃂命至于三也盖禮不稱則威不重而下不信也然則人君而以兵權授其臣夫亦可以審所處矣又曰他卦九二爲六五所任者有矣唯師專主其事而爲衆陰所歸故其義最大人臣之道于事无所敢專唯閫外之事則專制之雖制之在已然因師之力而能制勝者皆君所與而職當為也如此道理凡事君者皆當知之能眀其義則韓信當以功名終李光弼不以慙憤死下至李懷光僕固懷恩之徒皆免于赤族之禍矣象曰在師中吉承天寵也王三錫命懷萬邦也在師中吉從君之寵任得來假以事權隆以異等故有所憑藉以成功不然雖剛中爲徳无專征之權豈其有成功之吉乎爻言王象稱天春秋繋王于天之意所以尊王也王三錫命雖云功懋懋賞然其意實從萬邦起見盖國有若臣而後奏敉寧之績鍚命者懷九二正所以懷萬邦也懷即父母懷抱之懷惟其置萬邦於懷中而不釋去是以優禮功臣如此也六三師或輿尸凶本義師徒撓敗輿尸而歸固自見成然不如傳義為長傳曰師旅之事任當專一二既以剛中之才爲上信􅀝必專其事乃有成功若更使衆人主之凶之道也輿尸衆主也蓋指三也以三居下之上故發此義軍旅之事任不專一覆敗必矣按輿字如輿論輿情輿人等皆作衆字尸字如詩誰其尸之春秋傳子尸之皆取主義益信衆主之説確不可易也按唐命御史監軍自武后革去可以爲後世法迨眀皇肅代徳憲皆蹈此弊甚至以中人監之裴度奏罷監軍使然後能成淮西之功輿尸之凶可无戒與象曰師或輿尸大无功也權不歸一无所統屬故无功訂詁云无功釋凶若如輿尸血刃之説則大有罪矣豈止无功已哉六四師左次无咎春秋紀兵次者數矣惟次于陘爲善左次无咎善之也傳曰師之進以强勇也四以柔居陰非能進而克㨗者也知不能勝而退故左次左次退舎也量宜進退乃所當也故无咎此足盡六四之義矣又曰度不能勝而完師以退愈于覆敗逺矣可進而退乃爲咎也易之發此義以示後世其仁深矣易義精妙不曰聖人之知而曰聖人之仁厥旨微矣不可不深長思也魏司馬懿善于用兵其與武侯對壘乃甘受巾幗而不辭亦庶幾左次无咎矣城濮之役楚衆欲止子玉不可遂致敗績以殺其身使明于六四之義豈至是乎象曰左次无咎未失常也傳曰見可而進知難而退師之常也二句本左傳上句是客下句是主本義解象傳用下句是用主不用客也傳博而義約如此𩔖者多矣愚謂進能觀變則有得也退能守常則无失也不求有得只求无失兵法所謂知彼知己也六五田有禽利執言无咎長子帥師弟子輿尸貞凶本義曰六五用師之主柔順而中不爲兵端者也敵加于己不得已而應之故爲田有禽之象其義精矣傳曰五君位興師之主也故言興師任將之道田有禽利執言无咎興師之道也長子帥師弟子輿尸貞凶任將之道也師之道必以蠻夷猾夏冦賊奸宄爲生民之害不可懷來然後奉辭以誅之盖不軌之徒騷擾我土地吞噬我人民正如封豕長蛇之逼處乎此也聲罪致討安得有咎執言奉辭也如尚書甘誓𦙍征之𩔖胡傳曰彼有罪可聲此有言可執盖本諸此三代而後如項羽放弑義帝漢髙祖有言可執矣而數其十罪不能用此爲首可謂執言乎隋煬帝子弑父臣弑君唐高祖有言可執矣而狃于習見不能明正其罪可謂執言乎吾獨有取于漢諸葛武侯出師二表唐駱賔王討武氏一檄也辭嚴義正凜凜與日月爭光事雖有成否而均之无咎也長子即彖所謂丈人也胡氏曰自衆尊之則曰丈人自君稱之則曰長子妙甚帥師古所謂仗鉞臨戎專制閫外雖君命有所不受者也弟子少年新進之徒如趙括軰是也二句言任將授師之道當專其權于長子而不可令弟子從旁撓制之也衆主貞亦凶如失律臧亦凶也按註釋此爻有云處師之時柔得尊位陰不先倡柔不犯物犯而後應徃必得直故田有禽也物先犯己故可以執言而无咎也柔非軍師陰非剛武故不躬行必以授也授不得正則衆不從故長子帥師可也弟子之凶固其宜也精甚謹按田有禽當與田旡禽田𫉬三品例㸔作田獵之田為是盖田有禽者謂兵不輕動師出有功也利執言者謂兵以義動師出有名也若作禽獸入田害稼而後獵取之不唯其義瑣細且西伯之戡黎成湯之伐葛豈有兵先來犯己而後應之乎象曰長子師師以中行也弟子輿尸使不當也長子帥師謂二也以中行以剛中之徳行也弟子輿尸謂三也付託匪人故曰使不當也上六大君有命開國承家小人勿用上六師之終所謂論功行賞之時也故曰大君有命命之爲諸侯則開國也命之爲卿大夫則承家也承受也本義曰坤爲土故為開國承家之象然小人則雖有功亦不可使之得有爵土但優以金帛可也此説與傳正同即使貪使詐之謂也傳又曰小人平日易致驕盈况挾其功乎漢之英彭所以亡也此聖人之深戒逺慮也然亦可為用小人之明鑑矣但英彭之敗實則高祖寡恩今責其亂邦未爲至論愚謂後世犯是戒者如韓侂胄定策之功可命也而不可用也趙汝愚知其爲小人而用之卒致反噬以基宋室之亂李勣佐命之功可命也而不可用也唐太宗不知其爲小人而用之卒媚武后以基唐室之亂皆不明于上六之義故耳傳曰此專言師終之義不取爻義盖以其大者若以爻言則六以柔居順之極師既終而在无位之地善處而无咎者也此又補爻義之所未備矣象曰大君有命以正功也小人勿用必亂邦也大君有命以功之大小為賞之厚薄爵之崇卑也功而曰正次第軍功无所偏私小人而用之開國承家將有非分之圖釀亂必矣懐萬邦者戒之哉按六爻中凡出師駐師將兵將將與夫奉辭伐罪旋師班賞无所不備故讀武七書者不如讀師一卦也坤下坎上比吉原筮元永貞无咎不寧方來後夫凶地中有水畜聚之象故其卦名師地上有水附麗之象故其卦名比師以一陽統五隂而在上卦之下故爲將帥象比以一陽統五隂而在下卦之上故爲君象傳曰人相親比必有其道苟非其道則有悔吝故必推原占决其可比者而比之筮謂占决卜度非謂以蓍龜也如此解原字筮字甚當元謂徳之克長克君也永謂徳之有始有卒也貞謂徳之勿二勿三也上之所以爲人比者以此人之所以求上而比之者亦以此故无咎傳曰人之不能自保其安寧方且來求親比本義曰其未比而有所不安者亦將皆來歸之方字皆作虚字看獨疏以爲不寧之方亦可不必五具元永貞之徳四方于是借庇廕焉盖陰不得陽則不寧求五所以求寧也若復遲回觀望不汲汲求比而自外大同凶之道也如公孫述隗囂張士誠之𩔖是也傳以夫爲剛立之稱而引左傳子南夫也以証之曰雖夫猶凶况柔弱者乎朱子云陽便是夫陰便是婦後夫凶言九五既為衆隂所歸若後來更添出一個陽來則必凶而引古人袁紹劉馥劉繇諸人以見兩雄不並棲之義均有至理彖曰比吉也比輔也下順從也朱子以比吉也三字為衍文又用王昭素之説以爲也字羡唯傳着解曰比者吉之道也余向來謂彖再言比吉而加也字是咏嘆意近見訂詁正合以與漸之進也同例甚是比輔也下順從也俱進一步説輔者贊勷之意輔所以比也下順從者使臂使指之意下順從所以輔也輔釋比下順釋比吉原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也原筮元永貞无咎唯九五足以當之以其陽剛而得中道也傳曰以陽剛居尊位爲君徳元也居中得正能永而貞也所謂盡比道之善者也又曰民不能自保故戴君以求寧君不能獨立故保民以爲安是以一陽爲上五陰爲下上下交相應也本義曰上下謂五隂則是以五隂共應一陽本義尤確後夫凶指上六一陰言以其居崇高之地故也徒知上六不可以下應五不知六隂不可以不順應陽易道窮則變故曰其道窮也象曰地上有水比先王以建萬國親諸侯坎水坤地地上有水親比而无間之象也先王觀其象以建萬國親諸侯何氏曰天下不可以一人統不可以一人治民方比我而我无以比之則疎必躬比之亦疎于是衆建萬國以屬諸侯而又制朝覲㑹同之禮以親之俾各承流宣化以親其民如是視天下猶一家視萬民猶一身而天下比于一矣正是蒙引六字一串説之意余意兩平説亦无妨如分茅胙土以諸侯分統之建萬國所以建諸侯也推心置腹以萬國分理之親諸侯所以親萬國也二句之義正相比也本義曰彖意人來比我此取我徃比人如此互説比義始盡胡氏曰師之容民畜衆井田法也比之建國親侯封建法也如此義方得聖人經世大用封建之法始于羲皇成于堯舜而三代因之故不言君子而言先王也柳子厚封建論不免以私心窺聖人惟胡氏一篇最得聖人公天下之心然欲施諸後世實難措手朱子本紀云不必封建而後可爲治也但論治體則必如是然後能公天下以爲心而達君臣之義于天下使其恩禮足以相及情意足以相通此則至當之論矣初六有孚比之无咎有孚盈缶終來有他吉傳曰􅀄六比之始也相比之道以誠信為本中心不信而親人人誰與之此言可爲始比者之鑑又曰故比之始必有孚誠乃无咎也中心較然不欺乃无咎六隂也陰虛有缶象􅀄陽也陽實有盈象誠意充滿于中而外无一毫文餙則不止于无咎矣有他􅁻指五也五與􅀄非正應且尊卑懸絶故曰他他吉而曰終來者言目前之吉未可期固當操劵于異日也象曰比之􅀄六有他吉也不復加一辭只㸃出􅀄六字以見吉其終者當孚其始也蒙引曰比之初六則有孚及有孚盈缶皆􅀄六也曰有他吉則无咎不待言矣聖筆簡而不漏如此冦凖十七舉進士或勸其增年凖曰吾始進身其可欺耶此比之初六之義也六二比之自内貞吉二在卦之内故曰比之自内傳曰自内謂由己也擇才而用雖在乎上而以身許國必由于已盖學修務盡其在我求爲可知而不患莫已知故得正而吉也二與五爲正應以中正之道相比故其象如此象曰比之自内不自失也身心間漫无感召之理而希世取寵則自失矣比之自内者修身待聘故曰不自失也傳曰士之修已乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至然後出也士之居家者可以自審矣六三比之匪人三陰柔不中正與上六爲應上无首而三比之故曰比之匪人不言悔吝者不待言也謹按三與上為正應皆隂柔邪曲相為比昵雖上有顯比之君冥然不顧所以有比匪之傷也若謂承乗皆隂而以二四為匪易摠隨時取義恐亦无此義例也故槩不敢録象曰比之匪人不亦傷乎傷字向來俱作悲傷之傷余意作損傷之傷爲是比者所以求益而逺損也昵狎非𩔖所損多矣曰不亦傷乎寓多少咨嗟慨嘆之意然則悲傷亦在其中矣荀彧之比曹操蔡邕之比董卓柳宗元之比王伾王安石之比呂惠卿皆其鑒也六四外比之貞吉四在卦之外故曰外比之四不應􅀄而比五胡氏所謂義之與比而无適莫是也以其柔而得正者比其剛而得中者其相切劘爲何如也故得正而吉象曰外比于賢以從上也五陽剛中正賢也居尊位上也賢君在上順從而輔之故比有外與内而貞吉同也馬伏波遇光武而効藎劉誠意見明太祖而推誠其六四之義乎九五顯比王用三驅失前禽邑人不誡吉傳曰五居君位處中得正盡比道之善者也人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下蒙其惠澤是人君親比天下之道也如是天下孰不親比于上若乃暴其小仁違道干譽欲以求天下之比其道亦狹矣其能得天下之比乎凡人君親比天下大道理統括畧盡又曰先王以四時之畋不可廢也故推其仁心爲三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也只取其不用命不出而反入者也禽獸前去者皆免矣故曰失前禽也此王道之大所以其民皥皥而莫知爲之者也以三驅喻九五比道之正何等分曉本義來者不拒數語祇是從傳意約之非有加也邑人不誡􅁻程朱互有異同竊意詩云商邑翼翼則邑爲都邑之邑語云千室之邑則邑爲里邑之邑邑之人蓋不誡而朝夕相比者也王者開誠布公與天下相忘原无心與之比然天下沐顯比之徳而仰其光正如同邑之人无煩告誡有留无去自然親比而吉也如此亦可通姑存之謹按折中以本義係朱子未修改之書故其講論多有與語𩔖不同者大抵此爻之意是以田獵喻王者皥皥之氣象前禽失而不追邑人居而不誡逺去者若不知有王者之親乃所以爲親之至也近附者若不知有王者之尊乃所以爲尊之至也顯比之世凡有血氣莫不尊親而所謂大順大化不見其迹者又如此此義獨爲曉暢象曰顯比之吉位正中也舎逆取順失前禽也邑人不誡上使中也傳曰顯比所以吉者以其所居之位得正中也處正中之地乃由正中之道也比以不偏爲善故云正中從位說到道上見正中者以其位實以其徳也凡言正中者其處正得中也比與随是也言中正者得中與正也訟與需是也二字一上一下便如此分别禮取不用命者乃是舎順取逆也順命而去者皆免矣此以向背而言謂去者爲逆來者為順也故所失者前去之禽也順逆二字如此説纔明又上一隂乗陽而背之故曰逆逆者舎之下四隂承陽而比之故曰順順者取之失前禽祇舎逆而取順在其中矣上六比之无首凶六爻自下而上下爲足上爲首居最上之地不能首倡以從陽故爲比之无首之象所謂後夫凶也乾上九无首吉戒髙亢也比上六无首凶戒孤睽也无首同而吉凶異因時取義也傳曰首謂始也凡比之道其始善則其終善矣始比不以道隙于終者天下多矣可作取友箴象曰比之无首无所終也有初鮮終恒情也况无首乎吾不知其所終矣本義曰以上下之象言之則爲无首以終始之象言之則爲无終无首則无終矣精甚蒙引云元永貞皆自君道言之有元而不永者有元永而不貞者如唐之明皇其始也勵精爲治非不元善也而不善其終開元之未遂恣情極欲以稔无涯之禍此是元善而不能長永者又如漢之文帝恭黙徳化二十餘年如一日宋之仁宗勤儉正身四十餘年如一日亦可謂元善而長永矣然一則有黄老之雜而不能力追三代之治化一則剛毅不足時爲小人所遷惑則是能元善長永而未能正固者也是皆未免有咎也有咎者徳道未能稱人之比也此說甚爲得當易酌卷二
