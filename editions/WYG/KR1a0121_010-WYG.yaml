body:
  text: 易酌卷十祁州刁包撰周易下經兊下兊上兊亨利貞說去言為兊兊者不言之說猶感去心為咸咸者无心之感也凡人情逆而亢則不說順而入則說隂巽陽故陽說隂也初伏二陽之下既升二陽之上隂下而陽上之也隂陽相說如天地交泰然固自有亨理也使不以其正則狥私阿好豈愛人以德之意乎惟貞則相切以道相劘以義發乎情止乎道義故利也彖曰兊說也兊之義以說得名也而兊相重内外忻合无間故說也不言亨者言說而亨在其中矣剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉二五居中剛也三上居外柔也外雖柔說内實剛健說以利貞也外柔内剛大正之道反是則色厲而内荏矣此以上釋卦辭此以下則承利貞之意而極言之也天與人所說者正而已矣說而能正是以順天理應人心也或曰上為天位上兊之說順乎天也三為人位下兊之說應乎人也然與革之順天應人不同彼以受命言而此以隂陽相說言也傳曰若夫違道以干百姓之譽者茍說之道違道不順天干譽非應人茍取一時之說耳非君子之正道也君子之道其說於民不徒使民感而偏能使民忘有事而先民所以勞之也而民不見勞如子弟之趨恐後有難而民犯所以死之也而民不恤死雖踵頂之捐弗恤民至此可謂勸矣然而勸民之與民勸相去固自逺也說道之大其在於使民自相勸矣哉勸者民日遷善而不知誰之為之意謂信其上而交相勸勵也傳曰人君之道以人心說服為本故聖人贊其大象曰麗澤兊君子以朋友講習澤潤物者也雨澤附麗互相滋潤兊之象也君子觀其象而得求益之道則以朋友講習先儒謂天下之可說者莫若朋友講習講者取古今之前言往行相與討究其所以然致知之事也習者取古今之嘉言善行相與踐履其所以然力行之事也魯論以時習為恱此益以朋友講學之事與人為善恱而樂矣蒙引云習只是講而又講屬知不屬行誤矣㑹講時如嚴立課程及大家勉勵為希聖希賢之事皆習也梁溪與吴子往相對静坐坐必七日講乎習乎程明道曰朋友講習更莫若相勸而善功夫多是行固重於知也顧涇陽嘗作麗澤說有曰自古未有闗門閉戸獨自做成的聖賢自古聖賢亦未有離羣絶類孤立无與的學問講是研窮討論功夫習是持循佩服功夫此可作大象註疏初九和兊吉傳曰初雖陽爻居說體而在最下无所係應此從象說本義全用之以和為說而无所偏私說之正也陽剛則不卑居下則能巽處說則能和无應則不偏處說如是所以吉也此從理說更自少一句不得象曰和兊之吉行未疑也凡人邪正混投則形迹之間開人以隙猜疑所由生耳初逺三而近二親君子逺小人故行无可疑而人人飲其和也傳曰象以其處說在下而非中正故云行未疑也若得中正則无是言也說以中正為本爻直陳其義象則推而盡之此義尤不可不知九二孚兊吉悔亡三隂柔小人也二承而比之宜有悔然以剛中之德上應剛中之君能孚五而不為三所惑故孚兊吉而悔亡也本義曰剛中為孚居隂為悔象曰孚兊之吉信志也比小人似為可疑然剛實居中其志有確然自信者矣故二五同德相恱非小人所得而易之也初行无可疑故信不待言二志有可信故疑不遑恤位不同耳六三來兊凶三隂柔不中正上无所應而來就二陽以求說說不以道者也故曰來兊凶來謂自上而下就初與二也初剛正二剛中說之不以道不說也安得不凶傳曰之内為來上下俱陽而獨之内者以同體而隂性下也失道下行也確甚象曰來兊之凶位不當也位不當謂以隂居陽也志行俱喪逢人乞憐傳所謂无與而妄求說所以凶也謹按𢎞霸之嘗糞丁謂之拂鬚皆來兊之凶也九四商兊未寧介疾有喜上承九五下比六三一中正一柔邪兩者之相去逺矣質剛故欲從五位柔故欲從三反覆擬議未能歸一故註疏以疾為三以介為隔謂三為佞說將近至尊故四以剛德截而隔之於義亦通傳曰兩間謂之介分限也地之界則加田義乃同也故人有節謂之介若介然守正而疾逺邪惡則有喜也從五正也說三邪也四近君之位若剛介守正疾逺邪惡將得君以行道福慶及物為有喜也若四者得失未有定繫所從耳其義甚確如此則當作介于石之介象曰九四之喜有慶也楊誠齋曰六三者君心之膏肓也九四者膏肓之鍼艾也故九四者六三之所甚不喜也六三不喜則九四有喜矣非九四之私喜也天下國家之大慶也甚是痛快九五孚于剝有厲五以剛健中正之德居尊位在朝宜以喜起為說而聖人復設有厲之戒何也傳曰雖聖賢在上天下未嘗无小人然不敢肆其惡也聖人亦說其能勉而革面也彼小人者未嘗不知聖賢之可說也如四凶處堯朝隠惡而順命是也聖人非不知其終惡也取其畏罪而强仁耳五若誠心信小人之假善為實善而不知其包藏則危道也小人者備之不至則害於善聖人為戒之意深矣又曰以說之時而宻比於上六故為之戒雖舜之聖且畏巧言令色安得不戒也說之惑人易入而可懼也如此諸家多援此為懼不復著解以其義固曲盡也葢隂能消陽曰剝以五之陽而孚上六之隂則必以上之隂而剝九五之陽損盛德而虧至治故有厲也象曰孚于剝位正當也孚于剝以五所處者正當說體之中位而宻比上六有相說之道故設此戒也以明太祖之剛明而孚於胡惟庸肅宗之剛明而孚嚴嵩非其驗與謹按明皇之於李林甫德宗之于盧杞亦孚剝之厲也上六引兊上成兊之主居說之極不引其君以當道而引其君以容恱者也故曰引兊引兊與來兊不同來者移己之身以就人者也引者移人之心以就己也葢其才情智力大有動於人者使人不覺墮其術中也不言凶者傳曰未見其所說者善惡也本義曰二陽相與為說而不能必其從也余謂五言厲指上六故上六不復言凶象曰上六引兊未光也引者牽引誘引之意曰未光言其心事之暗昧也坎下巽上渙亨王假有廟利渉大川利貞為卦巽上坎下風行於水上水遇風則渙散所以為渙也兊說之極必舒緩放肆故宜有以散之散其偷安之氣則嚴肅收歛故亨也王假有廟申渙義利涉大川申亨義利貞則總申渙亨之義也假廟之說頗多或以巽為隠為伏坎亦為隠伏取幽隠之義有鬼神象其說近似然亦未確所以朱子說這處都見不得且作因渙散而立廟說朱氏廣其義曰天下離散不安其居聖人將以聚之故以宗廟為先宗廟者收其心之渙散而存之也人孰不有父母知報本則知祭祀出於人心復其本心則離散者可合而天下无事矣治渙之道也利涉大川只本義巽木坎水舟楫之象二語最精利貞承上二句說祭祀不以正如魯用郊禘季氏旅泰山之類則有非分之譏涉川不以正行險以徼倖也故利貞當作戒辭彖曰渙亨剛來而不窮柔得位乎外而上同渙亨以卦變言也傳曰渙之成渙繇九來居二六上居四也剛陽之來則不窮極於下而處得其中柔之往則得正位於外而上同於五之中巽順於五乃上同也四近五居臣之位當渙而比其義相通同五乃從中也當渙之時而守其中則不至於離散故能亨也本義主漸卦變存之别作一義可耳王假有廟王乃在中也在中本義以為廟中傳以為攝其心之中張南軒以為中天下而立定四海之民竊意王謂九五在中謂以剛居中也以剛中之德對越神明所謂不薦之孚无言之假故能與祖考相為感假也如此看中字即三儒之說併存可也利涉大川乗木有功也乗木有功乗巽木涉坎水必有濟渙之功也胡氏曰易以巽言利涉大川者三皆以木言益曰木道乃行中孚曰乗木舟虚渙亦曰乗木有功其義最明象曰風行水上渙先王以享于帝立廟風行水上解散離披渙之象也先王觀其象而以享於帝立廟不曰王者以享帝立廟而曰先王以享於帝立廟享於帝為先王言也立廟不獨為先王言也享帝於郊王者之事帝以主宰言曰帝尊之也立廟有差等天子七廟諸侯五廟大夫三廟士一廟庶人祭於寢先王所以創制立法也繇天地而推及祖宗繇祖宗而推及人人之祖宗所以廣孝思而一天下之心萃天下之渙也唐時大臣有不立廟者朝廷為立廟以愧之後世此義廢而萃渙之道闕如矣奈何欲望先王之治乎初六用拯馬壯吉以隂柔居渙之初才不足以濟渙也但渙之方始拯救頗易為力且上比九二剛中之才若倚之以拯其渙如得壯馬然任重致逺罔不濟矣故吉也傳曰六爻獨初不云渙者離散之勢辨之宜早方始而拯之則不至於渙也為教深矣象曰初六之吉順也順謂順乎九二以隂從陽以柔從剛故曰順也九二渙奔其机悔亡二當渙之時而在險中能无悔乎悔則舍危就安其所願也机木之有足可憑以為安者也奔即奔而殿之奔謂反而趨走也以剛中之才反就初而安之如机然出險而得憑倚之具故悔可亡也象曰渙奔其机得願也得願得其舍危就安之願也願者悔之反悔亡則願得矣二與初本非應而剛柔有相濟之理初以二之剛為馬二以初之柔為机其用各有攸當也使非相比而相求則二徒立无依初又何以行之哉六三渙其躬无悔𫝊曰三在渙時止於其身无悔而已恐未安本義云隂不中正有私於己之象也然居得陽位志在濟時能散其私則可无悔此說較長凡人情所以益入於險中者以形骸為之障也撤去其障則大同矣何悔之有象曰渙其躬志在外也三以上為外志在應上見有上不見有身也无我之謂也三當渙時視諸爻獨有正應故以克己之道勉之六四渙其羣元吉渙有丘匪夷所思𫝊曰天下渙散而能使之羣聚誤矣朱子曰如此說是羣其渙非渙其羣也信然是以獨取老蘇之說曰羣者聖人所欲渙以混一天下者也渙小人之私羣成天下之公道此所以元吉也此說極好自古朝廷之治恒敗於朋黨東漢黨錮之禍朝野互相標榜以至唐之牛李宋之朔洛蜀皆羣也四居柔得正處大臣之位與五咸有一德為能剖破其藩籬渾一其門戸所謂天下為公者何吉如之繇是小羣往則大羣來如有丘然丘者巍然髙大之意所謂舜合二十二人為羣武王合三千人為羣也此豈尋常之見所及乎訂詁云指下二隂而言二隂以四為同類方且以私心窺四謂四必俯而與我相繫援也今乃望之峩峩若髙山此豈其夷輩思慮之所及哉巽風為散險之主六四為巽卦之主卦之所以成渙者在此一爻朱子謂六四一爻未見有大好處今其辭恁地浩大皆不可曉葢繇其不詳於卦主之義故也此說頗有理象曰渙其羣元吉光大也人自為羣必有暗昧未光者矣必有偏私未大者矣渙其羣无些子暗昧偏私之意思光明正大元吉豈偶然哉九五渙汗其大號渙王居无咎五以剛健中正之德居尊位宻比六四柔正之臣合力同心以濟渙者也然居巽中有號令四方之象故曰渙汗其大號人君合天下為一體號令未出疾痛相闗有不容頃刻待者號令既出舉一世否塞鬱隔之患愁苦呻吟之情莫不消釋而解散之如汗出於毛髪腠理之微達於肌膚筋骸之㑹无微不徹无逺不被也大號謂大政敎大誥誡也渙王居朱子作散其居積而辨程𫝊之誤非也五與四渙字俱兩用之上渙字俱作解散不知伊川說下渙字只輕輕㸃過言處渙如是則有立則王居无咎也王居謂居王者之位為稱伊川說正與象合必如本義象𫝊正位二字說不去矣𫝊於四爻曰元吉光大不在五而在四者二爻之義通言也於四言其施用於五言其成功君臣之分也於五爻曰在四已言元吉五唯言稱其位也渙之四五通言者渙以離散為害拯之使合也非君臣同功合力其能濟乎爻義相須時之宜也此義亦須曉得謹按此爻來氏集註似比諸家之說為長葢天下當渙之時土崩瓦解非早正位號无以繫屬人心故漢光武之洛陽唐肅宗之靈武宋髙宗之江南皆王居之无咎者也近若明之景泰初亦无咎後則貪位蔑義為有咎耳九五陽剛中正得六四柔順公正之臣合力同心以濟渙天下可𫝊檄而定也光復舊物混一土宇其號可不謂大其居又何咎之有哉孔子恐人不明王居二字之義故小象解之曰正位也象曰王居无咎正位也正位者居重馭輕所謂恭己正南面也上九渙其血去逖出无咎程朱俱作血去惕出與小畜六四同至象辭解不去程云脫去字朱云節去字非也渙其血當為一句去逖出當為一句此與三應三坎終為血卦上若應之則入險中不免於沾濡矣故曰渙其血又云去逖出者上居渙之極逺出渙外故不特言出又言逖出去之逺也余意如此諸家亦有作此解者似確不可易謹按折中之解正合此意讀易者辨之象曰渙其血逺害也害字解血字逺字解逖字正自分明奈何遷就小畜而强以逖為惕也兊下坎上節亨苦節不可貞渙者散亂而无統故須用節節則有次第有界限无過分踰量之為故亨若夫矯激以為名枯寂以為髙節而苦矣非所以為訓也是可固守一隅之見而不進之大中乎如二氏之流絶而聲色薄而滋味棄而倫理徒自苦耳雖貞亦奚以為他若季札之讓而孔子貶之陳仲子之㢘而孟子非之皆苦節不可貞之類也彖曰節亨剛柔分而剛得中節之所以亨者三剛三柔各分其一以相濟二五皆剛而得中也此以卦體言也分者謂分乾三之剛於五以濟坤之柔分坤五之柔於三以濟乾之剛也苦節不可貞其道窮也節適中則甘過中則苦甘則不窮苦則窮道固然也故本義云又以理言說以行險當位以節中正以通兊說坎險說以行險也𫝊曰人於斯說則不知已遇艱險則思止方說而止為節之義其說甚當朱子亟稱之九五居尊當位也在澤上故曰以節居坎中而得正位中正也蓄極而流故曰以通此以卦體卦德言也天地節而四時成節以制度不傷財不害民以下又因節道而推極言之天地之道寒極則以暑節之暑極則以寒節之分至啟閉弦望晦朔四時不忒而嵗功成矣聖人法天地之節立限制軌度如春夏秋冬之不可易則不至傷財而害民也周官大學俱不諱言財財者民間之大利大害也苟非節則侈肆奢麗民不堪命即以儉德自安而出入无藝酌盈无道亦必匱之術也惟多寡疾舒之間各中其節則家給人足而无蕭索困憊之憂矣或以傷財害民平說曰量入為出不傷財也時使薄歛不害民也亦好象曰澤上有水節君子以制數度議德行澤上有水其容受有限節之象也君子觀其象以節數度則制之以節德行則議之其曰制數度者何也考諸禮宫室衣服器用有以髙為貴者有以下為貴者有以多為貴者有以少為貴者有以大為貴者有以小為貴者有以文為貴者有以素為貴者尊卑之序貴賤之等截然不可踰越斟酌損益以歸於至當所謂制也其曰議德行者何也如伊尹而以清為德行栁下惠而以任為德行伯夷而以和為德行皆非矣是故宋襄之仁申生之孝子路之死以語於德行均未也後世大節虧喪而欲以他長自解免即有清白之德卓異之行豈足稱乎商量審度以合於大中所謂議也初九不出戸庭无咎傳以初為不能節本義曰初陽剛得正能節而止者也本義為是然處卦之下居節之初所宜養晦也往則有二剛以蔽之應則有四險以陷之可輕出乎不出戸庭庶免於咎欲其韜藏隠黙以自全也戸庭戸外之庭指九二二陽竒故有戸象象曰不出戸庭知通塞也一通一塞惟義所在通則出塞則不出若時方否塞而强欲通之是不知也爻敎以守身之義象許以保身之􅈒交相發也傳曰尾生之信水至不去不知通塞也故君子貞而不諒繫辭所解獨以言者在人所節惟言與行節於言則行可知言當在先也此義尤不出戸庭者所當知謹按此爻所該者廣不可混於繫辭謂專指言語一節也九二不出門庭凶二以剛中之德居臣位上應陽剛中正之君出而制數度議德行與有責焉且二柔當其前无遮隔之者與初九異矣乃閉門守拙无志於時所謂邦有道貧且賤焉恥也故凶門庭門内之庭指六三六隂耦故有門象傳曰二五非隂陽正應故不相從本義曰九二當可行之時而失剛不正上无應與知節而不知通此義亦須知之象曰不出門庭凶失時極也立節者不可以不知時時方有為而以隂柔自安上負其君下負所學失時甚矣故曰極傳曰不能上從九五剛中正之道成節之功乃係於私暱之隂柔是失時之至極所以凶也失時失其所宜也尤為顯切梁溪先生曰不出戸庭與不出門庭兩爻人時時用得着如事之當做者不做便是不出門庭之凶矣事不當做而做便是出戸庭而咎矣須如此乃可云善用易也謹按此爻在禹稷之位執顔子之行故凶六三不節若則嗟若无咎大過之上六𫝊作无所歸咎本義直云无咎萃之上六傳作无所歸咎本義直云无咎獨於此爻主程說曰與諸爻異言无所歸咎也焦氏仍以无咎為許之之辭非矣六三隂柔而不中正乗剛臨險安得无咎本義曰以當節時非能節者是也象曰不節之嗟又誰咎也不節之嗟咎其所自取耳傳明云又誰咎也則无咎自是无所歸咎若曲為之辭是不以孔子解易矣六四安節亨四居柔居正當水澤之交最先受節順其自然而无所勉强者也故曰安節安則亨矣傳曰節以安為善强守而不安則不能當豈能亨也馮氏曰節中其節之義在學為不陵節在禮為節文在財為樽節在物為符節在臣為名節在君師為節制唯其時物耳其義最為明備象曰安節之亨承上道也上謂九五道謂剛中正之道四以柔承之故安節而亨也傳曰四能安節之義非一象獨舉其重者餘善亦不出於中正也九五甘節吉往有尚當位以節中正以通九五當之其制度之恱心如芻豢之恱口也故曰甘節吉甘者嘉美而无艱苦之謂以此節天下往制數度則恱而守之往議德行則恱而從之其可嘉尚為何如也象曰甘節之吉居位中也甘者味之中五者位之中居得中位則發而皆中節矣故人之於五有同好猶口之於味有同嗜也上六苦節貞凶悔亡上居節之極險之終過於節而已甚者也故曰苦節凡處已以不情强人以難堪皆是也曰凶曰悔亡原木闕類能堅忍刻厲直行其意而不顧使一旦悟其過苦而悔心生焉則化凶為吉一轉念間耳醫家所謂不足之症難治有餘之症易治也傳曰悔損過從中之謂節之悔亡與他卦之悔亡辭同而義異也此解最確本義依例作悔亡而以禮奢寧儉之意解之恐未是象曰苦節貞凶其道窮也爻辭即本彖辭故象傳亦即用彖傳義不厭重兊下巽上中孚豚魚吉利渉大川利貞孚之為言實也中孚一卦兼取中虚中實二義傳曰中虚信之本中實信之質朱子曰一念之間中无私主便謂之虚事皆不妄便謂之實不是兩件事柔曰敬則内欲不萌外誘不入自其内欲不萌而言則曰虚自其外誘不入而言則曰實只是一時事不可作兩截看非伊川不能說的如此確當非晦翁不能解的如此分曉豚魚吉只宜就感格上說從來一人一念之誠而致禽獸馴擾者多矣况至誠乎蒙引云不曰感豚魚而曰豚魚吉承中孚云也中孚便有以孚於物矣說的好或云江豚有信或云飼之以物則不期而集俱不必信以渉險雖在波濤洶湧之中如履平地故曰利渉大川然須以貞正為本孚而不以正如宗魯効忠於主人死被惡名郭解徵死於死黨生陷大戮其何利之有焉謹按尾生之抱柱而死荀息之不食其言亦是此類彖曰中孚柔在内而剛得中說而巽孚乃化邦也以全體言之三四在内柔也中虚之象以二體言之二五居中剛也中實之象虚者所以受信實者所以為信皆中孚之義也此以卦體言也下兊說也說則孚其上上巽順也順則孚其下上下交孚不言而喻乃可以感化乎萬邦也傳曰若人不說從或違拂事理豈能化天下乎此以卦德言也豚魚吉信及豚魚也利渉大川乗木舟虚也豚魚冥昧无知之物信及此則无有不信者故吉也信及豚魚即仁及草木誠動金石之意上巽木也下兊澤也乗巽木於澤水之上濟川之象三四二柔虚舟之象以虚舟濟川則渡水不溺厯險不驚豈有覆没之患哉此以卦象言也中孚以利貞乃應乎天也天之所以為天者信而已矣无爽時故信也正而已矣无私覆故正也信而正則與天合體故曰乃應乎天也象曰澤上有風中孚君子以議獄緩死風之性善入水虚而能順承之故為中孚之象君子觀其象以議獄使生者不寃緩死使死者不憾生死交孚也曰議曰緩便有與其殺不辜寧失不經之意所謂好生之德洽於民心也民心洽然後可以言中孚傳曰君子之於議獄盡其忠而已於緩死極於惻而已於天下之事无所不盡其忠而議獄緩死最其大者也或曰議獄兊象緩死巽象或曰元惡大姦不在是典故四凶无議法少正夘无緩理此又從象外說理也初九虞吉有他不燕初以陽剛之才上與四為正應審度其可從而從之所謂因不失其親吉之道也若舍正應而之他二三其德非所以為安矣故曰有他不燕𫝊曰爻以謀始之義大故不取相應之義若用應則非虞也亦是一義象曰初九虞吉志未變也趨向之邪正視乎其志志惑於他則變易其初心當中孚之初无他端之惑志固未有所變易也九二鳴鶴在隂其子和之我有好爵吾與爾靡之二有中實之德五亦有中實之德同德相應二四中虚无一阻隔其間故有鶴鳴子和我爵爾靡之象以繫辭証之上二句屬言言者君子之樞機所以動天地也故以鶴鳴子和為象鶴陽鳥鳴謂九也在隂居二也子和五也同聲相應篤父子之親也下二句屬行行者君子之摳機所以動天地也故以好爵共靡為象向來以爵為人爵故我指五五君位以好爵與二共之也看來作天爵為是葢二不以朝廷之崇髙為榮而以性命之賦畀為榮故曰好爵本義懿德之說精矣靡舊作縻謂繫戀而不能忘也余以縻只如字即靡不有初之死矢靡他之靡言吾與爾念兹在兹他无所之也初九戒有他二靡之正无他也无他則燕矣同德相愛忘君臣之分也忘君臣之分故直稱爾我而不以為嫌竊以下二句觀之二臣而五君也以上二句觀之二父而五子矣可乎朱子曰九二不可曉意葢謂此也意者周公以父子為君臣故言之无所諱如此乎傳曰有孚於中物无不應誠同故也至誠无逺近幽深之間故繫辭云善則千里之外應之不善則千里之外違之言誠通也至誠感通之理知道者為能識之只渾說道理更不分疏父子君臣亦是一義象曰其子和之中心願也二五俱剛而得中故曰中心願不出于中心欲勉為響應難矣根於心發於聲其天籟之自鳴乎象單釋一句而全爻包括在内葢全爻固可以中心願三字盡之也六三得敵或鼓或罷或泣或歌三與上為正應匹也非敵也然上居上體之上其信己窮三居下體之上其說已極此愈說彼愈疑猜嫌積而仇隙生故曰得敵一柔而不正一剛而不中能相容乎惟得敵則有進退勝敗之勢或鼓而前或罷而後或敗而泣或勝而歌皆用兵之象也體均力敵互有勝負言不相孚之甚也象曰或鼔或罷位不當也以隂居陽不中不正叛上以樹敵故其象如此朱子云中孚乃疊畫之離離為飛鳥故諸爻多言鳥離為兵戈故此爻專言敵此可以証得敵之說之不誣矣謹按中爻下震鼔之象也上艮罷之象也兊為口為恱歌之象也巽為不果泣之象也爻辭一字一句无非卦中所冇者六四月幾望馬匹亡无咎四居近君之位佐五以孚天下者也故有月幾望之象傳曰已望則敵矣臣而敵君禍敗必至故以幾望為主盛此人臣持盈戒滿功懋而不自居之象故曰馬匹亡四與初為正應匹也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹謂對也馬者行物也初上應四而四亦進從五為上行故以馬為象四志在孚五而不下係於初馬匹亡也此人臣精白一德不交私不阿黨之象何咎之有象曰馬匹亡絶類上也絶初九之類而上孚于五可謂乃心王室者矣事君者不獨非我族類宜絶之即屬在同類而溺于情面不能避逺嫌疑非无咎之道也九五有孚攣如无咎五以剛健中正之德居尊位下應九二剛中之臣君臣同德以孚天下者也故曰有孚攣如攣而曰如似有所束縳拘係者然固結不可解之象也昭示大信一道同風何咎之有𫝊曰人君之孚不能使天下固結如是則億兆之心安能保其不離乎是推開說象曰有孚攣如位正當也三以隂居陽而不中正德不稱位故曰位不當五以陽居陽而中且正德稱其位故曰位正當也蒙引正當二字分看未是他爻不言孚獨五言孚說而巽孚乃化邦也九五當之矣上九翰音登于天貞凶巽為雞雞曰翰音出曲禮或曰雞鳴必振其羽故曰翰音鳴必信於旦亦物之中孚者也然處巽之最上无位而不知變為登於天之象故雖正亦凶𫝊曰信之終信終則衰忠篤内喪華美外颺故云翰音登天夫子曰好信不好學其蔽也賊固守而不通之謂也象曰翰音登于天何可長也誠於中者可久飾於外者不可繼上之志唯欲求人之知而邀人之應髙自標榜終與空俱銷故曰何可長也孟子曰聲聞過情如溝澮皆盈之水其涸也可立而待也上九之謂矣艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉為卦二陽在内四隂在外隂過乎陽也隂為小故曰小過雖過其常未至於太甚故有可亨之理然所利在正不正則不亨矣𫝊曰不失時宜之謂正言其時須小過而後能亨也可小事不可大事是就卦才說言尋常小事還做的非常大事便做不得傳曰過所以求就中也所過者小事也事之大者豈可過也此與彖辭解似不同飛鳥遺之音𫝊謂過之不逺也本義謂致鳥遺音之應竊意卦體内實外虚飛鳥之象然鳥飛於上而音則遺於下過而不留鳴而善下此處小過之道也故下即承之曰不宜上宜下上二隂在陽之上乗陽也乗陽非正也故不宜下二隂在陽之下承陽也承陽正也故不宜上宜下摠之順於理而已過而順理其吉大矣象曰小過小者過而亨也小過小者過而亨也此句只用虚字輕輕逓過而亨義却在過以利貞内葢當過而過順時以偕行故亨也過以利貞與時行也當其可之謂時如觀過知仁及君子過其行之過道固應爾也柔得中是以小事吉也二五皆柔得中也小事而以柔中之道處之則允濟是以吉也剛失位而不中是以不可大事也剛居三四為上下四隂所逼失位而不中也失位則權不足以乗失中則德不足以恃雖陽剛无所恃其才大事其有濟乎是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦之全體言之中二剛為鳥身上下四柔為翼有飛鳥之象焉飛鳥遺之音便是不宜上宜下不宜上宜下便大吉三句一連讀上則乗剛為逆下則承剛為順去逆就順所以大吉也陽為大隂順陽故大吉然則當小過之時者明逆順之理而已象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉艮止震動止而動則過動而止則小過葢雷不在天上而在山上其聲不至大壯故為小過之象君子觀其象以行過乎恭謙抑之過出於中心之无敢慢非諂也所謂一命而僂再命而傴三命而俯也喪過乎哀憂戚之過出於中心之无敢忘非毁也所謂與其哀不足而禮有餘不若禮不足而哀有餘也用過乎儉節省之過出於中心之无敢侈非固也所謂國奢則示之以儉也三者小過皆仁人君子之心若太過則為足恭為滅性為僑而野矣初六飛鳥以凶初以隂柔居艮之下止體也垂翅戢翼其所宜耳乃上應九四則不安於止而妄動矣躁易迅疾莫能自主故為飛鳥之象鳥飛而不遺其音上而不下逆而不順者也故凶以凶言自取凶也象曰飛鳥以凶不可如何也不可如何恣其所之无回翔審顧之意吾末如之何也已矣六二過其祖遇其妣不及其君遇其臣无咎三父也四尊於三則為祖二陽在上之象也五以隂居尊則為妣與二同德相應二若進而應五須越四而過之是過其祖遇其妣也遇而過過而後遇是為上柔非柔順中正之道矣夫以隂言謂之妣以尊言則謂之君二以陽不可過則不及六五而安六二本位是不及其君也不及其君者不敢過其君順而不逆適得其為臣之分故曰遇其臣无咎守正而得中故也象曰不及其君臣不可過也臣而過則有非分之嫌可乎本義云所以不及君而還遇臣者以臣不可過故也過恭過哀過險過之小者也小者有時而可過也臣過其君過之大者也大者无時而可過也聖人嚴於君臣之大分如此九三弗過防之從或戕之凶朱子謂小過義不可曉弗過防之四字為一句弗過遇之弗遇過之皆兩字絶句胡氏曰小過乃隂過之時故二陽爻皆稱弗過言陽弗能過也此說足以破朱子之疑矣當小人道長之時三居剛得正勢不兩立故備戒不可不嚴若一有疎虞而從之則彼或得以害正而凶矣訂詁從與戕作兩義看曰若不逆其詐而順從之則必貽累於後日栁子厚是也或不容其惡而戕伐之則必反噬於目前陳蕃竇武是也二者皆致凶之道如此看亦好象曰從或戕之凶如何也初之凶曰不可如何三之凶曰如何從來俱一例看傳曰言其甚也訂詁曰謂凶不可測余向有說云初以隂而役於不正之陽救正殊難為力凶而曰以決辭也不可如何言善者亦无能為也三以陽而惑於不正之隂救正殊易為功戕而曰或疑詞也如何言當商量而思所以解免之九四无咎弗過遇之往厲必戒勿用永貞四以剛居柔在己不失君子之德在外不激小人之怒无咎之道也弗過謂隂盛之時陽弗能過惟有遇之而已遇者以形迹相羈縻也三處二隂之上故當拒絶四處二隂之下故當委曲位不同也雖然遇可也往則不可遇者彼來而我遇之也是謂邂逅以无心往者我往而彼遇之也是謂貶損以求容貞不貞之分也是故輕身以先則生平盡喪為可危懼所當戒飭以自保全也勿用永貞𦂳根往厲以戒來言勿為隂用惟有終守其貞而已彼來我不拒彼不來我亦不往此用隂而不為隂用之道也若夫貞正之道豈可須臾離乎此亦當如弗過防之等例兩字絶句不然卦曰利貞坤用六曰利永貞此獨曰勿用永貞非所以為訓矣雖程朱之說未敢信謹按易曰利貞未嘗曰利不貞曰貞吉未嘗曰不貞吉曰利永貞曰永貞吉曰元永貞无咎以此知勿用永貞之必非教以不可固守其常也何也變而不失其常是以君子有致命遂志之時若謂小過之時不可執守常道恐世之枉己狥人隨俗俯仰者得以藉口故不敢信象曰弗過遇之位不當也往厲必戒終不可長也位不當即所謂剛失位而不中也一陽在二隂之下處的地位不好是以弗過而遇之也長字𫝊作上聲本義疑而闕之竊意以勢言之一陽不可以勝二隂以理言之二隂不可以勝一陽隂雖過陽終難長久是以戒其往而固守也仍作平聲為是若云隂過之時陽退縮自保足矣豈能長而盛也恐非聖人扶陽抑隂之意六五宻雲不雨自我西郊公弋取彼在穴五隂在三四二陽之上亦欲畜三四而成雨然五雖有唱三四終不為和隂氣凝而上結可以為雲陽氣不散而下流不可以為雨故為宻雲不雨之象自我西郊解在小畜卦中公謂五也弋而取之者六二也二以隂處隂又在山之中虚故曰在穴但言在穴而不言穴中之物見其空无所得也𫝊曰同類相取雖得之兩隂豈能濟大事乎猶宻雲之不能成雨也醒甚象曰宻雲不雨已上也本義只云太髙未盡傳曰陽降隂升合則和而成雨隂已在上雲雖宻豈能成雨乎隂過不能成大之義也其義始盡矣上六弗遇過之飛鳥離之凶是謂災𤯝上以隂居動體之上處隂過之極所謂過之已髙而甚逺者也視初六之逆而不順殆有甚焉𫝊云不與理遇動皆過之恐未的本義引或曰之說遇過恐亦當作過遇義同九四失之逺矣上六一爻正與九四相反四陽弗能過隂而反遇之曲以全身也上隂弗能遇陽而反過之滿以招禍也飛鳥離之程朱俱云逺過之象或云離麗於繒繳亦通災自天降𤯝繇人作天人交惡凶莫甚焉𫝊不兩平說曰災者天殃𤯝者人為既過之極豈唯人𤯝天災亦至其凶可知天理人事皆然也如此分輕重極是象曰弗遇過之已亢也已亢者上而又上履盛滿而不知止是以弗與陽遇反越而過之也離下坎上既濟亨小利貞初吉終亂火炎上者也而降在下水潤下者也而升在上如人之一身水火既濟則元氣充而百病不作矣其在世道亦然養身者身既壯則恃其壯而沈溺起持世者世既治則恃其治而宴安生故本義云此卦及六爻皆有警戒之意時當然也既濟亨小言大事都亨過去了只是小小的亨通𫝊分别亨小小亨固有義本義直作小亨觀彖𫝊曰小者亨而不曰亨者小則朱子之說是矣利貞指六爻言六爻之位本正利在固守之而已初吉指六二以其在方濟之時也終亂指上六以其在既濟之終也盛極而衰至泰極而否來理固然也彖曰既濟亨小者亨也本義以為濟下脫小字諸儒以為亨小下脫小字諸儒說是張中溪曰爻有六位三隂得位而三陽下之故曰小者亨也利貞剛柔正而位當也初三五陽位皆以九居之二四上隂位皆以六居之剛柔各正其位无不當也卦所以利貞也泰卦六爻雖相應而五處非其位唯既濟不惟六爻相應而剛柔无一之不當故先儒論六十四卦无如既濟最正初吉柔得中也初吉者二以文明柔順之德居中上應故能成既濟之功而吉也終止則亂其道窮也終亂者上居濟之終不進而止其道窮極也張中溪曰終亂而彖曰終止則亂非終之能亂也於其終而有止心此亂之所繇生也最得孔子發文王未發之意𫝊曰聖人至此奈何曰唯聖人為能通其變於未窮不使至於極也堯舜是也故有終而无亂說理至此始稱完美矣昔唐虞三代之世其君臣相與咨警誥誡之意至今尚可想見况下此者乎若自謂已治已安而不復憂勤惕厲唯日不足國家之亂日可俟也晉武帝唐明皇其前事也象曰水在火上既濟君子以思患而預防之坎上離下水火相資為用既濟之象君子觀其象而知既濟非有患也然患從此生矣无虞則不戒其固然也唯是未然而為已然之防其慮之也周其備之也蚤杜釁消萌无復事矣如火然其性炎上其勢燎原若凛厝火之戒裕徙薪之計豫儲水以防之豈有患乎書曰惟事事乃其有備有備无患此之謂也自古明聖開國其貽謀經始之道纎悉必具不留餘地以俟後人以至興家立業之主亦然无他其思之者无遺策而防之者能先事故也患坎險象思防離明象初九曳其輪濡其尾无咎初以陽剛之才上與六四為正應而火體當既濟之初必有鋭於進者故以曳其輪濡其尾戒之程朱俱云不進也不進則止止則亂矣竊意當作進而不輕進説車涉水慮有傾側之患曳其輪則遲回安重而不遽進狐涉水慮有陷溺之患濡其尾則傍皇審顧而不冒進平其前後量其淺深无咎之道也蒙引云非真曳輪濡尾亦言其凛凛之心有若此者得之矣象曰曳其輪義无咎也指出義字義者宜也方既濟之時而慎重如此隨時合宜故无咎也六二婦喪其茀勿逐七日得二與五同德相應得君行道其宜也然當既濟之時五溺於上下二隂无復求賢之志傳曰自古既濟而能用人者鮮矣以唐太宗之用言尚怠於終况其下者乎於斯時也則剛中反為中滿坎離乃為相戾矣人能識時知變則可以言易矣二隂為婦禮婦人出門必擁蔽其面車則用茀五不來二不往則茀无所用之故曰喪其茀勿逐者閒静自守不貶損以從物也七日者自二數之六位一周則為七二五正應窮則必通終當遇合故曰七日得也象曰七日得以中道也象復推本所以而言之言茀雖喪應期而得如持左劵以其有剛中之道也道在二不終窮矣九三髙宗伐鬼方三年克之小人勿用三當既濟之時以剛居剛其威力足以逺及故有髙宗伐鬼方之象或曰三近坎體鬼方象離為戎兵伐象鬼方即詩所謂氐羌也髙宗當殷道之盛興仁義之師必待三年而後克者見用兵之難也然則兵非萬不得已其可輕用乎小人勿用即就伐國說用小人或招怨啟侮以辱國不利莫大焉葢小人原无可用之時至於兵凶戰危尤萬萬不可假手者張中溪曰小人譯敵皆為隂類戎敵之禍逺小人之禍近故作易者於用兵之後必以小人勿用戒之如師之上既濟之三是也象曰三年克之憊也憊即華元告子反曰嘻憊矣之憊言疲困之甚也噫商髙宗之伐鬼方也憊而後克唐太宗之伐髙麗也憊而罔克觀此可以為窮兵黷武之戒矣九四繻有衣袽終日戒四以柔居柔所謂小心慎宻其人也在濟時而履坎須用舟舟有罅漏須用備本義不别作解但述𫝊之言曰繻當作濡衣袽以塞舟之罅漏終日戒朝乾夕惕无頃刻之或怠也皆所以思患而預防之也胡氏曰乗舟者不可以无繻而忘衣袽亦不可謂衣袽已備遂恝然不知戒水寖至而不知則雖有衣袽不及施矣如此始盡聖人慮患之意傳曰不言吉方免於患也既濟之時免患則足矣豈復有加也此意亦須曉的象曰終日戒有所疑也晰理貴信防患貴疑凡事信其无患則變生意外疑其不虞則變弭意中聖賢兢業不敢自暇自逸用是道耳葢疑非猶豫不定之謂而畏懼不安之謂也九五東鄰殺牛不如西鄰之禴祭實受其福此爻之義殊難解陽實隂虚爻曰實受其福而五之實不若二之虛陽大隂小象曰吉大來也而五之大不若二之小畢竞未安反覆求之宜取東鄰西鄰取義東陽謂五也五所鄰者二隂祭意雖誠二隂蔽之不能自達故物盛而誠衰西隂謂二也二所鄰者二陽祭物雖薄二陽闕之可以共達其誠意故誠盛而物著此東鄰殺牛不如西鄰之禴祭實受其福之說也註疏主積德說似有理然於爻義固无着落謹按此爻之義說者不一折中獨取潘氏姚氏之說其理固是而東鄰西鄰俱未著解來氏據文王圓圖謂震兊東西正對乃水火之鄰也亦屬牽强竊意伏羲圓圖離東坎西非東西鄰之象乎離為戈兵為牛非殺牛之象乎坎為水為隠伏非禴祭之象乎故離雖文明而中虚坎雖隠暗而中實惟得殺而當時又以誠將之雖薄祭亦受福矣如此則小象大字亦有着落象曰東鄰殺牛不如西鄰之時也實受其福吉大來也象只加時字而一爻全辭俱明葢五當二隂為鄰之時二當二陽為鄰之時時不同故二之禴祭實受其福而五殺牛反不與焉處既濟之時亦可以慎擇鄰矣𫝊曰理无極而不反已至於極雖善處亦无如之何恐非聖人立教之意本義云當文王與紂之事亦未見以文為六二可也以紂為九五可乎近閱訂詁云西周侯國與商天子稱鄰恐非周公語余意正合上六濡其首厲上六以隂柔處既濟之終既有止則亂之憂又將險極將與波俱没矣故為濡其首之象濡其首則厲矣濡其首只就上六說傳曰坎為水濟亦取水義本義如狐涉水三字非是象曰濡其首厲何可久也濡其首身且不保其能久乎其道窮也上六當之矣坎下離上未濟亨小狐汔濟濡其尾无攸利天下事到盡頭處便窮而无所往矣以其不復留餘地也未濟者凡事有餘地可以生生而不窮故直稱亨而不若既濟之小亨也小狐汔濟本義云汔幾也其說固確𫝊作仡仡勇夫之仡曰狐之老者多疑畏故履氷而聴懼其陷也小者則未能畏慎故勇於濟汔當作仡壯勇之狀此正如少年新進之徒閱厯未深勇於有為而不免半途之廢所謂其進銳者其退速也若在老成謀深慮逺當不至是故不曰狐而必曰小狐如此方說的小字義出濡其尾則不能濟矣又何利之有焉觀恃强用壯之无成事則知審時量力之无敗理矣謹按折中云小狐當從程𫝊之解汔濟當從本義之解要之是戒人敬慎之意自始濟以至于將濟不可一息而忘敬慎也彖曰未濟亨柔得中也未濟之所以亨者六五以柔而得居上卦之中也得中而應剛故其才可以亨也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也小狐汔濟指九二雖勇於往而在坎中畫未能濟而出也氣虞中衰力求可繼濟而濡尾則氣衰力竭矣終之不續其能誕登彼岸乎隂居陽位陽居隂位位不當也然三剛三柔皆相應有相濟之理而未濟者終必濟矣此未濟之所以亨也傳曰卦之諸爻皆不得位故為未濟雜卦云未濟男之窮也謂三陽皆失位也斯義也聞之成都隠者朱子曰張敬夫說伊川之在涪也方讀易有篐桶人以此問伊川不能答其人云三陽失位伊川謂是不知此語火珠林上已有葢伊川未嘗看雜書所以被他說動了象曰火在水上未濟君子以慎辨物居方上離下坎火升而上水降而下兩不相資未濟之象君子觀其象而知水火之為物不辨其方而居之則火上水下失位而不相濟辨其方而居之則水上火下得位而相濟辨未濟之物居既濟之方不可不慎也由二體而推之八卦由八卦而推之六十四卦由六十四卦而推之三百八十四爻莫不有物可辨有方可居象豈獨為坎離言乎是故慎此以修身則一身之隂陽濟而元和在四體慎此以治世則一世之隂陽濟而太和在兩間此君子調爕參贊之事非獨分别名物酌定方位而已也此易卦之終聖人說作易的大用出來不得作尋常看過初六濡其尾吝未濟之初與既濟之初同一濡其尾也彼无咎而此吝者彼以陽剛之才而離體明於既濟之時能進而不輕進故无咎此以隂柔之才而坎體陷於未濟之時不能進而冒進故吝象曰濡其尾亦不知極也𫝊曰不量其才力而進至於濡尾是不知之極亦是以初六履坎而失離也竊意與不知節句一例看為是或云極者界至之謂界之所至淺深分焉不知淺深之界是以冒進而濡尾也如此說似有理諸說紛紛可盡廢也九二曳其輪貞吉二以陽剛之才上應柔順之君若輕試漫嘗則有僭逼之嫌失正甚矣故其才力雖足以濟而不遽濟與既濟之初九同一鄭重為曳其輪之象然取義微有不同在彼則遲回安重之至在此則謙退遜順之至也是以得正而吉𫝊曰唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也於六五則言其貞吉光輝盡君道之善於九二則戒其恭順盡臣道之正盡上下之道也象曰九二貞吉中以行正也九居二本非正其所以得正而吉者居中位以行其正也𫝊所謂中則正矣謂此類也六三未濟征凶利涉大川三隂柔不中居險之極未能出險者也未出險而欲徒步以濟其有幸乎故曰征凶然坎終而離始一進步則與九四合又得陽剛之才為正應援引其上有同舟共濟之勢故曰利涉大川是陸行不利舟行則利也本義疑利字上脫不字諸儒從之非也象曰未濟征凶位不當也或謂未濟諸爻位皆不當象𫝊獨於六三發之者以隂柔居險極也三之險一耳不善用之則有征行之凶善用之則有涉川之利其所以處險者異也履險者可坐失應援而甘心未濟哉九四貞吉悔亡震用伐鬼方三年有賞于大國四以陽剛之才居近君之位出乎險入乎明可以濟天下之未濟者矣但所居者柔宜有不正之悔須正固以守之乃吉而亡其悔也不然豈能濟乎當未濟之時任濟世之責使非躬冒大難建立殊勲而欲以邀大國之賞難矣故曰震用伐鬼方三年有賞於大國𫝊云震動也胡氏曰震懼也臨時而懼動罔不利此孔門兵法也本義曰以不正之資欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象其義甚精象曰貞吉悔亡志行也四何志上以五為志下以初為志也承六五之光付託宜効應初六之濡拯救宜急堅守正道立功異域乃得行其濟時之志而安上全下也六五貞吉无悔君子之光有孚吉𫝊曰五文明之主居剛而應剛其處得中虚其心而陽為之輔雖以柔居尊處之至正至善无不足也既得貞正故吉而无悔貞其固有非戒也以此而濟无不濟也故四曰悔亡則戒之之辭五曰无悔則許之之辭一字之間固自有别也離體文明故曰君子之光言盛德之輝煌發越也有孚傳以為有功實稱之本義以為信實不妄俱有理竊意只作五孚於二為是五柔中下得九二剛中之賢為之應則剛柔相濟是吉而又吉也𫝊曰上云吉以貞也柔而能貞德之吉也下云吉以功也既光而有孚時可濟也分疏最明象曰君子之光其暉吉也傳曰輝者光之散也本義因之言君子積充而光盛至於有暉善之至也或引管輅之言曰日中為光朝日為暉中則日在上朝則日在下在上之光以在下之暉而獲吉也亦通上九有孚于飲酒无咎濡其首有孚失是九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為決明明能燭理剛能斷義可謂備上九之義矣以其處未濟之極而无位不得與二四兩剛同輔六五之君惟有孚於飲酒而已寄懐於酒確然自信无一毫世故累其中若陶淵明邵康節其人也樂天知命何咎之有使沈溺不反至於濡首則有孚而失其是非守身之道矣若嵇阮劉畢諸公是也蒙引云是字是一大事件一部易書只教人不失是而已且不但易也傳曰人之處難知其无可奈何而放意不反者豈安於義命者哉失是之謂也如此說當是魏公子信陵一流象曰飲酒濡首亦不知節也指出節字其不為酒困之意乎曰節制曰節度謂有限量而不可踰也怡情肆志无復限量豈知節者哉聖人以中道望之亦禹惡㫖酒周公作酒誥之意也本義必以濡其首為狐而謂小象不可曉過矣易變易也濡其首為狐濡其首便不必作狐矣觀傳可見既濟之上六濡其首為水未濟之上九濡其首為酒便不必作水矣觀象𫝊可見若之何其以例論哉謹按易之分上下經也諸家說者不一然皆有所牽强安排未能自然而然故于心不大脗合竊意易者言道之書也一隂一陽之謂道故經之有上下也陽隂之謂也上經屬陽故首乾之純陽而坤之純隂從之合兩卦之爻六陽六隂陽統隂也所言者天道故乾坤交而六子不交夫乾坤交則萬物化生矣然泰否而後陽之盛者漸趨于衰雖將終而大者過猶燈之將滅而乍明也自是而坎離則陽陷而隂生于中矣下經屬隂故首咸而次恒皆三隂居外而三陽中處焉合兩卦之爻亦六隂六陽隂包陽也所言者人事故六子皆交夫六子交而萬事畢舉矣然損益而後隂之極者亦將漸反雖將終而小者亦過猶之上經大過之意也自是而既濟未濟則隂退而陽生于中矣隂陽相生如環无端此上下經之大較也若夫取六十四卦合觀之則乾天坤地餘卦皆包括于其中而坎為中男最貴用事故乾坤而後屯蒙則坎上坎下帥震艮而圖業既濟未濟亦坎上坎下交離火以成功所謂能始之能終之嫡子而承祧者也讀易者不可不知也易酌卷十
