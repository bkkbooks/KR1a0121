body:
  text: 易酌卷十二祁州刁包撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣此章首言象爻變動而下則統歸之于動動又統歸之于正蓋易之為書無非教人以正動也然非聖人之德得聖人之位不能合德天地大居正以善天下之動也故末以聖人結之本義云成列如乾一兑二離三震四巽五坎六艮七坤八之類語録又云舉橫圗以該圓圗也故云之類象謂卦之形體只就六子説訂詁云如説卦所列乾為天又為首又為馬之類是亦有理八卦以三畫言因其三畫而各加三畫于其上則為六畫之卦凡卦六十有四凡爻三百八十有四一爻各具一義也蒙引云八卦成列時只可謂之三畫不可謂之三爻必有六爻後分卦之上下體而言才可言上三爻下三爻也剛柔相推變在其中矣繫辭焉而命之動在其中矣以氣言曰隂陽以體言曰剛柔剛柔相推剛推柔柔推剛也蒙引發明往來交錯之義曰剛推柔則柔來而剛往柔推剛則剛來而柔往是作推出之推余意推者推而去也剛推柔則剛來而柔往柔推剛則柔來而剛往二義固自不同蒙引本朱子變只就卦爻上説不指卜筮説若作卜筮之變則下文所謂動者也誠是聖人于逐卦逐爻之下各繫之辭以命告其吉凶吉者宜動而趨凶者宜動而避其理具載于此也訂詁與余正合本義則指占者所值當之爻象説如二爻變則占者以上爻為主而此上一爻乃其動者也如五爻變一爻不變則占者又以不變之爻為主而此一不變之爻乃其動者也其説詳見啓蒙不可不知吉凶悔吝者生乎動者也吉凶悔吝生乎動向來只作事為説言以善惡為吉凶也與訂詁合本義只就卦爻動説為是剛柔者立本者也變通者趣時者也一剛一柔各有定位言九六二體確不可易也故曰立本立本者植立其本根也自此而彼或剛變而通于柔或柔變而通于剛惟其時而已時宜剛則剛時宜柔則柔即孔子聖之時時春秋傳所謂輕重之權衡曲直之繩墨也吉凶者貞勝者也本義以貞為正而常又曰天下之事非吉則凶非凶則吉常相勝而不已也此説似未安余向來云吉凶倚伏秉正者勝貞者固守其正而不妄動也不妄動則吉者永吉凶者獲免于凶故曰貞勝者也近見韓注與訂詁俱如此説注云貞者正也一也夫有動則未免乎纍殉吉則未離乎凶盡會通之變而不纍于吉凶者其惟貞者乎老子云王侯得一以為天下貞萬變雖殊可以執一御也此説甚有理不知朱子何故置之訂詁云吉凶者悔吝之積也然必正者勝不正者負貞者固守以正而不妄動也一部易經皆利于正蓋以道義配禍福也故為聖人之書惟正則勝不論吉凶也術家獨言禍福不配以道義如此而詭遇獲禽則曰吉得正而斃則曰凶京房郭璞是也此説本引用先儒之言却亦甚當天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也道者天地日月之正理也天地常守正理故為物不二而為萬古所則效日月常守正理故容光必照而為萬古所瞻仰天地日月不外一正而况人乎是故天下之動惟有守正一條路罔二以二罔三以三者也豈能舍是而别為吉凶哉夫乾確然示人易矣夫坤隤然示人簡矣乾健故確然確然者不可易之謂也不可易則易矣坤順故隤然隤然者不自用之謂也不自用則簡矣爻也者效此者也象也者像此者也爻也者效易簡之理以交也象也者像易簡之理以示也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭爻象動乎蓍卦之內吉凶見乎蓍卦之外易而簡也定天下之吉凶成天下之亹亹者功莫峻焉業莫大焉于卦之變通見之聖人憂天下與來世之情勤以懇矣周以到矣于卦辭爻辭見之易而簡也以上反覆發揮爻象道理歸其功業于聖人下則就聖人而指其建功立業之實也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義天地以生生為大德而聖人則之聖人之德即天地之德也故不復言德而但言位聖人之在位與否天下視以為安危治亂故曰大寶蓋聖人不自寶而天下寶之也所謂崇髙莫大乎富貴也古本人作仁亦是然不如非衆罔與守邦之説為確看上句説位下句便説守位之人上句説人下句便説聚人之財上句説財下句便由理財而進之聖人之立言有序如此財者百貨總名人非財不聚得其心斯得民矣天地生財止有此數不在官則在民理財者處置停當使官民各得其分而不相侵則百物蕃庶衆多而天下得其養矣正辭作辨别是非亦是竊意有名正言順而一一歸諸大道之意上自朝廷誥令以迄經生之業里巷之歌莫不粹然一出于正則天下得其教矣故朱子曰教化便在裏面為非如不忠不孝不睦之類禁者以刑罰制馭之而外內使知懼也蒙引既疑正辭禁民為非不必俱從理財説而旋又力辨其是誤矣義字統承上三者説蓋因時致用與民宜之也此皆聖人所以生天下而布其大德者也功業豈有量哉右第一章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情此章厯舉古帝開天闢地之手未有出易卦之範圍者也伏羲因立庖厨教民饌食故曰包羲氏代天御極欲作易以前民用仰則觀象于天如日月星辰晝夜雷風之類俯則觀法于地如山林川澤之類蒙引云法專指南北髙深不可兼動植為犯下文鳥獸及物字誠是以其輕清上浮故曰象以其重濁下結故曰法觀羽毛齒革之屬各有文以章身與地之東西南北髙下原濕各有所宜此依正文解去本義引王昭素之説曰諸本地上多有天字近取諸身如四體百骸五性七情之類逺取諸物如飛潛動植大小美惡之類俯仰逺近所取不一然不過以驗隂陽消息兩端而已此語最盡于是括其理于八卦自下而上再倍而三八卦之上各加八卦該盡六十四卦凡知覺運動之靈呼吸闔闢之微莫不洞徹罔間以通神明之德旡微不入也凡紛賾錯雜之態變幻出沒之狀莫不舉似罔遺以類萬物之情無顯不出也蓋自六十四卦成而萬世制作不能外焉矣作結繩而為網罟以佃以漁蓋取諸離姑舉其大者言之庖犧其開之者也神農黃帝堯舜其承之者也民非食不生包犧氏曰彼鳥獸之肉可取而食也緝麻以為繩而大者網小者罟獵獸于山林以佃也取漁于川澤以漁也蓋取諸離云離麗也以一隂麗二陽之間如兩目相承而物麗其中也蓋發語辭朱子及諸家俱作疑辭訂詁云倣佛之辭其意正同大抵聖人從一卦中悟出一假道理遂做成天大事來豈是偶合的孔子作大象正是如此包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益肉食久必厭厭則食草木之實神農曰盍若粒食之為愈也于是制耒耜之器焉耜犂首也以木之鋭者為之故利用斫耒犂柄也以木之曲者為之故利用揉耒以耕之耨以耘之教民知稼穡之利而八口之家無飢而八方之民鼓腹天下之益有大于此者乎取其象上下皆木也取其德上入下動也取其名禆益宏多也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑禽魚椒粟民之食也網罟耒耜民之用也諸貨具矣然具此者或不能兼乎彼具彼者或不能兼乎此不足者無所資有餘者無所庸何利之有焉于是日中為市當萬物相見之時而為市市得其所也天下之民致之得其所天下之貨聚之得其所交易而退藏之得其所以各得其所一句承上文而總結之噬嗑以電雷成卦電之明有以助乎雷之震雷之動有以助乎電之光有交易之象焉故取其德則上明下動也取其名則噬市嗑合也取其義則物莫之間而頤得其養也神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤犧農之時知所以養之矣教則未也使無以通變於未窮則逸居而無教倦怠之習生矣黃帝堯舜不執前此之已然而開後此之未然鼓舞作興所以成天下之亹亹也且也過化存神使民日遷善而不知誰之為之者故曰宜宜者相安于神化之中也易之理于斯可見矣窮則變變者革故鼎新也變則通通者窮神知化也不變不通則有行不去時其能久乎通而後無弊旡弊而後能行逺也窮變通久天之道也體天之道荷天之休又何疑焉是以自天祐之吉無不利也然其所以窮變通久者于何知之于其垂衣裳而天下治者知之衣元而裳纁衣竒而裳偶所謂觀古人之象作會宗彛藻火粉米以五彩彰施于五色作服者是也文明之象既著而上下之辨截然使民知君臣父子尊卑貴賤之分凛凛乎其不可越也蓋取諸乾坤云取其名則天髙地下天尊地卑也取其象則天以雲漢為章地以山川為章也取其德則乾健而不息坤順而無為也蒙引云人但知數聖人之垂衣裳而不知垂衣裳所以興禮義也禮義由衣裳而興學者當自會之甚矣聖人之神化也衣裳之化神矣哉至今外國有冠裳之制者便亦略有禮義之風易治之俗上國所以遇之者亦自為一等其餘則不然以是觀之益見聖人神化之妙衣裳功用之大此理不可不知也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙人文宣著逺邇嚮風矣不有以濟之阻隔何自而通乎于是刻木以虛其中而為舟削木以鋭其末而為楫舟楫通而涉河航海如平地焉致逺以利天下本義疑衍竊意有此句文義始完正無逺弗屆之意也渙以巽坎成卦巽木在坎水之上故取之彖曰利涉大川乘木有功即其解也謹按濟不通橫渡也致逺長涉也以利天下通承上文蓋合二句而舟楫之利始全何衍之有服牛乘馬引重致逺以利天下蓋取諸隨舟行而險阻攸賴陸行而跋涉可虞矣于是分别百獸猛而不可制者驅之柔而不可用者畜之其可以服而乘之者則牛馬也服者馴擾之意乘者駕御之意牛稱其力故曰引重馬稱其德故曰致逺下馳驅而上悅安隨之德也東西南北惟人是從隨之象也重門擊柝以待暴客蓋取諸豫水陸無阻往來自若姦宄不逞之徒因而生心焉重門以禦其外則無劫奪之憂擊柝以警其內則無竊發之虞暴客所以斂迹也豫則凡事豫則立之豫蓋杜釁于萌防患于早之意斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過斷木震象也掘地艮象也杵鋭其末而可以舂故曰上動臼空其中而足以容故曰下止小過之象也始也茹草木之實既而進之以菽粟既而進之以杵臼人欲何極日精以細聖人有憂之故以小過見意焉然則澤被生民不敢為天下居功而早為天下分過聖人之用心固如是也弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽能守而不能戰所以待暴客者有遺算矣故門柝之外仍以弧矢待之足食而不足兵所以濟萬民者無完䇿矣故杵臼之後復以弧矢濟之國家長技赫赫之聲濯濯之靈胥是出焉其德威之畏乎大同之世利用禮樂乖睽之人利用征伐猶天道有春夏不可無秋冬也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯前數者所以衛天下之生者至矣乃上者為巢下者為營窟風雨之來能無飄搖濡濕之患乎後世聖人易之以宫室髙堂廣厦窮簷茅屋之制興焉有棟以承載其上屋脊也有宇以覆冒其下屋襜也風雨攸除取之此而已矣大壯者規模宏濶基圖鞏固之意如人之元氣大壯則疾病不能入人之宫室大壯則風雨不能侵其義一也古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過養其生而無以送其死遺憾多矣古之葬者雖云厚乎然被之以薪無衣衾之美葬之中野無窆兆之儀不封不樹無望祭之所喪期無數無躃踊之節聖人固以為不及也于是易之以棺槨而封樹之禮喪期之數在其中矣事死如事生棺槨其死者之宫室乎昊天罔極之恩難報仁人孝子之心無窮故極致其窮而不留餘地以待後人大過之義也上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬上古民淳俗朴不文而明不約而信故結繩足以為治後世風氣日開欺詐日生故聖人易之以書契徐氏曰書文字也契合約也言有不能記者書識之事有不能信者契驗之取明決之義此百官所以無曠職萬民所以無遁情也書稱唐虞稽古建官惟百百官所以察萬民者也百官治則萬民察矣夬者君子決小人之卦也書契之造正所以決去小人之偽而防其欺也前面許多物事末以書契統結之此其所以為制治之源也與由十三卦推之古今制作其不能踰乎六十四卦也審矣右第二章是故易者象也象也者像也此承上章制器尚象之事而言也聖人作易都是畫個模樣出來易者象也象也者肖似而形容之像此者也彖者材也有象則有材彖者斷象之材者也爻也者效天下之動者也有象則有動爻也者效象之動者也是故吉凶生而悔吝著也材有剛柔動有善惡故象有吉凶吉凶之生悔吝所由著也改過則吉吉生而悔著也文過則凶凶生而吝著也然則易豈能吉凶人哉吉凶固所自取耳觀象玩辭者常以悔而吉不以吝而凶則幾矣右第三章陽卦多隂隂卦多陽此章専明陽卦隂卦之義以扶陽而抑隂也震坎艮陽卦也陽卦宜多陽矣然皆一陽二隂則隂多于陽巽離兌隂卦也隂卦宜多隂矣然皆一隂二陽則陽多于隂其故何也陽卦奇隂卦偶此何以故陽卦陽一隂二以其得乾卦之奇爻也奇為主故多隂隂卦隂一陽二以其得坤卦之偶爻也偶為主故多陽奇偶以言乎其主者耳謹按陽卦奇隂卦偶向來多取本義凡陽卦皆五畫凡隂卦皆四畫之説其實非也何也八卦之設也每三畫為一卦故陽畫奇一畫為一爻隂畫偶二畫止為一爻重而為六十四卦共得三百八十四爻若如五畫四畫之説則宜為五百七十六爻矣且下文亦宜曰一君而四民二君而二民矣烏乎可蓋陽卦奇者陽卦以奇為上也隂卦偶者隂卦以偶為主也如此則與下文亦相應矣故更正之其德行何也陽一君而二民君子之道也隂二君而一民小人之道也有數則有理故又轉而問其德行陽有陽之德行隂有隂之德行陽為君君尊也隂為民民卑也一陽為主而羣隂附之是以尊制卑則得其所以為德行矣故曰君子之道也一隂為主而羣陽附之是以卑制尊則失其所以為德行矣故曰小人之道也天無二日民無二王理固如此豈惟君若民哉以父子言之父陽而子隂一父二子則可一子二父則不可以夫婦言之夫陽而婦隂一夫二婦則可一婦二夫則不可無他陽可以統隂隂不可以統陽故也豫蓋因是而有感焉伯夷叔齊一君而二民也君子之道也范質王溥二君而一民也小人之道也低回古今能不三嘆右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮聖賢道理須是活看如慎思之思之弗得弗措也學而不思則罔吾嘗終日不食終夜不寢以思君子有九思周公思兼三王仰而思之安而后能慮慮而后能得思慮如何廢的至此一則曰天下何思何慮再則曰天下何思何慮蓋承咸九四憧憧往來之思而言也思者心之懸想凝注也慮者心之經營籌度也或以思屬心慮屬事非是天下只是一個感應一感一應都有自然一定之理亦奚以計較安排為哉蓋理本不異雖千蹊萬徑不害其為同也理本不二雖千思萬想不失其為一也不曰殊途而同歸百慮而一致必曰同歸而殊途一致而百慮者言塗雖殊原是同歸的殊塗慮雖百原是一致的百慮本義云理本無二而殊塗百慮莫非自然看他自不倒説自此至何以思慮為哉是解繫辭必思而從則所從者亦狹矣是解爻辭大抵何思何慮只是個因物付物非冥然寂滅之謂也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉試看日月往來循環不已日月何思何慮哉而明同歸而明一致焉生而不匱也寒暑往來流行不息寒暑何思何慮哉而嵗同歸而嵗一致焉成而不虧也日往則日屈而月信月往則月屈而日信寒往則寒屈而暑信暑往則暑屈而寒信往來屈信何思何慮哉而明生嵗成之利同歸一致焉生成而不易也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也試以物理言之尺蠖能屈而後能信屈者信之地也龍蛇能蟄而後能存蟄者存身之本也物理屈信相感之利如此也試以聖學言之精義者毫芒析理潛其心于靈妙不測之天屈而入也乃所以出而致其泛應曲當之用其屈也兹其所以為信也與利用者張弛合宜置其身于優遊自得之天信而出也乃所以入而崇其日新月盛之德其信也兹其所以為屈也與聖學屈信相感之利如此也蘇子瞻云精義窮理也入神盡性以至于命也窮理盡性以至于命豈徒然哉將以致用也此解甚好竊意精義入神屬已致用則及人矣橫渠所謂事豫吾內求利吾外也利用屬人蓋利人不利己而後其身乃安也安身崇德則成已矣橫渠所謂素利吾外致養吾內也故本義云內外交相養互相發也過此以往未之或知也窮神知化德之盛也過此以往信手拈來頭頭是道有不知其然而然者所謂從心所欲不踰矩也窮神知化本義引橫渠之言曰推行有漸為化合一不測為神無容復贅蓋窮神即至誠如神知化即知天地之化育所謂與造化吻合無間也合精義利用未或知三假統而歸窮神知化合窮神知化統而歸諸德之盛盛視崇有加崇以言乎其積纍也盛以言乎其充裕也與日月同明與寒暑同運與尺蠖龍蛇同屈信無思而無乎不思無慮而無乎不慮又奚以計較安排為哉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪困六三隂柔不中正承九四之剛強有石之象石堅不可動者也而乃力勝之非所困而困也故名必辱下承九二之剛強有蒺藜之象蒺藜險不可即者也而乃身依之非所據而據也故身必危辱且危皆自取也自作孽不可活故聖人危言以悚之也或以妻為上六言正應終不得應也亦通易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也有其器而無其人與無器同有其人而無其器與無人同有其器有其人矣而又藏器于身自珍也待時而動應天也自古舉大事者動多阻礙是以鮮有成功成器而動者不然是故解之上六蓋如取諸寄矣子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屢校滅趾無咎此之謂也孟子曰人不可以無恥周子曰人之生大不幸無恥不恥不仁羞惡之心亡矣必有違天逆理之事不畏不義忌憚之意泯矣必有敗名喪檢之行不見利不勸須是要占便宜不威不懲須是要用刑罰小懲之使之知恥而知畏則大誡其不仁不義之行將轉禍而為福矣周公之辭其懲之乎孔子之辭其勸之乎玩噬嗑初九之義則知聖人之愛小人也不殊乎其愛君子矣善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶積善者求不愧屋漏足矣曷言乎成名也子曰君子去仁惡乎成名又曰君子疾沒世而名不稱焉過情之名君子所不居也賔實之名君子所不避也善不積不足以成名焉為一得自矜片長自滿者更進一步矣從來積惡者只是緣身起見耳然愛身者實所以滅身也説到滅身處彼昵形骸戀性命者能無惶懼不寧之意乎以成名誘積善者以滅身惕積惡者聖人勸懲之意深矣凡善與惡莫不積微成著積小成大小人之不積善而積惡也豈其始遂甘居下流使天下之惡皆歸乎彼其視小善以為不足以成吾名也未免悠忽放過視小惡以為不足以滅吾身也未免隱忍恕過豈知不為小善便是惡不去小惡便是大萌葉不翦遂成尋丈涓滴不塞遂成江河是以罪大惡極身罹憲網雖欲改絃易轍其道無由玩噬嗑上六之義悔之于終曷若慎之于始哉子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑危也亡也亂也凶之道也安也存也治也吉之道也至吉却從至凶得來天下事有相反實以相成者此類是也君子知危之安其位也敢以安忘危乎知亡之保其存也敢以存忘亡乎知亂之有其治也敢以治忘亂乎堯舜之咨警湯之栗栗危懼文之翼翼臨保武之在在針銘用是道也安身而保其家國豈幸致哉否之九五可謂久安長治之良策矣子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也德薄位尊如鄭綮作宰相之類知小謀大如張浚恢復中原之類力小任重如趙括將兵四十萬之類福過其分用違其才折足覆餗之凶其能免乎玩鼎之九四受事者其亦度德量力幸毋以人國僥幸也哉子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望朱子曰恭與諂相近和與瀆相近只爭些子便至于流也又曰上交易諂下交易瀆知幾者念頭才萌動便遏絶的去是謹獨意思説的極好至見幾而作須就梅福逢萌一流人説則幾字便有兩意知幾之幾是辨析于幾微之間而不過的意思然人情亦在其中故先之以上下之交見幾之幾是看破人情世故的意思而當身亦在其中故繼之以介石之貞君子上交不諂下交不瀆其知幾乎是説守的定由于見的正介于石不終日貞吉是説見的正由于守的定兩者蓋交相成也知幾其神乎即入神窮神之神幾者動之微正周子所謂動而未形有無之問者也疏云此幾在吉之先豫前已見故曰吉之先見者也此直云吉而不云凶者凡豫前知幾皆向吉而背凶違凶而就吉無復有凶故特云吉也諸本或有凶字者其定本則無也此説與余意合本義引漢書吉之之間加凶字恐不必見幾而作不俟終日正吉之先見者也作則貞貞則吉將安俟乎俟則不免乎諂且瀆矣嘗見一等人審時度勢明明曉的不好只是濡忍不能斷此夏桂州所以有晴天不肯去只待雨淋頭之謡也介于石者不然楊誠齋云石至靜而無欲此語極好無欲則私邪無所惑所以見幾無欲則美好無所戀所以見幾而作又何濡滯淹留之有哉不諂不瀆是知幾受用處介于石却是知幾的根子此豫六二一爻子所以反覆其義而申言以信之也知微知彰知柔知剛伊川作兩件説晦菴作四件説都好余意以知微為主知微即知動之微也知微故知彰知柔知剛無所不知斯如神之哲而天下所儀刑而具瞻也故曰萬夫之望首贊知幾而歸之君子末贊君子而歸之知幾此皆聖人發明爻外之意非僅僅作注疏也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉本義云殆危也不如作虛字看如殆不可復之殆庶幾近意如本義作近道為是若作知幾之幾恐費解有不善有已而非禮者也凡在視聽言動之間者皆是發即覺覺即止所謂時時見天地之心也是故復之初九顔子當之不善不行視聖人之無不善有問矣必曰元吉者聖人不貴無過而貴改過也蒙引云誠者天之道也無妄之謂也復則不妄矣不逺復之謂也猶未達一間也説的好天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也天地一大男女絪緼者氣之交也氣交而其化醲以厚萬物化醇也男女一小天地構精者形之交也形交而其化繁以衍萬物化生也三人損一則兩一人得友則兩張子所謂兩則化也天地男女之象也致一猶言専一也絪緼構精之理也一隂一陽之謂道又于損六三見之子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶動者身之表也凡事向妥當處做則不險凡路向平穩處走則不蹶動之恆也語者心之聲也其心平易則語無詖僻其心顯易則語無晦昧其心和易樂易則語無乖忤躁率語之恆也求者交之道也許之以意氣則豪傑之交定盟之以道義則聖賢之交定交之恆也若夫不安而危則傾險之習民將避之其誰親我不易而懼則變幻之口民將憎之其誰和我交不定而求于人則勢利之行民將拒之其誰許我人情不相得則必見尤舟中皆敵國何以禦之益之上九可為立心勿恆者之明鑒矣項氏曰上不與黨與之與下不與取與之與正宜如此分别右第五章子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德此章言乾坤為易之門而易又民之門所以濟其行也朱子云乾坤便是易門只就闔闢説極是竊意乾坤之理易由此出學易者由此入故曰門如此説更顯乾坤只是隂陽隂陽只是物以其形而下者言也若夫以形而上者言之則曰德隂陽合德而剛柔形見故曰體剛則陽之體柔則隂之體也雷風山澤水火造化之迹皆天地之撰也而實易之撰本義曰撰事也體者統而備之也動順髙下燥濕造化之性皆神明之德也而實易之德通者洞而徹之也其稱名也雜而不越於稽其類其衰世之意邪卦之所以得名者雖乾坤六子之變錯綜雜陳而皆有秩然不忒之次第詳考世類蓋有衰世之意行乎其間矣情偽日滋變詐百出其防之也周故其形之也盡夫亦不得已焉耳本義云衰世指文王與紂之時夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣聖人上觀千世下觀千世豈有不彰之往不察之來哉往者事之已然也如隂陽消息之類易皆著而明之來者事之未然也如吉凶悔吝之類易皆前而知之上繫曰藏往此曰彰往藏以言乎其藴彰以言乎其形也上繫曰知來此曰察來知以言乎其體察以言乎其用也其象曉然可見不亦顯乎而必究其源本微顯也其理杳乎無朕不亦幽乎而必示諸現前闡幽也開拓也言推廣其意也本意云而微顯恐當作微顯而極是又云開而之而亦疑有誤信然君臣上下之分莫不定其位置當名也禽獸草木之屬莫不析其意義辨物也是非歸于大道正言也吉凶確有定案斷辭也天下古今事物莫不兼該具舉則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報或以事名或以物名其稱小配乎天地合乎隂陽其取類大寓意無窮其旨逺立言有章其辭文其言周折宛轉而合于中不可以躁心嘗也其事宏博浩大而藏于隱不可以淺見窺也民無所據則疑疑則徘徊岐路而不能自析其何以行之哉聖人為之指示而接引之本其得失以定其吉凶明其報以正其感也吳臨川云自夫易以下至此專論文王彖辭而不及爻辭竊意彖辭爻辭合説為是右第六章易之興也其於中古乎作易者其有憂患乎朱子曰三陳九卦初無他意只是偶然看得這幾卦有這個道理所以就這裏説去若更添一卦也不妨更不説一卦也不妨後世拘于象數之學者以為九陽數聖人之舉九卦蓋合此數也尤泥而不通觀聖人之經正不當如此若以困為處憂患底卦則屯蹇非處患而何又曰今之談經者往往有四者之病本卑也而亢之使髙本淺也而鑿之使深本近也而推之使逺本明也而必至于晦此等議論學經者不可不知然據胡雲峯之説推之九卦上下前後對待恰好直是一針不雜又似非偶然者宜詳之伏羲之畫無文字可考只是占卜之書自文王彖卦辭以反身修德之道而易書始著明而興起故曰易之興也其于中古乎子曰仁者不憂孟子曰君子有終身之憂無一朝之患此却言作易者其有憂患程子曰用處各别是也大抵憂患之心自內出者不可有自外來者不能無作易者蓋不徒為一身之憂患計而為天下來世之憂患計也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也訂詁云九卦雖云處憂患其實聖學莫備于此德者行道而有得于身也入道者先從復禮始禮聖人之成法卑如地者也人之欲無窮不範之以禮則萬過所由叢故履為德基基者積纍之所始如築上下址也然心不自下雖勉而由禮弗終也故次之以謙滿招損謙受益故為德之柄柄者以此自持如言以謙為把柄也説的甚好蒙引云履所以為德之基者蓋人之修德必以力行實踐為先而所行之際必有箇上下尊卑親踈隆殺之禮文以為憑藉依據之地故張子教人以禮而入即此意也説的更明切又云繼以復禮之本者凡人之修德必先有以制其外然後有以養其中故必先以履與謙謙者修飾把持于其外然後善端可得而復于內不然外之不恪內亦隨亡矣此論本伊川四針來可為陸王藥石訂詁云至于復而學始有根底還得其本心矣猶不能保其長存而不失也故次之以恆恆者守其變而常且久也至于恆而根底乃堅固心始不動矣德既固矣焉用損或以欲牽或以見溷皆蝕吾德者也不減損則其所執為德者竟非德矣本無者日損而德始修治故曰損德之修也德既修矣然以粹白自足而不務深造無乃猶有遺德遷善改過則本有之道心日長故曰益德之裕也居常履順而懷德易耳不從困中過如金不經鍛鍊不可為鏌鎁木不經椎鑿不可成宫室必困而德始辨焉遭非常之變而所造因以日積日徹故曰辨非自他人觀之也此一句乃三陳九卦之本旨説的甚好使處困者讀之躍然蒙引獨本朱義困以自驗其力一句作周于德者邪世不能亂意説曰困而亨可以驗吾學力之已至困而不亨可以驗吾學力之未至若困窮動他不得則無喪無得常永貞固所謂可以立矣然後能巽順于理而用權以制事變也固自有理訂詁之説又異是曰至是而德可以濟天下矣必親為之日亦不足是故居至靜以待天下之動若井之在地而往來井井靜而不勞施而不匱可也故曰井德之地也天下之事無窮載籍有所不備父師有所不傳當機審宜問不容髮非天下之最善制者孰能定而非最精心以巽順于理者孰能制故以巽為德之制終焉説的尤有曲折此初陳九卦之德也履和而至謙尊而光復小而辨于物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履禮也禮之用和為貴和則疑于平易非其至者然皆臻乎天理之極至故曰和而至謙退處而其道則尊謙晦處而其道則光敬人者人恆敬之也復一陽生于五隂之下其端甚微然不為羣隂所淆亂一點靈光無物不照小而辨于物也閲厯久極天下之賾賾則雜雜則人或厭之恆處雜揉之中而不失其常何厭之有私欲淨盡而後天理見然私欲豈能猝除勉強艱苦甚矣久之天理盎溢人欲廓清則易易耳以至治人理物莫不皆然充長寬裕即日新月盛之意然順其自然如天施地生豈有所安排造作為哉故不設困者窮于身不窮于心窮于世不窮于道故通改邑不改井居其所也然隨取隨足推陳易新故曰遷稱者衡量比擬務期至當宜有形迹之可見矣然渾然不露形迹故曰巽稱而隱此次陳九卦之才也履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權履所以行也行合乎禮則無所乖拂故曰以和行此就律身言禮所以鳴謙也謙者卑以自牧動中天則故曰以制禮復者于人所不知而已所獨知之地自見天地之心故曰以自知德二三則不恆矣恆者內外不二始終不二故曰以一德懲忿窒欲則不至于忘親而溺利故逺害改過遷善則必至崇德而廣業故興利蒙引云益則日進于髙明希賢而希聖矣何利如之未必是立言之意説的却好困者易于招怨惟責已而不責人故怨是用希本義少所怨尤似就不怨天不尤人説井以辨義故是是非非皆有以裁酌而歸于至當所謂定生慧也巽者優柔婉曲而變化生焉可與權矣權者八卦所以成其終聖人所以大其用也文王免于羑里其巽以行權乎狄梁公之于武后庶幾近之九以字如大象之以合其德與才而見諸本領也此三陳九卦之用也以處憂患裕如已右第七章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適此章言易之道與學易之方待其人而後行也易之為書也不可逺為道也屢遷二句是主腦自變動不居至惟變所適明為道也屢遷一句自其出入以度至如臨父母明為書也不可逺一句下則言易雖不可為典要學易者則有典常顧其人何如耳不可逺焦氏就子臣弟友視聽言動説亦好然不逺也非不可逺也尋常日用無非易者不可逺只作須臾不可離之意為是道無定位故曰屢遷變動不居即屢遷之意隂陽流行于爻之六位故曰周流六虛不曰六位而曰六虛所謂體該本無也上爻倐而在下下爻倐而在上上下無常也剛爻易而為柔柔爻易而為剛剛柔相易也不執定局子故曰不可為典要惟其畫之變而趨之正見其不可為典要也其出入以度外內使知懼然易之用雖變而其體則常有度焉凡出入者必以之言進退往來皆當以易為法則也出而在外或在官或在旅入而在內或在家或在室皆使知懼焉懼其不以度也又明于憂患與故無有師保如臨父母易中凡凶咎危厲等處莫不一一剖破是明于憂患也而必言其所以致此之由是明于憂患與故也雖無師以教之無保以輔之如臨父母若生我鞠我之在前尊而且親匪但師保也愛敬之至懼之至也易之書可逺也父母可逺乎初率其辭而揆其方既有典常茍非其人道不虛行其初也率其卦辭爻辭之指率者步步踐履之意揆而度其方之所向如震東兌西離南坎北之類揆者斤斤稱量之意其既也辭不率而意自達方不揆而道自中從心所欲不踰矩矣故曰有典常初字既字正須著解茍非神明默成之人率其辭以度其理而見諸行事雖有典常其能自逹于事為之問乎逺其書所以逺其道也道不虛行即人能𢎞道非道𢎞人之意右第八章易之為書也原始要終以為質也六爻相雜唯其時物也此章詳明六爻成卦之象使學易者一一尋而味之也原始謂初推卦之緣由也要終謂上定卦之指歸也合始終而乃成一卦之體故曰以為質也六爻錯綜相間故曰雜隨其六位之時以為隂陽二物之變聖人何容心哉其初難知其上易知本末也初辭擬之卒成之終初爻本也質未成故難知上爻末也質已定故易知初難知其辭尚在擬議之間卒易知始終本末統具諸此惟有成其終而已若夫雜物撰德辨是與非則非其中爻不備中爻謂二三四五中間四爻也四爻之隂陽雜而互之又成兩卦如坤坎為師而六五之爻曰長子帥師以正應九二而言蓋指二至四為震也坤艮為謙而初六之爻曰用涉大川蓋自二而上則六二九三六四為坎也此互體之説見于左傳漢儒多用之朱子亦云不可廢物如雷風水火之類德如健順動止之類雜者交互之意撰如撰文之撰謂德之見于制作者也不曰辨吉與凶而曰辨是與非是非固所以吉凶也既考正卦之體又詳互卦之體然後卦之辨完全周到而無復虧欠矣噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣噫歎美辭承上文言辨之也備則存亡吉凶瞭然如指諸掌矣居可知言不煩經營而安然坐照也卦之大用散于六爻卦之全體則統于一卦不必逐爻研審但觀文王卦下之辭而已得其十之五六矣此可為知者道也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也隂有隂之功二與四同也而逺近之位則異其善不同言不同善也二多譽則善四多懼則不善四之多懼以其近也二之多譽豈以其逺耶逺則情有不逹力有不伸何利之有然柔之道不利逺而二之柔則利逺其所以多譽而無咎者則以其用中故耳三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶陽有陽之功三與五同也而貴賤之位則異三以賤而位下體之上則有逼上之嫌故多凶五以貴而位上體之中則得居上之體故多功貴賤之差等固如是也焦氏云柔危剛勝或指五言或指三言或兼言之皆有未通然其説似亦無加于三者竊意聖人言語要看得活其即論語其然之其曰其曰耶蓋疑而嘆其不然使學者會于言外也三之所以危而多凶者其以柔耶剛故也五之所以勝而多功者其以剛耶中故也危不以柔勝不以剛中而已矣貴者中賤者不中何􅏜乎多凶多功之異耶朱子云此章多不可曉且如此解去右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也訂詁云上章析論初上二五三四此章統六爻言之而以爻畫之序三分焉亦易書中一義也又云廣大者體統渾淪也悉備者條理詳密也即蒙引統言析言之義説的好自三畫言之上一畫為天中一畫為人下一畫為地自六畫言之上二畫為天中二畫為人下二畫為地三才之道已在三畫內備了聖人又重之為六畫是兩三才也然畢竟只是三才之道合隂陽而乃成天道合仁義而乃成人道合剛柔而乃成地道也説文一手持二秉為兼才者能也天能覆地能載人能參天地故曰才以上發明廣大悉備之義也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉朱子曰道有變動不是指那隂陽老少之説是説卦中變動如乾卦六畫初潛二見三惕四躍這個便是有變動所以謂之爻爻者交變之義也爻或上或下或貴或賤或逺或近各有差等不可亂也故謂之物物即隂陽二物也物錯綜成象經緯成章斐然可觀故曰文文謂玄黃相間也本義云不當謂爻不當位非專指陽居隂位隂居陽位也文當于理雖不當位亦吉文不當于理雖當位亦凶所謂文不當者言不盡當于理也故有吉有凶惟所趨避何如耳胡雲峯云前章始以質言此章末以文言卦必舉始終而成體故曰質爻必雜剛柔以為用故曰文説的好右第十章易之興也其當殷之末世周之盛德耶當文王與紂之事耶是故其辭危此章原易所由興而以危字括之原學易者所由無咎而以懼字括之正聖人傳心要訣也凡事須親經歷過才説的痛切文王之易是已非殷之末世不足以見周之盛德非周之盛德不可以處殷之末世此千載竒遇而當年危心要道則畢寓之易也孔子周之臣而殷後也斥紂之名而不諱稱文之號而不抑其仁者之好惡而春秋之筆法乎此説本誠齋楊氏而進之蓋可以當末世則當平世不待言矣可以事紂則事人不待言矣文王因已之憂患而思來世之憂患其懼之也深故其言之也危或云辭即彖辭爻辭皆文王所作若文王止作彖辭則彖辭未見所謂危者惟爻辭則多有之謂爻辭非文王所作可乎此頗有理姑存之危者使平易者使傾本義云危懼故得平安慢易則必傾覆二語甚精平也傾也是孰使之哉危者易者使之也訂詁云使者天理之自然若或使之也柴氏所謂殖有禮覆昏暴天之道即易之道也都説的好其道甚大百物不廢古今不能外此理故曰其道甚大逺取諸物近取諸身凡古今所有之物皆易所有故曰百物不廢向來都如此説極是蒙引獨以物為事緊承上二句來言危必平易必傾凡事不能外此道也訂詁又詳之曰近而語默動靜之得失逺而天下國家之興亡靡不由此應若景響無能違者如此説尤有理不可不知懼以終始懼其終而猶夫始乾乾惕若之道也危而罔易平而如傾若臨深若履薄若蹈虎尾蓋未敢瞬息即安也所謂因其辭之危而承以心之懼也蒙引云懼易懼之也其辭危故為懼以終始使人始終一懼而不敢有慢易之心也此説亦好其要無咎此之謂易之道也其要無咎要字朱子兼存二説或作去聲則為要約或作平聲則為要歸二説俱通只期無咎不求有譽文王之心而易之道也古今極難極苦局子都被聖人做過其道俱在後世處憂患而束手莫措者不知易故耳右第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻上繫之首章以易簡終下繫之末章以易簡始上繫之末章以德行終下繫之末章以德行始前後正相關通知險知阻正所謂危且懼也上則反覆乎易之情而推之于人下則究極乎人之情而決之于辭知人知言一以貫之皆學易之能事也説乾説坤都就聖人而有乾坤之德者説故蒙引云天下至健天下至順與天下至聖天下至誠相似本義至健則所行無難故易至順則所行不煩故簡二語極確又下轉語云然其于事皆有以知其難而不敢易以處之也然后補出憂患來健而知險則以自髙臨下擬之順而知阻則以自下趨上擬之最為切當又云雖易而能知險則不陷于險矣既簡而又知阻則不困于阻矣所以能危能懼而無易者之傾也補此一段其義始完蒙引又從雖字既字看出朱子用字之精云雖易而能知險是轉摺語既簡而又知阻是直承語極有深心余意二句一律説亦不妨蓋易與簡相反簡亦與阻相反也能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者知險阻必不向險阻地上走知險阻須籌算處險阻的道理所以能説諸心所謂理與心會也所以能研諸慮所謂事因慮審也理與心會合理便是不合理便非判斷出是非來故能定天下之吉凶事因慮審凡事研磨到精細處做出許大事業來故能成天下之亹亹皆乾坤之德行也本義四句俱分陽分隂向嘗疑之仔細看來固是如云開物是陽成務是隂致知是陽力行是隂説諸心定吉凶是開物事屬陽研諸慮成亹亹是成務事屬隂就中各有輕清重濁意此從周子通書推出亦從張乖崖事之未定者屬陽事之已定者屬隂推出説的極精密是故變化云為吉事有祥象事知器占事知來在天道則為變化在人事則為云為云謂所言也為謂所行也吉事有祥即見于變化云為之間也蒙引云此祥字不可兼休咎為上有吉字極是又云獨言吉事有祥則凶事可知矣意謂以此例彼也訂詁獨謂事與吉逢者其先必有祥兆天人相感志一之動也聖人作易正以迪人于吉故獨以吉事言之與吉之先見同義説的却好象事知器其事理之已定者也根變化云為説占事知來其事應之未然者也根吉事有祥説本義貼合自是天地設位聖人成能人謀鬼謀百姓與能天位乎上地位乎下徹上徹下之理天地不能以告人也聖人作易以成之功奪造化矣明謀之人商略其得失也聖人之察諸人情也幽謀之鬼卜筮其吉凶也聖人之合謀天理也知器知來聖人獨擅其能矣易既作則雖日用不知之百姓亦得分聖人之能以為能故曰與也天地之能聖人成之百姓之能聖人與之作易之功大矣哉八卦以象告爻彖以情言剛柔雜居而吉凶可見矣八卦成列象在其中使人默會于言意之表也此先天之易也爻也者效其象而為之辭者也彖也者斷其象而為之辭者也象顯而情隱繫之辭焉則情顯于象矣從象之正切懇至處言之故曰以情言也此後天之易也一卦之中或剛多而柔少或柔多而剛少雜居而得失分則吉凶見矣周子云剛善剛惡柔亦如之此吉凶所由分也此二句承八卦以象告句推而言之也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝易道變動言開物成務之利所以歆之勸之也情即下面相攻相取相感之類其情吉則辭遷而吉其情凶則辭遷而凶吉凶無定在也此二句承爻彖以情言句推而言之也是故以下又就吉凶以情遷句推而言之攻非攻伐之攻攻治之攻也愛相攻而吉生惡相攻而凶生或逺與逺相取或近與近相取或逺與近相取或近與逺相取取之不當而悔吝生情相感而利生偽相感而害生此三句概言六爻之情也下又以易之情總括之吳氏云不相得謂惡相攻偽相感近不相取則愛相攻情相感近相取為相得矣不相得則凶害悔吝其相得則吉利悔亡無悔無咎矣夫子之已言者三其未言者三總之凡六條然此據近之比爻言爾若逺之應爻及主爻亦當各備六條總之為十八條矣此説本項氏可謂深得聖人立言之旨學易者欲知易之數不可不知易之理天下固無理外之數也欲知易之理不可不知易之情天下固無情外之理也此章曲盡易之情所以曲盡易之理也知此者豈獨知易哉即人之情與辭當不外是故下以六辭明之知其辭則得其情矣將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈項氏曰叛非叛逆但背實棄信皆是也有愧于心則有愧于言故曰其辭慚中能自信則其言有根據一致而同歸也惟恍惚莫定必兩可其説如枝葉之岐出然故曰其辭枝吉人安詳慎重之人也非禮勿言擬之而後言則其辭自然簡易要約而不煩故曰其辭寡躁人輕浮淺露之人也其中無所有而嘵嘵自謂有餘其中有所有而刺刺不能少待故曰其辭多揚善之言可望而知可述而志何遊之有惟志在誣陷善類或揚譽其長而隂摘其短或託言在彼而寓意在此遊移而莫可捉摸故曰其辭遊卓乎有守則理直者氣自壯而其辭乃沛然常伸矣失其守者自家無所操執是以發于辭者撓屈而不能自伸也故曰其辭屈項氏吳王失國辭屈于晉夷之失對辭屈于孟子二譬極好因人以考其辭天下無匿辭矣因辭以察其情天下無遁情矣此一段又就易之情與辭推而言之也諸儒因本義卦爻之辭亦猶是一句強取經辭附合之非是蒙引云不可就易上取貼是也右第十二章易酌卷十二
