body:
  text: 易酌易類提要臣等謹案易酌十四卷國朝刁包撰包字蒙吉祁州人前明天啓辛邜舉人是書用注疏本以程傳本義為主雖亦偶言象數然皆陳摶李之才之學非漢以來相傳之法也原序稱陸隴其官靈壽時欲為刋板不果雍正初其孫顯祖又以已意附益之卷首凡例雜卦諸圖及卷中細字稱謹案者皆顯祖筆原序又稱此書為經學之津梁亦舉業之凖的考包在國初與諸儒往來講學其著書一本於義理惟以明道為主絶不為程試之計是書推闡易理亦大抵明白正大足以羽翼程朱於宋學之中實深有所得以為科舉之書則失包之本意多矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易酌原序易何昉乎自庖羲一畫始也而康莭教學者直遡諸未畫以前夫畫前之易生天生地生人者也舉天地不能出其範圍而易于是乎見矣學畫前之易即心見易學畫後之易即易見心故曰易心畫也由一畫而加之至三百八十有四交易變易妙有權衡故用酌或仰酌諸天或俯酌諸地或中酌諸人變化生心萬理具備聊以待夫神而明之者而未獲一遇也越數千載文王作于前周公繼于後一則酌羲之畫合而為彖有彖下之辭一則酌羲之畫分而為爻有爻下之辭讀其辭離竒奧衍非上智茫不得其解潔淨精微之教難言矣越數百載天縱孔子而假之年畫酌羲彖酌文爻酌周公用成十翼易由此為古今完書開五經之祖標四書之宗神靈呵護雖秦火不能焚也已嗣是而後言易者無慮數十家若焦延夀若京房若郭璞其表表者然皆相傳為卜筮之書以自神其術數云爾唯韓康伯之注王輔嗣之疏粗知義理惜其旁酌老莊未免影響支離揣摩其皮膚而無由洞見其腠理也潔淨精微之教難言矣越千四百載得伊川程子其人以周元公為師太極圖通書既有以酌其源流以明道為兄家庭間講習討論又有以酌其體用行年七十有三尚兾少進不輕以其書示人竭終身之力破除術數小技歸乎綱常名教洗滌注疏陋説徴乎日用行習原夲孔翼發揮之聖之藴以教天下來世于無窮一人而已雖然作者固難知者亦未易孔子而後唯伊川為能作是書唯考亭為能明是書本義翼程為二傳功臣正猶程傳翼孔為十翼功臣也讀者不察判然視為兩書可謂知言乎國家以制科取士考其始程之傳朱之本義蓋嘗並列學宫其既也厭慱而就約避難而趨易于是專主本義程傳不得而與焉業易者童而習之白首而不知為何書其所為舉業家言則又倣佛于不可知之象馳騖于無所用之辭程之奧旨宏綱棄置有如隔世朱之微言約義奉行又徒具文易所可見者畫焉耳易所可讀者辭焉耳若夫義理之存蓋寥寥也義理亡而簡編存天下豈復有易哉潔淨精微之教難言矣包也有憂之竊以為學易者學畫學彖學爻功夫固有次第使非肆力于孔子之翼以求作易者之心于憂患之中則羲之畫文之彖周公之爻懵如也學畫學彖學爻者學十翼功夫乃有著落使非肆力于程子之傳以求贊易者之心于韋編之外則孔子之翼懵如也夫是以矻矻窮年纂輯成書大都以孔子十翼為三聖之階梯以程子二傳為孔子之階梯或録其辭而表章之或述其志而推廣之而亦間以朱義補程傳所未備而亦間以諸儒及已意補程朱所未備總之酌朱以合于程酌程以合于孔酌孔以合于羲文周公統四聖二賢之易為一心之易內省吾心一易之注存也外觀吾身一易之發見也極而至于家于國于天下何莫非一易之洋溢也哉夫然後學畫後之易可學畫前之易亦無不可矣順治庚子孟夏吉伊祁用六居士刁包蒙吉氏序先生父鄉薦後屏除帖括業究心性命之學以著述為已任其學以四書五經為經以諸史綱目為緯以諸先儒名賢文集語録為之組絍而繅織慱洽淹貫四十餘年其時又有北平孫少宰北海先生蔚州魏司寇環極先生江南髙學憲彚旃先生書札往來反覆論辨雖千里不啻同堂又館徴君孫先生五公山人王先生于家質疑䉸難無間晨夕于是所著有四書翊注斯文正統用六集潛室劄記諸書業已前後刋行矣久貯篋中者尚有易酌一編是書也昔年稼書陸先生尹靈夀時謀付梓而不果子未孫先生課士保陽時謀付梓而又不果余向官上元坊人梓匠輻輳之所梨棗稱便焉而以囊羞宧拙蹉跎至今每念先君子終嵗編謄不遺餘力未嘗不耐然欲泚也夫制科取士周易定為首經豈非以其潔淨精微成於四大聖人之手故歟先是程傳朱義并列學宫今則祧程而宗朱矣返慱歸約就易去難非不至善但其有簡括非好學深思之士不能得其説於意言之貴也此酌之所由起也酌於程之傳酌於朱之義又酌於大全蒙引注疏暨諸先儒之説亦或問出已意以酌於至當總以發明四聖人之微言奧義俾不至影響於占筮支離於莊老而止故言理不遺乎數言數必歸於理引經據史凡一字一句莫不明白曉暢使學者洞若觀旨則經學之津梁亦舉業之凖的也家季紹武取而校讐之六年以來三卒業矣今又取而重訂之兼取周易折中暨諸講義之暢逹者附於簡末以備參考間有一得之見為羣書所未及者亦綴焉俟余公務餘暇每以疑義相商質見其用意刻苦夙夜不遑或亦兩先人在天之靈有以默牖其𠂻也歟今余又官江南未必非天假之緣也亟付剞劂以質海內雍正十年嵗次壬子正月上浣之吉孫男承祖步武氏識於姑蘇之臬署欽定四庫全書易酌卷首祁州刁包撰讀易法計十三則陳希夷曰伏羲畫卦不立文字使人觀其象而已按史制字自伏羲始則六十四卦之名已具矣文王觀其畫之吉凶而繫以辭如元亨利貞之類所謂彖也六爻之作班固揚雄皆以為文王筆焦氏宗之謂繫辭傳纍舉庖羲文王而不及周公此其證也但六爻中如王用享于岐山箕子之明夷皆文王後事則伊川晦菴諸公皆以為周公繫爻無疑耳爻者效其六畫之時位而為之辭者也孔子十翼上彖傳一下彖傳二上象傳三下象傳四上繫辭傳五下繫辭傳六文言傳七説卦傳八序卦傳九雜卦傳十皆所以翊助三聖也大象者合六畫而共為一象也小象者分六爻而各為一象也程傳主理本義主卜筮因秦焚書易以卜筮得不焚故也但本義于每爻之下輒云占者筮得此爻則宜云云恐一爻只作一事用朱子嘗謂程子不能盡其言者得無躬自蹈之乎竊意據理解釋俟占時隨人隨事而變通以取義焉斯學易之善者也學易者博以程傳約以本義亦可以弗畔矣夫程傳其至矣乎説易者固有深于程傳者矣或失則鑿固有淺于程傳者矣或失則支深而不鑿淺而不支舍本義其誰與歸陳惕龍曰朱子本義太淺略非也程傳深矣故本義以淺出之若又加深焉則涉于晦程傳詳矣故本義以略出之若又加詳焉則涉于煩淺以翼深略以翼詳正善用易者也伏羲之易畫也文王彖之彖者斷羲之畫也然而進乎畫之義矣文王之易彖也周公爻之爻者效文王之彖也然而進乎彖之義矣至孔子十翼所以翼畫也所以翼彖也所以翼爻也然而三聖之義于是乎始有著解處矣高子曰非孔子而吾烏知易之所語何語哉五經注于諸儒易注于孔子學易者明孔子之易而易明矣至哉言乎此周易孔義之所以作也余以程傳視孔義規模氣象固有大聖大賢之分要之程之義無一非孔之義也高子曰學易者明孔子之易而易明愚謂學易者明程子之義而孔義其庶乎庶乎孔義則庶乎可與言易矣朱子曰太極圖一圈便是一畫只是撒開了引教長一畫竊意伏羲一畫原是直的直則無回曲古若今萬物萬事都貫徹的去未有遺乎其外者也撒開了教長一畫便是圓的圓則無剩漏古若今萬物萬事都包括的來未有遺乎其內者也直的也是這一畫圎的也是這一畫非有兩畫也學易者明乎此庶乎可與言易矣此心凝聚處即是太極此凝聚之心無有形象依倚即無極無極而太極正于反觀內照得之易有太極心有太極也故高子曰天下有非易之心而無非心之易易有太極心有太極不見吾心之太極則無以見易也薛文清曰人之動靜語默寤寐皆易也嘗試反躬而求之一動一靜一語一默一寤一寐其對待之易乎所謂交易為體也動而靜靜而動語而默默而語寤而寐寐而寤循環無端其流行之易乎所謂變易為用也動靜必以禮語默必以義寤寐必以敬則太極之理真實在我而渾身于是乎見易矣高忠憲曰吾平生不以三公為榮而以潔淨二字為願然則願學先生者學先生之所願而已先生願潔淨二字豈非合心與身而為言乎心挂一絲則其心不潔不淨矣身染一塵則其身不潔不淨矣一絲不挂一塵不染所謂上天之載無聲無臭者舉在吾心身中夫然後可與言潔淨矣即潔淨即精微內觀吾心一易之祕藏也外觀吾身一易之流行也心也身也易也一而已矣此之謂真學易此之謂善學髙子渾身是性刻刻要復他滿目是易件件要用他不見易不可與言性不見性不可與言易故曰神而明之存乎其人興于書立于春秋成于易善言伏羲之易者莫如文王善言文王之易者莫如周公善言伏羲文王周公之易者莫如孔子善言孔子之易者莫如伊川善言伊川之易者莫如晦翁晦翁本義妙在程子所已言者只還他程傳備矣四字更不著解也其他則舉業之易淺陋而支離其他則儒流之易穿鑿而詭僻是奚足與之言易哉前有四聖後有兩賢易于是乎為完書雖有作者其弗可及也已凡例一朱子集諸儒之大成故當今功令周易以本義為主尊朱子也但朱子以聖人作易所以教人卜筮而開物成務之意故其言簡括而其説理不如程傳之詳又每有程傳備矣而不復著解者在博洽之士自能怡然以喻若未見程傳者不亦茫然而無所得乎是編酌於程朱之間反覆推𫾣以求至當又多録程傳全文蓋欲使學者展卷了然也一朱子之學本於程子而義之與傳多有異同者則以朱子主占程子主理其旨趣不同故也但程子所言之理皆修齊治平之道平易精實有補於學者身心故是編多所援引至于宋元諸儒或説經雖無全書而其言之精透易理可以發明傳義所未及者槩為收入以備覽焉一漢晉以來談易者無慮數十百家其淫於象數者既詭僻穿鑿不可為訓而掇拾緒餘者又粗淺鄙陋亦不足觀夫易之作原起於象數故羲之畫文之彖周公之爻孔子之翼皆本乎此今若一槩刪除毋乃逐盜而並從人之不留乎唯是勉強牽合者刪之除之或本卦所有或十翼所及者似未可槩以象數斥也互卦之説原於繫辭故是編間一及之一六十四卦每卦上下二體凡六爻其中盈虛消息之理進退存亡之道吉凶悔吝之機無不備焉學者不得于爻則求之辭不得于辭則求之象是故全經之文爛熟于胸中然後融會貫通溯流窮源見其一句一字莫不各有至理燦然流露得其意而神明之其於四聖人之精微思過半矣一解易者有其説絶不相同而不妨並存者蓋羲畫以後文王有文王之易周公有周公之易孔子有孔子之易其説不必盡同而其理無不大同也故無妄曰不利有攸往爻則曰往吉歸妹曰征凶無攸利傳則曰天地之大義是也然則本義其朱子之易乎程傳其程子之易乎大過上六一爻一謂殺身成仁之君子一謂行險僥幸之小人可謂不同之極致矣雖按之大象似乎朱子之理長然而不妨並存者非騎墻也蓋動于理而過者君子也如明之身罹璫禍諸人是已動于欲而過者小人也如明之南宫奪門諸人是已易不可為典要故也一邵子嘗謂畫前有易向固茫如也而今乃知未畫以前易在天地萬物既畫以後易在三百八十四爻既演既繫而後易又在彖爻十傳矣而其實無日不在天地萬物也試觀天地間上自朝廷下至里巷與夫人之一身日用飲食何所往而非易乎學者讀紙上之易而忘吾身之易與天地萬物之易非能學易者也唯即以紙上之易推而極之天地萬物之易近而驗之日用飲食之易融會貫通夫而後吾身之動靜語默無所往而非易可以無大過矣一易之為書也廣大悉備故苞藴宏深含蓄靡盡舉古今來世道人心上自朝廷下至街衢里巷愚夫婦至纎至褻之事皆總括於其中故逐卦逐爻求之無不得其髣佛者向嘗疑于暌之六三既云髠且劓矣斷者不可復屬何以有終乎每讀此爻輒凝思者踰晷説者紛紛於心未有當也偶焉平明背誦於心若有感者思維再四忽憶昔年所見其人其事並爾日情形按之此爻無不吻合如繪夫乃心曠神怡嘆易之精妙一至此也用敢筆於本條之下以質海內髙明且凡以鄙意附入者俱加謹按二字以别之一潔淨精微之教難言矣况以余之固陋又非專經謂敢輕一置喙哉獨是心慕是書六年以來心維口誦不啻數十百遍竊謂聖人韋編三絶以後既有彖傳象傳與繫辭矣而又説之又序之又雜之其故何哉且雜卦一篇正當易之結穴意聖人必有説以處此于是終日終夜思得其解幾廢寢食夫然後乃嘆聖人之教天下後世者何其深以摯也夫序卦者有序而不紊也始蓋懼人之躐等而無節也故教之以循序漸進雜卦者雖雜而不亂也終又懼人之執滯而不化也故教之以變化從心試取而讀之雖前三十卦後三十四卦合上下經之數而其中交互分合却有頭有尾段落分明故既詳注本講之後又為橫直二圗及考訂諸圗以附于末云諸圗附考按繫辭有云河出圗洛出書聖人則之是圗書者聖人作易之源頭也周時河圗與天球之屬藏于王府秦漢以後雖流傳人間然有象數而無文字儒流不知寶惜故見者猶少至于晉魏諸儒遂有謂龍負一片之圗龜負一卷之書者無惑乎後人之紛紜聚訟也不知未畫卦以前龍馬出于河其背之旋毛成文其數二七在前一六在後三八在左四九在右五十居中皆竒偶相配對待之形也神龜出于洛其背之甲坼成文其數戴九履一左三右七二四為肩六八為足中五為腹皆竒偶相間流行之意也聖人見而有契焉于是畫一竒以象陽畫一偶以象隂又加之而成四象又加之而成八卦又重之而成六十四卦皆天地自然之象與天地自然之理也以其旋毛之文有如星點故曰圗後世圗繪形象于是乎出焉以其甲坼之文有如字畫故曰書後世六書文字於是乎出焉按伏羲卦圗升乾降坤左順右逆規而圎之其卦畫之對待法象之配合皆自然而然陽畫多于上隂畫多于下故乾坤相對于南北坎離相對于東西兌震相對于東南東北艮巽相對于西南西北邵子曰乾坤定上下之位離坎列左右之門是也此造化之體也文王卦圗則因其定位之體以著其交易之用焉陽降而下隂升而上故震兊相對于東西離坎相對于南北巽艮相對于東南東北坤乾相對于西南西北邵子曰乾坤交而為泰坎離交而為既濟是也夫震兊始交者也故當朝夕之位坎離交之極者也故當子午之位艮巽不交而隂陽猶雜也故居用中之偏乾坤純陽純隂也故居不用之位此造化之用也淳安夏氏述何氏潛齋云圎圗見天地之順方圗見天地之逆天地之運不順不行天地之交不逆不生順而行所以生物逆而生所以自生也蓋謂循其數而數其已往是因其故迹故曰順凡推測以求其將來是迎于未形故曰逆易卦之畫皆推測而迎之于未形者所以為逆數也圎圗自乾一至震四自巽五至坤八皆自南而北自上而下為順方圗自乾一之八卦至坤八之八卦皆自北而南自下而上為逆畫卦亦然故曰易逆數也前村程先生曰邵子云先天之學心法也故圗皆從中起萬化萬事生于心也其詩曰天向一中分造化人于心上起經綸圎圗之從中起固不待言矣説卦之第四章正所以明方圗之從中起也雷以動之風以散之震巽恆益之生物也故其象最在內雨以潤之日以暄之坎離既濟未濟之長物也故次之艮以止之兌以説之山澤咸損之收物也故又次之乾以君之坤以藏之天地否泰之覆載包羅也故最在外也邵子曰有意象有言象有象象有數象數象者七日八月三年十年之類是也一數屬艮乾二數屬離兌三數屬坎震四數屬巽離五數屬乾六數屬巽七數屬震乾八數屬兌坤九數屬艮十數屬坤吳先生曰此以一數析為四分十數凡四十分均為八卦每卦占五分乾統三男占五陽數于左三女從坤占五隂數于右陽數中于五隂數中于六故在上陽數究于九隂數究于十故在下一附九合十數于左下四附六合十數于右上三與七合十數而左升二與八合十數而右降皆自然而然若以乾占天五正位于上坤占地十正位于下則雷風以氣附天山澤以形附地水火以質居于天地之間又父上母下三男三女各順其長幼之序列于左右法象尤著周易雜卦圗昔我孔子假年學易韋編三絶然後作為十翼以教天下後世而精神之所結聚意匠之所經營無法不備無義不該尤在雜卦一篇蓋舉修己治人之理內聖外王之學悉貫徹流露于字句之間其中首尾相應前後相通分合交互段落井然為萬古文章鼻祖學者熟讀而有得焉以之修己以之治人以之經理天下國家無所處而不當信乎周易為六經之祖而此篇乃其喫緊教人處也豫也管窺蠡測何敢謂為知易然而眇能視亦不廢其明也既以鄙見所及詳注本講之下又為橫直二圗于左以便省覽焉乾剛坤柔自坤至困唯坤自為一卦其餘皆兩卦為一卦凡十五卦為小段落後同乾為頭天無不包故也後八卦不反對者為尾比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著以上上經起首八卦震起也艮止也此兩卦與大過頤前後錯綜相對損益盛衰之始也自比卦至此凡十卦以下經兩卦為樞紐大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也上經四卦兌見而巽伏也此兩卦與離坎兩卦句法相對合晉以下凡下經六卦與後段錯綜相對隨無故也蠱則飭也剝爛也復反也上經四卦晉晝也明夷誅也井通而困相遇也下經四卦自乾坤至此凡三十卦合上經之數內有下經十二卦咸速也恆久也自咸至訟唯小過中孚離坎各為一卦其餘皆兩卦為一卦亦十五卦與前段同終之以夬夬亦變而為乾也渙離也節止也解緩也蹇難也暌外也家人內也以上下經起首八卦否泰反其類也自咸卦至此凡十卦以上經兩卦為樞紐大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也下經六卦離上而坎下也小畜寡也履不處也需不進也訟不親也上經六卦大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也自咸恆至此凡三十四卦合下經之數內有上經十二卦合而觀之乾坤首也大過以下尾也其中分合變化照應起伏率皆井然不紊學者詳之謹按雜卦一篇乃十翼之結穴實聖人全副精神所注大過以下八卦不反對是乃以分為合之法自本義以為未詳蔡氏以為宜改學者習而不察遂使聖人喫緊教人處二千年來如在塵霧夫言易者衆矣非鑿之使深則強之使合不知聖人作易以前民用不過本天地之理象隂陽動靜而為八卦內之外之縱之橫之順之逆之莫非變化推遷之用不假安排自然而然故文王之彖周公之爻亦皆無所安排天然吻合所謂伏羲有伏羲之易文王有文王之易周公有周公之易是也至我孔子假年學之實有所得于是作為十翼示後世以學易之凖則焉亦非有所安排也蓋懼人不知文王周公之易因以不知伏羲之易也于是有彖傳有象傳又懼人不知易之所由作與易之所由繫也于是有上繫十二章下繫十二章又懼人不知伏羲之卦圗與文王之卦圗皆本于象數之自然而非聖人之安排也于是又有説卦十二章若夫序卦者有序而不雜也學之始也蓋懼人之躐等而無節也雜卦者雖雜而有序也學之成也蓋懼人之執滯而不化也故雜卦一篇無法不備無義不該蓋篇中專言人事而亦首乾坤者則吉凶消長之理進退存亡之道無一不在天地間也自比卦以下凡八卦而以下經之損益為樞其中如憂樂求與皆人情之大凡也終之以困者謂剛掩也見陽之不可不扶也自咸卦以下亦八卦而以上經之否泰為樞其中如久速新故皆人事之大常也終之以夬者謂決柔也見隂之不可不抑也豫又分其中為二小段者非臆説也亦非安排也遵上經十八卦下經十八卦之説而分之也况乎上下兩經六十四卦中唯乾卦先經而後傳自為一例不與餘卦同蓋以其尊無對而天無所不包故也余又謂乾自為首者資始之乾健行不息之理也終之以夬者決柔之乾盡人合天之學也其中卦皆反對所謂以合為分也末後八卦不反對所謂以分為合也故此八卦可以結全經亦可以結此篇亦可自為一篇內外人已天德王道一以貫之學者熟味而有得焉當知其不誣也然則余雖不敢妄附于知易也而牽強穿鑿竊所不敢也已按三十六宫説者謂陽竒一宫隂偶二宫余意不然伏羲之畫卦也先畫一竒以象陽又畫一偶以象隂及其既成八卦也每卦三畫重而為六十四卦也每卦六爻合之共三百八十四爻且繫辭傳曰陽卦竒隂卦偶又曰陽一君而二民君子之道也隂二君而一民小人之道也若以為陽一隂二則是隂倍于陽而隂陽不能均矣不當曰三百八十四爻而曰五百七十六爻可也不當曰一君而二民二君而一民而曰一君而四民二君而二民可也蓋隂之二止抵陽之一故曰陽爻一百九十二隂爻一百九十二且乾與坤對則乾一坤八而成九震與巽對則震四巽五而成九坎與離對則坎六離三而成九艮與兊對則艮七兊二而成九凡四九三十六隂陽各十八而多寡亦均三十六宫或是之謂也髙明者辨之周易上下經分卦考義按上下篇義作于程子謂卦之分以隂陽陽盛者居上而卦之有乾者居上篇隂盛者居下而卦之有坤者居下篇乃考之上篇有乾者凡十一卦有坤者亦十一卦下篇有乾者四卦有坤者亦四卦且剝有坤又隂盛乃居上篇大壯有乾又陽盛乃居下篇其説曰剝雖隂盛而爻則陽極故居上篇大壯雖陽壯而爻則隂盛故居下篇又謂五隂一陽之卦則一陽為主故皆在上篇至五陽一隂之卦如大有之彖傳明曰柔得尊位大中而上下應之矣乃謂王弼一隂為主之説非是咸卦之男下女傳有明文乃以女居男上為隂盛謂凡女居上者皆在下篇至于噬嗑又謂男下女非女勝男也諸如此類未免逐卦委曲以求合隂盛陽盛之説未見諦當故朱子作本義首言卷帙重大故分上下兩篇蓋不取程子之説也然而文王所作卦辭通計六十四卦凡七百一十五字連爻辭尚不滿五千止四千九百二十三字謂之卷帙重大可乎分而為二各三十二卦可也上經三十卦下經三十四卦何為而然哉竊意上下篇之分在聖人必有指歸乃反覆求之不得其説庚戌之冬于長沙書肆得來注讀之無間晝夜時時有所觸發然其上下篇義雖亦本于天道人道以為言乃以上經為易之數下經為易之氣多言綜卦而較量于隂爻陽爻之多寡其于卦之所以分與夫上經之所以三十卦下經之所以三十四卦者俱未深析明年春又得豫章蕭氏讀易考原抄本于民間其書不過落落數紙而閎奧粹精貫通理數其考據之精核指陳之周密有深當于心者其言卦必先分而後序上經者取陽升而上之義故乾坤坎離為上經之主卦以其居四正之位而隂畫陽畫皆純正也下經者取隂降而下之義故震巽艮兊為下經之主卦以其居四隅之位而隂爻陽爻皆偏雜也上經言天道故乾坤交而六子不交乾坤交而萬物化生矣下經言人事故六子皆交六子交而萬事畢舉矣又上經主卦乾為主而坤從之坎用事而離從之故交泰以前乾南坤北有坎無離由是而陽漸衰隂漸長矣故交泰以後乾北坤南坤為主而離用事矣盈虛消長之理然也下經主卦兊最貴而巽次之蓋下經貴隂又畫卦之始加一陽于太陽之上而成乾加一隂于太陽之上而成兌兌次乾而成故貴也至于上經六子不交故但以主卦之體始之終之而得卦三十下經六子皆交故遂以所交之卦始之中之終之而得卦三十有四似皆確不可易者謹節縮為上下二經卦圗于左以質海內髙明焉周易上經序卦圗按中一節凡十卦共六十爻陽爻三十隂爻三十隂陽平也自乾坤一交而坤遂南來為主而離用事矣觀此可以識盛衰消長之幾也下經之中主夬姤兌巽包乾受客來故乾萃升兌巽包坤坤坎離在兊困井兌巽包坎巽包括之中革鼎兌巽包離按下經主卦兌最貴巽次之艮震不得擬焉亦猶坎離之與乾坤也蓋由卦圗乾居南之正中兌巽居南之兩旁三體相比皆在上方故也况在下經又坤南乾北而亦與聨于上方乎下經之終隂震艮陽前中之隂至是漸歸妹巽艮震兌之體遂不復有乾豐旅震艮包離按易之卦凡六十有四乾坤坎離四正卦為上經之用兌巽艮震四隅卦為下經之用所用之卦各三十有二也而正卦所用者三十卦居上經二卦居下經隅卦所用之三十二卦盡居下經者則上得以兼下下不得以兼上故也又考諸卦之體乾坤二卦體全而用也中故否泰之交居上經之中是也坎離二卦體中而用也全故坎離之體居六十四卦之中既未濟之用當六十四卦之全也體全而用中生知安行不思不勉聖人之事也體中而用亦可全則學知利行擇善固執賢人之事也若夫四隅之卦其隂陽之體或偏于上或偏于下猶夫致曲之士得聖人之一體不全不中然不懈其功而已千已百則不中者亦可進于中不全者亦可幾于全矣所謂人皆可以為堯舜而易者變易也周易上下經分卦合卦考按豫章蕭氏謂卦必先分而後序故于上下經分隂陽主客非臆説也蓋六畫之卦皆三畫之八卦兩體相合而成者故六十四卦凡一百二十八體三畫之八卦每卦皆十六體今考上經之卦以乾坤坎離為主故乾坤之體見于上經者各十二最尊故也坎之體八嫡子用事得其中正故也離之體六隂視陽為進退減其二者偶數也震艮之體各七客讓主故視坎減一體竒數也巽兑之體各四視離減二體亦以偶數讓主也此上經之分卦也下經之卦以兑巽震艮為主又屬隂故兌巽最貴見下經者各十二體震艮各九體離十體讓主之隂卦者二坎八體讓主之陽卦者一乾坤各四體此下經之分卦也至于上經之合卦乾體十二除本卦二體合主卦者六體否泰需訟同人大有是也合客卦者四體無妄履小畜大畜是也坤體十二除本卦二體合主卦者四體否泰師比是也合客卦者六體豫復謙剝臨觀是也然所合客卦陽多而隂少又不合離上經屬陽故貴陽也坎八體除本卦二體合主卦者四體需訟師比是也合客卦者二體屯蒙是也離六體除本卦二體合主卦者二體同人大有是也合客卦者二體噬嗑賁是也上經六子不交故不合坎上經貴陽故不合坤與兌巽也其客卦則震有七體合主卦者五體無妄復屯噬嗑豫是也合客卦者二體頤隨是也艮有七體合主卦者五體大畜剝蒙賁謙是也合客卦者二體頤蠱是也巽有四體以二體合主卦小畜觀是也以二體合客卦蠱大過是也兌有四體以二體合主卦履臨是也以二體合客卦隨大過是也然上經貴陽震陽爻在下故其合卦也除合坤外皆居下卦艮陽爻在上故其合卦也除合坤外皆居上卦巽兌亦然此上經之合卦也下經兌十二體除本卦二體合主卦者四體咸損中孚歸妹是也合客卦者六體夬萃困節革暌是也客多于主者蓋四隅之卦得體之偏故除正配艮也交合外止以二體合主卦其餘皆依四正之體以成卦也巽卦亦然同為隂卦故也巽十二體除本卦二體以二體交合正配恆益是也以二體合主卦中孚漸是也以六體合客卦姤升渙井家人鼎是也震九體除本卦二體正配交合二體恆益是也以二體合主卦歸妹小過是也以三體合客卦大壯解豐是也其與艮之依正體成卦猶之巽兌也艮九體除本卦二體正配交合二體損咸是也以二體合主卦漸小過是也以三體合客卦遁蹇旅是也其客卦乾四體合主不合客夬姤大壯遁是也坤四體合隂不合陽晉明夷萃升是也下經貴隂故也坎八體除正配交合二體既濟未濟是也其餘皆合主不合客困節渙井蹇解是也離十體正配交合與坎同除二體合坤晉明夷是也其餘亦合主不合客暌革家人鼎豐旅是也坎離所合之卦除正配外不唯離之合坤屬隂其所合之主卦皆隂多于陽此下經之合卦也學者按册求之當有信其不誣者矣易酌卷首
