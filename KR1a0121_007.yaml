body:
  text: 易酌卷七祁州刀包撰周易下經離下巽上家人利女貞為卦巽上離下巽齊也離明也明於内而齊於外家人之義備矣故卦名家人𫝊曰正倫理篤恩義二語可作治家箴一家之人尊卑長幼莫不利貞獨曰女者周子曰家人離必起於婦人婦人正則家道正矣又卦以巽離得名巽長女離中女故文王因其象而彖之曰利女貞主二四而言也試徴諸詩書周南以闗雎始以麟趾終召南以鵲巢始以騶虞終其閒所言者皆女貞之義堯典言治天下之道在堯則曰釐降二女於溈汭在舜則曰觀厥刑於二女皆彖以利女貞蔽家人之義也彖曰家人女正位乎内男正位乎外男女正天地之大義也六二以隂居隂女正位乎内也九五以陽居陽男正位乎外也天地以隂陽剛柔為義男陽也陽居外法天之剛男位正矣女隂也隂居内法地之柔女位正矣故曰天地之大義也家人有嚴君焉父母之謂也父義母慈母何以亦稱嚴君程母云子弟不才皆因母蔽其過而父不知也故其居家甚嚴敎成明道伊川兩兄弟二人同稱蓋此義耳此義不明姑息勝而家道壊矣人知以父母之道治國而不知以君長之道治家大抵朝廷之道恒虞其過嚴故曰元后民之父母家庭之間恒虞其過寛故曰父母家之嚴君𫝊曰家人之道必有所尊嚴而君長者謂父母也如此則嚴君作兩字説朱子曰所尊嚴之君長也只作一字説為是父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣如何呌做父子如何呌做兄弟如何呌做夫婦顧名思義各正其位家道有不正乎指出道字言道則正不道則不正也個個如此便是好人家家如此便是好世道蓋天下雖大无不有家之人天下之道正則天下之家定矣三代而後漢唐諸君未有庶幾斯道者文王只作利女貞孔子則繇女而推之於男繇男女而推之於父母又繇父母而推之於父子兄弟夫婦皆利貞也蓋文王所取者二體之義孔子則兼取六爻之義義无窮而不能有加於象明乎此者可以言易矣象曰風自火出家人君子以言有物而行有恒離内卦火也巽外卦風也火方熾如有聲然風也故曰風自火出此言外本於内繇内可以及外也君子觀其象得正家之道焉家自身正身自言行正也其言顯而可據謂之物无虚偽誕妄也其行貞而可久謂之恒无竒詭變易也言行合内外之道然未有不正言行於内而能正言行於外者一身之言有物則一家之言靡不有物一身之行有恒則一家之行靡不有恒身正而家正矣𫝊曰物謂事實恒謂常度法則也初九閑有家悔亡初以剛明之才處正家之始能防閑有家者也閑者界限節制之意愛而不溺和而不流使一家之人罔敢放肆偷惰者如是則其悔亡矣𫝊曰治家者治於衆人也茍不閑之以法度則人情流放必至于有悔失長幼之序亂男女之别傷恩義害倫理无所不至能以法度閑之於始則无是矣故悔亡也不云无悔者羣居必有悔以能閑故亡耳象曰閑有家志未變也𫝊曰志未變正志未流散變動也及是時而閑之則施以恩而知感誨以義而知畏故易為力而悔亡志既變而閑之則頑梗難化必有悔也慎厥終惟其始吾於治家亦云漢萬石君其庶幾斯義矣六二无攸遂在中饋貞吉𫝊解此爻似晦本義曰六二隂柔中正女之正位乎内者也極為得之无攸遂春秋所謂婦人无遂事也以順從為正不敢専擅直遂以行其意也在中饋不干預外事詩所謂惟酒食是議也孟母所謂精五飯幕酒醬養舅姑也彖言利女貞六二當之故吉也家禮中凡祭祀飲食必婦女躬親之不委其事於庖人今富貴家便以庖厨為恥豈貞吉之道乎或曰離為烹飪坎變兑皆有飲食象故稱饋鼎火烹飪於外曰享帝養賢家人之火烹飪於内曰在中饋亦有理象曰六二之吉順以巽也順以巽𫝊指六二張氏曰六二能正而吉者以其能順從九五之正應而卑巽之也進乎𫝊矣九三家人嗃嗃悔厲吉婦子嘻嘻終吝三居内卦之上家之主也然以陽居陽過剛不中故治家嚴急有嗃嗃之象𫝊云嗃嗃與嗷嗷相類説文云嚴酷貌大抵義勝恩威克愛家之人必有難堪者矣故悔於嚴厲𫝊曰骨肉恩勝嚴過故悔也雖悔於嚴厲未得寛猛之中然而家道齊肅人心祗畏猶為家之吉也又曰卦非有嘻嘻之象但對嗃嗃而言故王回疑九三重剛无嘻笑理然則爻何以及之或曰介二四兩柔之閒故也得之矣嗃嗃曰家人嘻嘻曰婦子便見溺於私愛之意𫝊曰嘻嘻笑樂无節也自恣无節則致敗家之凶但云吝者可吝之甚則至於凶故未遽言凶也象曰家人嗃嗃未失也婦子嘻嘻失家節也未失者未失正家之道也節正家之閑失家節則蕩檢踰閑而不可為訓矣所謂知和而和不以禮節之也六四富家大吉承乘應皆陽而四以隂受之以虚受實故有富家大吉之象張氏引記所謂家之肥者解四之富極有理但本義云陽主義隂居利四以隂居隂而在上位能富其家者也似與記之言肥者不同余謂四非以金帛寳玉為富也曰富家者言家道隆盛云爾二在下之婦也四在上則主家之婦主家有人則家道隆盛固其理也然而記所謂父子篤兄弟睦夫婦和者固在其中不然亦何以稱隆盛哉象曰富家大吉順在位也在位者以巽順在高位一家之母也二之貞吉曰順以巽四之大吉曰順在位舍順固无所謂婦道也九五王假有家勿恤吉五君位故曰王有剛健中正之徳下應六二之柔順中正治家之至善者也故為王假有家之象程朱以假為至𫝊曰自古聖王未有不以恭己正家為本五恭已於外二正家於内内外同徳可謂至矣本義曰如假於太廟之假俱是感格意詩所謂奏假无言也一家之人蒸蒸向化日遷善而不知誰之為之又何煩憂恤而吉哉按本義較𫝊為優象曰王假有家交相愛也本義不假一辭専述𫝊夫愛其内助婦愛其刑家二語是二語者固盡交相愛之義矣余意推開説尤善蓋父父子子兄兄弟弟夫夫婦婦莫不交勉於正而後謂之交相愛也上九有孚威如終吉上以陽剛居卦之終家道所繇成也故極言治家之道接物首要推誠雖異姓且然况骨肉乎故有家須有孚信足以孚之而威不足以畏之則易慢生焉嘻嘻之漸也故孚如又須威如二者合正家之道具此矣𫝊曰治家之道非至誠不能也故必中有孚信則能常久而衆人自化為善不繇至誠已且不能常定也况欲使人乎故治家以有孚為本治家者在妻孥情愛之閒慈過則无嚴恩勝則掩義故家之患常在禮法不足而瀆慢生也長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴則能終吉保家之終在有孚威如二者而已故於卦終言之象曰威如之吉反身之謂也𫝊曰治家之道以正身為本故云反身之謂爻辭謂治家當有威嚴而夫子反復戒云當先嚴其身也威嚴不先行於已則人怨而不服孟子所謂身不行道不行于妻子也本義曰謂非作威也反身自治則人畏服之矣二義俱精絶余嘗從其義推之曰夫子又恐其嚴於人而寛於已自治之功踈人將疑而不信也故謂威如之吉非威人也自威而已自威之道在於反躬責己故曰反身之謂也反之於身言得无有不物乎不物則不威反之於身行得无有不恒乎不恒則不威是故言有物行有恒然後身有威也本義又以卦畫推之曰上父初子五三夫四二婦五兄三弟尤為詳盡兑下離上睽小事吉睽乖也違也人情不相屬人事不相謀未可以吉言也然豈遂束手漫不事事乎旋轉大業固是做不去若隨其才分之所至尋常小事整頓起來為大事張本尚可以獲吉也此濟睽之道也或以興役動衆為大事以飲食衣服為小事殊未切彖曰睽火動而上澤動而下二女同居其志不同行𫝊曰彖先釋睽義次言卦才終言合睽之道而贊其時用之大只數語己盡大段離火也火性炎上故動而愈上兑澤也澤性潤下故動而愈下是火與澤睽也離中女兑少女二女幼而同處長則各願有家不同行故不同志也是中女與少女睽也此以卦象釋睽之義也説而麗乎明柔進而上行得中而應乎剛是以小事吉兑説也而麗離之下麗乎明也此卦徳也六五柔也而居尊位進而上行也此卦變也本義曰自離來者柔進居三自中孚來者柔進居五自家人來者兼之得中虚之道而下應九二應乎剛也此卦體也此三者皆足有為是以小事吉也𫝊曰五以明而應剛不能致大吉何也曰五隂柔雖應二而睽之時相與之道未能深固故二必遇主於巷五噬膚則无咎也天下睽散之時必君臣剛陽中正至誠協力而後能合也此理須此一轉始明天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉𫝊曰見同之為同者世俗之知也聖人則明物理之本同所以能同天下而和合萬類也以天地男女萬物明之天高地下其體睽也然陽降隂升相合而成化育之事則同也男女異質睽也而相求之志則通也生物萬殊睽也然而得天地之和禀隂陽之氣則相類也物雖異而理本同故天下之大羣生之衆睽散萬殊而聖人為能同之處睽之時合睽之用其事至大故云大矣哉此皆確不可易者余向有解盡去之獨存數語云以睽之體言之則曰小事吉以睽之用言之則曰大矣哉聖人叅賛化育之功曷可誣也象曰上火下澤睽君子以同而異上火下澤其性違異而不能相同睽之象也君子觀其象而得守身處世之道焉于人无争世无忤渾然大同矣至道義所在則有招不來麾不去者斷不能隨俗俯仰以取容也是故同者其心也心旡偏黨何人何已異者其志也志旡阿附獨往獨來君子其善用睽乎在彖則言異而同在象則言同而異交相發明也𫝊曰夫聖賢之處世在人理之常莫不大同于世俗所同者則有異而獨異盖于秉彛則同矣于世俗之失則異也不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也其理精矣初九悔亡喪馬勿逐自復見惡人旡咎初與四非正應當睽之時宜有悔也然同是陽爻同在下同徳則相助同類則相憐終當自合故其悔可亡而有喪馬勿逐自復之象也初資四以行四者初之馬也始以非應喪之既以同類復之理有固然旡庸越逐為也盖同類不相應急之則反致疑緩之則當相信修徳以俟自至此招來同類之道也惡人非我族類何可見者本義曰如孔子之于陽貨也𫝊曰當睽之時雖同徳者相與然小人乖異者至衆若棄絶之不幾盡天下以讐君子乎如此則失含𢎞之義致凶咎之道也又安能化不善而使之合乎故必見惡人則旡咎也古之聖王所以能化姦凶為善良革讐敵為臣民者繇弗絶也其義甚大不可不知張氏曰見者遇而勿絶之辭非必欲見之也此義不明恐為同惡者借口矣謹按四在中爻為坎函心之馬也初動於下四動于上故為喪馬之象象曰見惡人以辟咎也爻曰旡咎象曰辟咎似只為全身逺害地耳𫝊曰所以免辟怨咎也旡怨咎則有可合之道以道相合惡人將化為善人矣此説㝡得聖人婆心九二遇主于巷旡咎二臣而五君九剛而六柔正應也在睽孤之時居中左右者少從旁間阻者多固執常道鮮一克遇故不曰遇主于堂于陛而曰于巷婉曲以行其忠愛也何咎之有𫝊曰君臣睽離其咎大矣巷者委曲之途也遇者㑹逢之謂也當委曲相求期于㑹遇與之合也所謂委曲者以善道宛轉將就使合而已非枉已屈道也可謂曲盡遇巷之義象曰遇主于巷未失道也𫝊曰至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逢也巷非邪僻繇徑也故夫子特云遇主于巷未失道也未非必也非必謂失道也如此發明不失道之義大見格君本領六三見輿曳其牛掣其人天且劓旡初有終車牛合而後行三隂柔不能立又居二剛之間見輿曳二曳于後也其牛掣四掣于前也其人天且劓天髠首也劓截鼻也天而又劓言重傷也程云傷于四竊意四特掣之耳𫝊曰掣從制從手執止之義恐未至于刑之也朱云傷于上九謂上九以六三正應繫于二四猜狠方深故不免刑傷如是則于義已絶又何以有終乎或曰其人指四言四欲奪三而上不肯容故刑之四被刑故三與九旡初而有終也旡初者始為二陽阻隔而不得前有終者究以正應得合也于理似順宜從之謹按序卦家道窮必乖故睽次家人兑為少女為口舌六三在兑上而為悦之主又以柔居剛而位不當盖少女中之彊悍自遂言笑旡忌而却不失其正者也然當睽之時正應既乖外侮必至二與四之曳與掣所由來歟而曰輿與牛者盖本卦中爻三至五為坎坎為輿又在三之前曳之象也二至四為離離為牝牛又在三之後掣之象也其人者六三也雖為悦之主言笑不謹本非不正一旦遭此凌辱豈甘之乎天者呼天號泣也且者將欲之辭劓者離為戈兵劓之象也即今之婦人為彊暴所辱欲自刎以殉者也見者上九見之也正應既來則曳者避而掣者去矣故為旡初有終而象曰遇剛也若以天為髠首以劓為截鼻則斷者不可復續何以有終乎至上九本有正應而乃云孤者盖以剛而處睽極明極故拂戾而難合過察而多疑也見豕負塗見其汚甚也載鬼一車見其怪甚也先張之弧初念欲殺之也後脱之弧轉念又釋之也惟其有此轉念是以匪寇婚媾遇雨則吉羣疑亡而睽者終合矣坎為豕為兩弦木為弧皆卦中自具之象也鄙見如是不知可以備髙明之博覽否象曰見輿曳位不當也旡初有終遇剛也以六居三上下二陽或曳之或掣之繇所處之位不當也遇上九之剛則曳者却步掣者束手矣以二四故旡初以上九故有終也𫝊曰不正而合未有乆而不離者也合以正道自无終睽之理故賢者順理而安行智者知幾而固守九四睽孤遇元夫交孚厲旡咎四當睽之時居二隂之間孤立无助者也故曰睽孤以類相求而得初九之應遇元夫也夫者男子之美稱謂九也元謂初也元夫男子之首稱也𫝊曰夫陽稱元善也初九當睽之初遂能與同徳而亡睽之悔處睽之至善者也故目之為元夫猶云善士也四則過中為睽已甚不若初之善也交孚同聲相應同氣相求以誠信交相孚合也又曰四與初皆以陽處一卦之下居相應之位當睽乖之時各无應援自然同徳相親故㑹遇也厲无咎𫝊云雖處危地而无咎本義云當睽時必危厲乃得无咎朱義為長盖恃元夫之孚而无惕厲之心鮮克有濟故戒之也象曰交孚旡咎志行也爻言无咎象又進一步説言但无咎而已二陽濟睽之志可以行矣孤則志不得行此見濟睽者必資同徳之助也六五悔亡厥宗噬膚往何咎以陰柔當睽之時而尊居五位之上宜有悔也然下有剛中之賢為應而匡扶之收得人之效矣故其悔可亡也厥宗九二也二以五為主五以二為宗交致其尊親之意也膚之為體柔也噬之為用剛也以剛濟柔故為噬膚之象𫝊曰噬膚噬齧其肌膚而深入之也當睽之時非入之者深豈能合也五雖隂柔之才二輔以陽剛之道而深入之則可往而有慶復何過咎之有以周成之幼稚而興盛王之治以劉禪之昏弱而有中興之勢盖繇任聖賢之輔而姬公孔明所以入之者深矣象曰厥宗噬膚往有慶也爻言无咎象不復及而以有慶賛之隂陽相合明良而喜起矣不特无咎也𫝊曰人君雖己才不足若能信任賢輔使以其道深入于己則可以有為是往而有福慶也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉此爻與六三俱險怪之甚𫝊以其居卦之終為睽極陽剛居上為剛極在離之上為用明之極日睽極則拂戾而難合剛極則躁暴而不詳明極則過察而多疑上九有六三之正應實不孤而其才性如此自睽孤也如人雖有親黨而多自疑猜妄生乖離雖處骨肉親黨之間而常孤獨也語語可為處親黨藥石見豕負塗疑三之污我也載鬼一車疑三之祟我也傳曰鬼本无形以无為有妄之極也先張弧而欲射之疑其真也後説弧而弗射信其偽也弦木為弧本出睽象其所以先張後説者何也始見為冦既而知其匪冦實婚媾也以為婚媾則睽極而合矣又曰物理極而必反以近明之如人適東東極矣動則西也如升髙髙極矣動則下也既極則動而必反也上之睽乖既極三之所處者正理大凡失道既極則必反正理故上于三始疑而終必合也隂陽交而和暢則為雨上于三始疑而終合隂陽合而益和則為雨故云往遇雨則吉往者自此而往猶言今而後也愚謂此言隂陽調暢上將沛其膏澤于三也象曰遇雨之吉羣疑亡也一疑則无所不疑一信則无所不信百端眩惑罔不冰消而霧釋故曰羣疑亡也天下事真的到底假不得輿曳牛掣原非觀望不前髠髮截鼻豈其殃禍自我乆當悟其寃也假的到底真不得見豕負塗清質芳躅自在載鬼一車捕風捉影何憑乆當悟其幻也剛而狠明而察未免妄生事端事過意平不覺自悔其无謂矣畢竟還是剛明之力艮下坎上蹇利西南不利東北利見大人貞吉蹇合坎艮二體坎北方艮東北方也東北之卦却不利東北利西南何也出乎蹇則利安乎蹇則不利也西南坤方坤順也出乎蹇故順順故利東北艮方艮山也山險也安乎蹇故險險故不利夫利平易不利險阻在安常處順之世且然况蹇難之時乎蹇難非平流所克濟必得經濟大手叚為之𫝊所謂聖賢之人也然又必固聖賢之志故曰貞吉𫝊曰凡處難者必在乎守貞正設使難不解不失正徳是以吉也若遇難而不固其守入于邪濫雖使茍免亦惡徳也知義命者不為也處蹇者各宜用其言以自勵彖曰蹇難也險在前也見險而能止知矣哉蹇足難進之象故曰蹇難也𫝊曰蹇之為難如乾之為健若易之為難則義有未足蹇有險阻之義屯亦難也困亦難也同為難而義則異屯者始難而未得通困者力之窮蹇乃險阻艱難之義各不同也須如此分明纔是若一例㸔則失之矣何氏云濟蹇者以往為尚處蹇者以止為尚極好所謂利西南不利東北者皆言往也𫝊却以見險能止之徳美之能止而後能進也坎居上險象艮居下止象外坎内艮見險而能止象知者美其能觀變俟時也蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉利西南勉九五也乾畫往五而居上卦之中不以坎險為可畏而以其身入籌畫焉則將有出險之望此西南之所以利也或曰坎本坤所變得中者得坤卦之中也亦有理此以卦變言也不利東北戒九三也三為艮體之主止而不進則常在險中其道窮矣此東北之所以不利也其惟二五同心共濟而後可五為大人三利見之三五同功五尤多功故往有功也三五皆卦主陽剛當位其他若二若四若上亦皆當位初雖以隂居陽而處下亦陰之正皆正邦象也邦正則不終于蹇矣此以卦體言也𫝊曰天下之難豈易平也非聖賢不能其用可謂大矣順時而處量險而行從平易之道繇至正之理乃蹇之時用也此理合下便用的著非空言者象曰山上有水蹇君子以反身修徳山以髙為險水以深為險山上有水險而又險蹇難之象也君子觀其象以反身修徳君子之身天地萬物一體之身也天地萬物缺䧟皆吾身缺陷敢自棄與是故天運艱難不敢委之天也反于身而得事天之道焉修其天之所以降衷者而已惟皇降衷厥有恒性得之天者失之已可乎人情險阻不敢責之人也反于身而得事人之道焉修其人之所以同然者而已民之秉彛好是懿徳同于人者異于已可乎不反身則徳旡繇修不修徳則身旡庸反善用此卦之象者孟子也故曰行有不得者皆反求諸己其大象之謂與𫝊曰凡遇艱蹇必自省于身有失而致之乎是反身也有所未善則改之旡歉于心則加勉乃自修其徳也君子修徳以俟時而已此等語都是合下用的初九往蹇來譽以隂柔居蹇之初力未能救蹇不量力而進則益入于深險矣故曰往蹇𫝊曰上進則為往不進則為來朱子亟稱此二句以為諸家之説有病惟此无咎病信然哉來而不往知幾識時人將稱道之勿置故曰來譽彖曰見險而能止知矣哉來譽之謂也象曰往蹇來譽宜待也往蹇來譽者言出處之際名節攸闗宜安分守正以待天下之清也嘗以管寧華歆二子觀之寜歆見金一揮而不顧一顧而不取相去幾何乃歆之往也不免亂臣賊子之誅而寧之來遂儼然為百世師宜待乎不宜待乎六二王臣蹇蹇匪躬之故二為九五之臣王臣也名曰王臣則不得有其躬矣不有其躬故可往而不來也蹇蹇猶言乾乾坎坎也匪躬之故捐軀從王也不言吉者𫝊云隂柔之才不足以濟蹇也本義引孔明之言曰鞠躬盡力而已至于成敗利鈍則非所論也可謂得王臣之心矣象曰王臣蹇蹇終无尤也本義云事雖不濟亦可旡尤此説仍本𫝊意余欲下一轉語云而况事成乎有志王臣固自有濟理耳九三往蹇來反𫝊于他卦以剛居剛必曰過剛不中于九三則曰以剛居正何也以其當蹇時居艮體之上故雖過剛而不失其正也三正應在上上柔不足恃獨以剛往其能濟蹇乎故曰往蹇去而復反故曰來反象曰往蹇來反内喜之也二隂居九三之下不能自立思得彊有力者為之援三來反則適慰其心故曰内喜之也春秋書季子來歸以其為國人所喜也正此義六四往蹇來連四居近君之位義可以不往也但時方蹇難徒往祗益之蹇耳來而連三以往則有濟也連即拔茅連茹之連謂同心共濟也如晉室衰㣲温嶠諸公必連陶侃以往乃克有濟此來連之義也象曰往蹇來連當位實也當位實𫝊作六四説諸家俱云九三陽剛而實六四隂柔而虚連三之剛濟四之柔連三之實濟四之虚資其所有餘助其所不足也如此説其義更長九五大蹇朋來五君位正在坎中舉天下之蹇統歸諸一身是天下之大蹇也然下有柔順中正之臣為之應君子道長衆正彚征譽反連碩之輩翕然鱗集是得朋來之助也此雖不言吉而吉在其中矣𫝊獨以爻不言吉少之曰得朋來而无吉何也曰未足以濟蹇也以陽剛中正之君而方在大蹇之中非得剛陽中正之臣相輔之不能濟天下之蹇也二之中正固有助矣欲以隂柔之助濟天下之難非所能也自古聖王濟天下之蹇未有不繇賢聖之臣為之助者湯武得伊吕是也中常之君得剛明之臣而能濟大難者則有矣劉禪之孔明唐肅宗之郭子儀徳宗之李晟是也雖賢明之君苟无其臣則不能濟于難也故凡六居五九居二者則多繇助而有功蒙泰之類是也九居五六居二則其功多不足屯否之類是也盖臣賢于君則輔君以君所不能臣不及君則賛助之而已故不能成大功也此理亦好特存之又曰自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也竊意李王之時羣小縱横君若贅旒晉中宗差勝赧獻可謂有剛健中正之徳乎李君尚矣允疎顗狂導黨逆持兩端未足語于柔順中正也或有臣无君或有君无臣以當大蹇朋來未也若漢之鄧禹馮異唐之房𤣥齡杜如晦其才未有大過人者只是柔順中正遭時遇主遂成濟蹇之功非其驗與或曰然則獨不言吉者何曰當蹇難之時聖人教人以先事後得先難後獲之義也大難方始遽有計功謀利之心鮮不敗乃事者自古然矣此與𫝊全異亦存之象曰大蹇朋來以中節也𫝊曰以其中正之節也恐未確竊意五與二剛柔中節固矣推之四與上以柔居柔三以剛居剛亦有互中節者訂詁云爻雖不言吉而象曰以中節也亦可謂吉辭矣盖二以柔居柔五以剛居剛各中其剛柔之節也以二之柔濟五之剛以五之剛濟二之柔互中其剛柔之節也如此説于朋來又切又發明的吉義出上六往蹇來碩吉利見大人上居蹇之極體猶在坎茍不思所以濟蹇之術彊欲逃之于蹇外吾何行如之故往則蹇而來則碩也蹇之來有寛大自如意陽實而隂虚故四連三則曰實陽大而隂小故上應三則曰碩本義云來就九五恐未是獨此爻言吉者他卦皆在蹇中惟上六蹇極當通故也大人指九五彖辭利見大人原主九三言爻以歸之上六何也三上正應上之利見即隨三而利見也盖其才柔本不足濟唯内應九三碩大之陽與之共戮力以佐五則可以出蹇矣象曰往蹇來碩志在内也利見大人以從貴也内謂九三也對外卦而言若指五五外恐不得以内言矣貴謂九五也有陽剛中正之徳而居尊位天爵人爵竝懋也坎下震上解利西南无所往其來復吉有攸往夙吉大難芟夷宜昭示寛仁大度與天下更始所謂開國之初規模宏逺也𫝊曰西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寛大簡易乃其宜也如是則人心懷而安之故利于西南也湯除桀之虐而以寛治武王誅紂之暴而反商政皆從寛易也无所往其來復吉有攸往夙吉无所往謂天下之難已解散无所為也有攸往謂尚有所當解之事也夫天下國家必紀綱法度廢亂而後禍患生聖人既解其難而安平无事矣是无所往也則當修復治道正紀綱明法度進復先代明王之治是來復也謂反正理也天下之吉也其發語辭自古聖王救難定亂其始未暇遽為也既安定則為可乆可繼之治自漢以下亂既除則不復有為姑隨時維持而已故不能成善治盖不知來復之意也渠魁剪除餘黨解散可相安无事矣此時正宜以不逺復之道輔其君盖復其見天地之心而後可以行周官法度也朱子云兩漢以來人主還有理㑹正心誠意否須得人主如窮閻陋巷之士治心修身講明義理以此應天下之務用天下之才方見次第正此意有攸往夙吉謂有害可除利可興宜先事圖之盖機㑹之來間不容髪稍緩之則滋蔓難圖矣故須早為之所也唐五王削去内難置武三思于不問不旋踵而國敗家亡不講于夙往之義故也𫝊曰當解而未盡者不早去則將復盛事之復生者不早為則將漸大皆憂深慮逺之言也彖曰解險以動動而免乎險解坎險震動險以動也震外坎内動而免乎險也出乎險故為解此以卦徳言也解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也西南平易之方也平易近人人必歸之故曰往得衆也本義云坤為衆得衆謂九四入坤體得中此以卦變言也𫝊以得中為修復先王之治大中不易之道也若如前説則當以格君心為中道矣夙則不失事機之㑹故往有功天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉天地嚴凝之氣閉藏則為冬為雪天地温厚之氣發散則為雷為雨雷以動之雨以潤之而百物生焉是天地萬物之功皆繇解而成也徐氏曰雷雨作者氣之解也百果草木皆甲拆者形之解也形隨氣而解則屈者伸鬱者暢生意流行充周普遍解之時其大矣哉此叚甚為明透傳曰王者法天道行寛宥施恩惠養育兆民至于昆蟲草木乃順解之時與天地合徳也比又推廣言之不可不知象曰雷雨作解君子以赦過宥罪天地以生物為心雷雨作天地之解也君子以生人為心赦過宥罪君子之解也君子法天之威而用刑法天之澤而恤刑過出无心置而不問罪干有司寛而不苛是亦利西南之道而廣之刑獄也蹇之未解負罪引慝以責乎己則有反身修徳之功蹇之既解泣罪解網以恕乎人則有赦過宥罪之典武曰百姓有過在予一人湯曰萬方有罪罪在朕躬赦過宥罪仍是反身修徳之意不然姑息養奸豈君子之道乎初六无咎天下无事才柔位卑足以自安且上有九四正應故无咎也𫝊曰方解之初宜安静以休息之爻之辭寡所以示意于无可解中著解妙甚象曰剛柔之際義无咎也居其下而應乎上居其柔而應乎剛初柔四剛交際得宜故曰義无咎也九二田獲三狐得黄矢貞吉𫝊曰九二以陽剛得中之才上應六五之君用于時者也天下小人常衆剛明之君在上則明足以照之威足以懼之剛足以㫁之故小人不敢用其情然尤常存警戒慮其有間而害正也六五以隂柔居尊位其明易蔽其威易犯其㫁不果而易惑小人一近之則移其心矣况難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三隂時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黄中色矢直物黄矢謂中直也羣邪不去君心一入則中直之道无繇行矣桓敬之不去武三思是也本義于九二宜曰程𫝊備矣象曰九二貞吉得中道也九二之于小人以非類目之以一網盡之疑于嫉惡過嚴而不知邪正无兩立之勢道理恰好如是耳故曰得中道也王曽之去丁謂韓𤦺之去任守忠庶幾此道矣六三負且乗致冦至貞吝三以隂柔而居下體之上故有負且乗之象負者擔負小人之事也乗者車乗君子之器也小人而乗君子之器處非其據盜思奪之伐之故曰致冦至𫝊曰小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也若能大正則如何曰大正非隂柔所能也若能之則是化為君子矣本義曰貞吝言雖以正得之亦可羞也唯避而去之為可免耳詳味程朱之意其所以為小人謀者亦至矣䝉引負乗之喻言劉盆子而未及更始言鄧通而未及董賢固為未盡若夫辯田千秋鄭綮之非六三則確論也象曰負且乗亦可醜也自我致戎又誰咎也負且乗在小人以為榮而聖人醜之灰其貪富貴之心也爻言冦象言戎冦小而戎大言禍不可量也戎自已致不得歸咎于人誨三使自反也𫝊曰聖人又于繫辭明其致冦之道謂作易者其知盗乎盜者乗釁而至茍无釁隙則盜安得犯負者小人之事乗者君子之器以小人而乗君子之器非其所能安也故盜乗釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜者乗其過惡而伐之矣伐者聲其罪也盜横暴而至者也貨財而輕慢其藏是教誨乎盜使取之也女子而妖冶其容是教誨淫者使暴之也小人而乗君子之器是招盜使奪之也皆自取之之謂也余謂盜必開于朝廷而後盛于郊圻必起于冠裳而後熾于奸宄聖人反覆咎其自取也若曰使朝无倖位爵无惡徳則盜賊之禍无自而生矣雖然名之曰盜人人得而治之尚足貴乎小人竊據髙位惡知其非有也聖人以危言動之猶冀其避賢安位以免于盜也易之誨人其至矣此亦有理姑存之九四解而拇朋至斯孚四居近君之位大臣也大臣事君以人用舍進退之間天下人才所視以為消長者也若親比小人則端人正士將疑而去之矣安石用吕惠卿而羣賢解體其效也解而拇解去也拇足大指在下之象初六也初與四應之不以正去邪勿疑然後任賢勿貳解去在下之隂合志同方之衆所以接踵而至繇是翕然相信无復積嫌觀望之心矣或曰朋指二謂其與四同徳也亦通象曰解而拇未當位也未當位以陽居隂也居陰恐其溺於隂故必解而拇也六五君子維有解吉有孚于小人𫝊曰六五居尊位為解之主人君之解也以君子通言之君子所親比者必君子也所解去者必小人也故君子維有解則吉也小人去則君子進矣吉孰大焉其義甚明三隂同類慮其未必能解去也故須有孚于小人程朱俱以孚為驗𫝊云孚見驗也本義曰君子有解以小人之退為驗也其説自確余向來以孚為信即朋至斯孚之孚言君子有解之吉不惟見信于君子而亦見信于小人也雖小人亦心服而去无怏怏之意故曰有孚孔明之去寥立李平是也象曰君子有解小人退也君子之所解者小人也小人解則奉身而退矣君子又何解之有上六公用射隼于髙墉之上獲之无不利隼謂六三以小人鷙害故曰隼以其竊據髙位故曰髙墉之上射之獲之者上六也繫辭明以上六為藏器待時之君子故𫝊曰處尊髙之地而非君位故曰公乃䝉引直以為隼謬矣其曰公用射隼于髙墉之上獲之絶句則是也无不利謂動而不括𫝊曰夫子于繫辭復申其義曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也鷙害之物在墉上茍无其器與不待時而發則安能獲之所以解之之道器也事之當解與己解之之道至者時也如是而動故无括結發而無不利矣括結謂阻礙聖人于此發明藏器待時之義夫行一身至于天下之事茍无其器與不以時而動小則括塞大則喪敗自古喜有為而无成功或顛覆者皆繇是也本義云繫辭備矣余亦云程𫝊備矣象曰公用射隼以解悖也怙終不悛悖逆之甚者也射之所以解之解逆為順則出乎蹇而天下平矣是爻也周公東征足以當之兑下艮上損有孚元吉无咎可貞利有攸往𫝊發損下益上之義凡數層其義備矣諸家多以本義剥民奉君為象詳味彖辭全无此義只是取他好處盖下本乾體乾陽也陽實有餘之象上本坤體坤隂也隂虚不足之象損有餘益不足此盖以大公為心无爾我形骸之隔故曰有孚有孚謂至誠而人信之也至誠而人信之故大善元吉无有過咎以守則正以往則利也曷之用二簋可用享當損之時削去煩文縟節獨以誠信相與豈獨事人為吉哉雖事神可矣曷之用問辭言果何所用乎二簋可用享答辭言如是用享則可矣詩曰陳饋八簋享用二簋言薄也𫝊云享祀也徐氏曰燕享之享亦通但易享于帝享于西山之類皆取享祀之義程𫝊為是盖享之道不貴用物而貴用孚禮雖薄而以至識孚于神自當來格來歆故曰可用享也𫝊曰損減損也凡損抑其過以就義理皆損之道也又曰損者損過而就中損浮末而就本實也聖人以寧儉為禮之本二簋之約可用享祭言在乎誠而已誠為本也天下之害无不繇末之勝也峻宇雕牆本于宫室酒池肉林本于飲食淫酷殘忍本于刑罰窮兵黷武本于征討凡人欲之過者皆本于奉養其流之逺則為害矣先王制其本者天理也後人流于末者人欲也損之義損人欲以復天理而已如此説損字得未曽有彖曰損損下益上其道上行卦之所以名損者損乾三之剛畫上益坤三之柔畫損下益上也損下益上者在百姓為好義急公在臣子為致身報國以下奉上當然之理也故曰其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損有孚數句只加一而字其義便明聖人解經之簡易如此𫝊曰謂損而以至誠則有此元吉以下四者損道之盡善也然文質相輔而行若一意向節省路上走則有吝嗇之弊固陋之譏夫子指出時字言有時應爾非所以為訓也所謂國奢示之以儉也若國儉則示之以禮矣𫝊曰夫子恐後人不達遂以為文飾當盡去故詳言之有本必有末有實必有文天下萬事无不然者无本不立无文不行父子主恩必有嚴順之體君臣主敬必有承接之儀禮讓存乎内待威儀而後行尊卑有其序非物采則無别文之與實相須而不可缺也及夫文之勝末之流逺本逺實乃當損之時也以下節節推去言豈特二簋之用有時哉以卦畫推之損剛益柔有時以天下之理推之損益盈虚有時此胡氏之説甚善盖損之益之補偏救弊唯其時而已損則必虚益則必盈盈則宜損虚則宜益推遷變化如環无端唯其時而已矣象曰山下有澤損君子以懲忿窒欲澤以損而深山以澤之損而髙損之象也君子觀損之象以自損其忿與欲損忿則必懲之損欲則必窒之書曰必有忍乃有濟懲忿之説也懲不獨戒于後須早早調伏他如山之覆壓我思所以脱之如山障之蔽我思所以除之則可以言懲矣書曰以義制事以禮制心窒欲之説也窒不獨塞于初須時時防閑他如澤之䧟溺人惟恐其墜也如澤之汚穢人惟恐其凂也則可以言窒矣本義曰君子修身所當損者莫切于此可謂要言不煩昔薛敬軒自謂用功念年克不得一怒字程明道自謂從茂叔二十年後見獵而有喜心聖賢于忿欲之際不肯容易放過如此初九己事遄往无咎酌損之初居下四居上損初之剛益四之柔損剛益柔損下益上也𫝊云所益于上者事既已則速去之不居其功本義云輟所為之事而速往以益之本義為是四有疾初為正應疾痛相闗者也緩則于心有所未安故速往救之而後无咎凡任事者當審其器之可與否若自許太過則後有難繼之悔故必斟酌衡量而為之未可貿貿從事也𫝊曰當酌度其宜而損己以益之過與不及皆不可也木義曰居下而益上亦當斟酌其淺深也其義俱確象曰已事遄往尚合志也初應上而與之合志則視上之疾猶已之疾然非速往損之其有濟乎本義曰尚上通則尚上一義𫝊既曰尚上也又曰時之所崇用為尚初之所尚者與上合志也則尚上似二義矣九二利貞征凶弗損益之初往而就四則无咎以剛居剛故也居剛而濟柔故志可合二往而就五則有凶以剛居柔故也居柔而狥柔則近于容悅矣故利在堅固自守而戒妄進也志切益上而㣲自貶損枉巳者豈能直人乎砥礪亷隅罔或輕身以先弗損為益其益大矣愛吾鼎即以愛吾君也𫝊曰世之愚者有雖无邪心而唯知竭力順上為忠者盖不知弗損益之之義也象曰九二利貞中以為志也當損之時莫善于中徳中以為志則不失其正矣不失其正則可以上益六五矣又何征焉蒙引以桐江一線繫漢九鼎為喻極好盖初以事人為義必進而合上之志乃所以益上二以自重為義惟退而貞巳之志即所以益上位不同也六三三人行則損一人一人行則得其友下乾三陽三人行之象也損其九三以益上六三人行則損一人之象也一陽上而居坤六陽行而得隂友一隂下居乾三隂行而得陽友一人行則得其友之象也以六爻言之初應四二應五三應上皆以一隂一陽相與而成二也三人行則損一人二也一人行則得其友二也大而天地小而男女其所以化育生成萬物者唯二而已𫝊曰蓋天下无不二者一與二相對待生生之本也三則餘而當損矣此損益之大義也夫子又於繫辭盡其義曰天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也絪緼交密之狀天地之氣相交而密則生萬物之化醇醇謂醲厚醲厚猶精一也男女精氣交搆則化生萬物唯精醇専一所以能生也一隂一陽豈可二也故三則當損言専致乎一也天地之間當損益之明且大者莫過此也象曰一人行三則疑也一陽行則必有隂一隂行則必有陽不易之理也三則隂陽雜亂而疑其所與欲不損其一得乎損之所以命名而取義觀此爻則可見矣六四損其疾使遄有喜无咎凡人以隂陽平為无疾偏隂則有過柔之疾偏陽則有過剛之疾六四以隂居柔其疾也與初為應而以陽剛損之損其疾也損其疾則剛柔既濟故有喜得損剛益柔之時故无咎蓋救人之疾莫若速不速則誣人故初曰遄往療已之疾亦莫若速不速則過而憚改故四曰使遄初惟遄乃不誣四四惟遄乃不負初也象曰損其疾亦可喜也𫝊以亦為發語辭曰固可喜也或曰无疾固可喜有疾而能速損則復於无疾亦可喜也如此纔説的亦字出六五或益之十朋之龜弗克違元吉謙受益五以柔順虚中之徳下應二之剛陽可謂謙以自損矣其受益顧有量耶據程𫝊或益之句十朋之龜句弗克違句朱子云或益之十朋之龜句看益六二象辭曰或益之上九曰莫益之則三字當為一句十朋之三字恐不成句按班志十朋之龜其説歴歴可據本義蓋考諸此今當斟酌程朱之間或益之句十朋之龜弗克違句十朋之龜從朱説元龜也食貨志元龜十朋但不取其寳而取其靈弗克違仍從程説𫝊云龜者决是非吉凶之物衆人之公論必合正理雖龜筮不能違也如此則不以十朋為衆衆意即在或益之句内或者莫定其為何人之辭言衆也古者卜筮以龜為主書曰詢謀僉同鬼神其依龜筮協從卜不習吉即弗克違之意元吉謂莫吉於此也向來如此看固有理再玩本義之意以十朋之龜為大寳或益之言不知其所從來也弗克違言雖欲辭之而不得也其説猶確謹按本義之解直㨗了當无可疑者從之為是象曰六五元吉自上祐也自上祐從來俱作惟天眷徳説焦氏云上即上爻之上損卦損三以益上者也而五受其益故曰自上祐固自有理上九弗損益之无咎貞吉利有攸往得臣无家弗損益之程以為弗損人朱以為弗損己本義云居上而益下有所謂惠而不費者不待損己然後可以益人也此義極精无咎貞吉利有攸往即有孚之效也得臣无家𫝊曰得臣謂得人心歸服无家謂无有逺近内外之限也其説甚確焦氏云上九以陽剛當損極變而為益然但以三益五非損己之有也故曰弗損益之此説正與上祐句應弗損似有咎弗損益之則无咎矣受三之益而不私於己此大正之道吉而往无不利也得臣无家者上九遇能受益之君為得其所臣盡推所有以益之不復自有其家也謹按卦以損下益上為義則上九乃成卦之主而受益之極者也故无咎貞吉利有攸往之辭與彖畧同而弗損益之則與九二異蓋九二之弗損謂損己益之謂益人此爻之弗損謂損人益之謂益己辭同而指異也夫弗損於人而有益於己非仁義之至者不能也仁義之俗成則民不遺親後君而樂於以下奉上不私其有所謂得臣无家也王道至此其志不亦大行矣乎故象曰大得志也象曰弗損益之大得志也𫝊曰君子之志唯在益於人而已不損己而益人便是大行其志焦氏云大得志者九三來於上卦非徒然也方在下位欲益五而不能今位乎上則益君之志可以大得矣此及前説與程朱異然皆有理震下巽上益利有攸往利涉大川損益等耳損下益上則不曰益而曰損在上者可无剥其脂膏之懼乎損上益下則不曰損而曰益在下者可无食其高厚之思乎卦中自然有此象便自然有此理非臆出也益與利字異而義同故也卦言利往者不言利涉言利涉者不言利往此獨兼言之也當益之時无所往而不為益焉故曰利有攸往雖履危蹈險莫不以益道濟之故曰利涉大川上句以處常言下句以處變言彖曰益損上益下民説无疆自上下下其道大光卦之所以名益者上損乾三之陽畫下益坤三之隂畫損上益下也上君象下民象君施膏澤於民民不勝身家之感故其説无疆也无疆即罔極之意乾上坤下自乾之上而下於坤之下天道下濟而光明也此四句以卦體言也利有攸往中正有慶利涉大川木道乃行利有攸往指二五兩爻言二以中正應五五以中正應二君臣相慶故往无不利也利涉大川指震巽兩體言木道𫝊以為益字之誤朱子作木為是巽隂木震陽木也以木道涉川故行无不利也此四句兼卦體卦象言也益動而巽日進无疆天施地生其益无方凡益之道與時偕行益之為卦下震上巽動而巽也動而以卑巽入之書所謂惟學遜志務時敏厥修乃來者也是以日進无疆進進而不已也蒙引云程𫝊巽字解順字不盡依理而做又做得潛心懇到方為巽也説的是天施地生其益无方𫝊以天道資始地道資生萬物各正性命之理言之本義則曰亦上文卦體之義也上體本乾以一陽益下而為震天之施也下體本坤以一隂應上而為巽地之生也合同而化物无不被其益寧有方所可限量乎无疆言悠久也无方言廣大也在損道時字凡三出有不勝其叮嚀者在益道則統以一言贊之曰與時偕行而巳天之施以時施也地之生以時生也益之道與天地合徳故曰與時偕行也蓋道无不行之時時无不益之道損固有時而不損益則无時而不益也𫝊曰天地之益无窮者理而已矣聖人利益天下之道應時順理與天地合也象曰風雷益君子以見善則遷有過則改風雷有交助之勢益之象也君子觀益之象以自益見善則以遷為益有過則以改為益善在人見之則有如不及之心遷者步其武也從善如登故曰遷過在已知之則有罔即安之心改者易其轍也謝過以質故曰改遷曰則遷改曰則改言乎其迅速而果决也迅速如風稍緩焉則濡滯而不能遷矣果决如雷稍憚焉則隠忍而不能改矣遷善則過日寡改過則善日積兩者相資以行而其要尤在改過改過所以遷善也陽明曰人非堯舜孰能无過此亦相沿之論若堯舜之心而自以為无過即非所以為堯舜矣不曰人心惟危乎成湯改過不吝孔子曰可以无大過矣自古大聖人未有不繇斯道者况其下乎周子曰人之生不幸不聞過又曰仲由喜聞過令名无窮焉是故改過而後可以遷善遷善而後可以為君子昔人置赤白二豆於筩中以為善惡之騐久之遂有善而无惡也其法益之象者與若先輩功過格著實舉行固君子之徒也初九利用為大作元吉无咎初本隂也損四之陽以益之遂為震主受四之益大矣受大益而不思所以大報之可乎故曰利用為大作利用正所以用益之道也為大作者大有作為𫝊曰作大益天下之事也然非盡善盡美不可四損已以益初元徳也初元象以元功報元徳而後无咎也象曰元吉无咎下不厚事也隂柔不堪大作者初之本色也賴四作成易柔為剛而後可以大作然則獲肩重任非下也上也若曰非四何以有今日乎故必大善而後可以塞咎也此與𫝊義少異𫝊曰在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為无咎能致元吉則在上者任之為知人已當之為勝任不然則上下皆有咎也六二或益之十朋之龜弗克違永貞吉王用享於帝吉六二柔順虚其中以求益與損六五同故或益之亦與六五同但損五元吉而二則曰永貞吉者君臣之分殊而剛柔之位異也𫝊曰質本隂柔故戒在常永貞固則吉也求益之道非永貞則安能守也王用享於帝吉本義只向占上説亦是似不如𫝊義為勝𫝊云如二之虚中而能永貞用以享上帝猶當獲吉况與人接物其義有不通乎求益於人有不應乎祭祀天子之事故曰王用也或曰王用謂九五九五用六二以享帝所謂使之主祭而百神享之頗有理象曰或益之自外來也或以外為五謂五為正應故來益之則外為外卦之外本義云或者衆无定主之辭𫝊云衆人自外來益之則外只就衆人説但𫝊又加一轉云或曰自外來豈非謂五乎曰如二之中正虚中天下孰不願益之三為正應固在其中矣如此説尤為渾全六三益之用凶事无咎有孚中行告公用圭三當益之時居下之上司長民牧民之責者也程𫝊作救荒説極是朱子非之謂當時无守令恐難如此説竊意易之為書把千萬年情事都豫先説在裏面豈當時所有而後言乎本義云益之以警戒震動之事欲其困心衡慮而固有之也其義固好然與有孚中行告公用圭二句便判然兩義矣看此卦初便説做大事五便説布大徳二説享帝四説遷國俱恁大事情則此爻為救荒何疑大凡事君之道専擅其所最忌也獨於患難非常之事不妨權宜為之自他人視之以為有専擅之咎而不知為上為民何咎之有𫝊曰量宜應卒奮不顧身力庇其民故无咎也然必有其孚誠而所為合乎中道則誠意通於上而上信與之矣専為而无為上愛民之至誠固不可也雖有誠意而所為不合中行亦不可也圭者通信之物禮云大夫執圭而使所以申信也凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公用圭玉也其孚能通達於上矣在下而有為之道固當有孚中行又三隂爻而不中故發此義或曰三乃隂柔何得反以剛果任事為義曰三質雖本隂然其居陽乃自處以剛也應剛乃志在乎剛也居動之極則果於行也以此行益非剛果而何易以所勝為義故不論其本質也直説的恁地通快須如此其義始曲盡矣昔汲黯發倉粟賑河内還報武帝而不之罪王竑巡撫兩淮不待奏報大發官儲賑饑民併及河南山東流亡者上聞之喜曰好都御史不然餓死吾百姓矣彭誼知紹興府民饑開倉賑之曰待請而發轉溝壑者多矣吾何愛一身而不以活萬民此皆有孚中行告公用圭之騐也象曰益用凶事固有之也衆人畏忌之事以身當之而不辭故曰固有之也𫝊曰謂専固自任其事也居下當禀承於上乃専任其事惟救民之凶災拯時之艱急則可也乃處急難變故之權宜故得无咎若平時則不可也説的最分曉六四中行告公從利用為依遷國三四以二體言之皆不中曰中行者戒之也以一卦言之皆中曰中行者勉之也任其一偏而不設中於乃心其可行乎不可行其可告乎行以中道則告公而見從矣四與初互遷而成益故言遷國之事利用者盤庚所謂視民利用遷也依字本義作周之東遷晉鄭焉依之依此為弱小者言也若盛時開國遷都之事則不然矣𫝊云依附於上亦未的愚謂立國必有所依失所依則遷遷國者為宗廟社稷百官萬民所憑依而遷也故曰利用為依遷國象曰告公從以益志也盤庚曰亦唯爾故以丕從厥志言志在益民也以益民之志告公公曰是吾志也其有弗從九五有孚惠心勿問元吉有孚惠我徳五以剛健中正之徳居尊位而下應六二之柔順中正當益之時為益之主而世沛其膏澤者也有孚惠心上有至誠愛人之心也元后作民父母豈待問而知其元吉哉夫所以勿問而知其元吉者何也在上存之為心者在下被之為徳有孚惠心正以其徳孚也有孚惠我徳正以其心孚也上下相孚之至也𫝊曰以陽實在中有孚之象也又曰有孚惠我徳人君至誠益於天下天下之人无不至誠愛戴以君之徳澤為恩澤也其理自好象曰有孚惠心勿問之矣惠我徳大得志也聖人以孚惠為吉以有孚惠心為元吉故象不復言元吉但於勿問加之矣二字正所以深信之也五何志以益天下為志惠我德則樂樂利利而九五益天下之志大得矣大得謂无遺憾也上九莫益之或擊之立心勿恒凶𫝊曰上居无位之地非行益於人者也以剛處益之極求益之甚者也所應者隂非取善自益者也如此説上九之義始備蓋貪得无厭黷貨不已者也歛怨樹敵故有莫益之而或擊之之象夫莫益而或擊之其凶甚矣則以立心无恒故也反覆變詐惟利是問不復知有常理正道也勿恒非特不恒言有意禁絶其恒心也𫝊曰利者衆人所同欲也専欲益己其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致讐怨故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也名言可作名言箴象曰莫益之偏辭也或擊之自外來也𫝊曰云莫益之者非有偏己之辭也本義曰猶從其求益之偏辭而言也俱未甚醒余謂求益不已不見已不益人只見人不益已云莫益之者不責已而尤人一偏之辭也其心不恒故其辭不正也公論不與羣起而攻之故曰自外來實自内召也求益者盍亦慎所為也𫝊曰人為善則千里之外應之六二中正虚已益之者自外而至是也茍為不善則千里之外違之上九求益之極擊之者自外而至是也繫辭曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶君子交動與求皆以其道乃完善也不然則取傷而凶矣或曰説卦謂近利市三倍上處巽極乃求益之甚者巽又為進退為不果其究為躁卦正所謂立心勿恒而好利者之常態也亦有理乾下兑上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬為卦上兑下乾五陽共决一隂故為夬方小人道長之時機事不密則害成故須鎮静沉黙未敢揚於王庭未敢號於衆也今以五陽决一隂消長之勢懸絶矣討罪之舉昭然暴白於大廷之上无庸隂謀為也又必至誠肫篤號召同人諭以戒慎恐懼之意其謀之也周其防之也備惟恐一念踈一着緩立遭反噬之禍也漢王允之於郭李唐五王之於武三思宋趙汝愚之於韓伌胄皆未達孚號有厲之義者也無瑕者可以戮人若自治不嚴則小人得以藉口自邑者私邑也告亦號之之意使吾黨之人莫不恪守法令不以疵累開之也五剛合勢所少者非威武也以强力為武以謀殺為威豈朝廷之福乎漢唐之討小人始於肘掖之間輕以甲兵從事遂至亡家覆國皆未達不利即戎之義者也五陽雖盛而居其下往而後造其極也一隂雖衰而據其上往而後除其本也故曰利有攸往此皆摹倣而得之然𫝊至淡至精畢竟有不可少者如解首句云小人方盛之時君子之道未勝安能顯然以正道决去之故含晦俟時漸圖消之之道今既小人消㣲君子道盛當顯行之於公朝使人明知善惡故云揚於王庭孚信之在中誠意也號者命衆之辭君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危道雖以此之甚盛决彼之甚衰若易而无備則有不虞之悔聖人設戒之意深矣如解中二句云君子之治小人以其不善也必以已之善道勝革之故聖人誅亂必先修已舜之敷文徳是也以衆陽之盛决於一隂力固有餘然不可極其剛至於太過太過乃如蒙上九之為冦也戎兵者强武之事不利即戎謂不宜尚壯武也即從也從戎尚武也如解末一句云利有攸往陽雖盛未極乎上隂雖㣲猶有未去是小人尚有存者君子之道有未至也故宜進而往也不尚剛武而其道益進乃夬之善也俱名言可作經國訏謨彖曰夬決也剛決柔也健而説決而和夬决去之義合五陽之剛决一隂之柔也乾體健兑體説健則决説則和无剛狠好勝之意有煦嫗平中之徳故曰决而和也此與他卦以卦徳釋卦名義不同故本義曰釋卦名義而贊其徳也揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也一柔乘五剛之上是以一小人乘衆君子之上而陵之其罪大矣聲而討之與衆共棄也當是時君子之操心其危矣至誠以警戒之乃可免於危而陽道光顯也鬭智角力小人所尚一意内修不與競一日之長則其技窮故曰所尚乃窮也五陽同進剛長也而未終進而除去一隂則夬往為乾剛之長乃克有終矣象曰澤上于天夬君子以施禄及下居徳則忌澤决而潰潰而上於天夬之象也决於上注溉於下澤之施也君子象之以施禄及下受禄於天則有天禄班禄於朝則有王禄君子之施可謂禄孚布徳施仁而下焉者廣被其休是即君子之禄也居官則以政教為膏澤居郷則以立達為施濟未有君子而膜視斯人者居徳則忌依𫝊約立防禁之説未安王弼作明忌或云居止或云居積其説甚多竊意澤從天而下者也然未嘗自以為功豈非天之大徳不居乎君子象之以居德則忌若行慶施惠而揚揚有德色焉則所忌也忌即忌諱忌憚之忌謂畏而不敢當也按訂詁云君子雖有以施德于天下茍自居其德不推功于衆則未免為羣陽所忌當夬之時一隂猶存五陽自當協力以决之不宜自相乖異也其説甚好或以為大象𫝊例无反辭故本義以為未詳初九壮于前趾往不勝為咎初乾體陽位當夬之時不以在下自安者也故有壮于前趾之象一隂在高位初居四陽之下而欲决之其能勝乎往而能决則為勝往而不能决則為不勝曰為咎者咎其所自為也象曰不勝而往咎也初意往勝爻曰往不勝抑之也爻曰往不勝抑之于既往之後象曰不勝往抑之于未往之前也未往而已知其不勝往何益矣當尊卑懸絶之日而以直言賈禍如此類者豈少哉京房劉蕡是也九二惕號莫夜有戎勿恤二以剛居柔而得中所謂健而説决而和者與惕厲以自警則有先事之防呼號以自助則有同德之應雖莫夜興戎其如有備无患何哉從來小人之謀君子每于倉卒不及隄防之際乗隙而動君子則有以思患而預防之故雖暮夜有戎勿用憂恤也象曰有戎勿恤得中道也得中道者得乾道之中也中則不至剛而過激小人之變不至柔而不及召小人之侮即小人亦嘆服而去不敢如害也或曰如周亞夫軍中夜驚堅卧不動是也九三壮于頄有凶君子夬夬獨行遇雨若濡有愠无咎三過剛而不中慮以輕洩敗事故有壮于頄之象决小人而見于顔面之間使彼先事而為之備必敗之道也故曰有凶周顗殺賊奴取金印如斗大想當時是甚顔面不旋踵而身亡壮頄之凶也然三與上為正應為所用不可也若陽用而隂圖之以行其權何不可者君子果能以决隂為志斷然不疑夬而又夬雖舍衆陽獨行而與上遇疑有失身之咎遇雨而見沾濡為衆陽所愠怒疑有敗羣之咎然志在次隂得貞勝之理无咎也𫝊本胡安定而互易爻辭朱子以為不必是也本義云温嶠之于王敦小註又益以王允之于董卓顔杲卿之于安禄山皆確喻也余謂王陽明之擒宸濠亦善用此爻者象曰君子夬夬終无咎也象加終字言始而汚其身以有為雖同類不能无異議况其他乎既而一隂退聽心事昭然亦可即終而諒其始矣九四臀无膚其行次且牽羊悔亡聞言不信四居大臣之位與上六同左右君側者也以陽剛負君子之望欲坐視而不與衆陽同進則有所未安臀无膚也以隂巽畏小人之禍欲直前而為衆陽之先則有所不敢其行次且也次則春秋次于郎之次牽羊本義從許慎之之説云讓而先之張橫渠亦如此説竊思四居三陽之上若不與同進而安處其後又是其行次且矣𫝊曰羊者羣行之物牽者挽拽之義言若能自强而牽挽以從羣行則可以亡其悔然既處柔必不能也雖使聞是言亦必不能信用也其義甚醒又曰夫過而能改聞善而能用克己以從義唯剛明者能之在他卦九居四其失未至如此之甚在夫而居柔其害大矣尤為格言竊從其意推之蓋三陽合志同心居四之下正望大臣為倡首則其事濟矣牽連衆陽以進于五上不負君下不愧諸君子故其悔可亡也其如遲疑不决聞忠謀而不見信用何哉象曰其行次且位不當也聞言不信聰不明也以剛居柔位不當也位不當故且前且却无見義之勇剛則有聰德居柔則為物欲所蔽聰不明也聰不明故自暴自棄无納忠之哲漢張禹之于王氐類此九五莧陸夬夬中行无咎五以陽剛中正居尊位决隂之主也而切比上六一隂有莧陸之象莧陸程云一物朱雖云兩物而本義從之曰今馬齒莧是也看來只是一物象一隂也按埤雅莧莖葉皆高大而見故字從見九五剛中居高而柔生于上莧陸之象也如此説則陸字有着落感隂氣之多者暴則難乾脆則易折若能夬之又夬伸衆陽之公義絶一隂之私情則合于中行之道而无咎矣一象曰中行无咎中未光也本義不能益一辭但曰程𫝊備矣𫝊曰夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而决之雖行于外不失中正之義可以无咎然于中道未得為光大也蓋人心一有所欲則離道矣夫子于此示人之意深矣觀此則知五與隂比但迫于衆陽而後夬之其中有不可告人者故聖人為此誅心之論亦春秋責備賢者之意也上六无號終有凶𫝊曰无用號咷本義云无所呼號本義為是蓋上卦兑體兑為口故彖曰孚號二曰惕號上則无所號也五陽明同進一隂无所容欲號五而五迫于公義不可奪也欲號三而三之應之者實所以圖之也欲號羣隂而黨類已盡矣其誰應之方權奸肆志之日一呼百應唯命是從一旦禍發勢窮去之惟恐不速豈復有患難與共者哉无號終有凶曲盡小人末後一着情状矣象曰无號之凶終不可長也上處一隂将終之地而當五陽並進之時无長久理若知其不可長而轉隂為陽則與君子同體矣此象所以但因爻辭一致嘆惜之意也謹按此卦爻五陽共决一隂宜若甚易之事而彖𫝊爻象每多戒備之辭又若甚難者何也諸家之説未深當于心嘗取彖𫝊爻象再四思維竊意一隂居上其在外戚則漢之梁冀唐之楊國忠之流是也其在權奸則漢之董卓唐之張易之武三思之流是也决之不得禍不旋踵矣故貴乎健而悦决而和也揚于王庭小人之權勢赫奕也故曰柔乗五剛也乗者凌而上之之謂孚號有厲言人亦有為小人所信任而聽其呼號者如以九三之陽且為之正應豈不可危然事平而人諒之故曰其危乃光也告自邑不利即戎言衆正同心共濟不激其怒不犯其鋒使之无隙可乗故曰所尚乃窮也陽日盛隂日衰一旦决而盡之故曰剛長乃終也當隂之方盛不量力而决之為壮趾之初九者曹操之刺董卓是也王允明于九二之義外敬奉而内實圖之卓雖横暴戮辱不及焉惕號而有戎勿恤者也杜喬李固壮頄有凶矣狄梁公其君子之夬夬者乎張説蓬生麻中其若濡有愠者乎此九三之大較也九四當大臣之位以剛居柔游移觀望故有次且之象衆正掖之以行故有牽羊之象然事濟亦得悔亡此碌碌因人成事者也九五一爻唯明皇馬嵬之變順六軍而誅國忠足以當之蓋莧者隂也生莧者陸也始而假以事權終能不昵私愛其中行无咎之謂矣上六之凶董卓被誅時似之若蔡雝之不免李郭之煽亂又王允犯居德則忌之戒也易酌卷七
