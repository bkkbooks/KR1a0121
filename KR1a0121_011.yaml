body:
  text: 易酌卷十一祁州刁包撰繫辭上傳天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣朱子曰天尊地卑上一截皆説易前道理下一截是説易書又曰把下面一截説做未畫之前也不妨看來只就未畫前説為是言有天地便自然有這易的道理至下設卦觀象章始是説易書也細玩程説俱未説到作易處如云尊卑之位定而乾坤之義明矣是謂乾健坤順性情確不可易也尊卑既判貴賤之位分矣是謂分貴分賤才成個世界如君臣上下之類是也陽動隂靜各有其常則剛柔判矣是謂陽常動隂常靜動者以其剛故也靜者以其柔故也動靜之不爽正剛柔之不易斷者判然分别之意也程子以方為事故本義云方謂事情所向余謂方即東西南北四方也方必有所宜隨其所宜為類方以類聚也有體質者謂之物物必有所與隨其所與為羣大羣小羣門戶攸分物以羣分也有類有羣則善惡邪正從此出焉善者吉惡者凶正者吉邪者凶吉凶所由生也此正為占決張本不必就指卦爻占決之辭説在天成象非特日月星辰也凡有氣者皆是在地成形非特山川動植也凡有質者皆是程子曰變化之迹見矣玩迹字是謂天施地生了無凝滯處此正為蓍䇿張本不必就指卦爻隂變為陽陽化為隂説此以上統言造化之體而易之體於是乎見矣是故剛柔相摩八卦相蕩是故二字雖起下要亦承上朱專就易説故只起下若就乾道説則承上矣剛柔相摩至坤道成女向來都依本義作易卦變化説玩程子云隂陽之文相摩軋八方之氣相推蕩雷霆以動之風雨以潤之日月運行寒暑相推而成造化之功得乾者成男得坤者成女只是就乾坤説主程為確此以上統言造化之用而易之用於是乎見矣竊意剛柔相摩一隂一陽交際為功也八卦相蕩四隂四陽互相為用也鼓之以雷霆潤之以風雨日月運行一寒一暑雷霆震動故曰鼓風雨和洽故曰潤禮作奮之以風雨風兼雨易作潤之以風雨雨兼風若單以奮言雨以潤言風則不得矣日月運行即所謂日往月來月往日來日月相推而明生也一寒一暑即所謂寒往暑來暑往寒來寒暑相推而嵗成也本義云此變化之成象者乾道成男坤道成女乾索坤而為震坎艮得乾之健氣故成男坤索乾而為巽離兊得坤之順氣故成女此專就人説而推之於物為是若兼人物説恐草木禽獸不得言男女也本義云此變化之成形者乾知大始坤作成物乾備四德萬事萬物莫不託始于此故曰大始知訓知州知縣之知有主宰意坤亦以四德奉行天道故曰作成言起而翊贊之以變化既成萬物也本義云此承上文男女而言乾坤之理其説便與程合矣乾以易知坤以簡能乾統坤故曰知坤承乾故曰能乾只是一箇健生出物來更無留難故為以易而知坤只是一箇順非于乾外另有作為故為以簡而能此四句總言乾坤之德也自此至末則言人能易簡便與乾坤合德矣易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業本義云人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於內故可久有功則兼於外故可大俱精甚不可移易嘗從其意推之能明白坦夷如乾之易則一望而見故易知此易字是容易之易與上易字不同此知字是知見之知與上知字亦不同人能要約直截如坤之簡則不煩勞而人易從從謂倚庇附和之人也易知則人以心相照異姓如骨肉故有親易從則人以身相託效力如指臂故有功有親則輸誠納款足以長永而不已故可久有功則樹勳底績足以恢括而不窮故可大可久則行道而有得於心故曰德所謂足乎已無待於外也可大則規模宏逺足以被物故曰業所謂三不朽也不曰聖人而曰賢人使人皆可學而至也易簡而天下之理得矣天下之理得而成位乎其中矣學者莫要於窮理博言之則精粗表裏無之可或遺也約言之則易簡二字盡之即精以該粗即裏以該表一以貫萬之道也故曰易簡而天下之理得易簡二字緊根易知易從二句來天下理得即賢人可大可久之德業也天位乎上地位乎下人位乎中鼎立原是本分事只因人把造化所以與我者斫喪了仰愧俯怍遂無以自立於天地間若是完完全全無少虧欠則三極在握才是頂天立地漢子成位乎中胡不可者本義云至此則體道之極功聖人之能事可以與天地參矣方言德業可以希賢即曰成位乎其中是不獨希聖且希天矣然則人可以為乾可以為坤而不可以為聖人乎學易者勉之右第一章聖人設卦觀象繫辭焉而明吉凶此章明作易緣由使學者朝夕佩服而不忘也卦成于六畫設之者伏羲耳先儒云卦者挂也懸挂物象以示人也卦設則有可觀之象象者倣佛影似之謂也然象隱而難據未若辭顯而可憑是故文王觀六十四卦之象而繫之彖辭周公觀三百八十四爻之象而繫之爻辭然後吉凶曉然而天下萬世知所趨避矣剛柔相推而生變化易只是隂陽陽剛隂柔二畫互相推蕩而變變化化浩乎其不窮矣或曰推如手之推變化謂變新化舊柔推去剛則剛變而化柔剛推去柔則柔變而化剛蓋周易以變者為占故用九六而不用七八也説的最分曉是故吉凶者失得之象也悔吝者憂虞之象也世人遭遇順境則曰吉遭遇逆境則曰凶聖人曰不然失得而已矣得則吉之象失則凶之象吉凶惟所自取耳此即所謂作善降祥作不善降殃也悔吝句與吉凶句不平對吉凶判然不兩立悔吝則居可吉可凶之間朱子曰悔者自凶而趨吉吝者自吉而向凶悔吝皆自憂慮于中虞度于外兩念得來蓋徒悔而已則悔亦為吝若真知羞焉則吝亦為悔此憂虞所以未為失得而悔吝所以未至吉凶也此聖人言設卦觀象繫辭而明吉凶之義也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也人不知變化有不知進退者乎變化之義微矣可借進退形之剛化柔進極而退之象柔變剛退極而進之象知進退則知變化矣進退猶言消息也人不知剛柔有不知晝夜者乎剛柔之義微矣可借晝夜形之剛屬陽晝象柔屬隂夜象剛柔之動而靜靜而動如晝夜之循環無端也剛以柔濟柔以剛濟如晝之必夜夜之必晝也知晝夜則知剛柔矣晝夜猶言盈虛也此言剛柔相推而生變化之義也六爻初二地也三四人也五上天也天地人以其質言之曰三才以其理言之曰三極渾言之三才統體一太極也分言之三才各具一太極也其理隨六爻變化蓋極至而蔑以加也是故君子所居而安者易之序也所樂而玩者爻之辭也易統天地人而滙其全如此是故君子所居而安者其序也行止進退以易為凖次第秩然其可循也蔡氏曰自卦言否泰剝復之類自爻言潛見飛躍之類是也或單指卦言未是所樂而玩者其辭也心口形神以易為歸語意淵然其無盡也橫渠曰每讀每有益所以可樂是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利此居字與上居字不同上居字以身之所處言此居字以靜對動言也靜而無為則觀卦爻之象而玩其吉凶之辭抽繹聖人之旨趨學易而會諸心也動而有事則觀卦爻之變而玩其吉凶之占服膺聖人之訓迪而體諸身也一動一靜奉若易道即奉若天道此天之所以隂扶默相而時措咸宜也有吉而無凶併無悔且吝又焉有不利者哉右第二章彖者言乎象者也爻者言乎變者也此章釋彖辭爻辭之大凡見人人可與能也彖辭謂文王所作者以言乎其斷也統言一卦之象而斷其吉凶也爻辭謂周公所作者以言乎其交也分言一節之變而交其剛柔也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也吉言乎其得則宜勉之凶言乎其失則宜救之豈曰言之已乎悔吝之心人恆有之但患不及察耳既云小疵則非大過旁觀者恕之可也雖非大過終是小疵當局者忽之可乎言及此如睹憂虞之象焉咎本有能易吝而悔易凶而吉則無咎矣補其罅漏者而得全補其錯誤者而歸正善哉能自新也已是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭位六爻之位陽貴隂賤以爻位次第之也朱子曰二四則四貴而二賤五三則五貴而三賤上初則上貴而初賤上雖無位然本是貴重所謂貴而無位髙而無民在人君則為天子父為天子師在他人則清髙而在物外不與事者此所以為貴也是專以上下言不以隂陽言也卦者六畫之卦陽大隂小以卦象更定之也楊氏曰齊不是整齊如分辨之義竊意作整齊亦是言大大小小整頓齊一而不亂也卦爻吉者則有吉之辭卦爻凶者則有凶之辭玩其辭而辨析較然矣謹按不分辨將何以整齊既整齊便自有分辨二義原不可偏廢憂悔吝者存乎介震無咎者存乎悔吉凶未定得失未成知悔吝之為疵而鰓鰓有憂心焉此非克自樹立介然有守不可也故曰存乎介介謂辨别之端蓋善惡已動而未形之時也于此憂之則不至于悔吝矣非吉則凶非得則失知無咎之為難而虩虩有懼心焉此非深自愧怍翻然大悟不可也故曰存乎悔震動也知悔則有以動其補過之心而可以無咎矣是故卦有小大辭有險易辭也者各指其所之小即大往小來之小隂也凶卦也大即小往大來之大陽也吉卦也卦之吉者則其辭平易可觀使人有玩慕不能置之心焉卦之凶者則其辭危險可畏使人有惶恐不自寧之意焉蓋得失異道吉凶殊途毫釐千里之差也各繫以辭所為指點路頭使不迷于所之耳聖人之憂患來世至矣哉右第三章易與天地凖故能彌綸天地之道此章言天地許大道理都包括在易中聖人用之以周盡天下古今物事也權衡家輕重停勻如數則曰凖易與天地凖言分量齊一也彌即河水彌彌之彌言彌綸充盈無罅隙無滲漏也綸者細密周匝條理井然也出乎天地之外而無際入乎天地之內而無間故曰彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀仰以觀于天文日月星辰之類其燦然者矣燦然者其明也其所以燦然者則未嘗不幽俯以察于地理山川動峙之類其秩然者矣秩然者其明也其所以秩然者則未嘗不幽明者其象也幽者其理也象不出乎理理不出乎隂陽隂陽不出乎易可觀察而知其故也本義云天文則有晝夜上下謂晝明夜幽上明下幽也地理則有南北髙深謂南明北幽髙明深幽也尤確仙釋之家脫離生死之外既不能原其始功利之徒醉生夢死之中又不能反其終知其説者或鮮矣原者推原之意探本窮源也反者還反之意歸根復命也能原始而知其所以生有全而生之者必能反終而知其所以死有全而歸之者生死者其命也所以生死者其理也命不離乎理理不離乎隂陽隂陽不離乎易可原反而知其説也子路問死子曰未知生焉知死其告以原始反終之説乎以鬼神為有者談玄説怪既誕妄而不可信以鬼神為無者直欲一筆勾倒反滋世人之疑知其情狀者或鮮矣精隂也氣陽也精氣凝結為物魄隂也魂陽也魂魄升降為變為物為變者其數也所以為物為變者其理也數不外乎理理不外乎隂陽隂陽不外乎易可考而知其情狀也楊誠齋曰與鬼神合其吉凶鬼神害盈而福謙此其情也視之不見聽之不聞體物而不可遺洋洋乎如在其上如在其左右此其狀也説的甚分明自天子以至于庶人莫不有祖宗莫不有祀自天地山川風雲雷雨社稷以至大聖大賢忠孝節義之類莫不有祀子曰敬鬼神而逺之曰非其鬼而祭之諂也記者又曰子不語神神與怪與力與亂都是有的若是無他何用説不語蓋聰明正直而為神固其理也若邪魅則亦有之昔者少昊氏之衰九黎亂德神人雜揉至顓頊絶地天通無相侵瀆然後神人不雜各安其位焉大抵身心正大則鬼不為祟世道休明則鬼不為厲自古如此彰彰可考故曰國將興聽于人國將亡聽于神若以中庸所謂鬼神者言之誠則有不誠則無以世俗所謂鬼神者言之正則無不正則有然則鬼神之有無其在人乎學者只是誠正二字治心治身的工夫便是事鬼事神的道理子路問事鬼神子曰未能事人焉能事鬼正此意也禮記孔子答宰我問曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必有死死必歸土是之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也張橫渠曰精氣者自無而有遊魂者自有而無朱子曰隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也合三説而鬼神之義始備矣與天地相似故不違知周萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛本義云天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知不流者守正之仁既樂天理而又知天命故能無憂而其知益深隨處皆安而無一息之不仁故能不忘其濟物之心而仁益篤分疏極明曉蓋天無所不覆地無所不載聖人之易無所不包與天地相似也不違言不相違戾也配合無間如顔子三月不違仁之違萬物之隂陽消息聖人以易旁燭之而不遺知周萬物也是與天相似也天下之吉凶禍福聖人以易開示之而不誣道濟天下也是與地相似也不過言不相踰越也千岐萬轍期于適中而止變而不失其常權而不離乎經旁行不流也天者何理是也念念循乎天理樂天也命者何數是也事事明乎天數知命也斯所謂知周萬物也以理御數則造化在手又何憂焉富貴貧賤譯狄患難皆土也安者素位而行隨其所遇安然若固有之也敦如中庸敦化敦厚易敦復敦艮敦臨之敦敦乎仁則人欲淨盡純是一團天理故以天地萬物為一體而能愛也斯所謂道濟天下也本義云仁者愛之理愛者仁之用故其相為表裏如此蒙引遂以仁為裏愛為表蓋仁者心之德愛之理也安土敦乎仁全乎心之德也所以能愛能愛全乎愛之理也故其仁益敦此相為表裏之説也韓退之以博愛為仁正不識表裏之義範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體天地之化渾淪無端聖人隨時隨處做出模樣來使不至渺而難窺如型範一般故曰範天地之化紛紜不齊聖人隨事隨物一切包括起來使不至渙而無統如匡郭一般故曰圍且如溫涼寒燠天地之化也非聖人範圍之不知如何是春如何是夏如何是秋冬能無過乎春夏秋冬天地之化也非聖人範圍之不知春如何生夏如何長秋冬如何收如何藏能無過乎推類言之亦安可枚舉也蓋不過與上不過不同謂聖人有以補天地之過也曲成萬物自五倫之大以至動靜語默及一牛一馬一草一木之類皆有以成就之罔不詳悉者不遺也朱子曰範圍如大德敦化曲成如小德川流竊意範圍如語大天下莫能載曲成如語小天下莫能破也千古萬年可以晝夜二字盡之通乎晝夜之道而知幽明之故生死之説鬼神之情狀無不知之矣通知一併知之也蒙引云不曰天地之道亦不曰隂陽之道而必曰晝夜之道晝夜循環者也聖人之道動靜無端隂陽合德上下與天地同流故知晝又知夜所謂知天地之化育也説的甚好通乎晝夜之道而知則神矣神妙萬物而為言者也豈有方所可拘乎妙萬物而不測易也易變動不拘不可為典要豈有形體可據乎或曰神主天地言非也張子曰語其不測故曰神語其生生故曰易神莫神于易故周易謂之神易易無體程子何以曰其體則謂之易也余謂以無極而太極言之故曰其體則謂之易以太極本無極言之故曰其體則謂之易以太極本無極言之故曰易無體朱子曰無體與那其體則謂之易不同各自是一個道理此章本義分三截看自易與天地凖至知鬼神之情狀為聖人窮理之事自與天地相似至故能愛為聖人盡性之事自範圍天地至易無體為聖人至命之事確不可易又曰以者聖人以易之書也此句尤當理會泛就聖人説非是右第四章一隂一陽之謂道此章言隂陽之道聖人神其用于易而不可測也本義云隂陽迭運者氣也其理則所謂道説的極有斟酌即程子所謂隂陽非道也所以一隂一陽者道也言其一隂而又一陽循環不已也此道字即指太極説太極動而生陽靜而生隂故曰一隂一陽之謂道先隂後陽本義所謂道具于隂而行乎陽者也繼之者善也成之者性也繼之成之兩之字俱就道説繼此一隂一陽之道于天則謂善謂上帝所降之衷也成此一隂一陽之道于人則謂性謂下民所有之恆也張蓬元曰繼善也者氣方行而未著于物正在天人相接之際故曰繼善所謂大哉乾元萬物資始誠之源也成性也者理已立而初受于人正在性命各正之時故曰成性所謂乾道變化各正性命誠斯立也有至善而後有繼善有繼善而後有成性其説甚確此見函隂負陽者咸具此道自天命之初而已然矣有善而後有性有性而謂無善可乎故曰孟子性善之説本此此言天地之性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣仁屬陽但見一陽而不見一隂則能動而不能靜知屬隂但見一隂而不見一陽則能靜而不能動執其一隅而不悟其大全所謂賢知之過也百姓行不著習不察日用隂陽而不知隂陽之道所謂愚不肖之不及也竊意仁者見之謂之仁如墨氏兼愛佛氏慈悲説法之類皆是也知者見之謂之知如楊氏為我老氏明民愚民之類皆是也君子之道所以不明不行者職是故耳故曰鮮矣此言氣質之性也顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉顯仁藏用向來就天地説非也宜緊根上君子之道鮮句來言體道者雖鮮而道之功用固不可誣也按文法似宜云顯諸用藏諸仁而必云顯仁藏用者正程子所謂體用一源顯微無間也本義云顯自內而外也以仁固在內者耳藏自外而內也以用固在外者耳訂詁云仁謂造化之心用謂造化之功亦好畢竟不如本義仁謂造化之功用謂機緘之妙二語意味深長朱子又云顯諸仁是元亨誠之通藏諸用是利貞誠之復顯諸仁似隱而費藏諸用似費而隱俱甚確鼓萬物而不與聖人同憂本義不著解但引程子云天地無心而成化聖人有心而無為二語最盡其説天地便是説道不當如諸儒就指天地説鼓兼鼓動鼓鑄二意盛德大業至矣哉是總承上三句而贊嘆之藏諸用便是充盛之德顯諸仁便是廣大之業不與聖人同憂便是盛德大業之極至而無以加處朱子曰只是説易之理非指聖人而言是也富有之謂大業日新之謂盛德盛德大業是從顯仁藏用看出富有日新又從盛德大業看出一步進一步富有者無物不有以體言日新者無時不然以功言本義只引張子大而無外久而無窮二語便盡不再加一字也此以上都是説道而易在其中此以下都是説易而道在其中矣生生之謂易訂詁云道雖無憂聖人能以其有憂體道之無憂而易于是乎作焉此句過接極好隂生陽陽生隂隂陽無始靜生動動生靜動靜無端交易變易生生而不窮也此其所以為易也本義云理與書皆然蓋説書便是理理固不在書外其揆一也蒙引以為朱子專言理不兼書言非也成象之謂乾效法之謂坤乾坤俱指卦説若泛言健順之理則失之矣疏云謂畫卦成乾之象擬乾之健故謂卦為乾也謂畫卦效坤之法擬坤之順故謂卦為坤也説的是本義云效呈也謂造化之詳密而可見者也説的晦了看來效法亦只是乃順承天之意極數知來之謂占通變之謂事極數或云天數二十有五地數三十之數或云七八九六之數俱通由數而推之預知來物須假靈乎蓍䇿故謂之占因卦之變而通乎事之變所謂聖人通變于未窮也個中大有斡旋在故曰通變之謂事若斤斤焉趨吉避凶而已則不可以言變通矣焦氏云徒知占而不知事一切俯首以聽于數則文王當殪于羑里孔子亦殱于桓魋矣何貴于易哉説的卻好隂陽不測之謂神隂陽不測之謂神本義只引兩在故不測一語便明張子曰一故神兩在故不測則其自注也斯謂一而兩兩而一者也夫道一而已矣以為在隂而又在陽以為在陽而又在隂無在無不在非人力所得而與也易其神矣乎知神則知易矣首以一隂一陽之謂道結以隂陽不測之謂神首尾互相照應而中間段段分隂分陽須要識的右第五章夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣此章極贊易之廣大而歸之易簡也夫易廣矣大矣句是綱下三句是目逺而無以禦之則其逺無際邇而有以止之則靜而正靜不雜揉也正不偏倚也謂無為而居中環應也本義即物而理存尚未甚顯天地間萬事萬物何可窮詰然都包括在易裏面備者完完全全無餘剩無滲漏也此三句皆明易之廣大也下二節又申言之夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉專舉乾坤者六十四卦皆從乾坤來二卦固諸卦之父母也以象言之乾畫竒而健固有靜專動直之象坤畫偶而順固有靜翕動闢之象以理言之物之未生乾道渾淪未剖故專一既生物則有一往莫遏之勢故直遂物之未生坤道斂藏未散故翕聚既生物則有四應不窮之功故開闢靜專動直大哉乾元萬物所以資始也故曰大生言乾道變化各正性命也靜翕動闢至哉坤元萬物所以資生也故曰廣生言坤順無疆也學者誠在自己身上看須是專一才能直遂若平居無確然不二之志臨事必多回互多摧折能直遂乎須是翕聚才能發散若平居無渾然不露之藏臨事必多鶻突多沾滯能發散乎天人只是一理本義云乾一而實故以質言而曰大坤二而虛故以量言而曰廣蓋天之形雖包于地之外而其氣常行乎地之中地能容受的天許多此廣大之所以分也其解尤確廣大配天地變通配四時隂陽之義配日月易簡之善配至德乾坤指易卦説故接大生廣生句而曰廣大配天地變通隂陽之義又從廣大而推言之也變謂隂陽老少之變變而不窮謂之通如四時之錯行也日陽精月隂精日月光華而隂陽之義無不普照如日月之代明也本義以三句為配天地以末句為配人事配人事正配天地之本也蓋易簡者所以廣大所以變通所以盡隂陽之義也易簡之善配至德所以配天地所以配四時所以配日月也配者合而有助如孟子配義與道之配與天地合其大與四時合其變與日月合其明參贊化育之事也與聖人合其德謂作聖之功必自易簡始也首章言易為賢人之德簡為賢人之業至此推而極之則為至德至德者極至而無以復加聖人之德也故此句結上三句又總結一章右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地此章贊易之至因乎天地之自然而其實則成性之書也上章云至德故此章直歸易而贊嘆之易之所以極至而無以加者何聖人之德由易崇聖人之業由易廣也胡氏指定作易聖人説恐亦未必德由易崇而崇德則致知之事知崇者知識超邁日進于髙明也業由易廣而廣業則力行之事禮卑者踐履篤實日守其卑下也知崇有上達意禮卑有下學意崇非好髙吾之知原與天同崇天崇而卑之是不及乎易也故崇效天卑非過下吾之禮原與地同卑地卑而亢之是過乎易也故卑法地本義云窮理則知崇如天而德崇循理則禮卑如地而業廣二語最確天地設位而易行乎其中矣成性存存道義之門天位乎上地位乎下易理便洋溢其中故曰乾坤毁則無以見易雖然易之崇非問知于天也即性之炯炯有覺者是易之卑非問禮于地也即性之秩秩有條者是崇德廣業者不必問易于天地但問易于天命之性而已天地間許多事物原是我性分內事只被私欲遮隔所以做道義不出若存而又存以至于不已則虛者能通靈者能應千變萬化都是這裏開闢出來故曰道義之門然則天地設位而易其門易位天地而性其門性者易之源頭也天地者易之法象也知崇禮卑者易之功夫也學易者日從事于秉彞之則降衷之恆庶幾得其門而入矣右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象此章明卦爻立象繫辭之意用之者要不外乎言動二端去疑指前段聖人為伏羲後段聖人為周公是遺卻文王矣可乎前聖人須兼伏羲文王説賾字依朱子作雜亂説為是以探賾索隱句觀之則賾隱二字須有分别不可作深逺説聖人仰觀俯察見其雜亂而莫可窮詰也于是畫卦倣佛出模樣來如竒便是乾的形容偶便是坤的形容宜于某物者即以某物象之如龍馬之類是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻動指隂陽變動及人身動作云為説朱子云凡一念之動亦是恐太深本義云會謂理之所聚而不可遺處通謂理之可行而無所礙處二語甚確太抵會如都會之會衆理皆萃聚于此通如通衢之通衆理皆往來于此典禮謂經常不易之理行其典禮直要做到恰好處聖門所謂約之以禮是也修乎典禮者以吉辭繫之悖乎典禮者以凶辭繫之以修悖為吉凶也效天下之動而為之是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也象者雖言天下之至賾然至賾之中有至一者存焉物宜所在不可厭惡也爻者雖言天下之至動然至動之中有至靜者存焉典禮所在不可紊亂也擬之而後言議之而後動擬議以成其變化本義云觀象玩辭觀變玩占而法行之是兼言動説項氏以擬言屬象以議動屬爻誣矣擬而後言只是比擬于易而言謂多寡煩簡中節也議而後動只是商議于易而動謂久速仕止當時也口無妄發身無妄動兢兢焉惟恐失之豈曰循行數墨已乎經權合宜正自小心謹慎中來擬議以成其變化也擬議本乎易變化生乎心即心即易而言動之間罔不成爻成象矣鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎擬言議動學易之道故以下七爻皆取言行之慎者明之中孚九二爻義言誠能動物也離卻言行則誠于何處見得故上截專説言下截説兼言行居其室在隂也出其言善鶴鳴也千里之外應之子和也誠則善不誠則不善善則應不善則違言如此行可知矣出身發邇言行不越居室而加民見逺則已行乎千里矣所以有應有違也樞謂戶樞有轉移之意機謂弩牙有撥動之意發而應則榮違則辱故曰榮辱之主也動天地專就善説以其為君子之言行也蒙引兼惡説非矣世人把言行作等間放過聖人説的恁地有關係擬議其義敢不慎乃言行乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭君子之道或出或處行不同也或默或語言不同也所謂同人者豈必言行是同哉同心可耳二人九五六二也斷金言物莫能間也同心之言其臭如蘭言臭味相投不啻若自其口出也如是更何號咷之不可笑哉朱子曰同人先號咷而後笑聖人卻恁地解擬議九五爻義則同人者不可不同心也按宋司馬光韓縝二公平生出處語默若合符節同為一代純忠其斷金之利乎且共期身後作傳克踐其言真如蘭之臭矣初六藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣載物莫如地錯諸地亦已安矣而又藉之不亦小心戒謹之甚乎茅之物本薄而錯地之物藉是以不敗是物輕而用重也可謂善用物矣慎斯術也以往推開説天下事莫不敗于忽而成于慎使事事物物皆以此道處之又安有他虞哉擬議大過初六爻義則用物者不可不慎厥術也勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也勞者所以立功也功則勞有成績矣不伐不自以為勞也不德不自以為功也此非厚之至者不能也楊氏云人之謙傲係其德之厚與薄德厚者無盈色德薄者無卑辭説的好以功下人言推之人而已不與正是其不伐不德處厚之至者蓋語此也德之厚者必盛德之盛者必恭動容周旋中禮者盛德之至也兩者自分開不得然而德須説個盛盛而後可言德也禮須説個恭恭而後可言禮也本義以欲字釋言字恐未的以上數句都發明謙字故末以謙字總結之蓋謙也者本乎德而徵乎禮天道益之地道流之鬼神福之人道好之故能保守其位而勿失也從來負氣傲物憑其技以加人者身名俱喪位之存焉者寡矣擬議謙九三爻義不可不進德而學禮也亢龍有悔子曰貴而無位髙而無民賢人在下位而尤輔是以動而有悔也此爻見文言故本義云重出蓋謙之德聖人既稱道之不置亢之悔聖人復悼惜之無已擬議上九爻義則履盛滿者不可不知止也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也不出戶庭身之節也聖人却説口之節蓋身之節莫大于口守口如扄戶庭庶不至于階之亂矣自古口舌招禍者不可勝數君不密則失臣唐髙宗昭宗是也臣不密則失身漢陳蕃董承是也事而曰幾圖之于未然也一或泄露使小人得先事而為之備則禍立至矣其能有成乎君子之謀大事定大難也雖骨肉不得與聞厥有以哉擬議節初九爻義不可不慎密其言也子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也作易者知盜謂其明于盜之源也無其才無其德而有其位孟子所謂非其有而取之者盜也五代六朝之君以盜招盜咎將誰歸偷竊神器不旋踵而亡滅豈非其明驗歟擬議解六三爻義不可不度德量力而妄為非分之獲也蓋易所謂盜與春秋所謂盜俱聖人特筆也余謂春秋書盜為盜臣賊子輩清其源惟作春秋者知之易繫盜為沽名竊位輩正其本惟作易者知之學者知春秋之盜然後可以知易之盜知易之盜然後可以知春秋之盜也右第八章天一地二天三地四天五地六天七地八天九地十此章明數學源流可以揲蓍求卦之法得之非人力所能為也先儒以此為河圖之數焦氏不取其説仔細看來正自同條共貫非無據而云然也伏羲氏繼天而王則河圖之文以畫八卦豈可誣乎天陽也陽數竒故一三五七九皆屬天地隂也隂數偶故二四六八十皆屬地以五行言之水火木金土五數備矣然水居北方壬癸也火居南方丙丁也木居東方甲乙也金居西方庚辛也土居中央戊己也即五數而十數在其中矣只此十個數目雖庸夫孺子能知之然兩儀在裏面所謂極平易極神竒極顯淺極奧妙也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也一三五七九天之五竒數也二四六八十地之五偶數也相得者一二也三四也五六也七八也九十也如甲陽與乙隂相得丙陽與丁隂相得戊陽與己隂相得庚陽與辛隂相得壬陽與癸隂相得也有合者一六也二七也三八也四九也五十也如甲陽與己隂有合乙隂與庚陽有合丙陽與辛隂有合丁隂與壬陽有合戊陽與癸隂有合也天積一三五七九之數則為二十有五地積二四六八十之數則為三十合天地之數五十有五則兼該而備舉矣五行之變化四時之變化萬物之變化皆天地之數為之也鬼神之屈伸往來皆天地之數為之也變化以數成鬼神以數行數之時義大矣哉大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒于扐以象閏五嵗再閏故再扐而後挂天地之數生于五五者數之祖也數之祖所以衍數而非所衍之數也故虛其中央金木水火土而獨稱五十所謂小衍之而成十大衍之而成五十也五十之中復虛其一而不用以象太極混沌未分之始一者其體也四十有九者其用也天下未有無體而有用者合四十有九之䇿信手平分各置一手以象兩儀左手象天右手象地也挂懸也有所待也以待兩手四揲之餘併歸而為一也舊法挂右手一䇿于左手小指之間焦氏云挂小指間則與扐同矣既有中指兩扐又加以小指則為三扐是五嵗之中不特再閏乃有三閏矣豈理也哉其法取一蓍懸于前與左右蓍折立為三今從之象三者天非地不成地非天不生天地非人不立謂人成位乎其中與天地鼎立而為三也焦氏所謂兩者三者無不象之非特象兩儀三才也則其説舛矣揲連數之也揲之以四者謂先置右手之䇿于一處而以右手四四而數左手之䇿又置左手之䇿于一處而以左手四四而數右手之䇿也象四時者象一嵗之春夏秋冬也竒零也扐勒也謂既四四而數左右之蓍而得正䇿之數則其四四之後必有零數或一或二或三或四也左手者歸之于第四第三指之間以象一閏右手者歸之于第三第二指之間以象再閏也閏者月之餘日積分而成月者也天地之數三百六十每嵗氣盈六日朔虛六日一嵗餘十二日三嵗餘三十六日以三十日為一月更餘六日又二嵗餘二十四日合前所餘六日為再閏再扐而後挂者一變之中有五節挂一為一節揲左為二節扐為三節揲右為四節再扐為五節一節象一節三節之扐象三嵗一閏五節之再扐象五嵗再閏是為第一變也既再扐而象再閏然後置前挂扐之蓍于一處而以所揲見存之正䇿合而為一是為第二變如初法再分再挂再揲再扐也不言分揲而獨言挂者以明再變三變以至十有八變每變皆當挂也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日䇿籌也即蓍之莖數也筮法初變挂扐之數不五則九再變不四則八三變亦不四則八九三變之後得五與四四通計十三則其過揲所得者四其三十六而其數九得九與八八通計二十五則其過揲所得者四其二十四而其數六合十有八變計之則為乾之䇿二百一十有六為坤之䇿百四十有四合之為三百六十則當一期之日數期周嵗也日行天一嵗一周凡三百六十五度四分度之一堯典云期三百六旬有六日是也今略其餘舉成數言之耳二篇之䇿萬有一千五百二十當萬物之數也二篇謂易上經下經也上下經六十四卦凡三百八十四爻陽爻百九十二每爻各四九三十六䇿積之得六千九百一十二䇿隂爻百九十二每爻各四六二十四䇿積之得四千六百零八䇿合之則萬有一千五百二十䇿而曰當萬物之數者取其盈數言之非謂萬物盡于是也是故四營而成易十有八變而成卦八卦而小成四營四度經營謂分二挂一揲四歸竒也焦氏引王景孟之説曰營求也用蓍之法以四而揲之成易之數以四而求之故老陽數九四而求之則其䇿三十有六老隂數六四而求之則其䇿二十有四少陽數七四而求之則其䇿二十有八少隂數八四而求之則其䇿三十有二是隂陽老少六爻之本也若夫乾坤之䇿三百有六十而二篇之䇿萬有一千五百二十亦以四而求之故乾陽爻九六九五十有四四而求之則二百一十有六坤隂爻六六六三十有六四而求之則百四十有四以乾之五十有四合坤之三十有六為九十焉亦四而求之則三百有六十而二篇之䇿陽爻一百九十有二其數一千七百二十有八隂爻一百九十有二其數一千一百五十有二總而言之二千八百八十亦四而求之則萬有一千五百二十也凡此皆求以四而得之此易所以成于四營也此説可謂發晦庵所未發每三變而成一爻一卦六爻合十有八變而成也八卦三畫之卦小成謂九變而內卦成于下也又九變而外卦成于上則大成矣引而伸之觸類而長之天下之能事畢矣引其義以靡竟觸其類以旁通則一卦可伸為六十四卦凡物之大小精粗事之經權常變數之進退分合理之微顯久暫未有出其範圍者故曰天下之能事畢矣引伸觸類是占得這一卦則就上面推看如乾則推其為圓為君為父之類是也本義又主四千九十六卦之説與諸家同竊意前説猶勝顯道神德行是故可與酬酢可與佑神矣凡一言一動皆道也何形影之可據揲蓍之法隨所占筮有辭可會有象可推莫不教人以恰好路徑如周行之彰明較著也故曰顯道德行即行道而有得于身心者步步趨趨決之于神絶人為而符天則若有靈爽呵護其間故曰神德行凡人類言事神尊卑判矣兹則幽明相應直如賔主相交神人一體居然與之酬酢也凡人類言神佑功用殊矣兹則神不能言者代之言神不能為者代之為神人合德是助神而非借助于神也子曰知變化之道者其知神之所為乎變化即隂陽老少盈虛消息自然之妙也明乎其道則乾坤在手造化生心雖隂陽之兩在不測者可以直窺于象先矣故深加贊嘆曰其知神之所為乎噫揲蓍之法具在雖三尺童子能知之但其道甚大果能明天而察地然後可以象兩儀也果能效天而法地然後可以象三才也果能喜怒哀樂配溫涼寒燠之節然後可以象四時也果能裒多益寡得稱物平施之宜然後可象一閏再閏也是故古者重其事于太卜之官蓋揲蓍者聖人之事次則學聖人之事也不然心不正意不誠幽明路隔而欲徼幸于冥冥不可知之中我知其難也雖爻象臚列祇滋之惑耳學易者其知之右第九章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此章承上章揲蓍求卦之法而推明其用也以辭變象占四句為主至精一節明尚辭尚占至變一節明尚變尚象至神一節則明辭變象占皆出于自然而非可以智計力索也極深研幾一節又明其所以至精所以至變所以至神者而以首句總結之也易之道即聖人之道指出四件舉其大端而言耳訂詁云此意與第二章觀象玩辭觀變玩占相應第八章云擬諸形容象其物宜則已言象矣云繫辭焉以斷其吉凶則已言辭矣第九章云十有八變而成卦八卦而小成引而伸之觸類而長之則已言變矣云大衍之數五十其用四十有九則已言占矣故此章合四者並言之而推本于神焉以見聖人之道所以不與讖緯術數同歸者也此義正須曉的張南軒曰指其所之者易之辭也以言者尚之則言無不當矣化而裁之者易之變也以動者尚之則動無不時矣象其物宜者易之象也制器者尚之則可以盡創物之智極數知來者易之占也卜筮者尚之則可以窮先知之神説的甚好戴記云卜筮者所以使民信時日決嫌疑定猶豫也原兼龜説朱子曰易占不用龜只是文勢如此故蒙引云如魏文侯卜相之卜非以龜卜也訂詁云人知易可以筮而不知易亦可以卜故聖人每以卜筮蓍龜並言即卦字亦從卜但揲法傳而龜法不傳耳此説發朱子所未發是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此君子學聖人者也所謂觀象玩辭觀變玩占者也為有所作也行有所往也蒙引以出身加民為行恐與為字無異問焉而以言謂揲蓍告神之辭也本義云以之發言處事與以言者尚其辭之言同則告神意只在問字內亦是受命者易受人之命如嚮謂應之速也朱子前云易不用龜至此直作龜説程子亦然如嚮程朱俱作響謂如嚮應聲也程子又擬諸祭祀之享言鬼神之理在彼而我以此理向之故享也于嚮字尤切或曰嚮向也嚮明而治之嚮言如彼此相向之近面受命親切也亦通何逺何近何深何幽徹底現前較然如數一二也言知來而必曰物者儼有形體之可據也至精言易理極盡精微而無以復加也耿氏所謂天地之鑑萬物之照是也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此本義曰參者三數之也伍者五數之也既參以變又伍以變一先一後更相考核以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昻之謂也此亦皆揲蓍求卦之事蓋通三揲兩手之䇿以成隂陽老少之畫究七八九六之數以定卦爻動靜之象也其義精矣項氏又本朱之義析之訂詁又從項氏之義推之其説曰參伍錯綜皆古語三人相雜曰參五人相雜曰伍史記引周書曰必參而伍之注三卿五大夫欲更議是也錯雜也綜三蒼云理經也謂機縷持絲交者屈扼制經令得開合也占法有數有變每三揲為三變而得一爻所謂參也每變之中有分有挂有揲有歸竒有再扐為五小變所謂五也此參伍以變也三揲之竒分而計之則有三少者三多者有一少兩多者有一多兩少者其數不齊蓋取挂扐之餘數所謂錯也去三揲之竒以左右手之正䇿合計之則得四九四六四七四八之數蓋取過揲之正數所謂綜也錯謂分而間之綜謂合而理之此錯綜其數也此二句止論一爻之法通六爻之變得十有八遂成初二三四五上以為剛柔相雜之文極六爻之數得七八九六遂定重單交折以為內外兩卦之象變者象之未定象者變之已成此二句方論成卦之法夫通其變遂成天地之文故以動者尚其變極其數遂定天下之象故以制器者尚其象變謂蓍卦之變非天下之極員轉不滯其誰能及于此其義益分曉矣謹按來注于六十四卦專言錯綜而以卦之正對者為錯反對者為綜未嘗不順但略言參伍而以為揲蓍之變于心終覺未安今細玩傳意四字本無低昂竊謂參者纍之加之之謂也如由兩儀而四象而八卦皆三畫而成之是也伍者左之右之之謂也如乾之與坤震之與巽坎之與離艮之與兊以及六十四卦皆有配偶是也錯者交之雜之之謂也如八卦各加于本卦之上而成六畫之卦又遍加于各卦之上而成六十四卦是也綜者上之下之之謂也如屯蒙需訟之一反一覆又成一卦是也夫兩儀止隂陽耳四象則有太少之分八卦則有乾坤六子之分無非隂陽變化而成者故曰參伍以變八卦既成有乾兊離震巽坎艮坤之序則有一二三四五六七八之數故乾一之與坤八兊二之與艮七離三之與坎六震四之與巽五皆秩然不紊遍相加而參差上下其數亦不齊矣故曰錯綜其數通其變遂成天地之文者謂太極已判天地定位而山澤水火風雷燦然具陳于其中也極其數遂定天下之象者謂六爻相雜剛柔相嬗而成六十四卦三百八十四爻之象是也此亦本聖人之繫辭而無所安排者姑存之以質髙明易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此本義云易指蓍卦無思無為言其無心也所謂鼓萬物而不與聖人同憂者此也寂然不動程子所謂指體而言者而本義以為感之體感而遂通天下之故程子所謂指用而言者而本義以為寂之用所謂體用一源也故曰人心之妙其動靜亦如此此語尤宜體認蓋未占之時象在畫辭在䇿如鑑之空而谷之虛也故曰寂然不動及其占而感之如鑑之照形而谷之應聲沛然通達乎天下之事而昭揭其所以然之理也故曰感而遂通天下之故無思而無不思無為而無不為非天下之至神者能之乎夫易聖人之所以極深而研幾也淵奧而不可窺者深也聖人以易極之極者窮究到底也此本辭占一邊説所謂至精者也隱現而不可據者幾也聖人以易研之研者勘審到底也此本象一邊説所謂至變者也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至吳氏曰唯辭之能極深也故以辭為占則可以前知而開通天下人之心志唯變之能妍幾也故以變得象則可以制作而完成天下人之事務説的明切朱子曰人心閉塞若道理淺如何開通的他故以通志為開務對下面成務言極是本義云所以通志而成務者神之所為也神者妙不可測故不疾而自能速不行而自能至此二句正是寂然不動感而遂通天下之故處程子曰神無速亦無至須如此言者不如是不足以形容故也子曰易有聖人之道四焉者此之謂也子曰易有聖人之道四焉者以辭變象占皆變化之道而神所為也非聖人則無以神非易則無以聖故易者聖書也而其道則神矣右第十章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑先設問答之辭以三兩言該盡易道下數節層層剔發只是推明第一段故曰如斯而已者也物多蒙昧易有以開之開物所以明道也務多虧欠易有以成之成物所以行道也明且行天下之道所以兼該具舉而無能外也故曰冒本義云開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中最為明曉物開而天下之志通矣務成而天下之業定矣冒天下之道而天下之疑斷矣道固所以解疑也是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫卦未定其變無方故曰圓而神蓍已定其理不易故曰方以知六爻之義隨其時位變易以獻于前故曰易以貢蓍與卦曰德以利物言也六爻曰義以合宜言也朱子云神字知字下得重貢字又却下得輕却曉不得竊意上二句方圓字輕故神知字下得重下句易字重故貢字下得輕聖人下字輕重意或在此乎聖人以此洗心退藏于密與聖人以此齋戒以神明其德夫一章全重在兩句兩句又全重在以此兩個字程子曰生生之謂易天地設位而易行乎其中乾坤毁則無以見易易不可見乾坤或幾乎息矣易畢竟是甚又指而言曰聖人以此洗心退藏于密聖人示人之意至此深且明矣終無人理會易者此也密也是甚物人能至此深思當自得之又曰聖人以此退藏于密以此齋戒以神明其德夫要須玩索其言皆引而不發竊意蓍卦爻三句正為下一句張本恐人在象數上用不知在心性上用也聖人制出這個物事來如禮樂一般禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉筮云筮云占驗云乎哉六十四卦生自乾坤二卦乾坤二卦畫出誠敬二字聖人心裏時時刻刻如那揲蓍求卦一段以此洗滌洗濯其心教他潔潔淨淨無纎毫私欲來汚染他如是那有一些馳騖那有一些滲漏才會退藏于密此所謂無思無為寂然不動也全體皆易不為自家故曰吉凶與民同患子曰作易者其有憂患乎正此意天地既不能同憂民又不能自憂聖人萬物一體把别人事都當自己事做同休共戚患民之凶也若不悔過那得吉時設法教他趨吉患民之吉也若不小心便成凶了設法教他避凶但云洗心不説到同患處便是自私自利但云同患不從那洗心裏來便是無源無本蓋洗心則虛虛則明同患則公公則溥明通公溥而神知出焉知來者燭之于未然也藏往者畜之于已然也不藏往何由知來不知來何庸藏往都是一貫事此所謂感而遂通天下之故也其孰能與于此哉與夫易何為者也一例看設問以起下文也神武不殺本義云得其理而不假其物之謂又云用神而不用蓍用知而不用卦無卜筮而知吉凶也説的極好讀此知晦庵非教人專靠卜筮也是以明于天之道而察于民之故是興神物以前民用聖人以此齋戒以神明其德夫隂陽剛柔天之道也聖人明之綱常倫理民之故也聖人察之明天而天之神物由是興焉蓍龜萃天之靈氣以為物故曰神察民而民之用由是前焉神物傳天之祕密以為民用故曰前上節既言得理者不假于物此節復言假物者所以明理聖人豈徒使民用吉化凶用凶迪吉而已哉蓋以此齋戒以神明其德也本義云湛然純一之謂齋肅然警惕之謂戒二語精絶戴記云齋之為言齊也齊不齊以致齊者也又曰防其邪物訖其嗜欲又曰心不茍慮必依于道手足不茍動必依于禮雖不言戒而戒在其中矣齋戒可易言乎聖人念念齋戒時時齋戒聖人之德所以神明也聖人使用之者莫不齋戒而民之德亦神明矣不然于物無防于嗜欲無止而徒四十九䇿七十二鑽神既厭矣其我告猶乎故以此洗心退藏于密以此齋戒以神明其德此三句聖人吃緊教人處學易者不可不知也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神戶闔則靜靜屬隂故曰坤戶闢則動動屬陽故曰乾先坤後乾者隂陽之義也歸藏首坤正如此時而闔時而闢有動而不居之義故曰變朝往暮來此往彼來有達而無礙之義故曰通以其可見也故曰象以其有形也故曰器制而用之則有截然不易之格式故曰法天下用之古今用之而不知誰之為故曰神一戶耳正人所行不著習不察者而乾坤之大道隂陽之妙理具焉此一節蓋聖人偶舉至微者以見易也觸類旁通天下何物何事非易也哉是故易有太極是生兩儀兩儀生四象四象生八卦生生者易也易之所以生生者則有太極焉北辰者天之極也棟者屋之極也易之極則無形體可按而渾然獨至者也理至而氣生兩儀立矣以理言之則乾健坤順也以數言之則陽竒隂偶也一生兩也兩生四則有象以理言之則水火木金也土分旺四季又地已該土故但言四象也以數言之則太陽太隂少陽少隂也四生八則為卦以理以數言之乾一兊二離三震四巽五坎六艮七坤八也八卦定吉凶吉凶生大業言八卦則六十四卦在其中內外異體上下異位動靜異時剛柔異象吉凶所由分也吉者業之成聖人有以開其始而善其終凶者業之廢聖人有以扶其危而定其傾勳懋績底有自來矣故曰吉凶生大業此一節明聖人作易之次第也是故法象莫大於天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜法象莫大乎天地天地一易也非易而天地之法象隱矣變通莫大乎四時四時一易也非易而四時之變通窮矣縣象著明莫大乎日月日月一易也非易而日月之著明晦矣易之功在造化者然也巍巍乎崇髙可以則天者莫大乎富貴富貴為易正位者也有創獲之智有制作之手為天下利用者莫大乎聖人聖人為易成能者也凡人疑則多沮而易怠決則發憤而日強疑信所以分勇怯也探索鈎致無幽不燭無逖不到别白吉凶使人知所趨避則一往直前矣詩曰亹亹文王又曰勉勉我王皆勤力之意故本義云亹亹猶勉勉也如此者莫大乎蓍龜蓍龜為易效靈者也易之功在人事者然也此一節明聖人作易之功用也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之神物蓍也則之而得揲蓍求卦之法神之所為也變化隂陽也效之而得消長進退之道天地之變化也天垂象日月也循度失度吉凶見矣詩曰日月告凶是也象之以為吉凶日月之著明也河圖洛書之説其來舊矣自朱子極力表章人始尊而信之後儒又紛紛焉觀孔子之言河圖與洛書併列是伏羲時且有之矣又何以云洛書錫禹耶此不可曉姑闕之此一節明聖人作易之源由也易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也先儒云會于象者深懸之以示人使人尋味抽繹超然默會于語言之表可獨喻可共喻未可告人也徒以象而已知者明之愚者昧焉聖人又從而為之辭不啻耳提面命也定之以吉凶即在象辭裏面看出蓋聖人以善惡配禍福斷者確有定案使天下後世不惑于疑似二三之途也所謂開物成務冒天下之道如斯而已此易之所以為易也右第十一章易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順所以尚賢也是以自天祐之吉無不利也此大有上九爻也本義以為錯簡宜在第八章之末信然以助字釋祐字見天為人用也天之所助者順也順天者天順之矣人之所助者信也信人者人信之矣上九居六五之上五交孚信也上履之謙退而思順焉又不尚寵髙而尚賢秉彞之好深矣惟天眷德是以自天祐之吉無不利也右第八章之末子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神此章極盡易之意與言而歸本于德行也書不盡言言不盡意語有之矣信斯語也則聖人之意終無以暴白于天下矣豈其然乎言不足以盡意固矣然言之所會者淺象之所示者深象者何竒偶二畫是也聖人吉凶同患之意有言可得而傳者有言不可得而傳者懸象以示之則躍然如在目前而聖人之意畢見矣古今之人情世故變幻多端有真者必有偽者猶卦之中有隂陽淑慝也自八卦衍而為六十四雖情偽紛紜不能逃先事之燭照矣此二句指伏羲以下三句則指文王周公文王周公以伏羲畫卦未有文字乃隨其卦之大小象之得失憂虞繫之辭以盡其言稽實理以待虛事後世即有能言者蔑以加矣變即動則觀其變而玩其占也即其所占之事而行相通于無窮即通變之謂事也下文所謂化裁推行是也如是則其用愈廣而為天下利者無不盡矣因變得占以定吉凶則民皆無疑而行事不倦如以鼓聲作舞容鼓聲愈疾而舞容亦愈疾鼓聲不已而舞容亦不已自然而然不知其孰使之者所謂盡神也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣程子曰乾健坤順人亦不曾果是認得乾坤毁則無以見易是以造化言也朱子只作易書説本義云乾坤毁謂卦畫不立乾坤息謂變化不行後儒本其意推之以乾坤其易之緼一段為立象盡意曰凡竒皆乾凡偶皆坤有乾坤兩象而變化生所謂盡情偽盡言盡利盡神而稱易者于此具矣緼者衣中所著之絮也易得乾坤而成易猶裘得絮而成裘離乾坤無易故曰乾坤易之緼也成列者一隂一陽對待也乾一陽畫對坤一隂畫成其竒偶之列而竒偶之交互相易以成六十四卦者立乎其中蓋易之所以為易者乾九坤六之變易也如使乾坤毁其列謂有其一無其一則無以見竒偶交互相易之用夫相易之用既不可見則乾無以辨其為陽坤無以辨其為隂而乾坤竒偶之書亦將自此滅息而不能有所生生矣此説最盡朱子之意然天地大化亦不外是則程子之言不可不理會也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業形上形下二句明道説的極好朱子又發明一番乃知聖人言語一字移易不得若云無形謂之道有形謂之器或云在上謂之道在下謂之器便成兩片物事蓋道器只是一件道非器不見器非道不成如耳目器也能視聽便是道手足器也能持行便是道眼前物事那一件不是器都有理在便都是道推而至于禮樂政刑亦莫不然佛老只是講道却遺了器天下豈有器外之道乎後世君相只理會的器見道者或寡矣如禮只在儀文上求樂只在聲音上求全不照管心性天下豈有道外之器乎余謂班馬之文李杜之詩只是形而下者以語于見道則未也且如古今道理大段在五經四子裏面今人竭終身之力去讀了只要應舉做官因憶先輩科第也是道後人經書也是器世道安得不壞吁可嘆也哉化者不滯于器也裁者分别節制之意凡事立個界分凡物著個度數此之謂變而不窮推者不執于道也行者展布設施之意因乎此以達乎彼謀乎始以善乎終此之謂通而不倦舉此化而裁之推而行之者通變以宜天下之民開物成務是故謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻此下推出以起下文而必加夫象二字言聖人繫卦下之辭爻下之辭不過為象作注腳耳極天下之賾者存乎卦鼓天下之動者存乎辭卦謂彖象窮盡天下紛紜錯雜事情故曰極天下之賾謂極至而不留餘地也辭謂爻辭親切懇到使人手舞足蹈而不能自已故曰鼓天下之動謂鼓舞作興之也化而裁之存乎變推而行之存乎通神而明之在乎其人默而成之不言而信存乎德行前以化而裁之發明變字故曰謂之變蓋化而裁之乃可以語于變也此以化而裁之歸本變字故曰存乎變蓋變乃能化而裁之也推而行之與上句同神而明之謂明其卦辭通變之道如神之知也茍非其人可乎然人非徒明之而已又必成之非徒成其道于己而已又必信其道于人此豈區區辭説之間哉必有酬酢佑神之德行而後可德者心之存也行者身之發也存諸心發諸身無非易者然後可以幾于德行也學易者欲盡書之言與意亦惟自盡其德行已耳上繫傳十二章説盡天地鬼神隂陽之奧末統以德行結之然則德行者其學易之綱領乎右第十二章易酌卷十一
