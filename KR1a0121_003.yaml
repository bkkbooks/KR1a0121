body:
  text: 易酌卷三祁州刁包撰周易上經乾下巽上小畜亨密雲不雨自我西郊上巽隂也下乾陽也陽大隂小以一隂畜五陽以小畜大也故曰小畜傳曰畜止剛健莫如巽順然巽隂也其體柔順唯能以巽順柔其剛健非能力止之也畜道之小者也此義甚徹然大假是臣畜君但未可指定若云君畜臣則陽畜隂矣未是諸儒又云小人畜君子觀彖開口便曰小畜亨彖傳曰柔得位而上下應之曰小畜健而巽剛中而志行乃亨若小人畜君子彖及傳恐不如此説畜字傳義皆訓止止則聚聚則通不止不聚不塞不通小畜之亨陽亨也然隂有力焉密雲不雨一隂之所布濩也雲行雨宜施矣而不雨者自我西郊故也東南陽方陽倡隂則雨西北隂方隂倡陽則不雨自我謂四也本義以為文王演易于羑里視岐州為西方故曰自我蓋引咎責躬愧其不能和二氣而布德澤于天下也極得文王心事彖曰小畜柔得位而上下應之曰小畜傳曰以隂居四又處上位柔得位也上下五陽皆應之為所畜也以一隂而畜五陽能係而不能固是以為小畜也成卦之義備矣健而巽剛中而志行乃亨內健外巽健而能巽卦體亦卦德也剛中謂二五各以剛居中也故其志得行行其剛中之志故亨也密雲不雨尚往也自我西郊施未行也密雲不雨陽尚往而隂未能下降也自我西郊一隂之施未能畜五陽而成雨也志行未行兩行字相應言陽之志行而隂之施未行也此畜之所以小而未能成大也以彖言上句在下句釋之密雲所以不雨者自我西郊故也彖傳言下句之義在上句該之唯其尚往所以施未行也文義不同各有當也象曰風行天上小畜君子以懿文德風有氣而無質能畜而不能久故為小畜之象竊意未是能畜而不能久是暫畜非小畜也傳曰巽畜乾非能固制其剛健也但柔順以擾係之耳故為小畜畢竟傳義為確傳又曰畜聚為藴畜之義君子所藴畜者大則道德經綸之業小則文章技藝之事君子觀小畜之象以懿美其文德文德方之道義為小也可見學者宜在道義上畜積若役役于文章技藝則其自處也小矣然大象之意則謂君子于小畜之象合當如此用未可便謂小畜君子也初九復自道何其咎吉初陽爻乾體本在上之物進而上升其來本正路也故曰復自道自由也由乎道則非旁蹊曲徑可擬故無咎而吉也傳曰諸爻言無咎者如是則無咎矣故云無咎者善補過也雖使爻義未善亦不害于不如是則有咎之義初九乃由其道而行無有過咎故云何其咎無咎之甚明也余謂不曰無咎而曰何其咎意同而辭則加切矣故不但無咎而又以吉許之初與四為正應今不應四而復自道所以無咎且吉也胡氏在下而畜于隂勢也其不為隂所畜而復于上者理也爻與卦義各有取也象曰復自道其義吉也以其路之當行者則曰道其行之合宜則曰義行乎道即合乎義故無咎不待言而直云吉也九二牽復吉傳以為二牽五本義以為二牽初然初曰復二即曰牽復本義更確二陽合力一道同升有連絡推挽之象故曰牽復吉象曰牽復在中亦不自失也復而曰牽得無有徇情昵比之失乎然二剛而得中與初同復而不失其道者也故本義曰亦者承上爻義也九三輿説輻夫妻反目本義曰九三剛而不中迫近于隂而非其正應但以隂陽相説而為所繫畜不能自進故有輿説輻之象約傳義更精又曰然以志剛故不能平而與之爭又為夫婦反目之象較傳更進一步矣傳曰婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也如唐髙宗之武后肅宗之張后宋光宗之李后是矣若曰四本有孚而三不中正遂至反目則如莊公于莊薑之類亦一説也象曰夫妻反目不能正室也陽制于隂無可奈何而必曰不能正室者咎陽不咎隂端本澄源之意也故本義但云説輻反目三自為也不復贊一辭矣六四有孚血去惕出無咎傳以四處近君之位為畜君者故有孚謂孚五也末又云以人君之威嚴而細微之臣有能畜止其欲者蓋有孚信以感之也前後統就君臣立義其間一假云卦獨一隂畜衆陽者也諸陽之志繫于四四苟欲以力畜之則一柔敵衆剛必見傷害惟盡其孚誠以應之則可以感之矣故其傷害逺其危懼免也如此則可以無咎不然則不免乎害矣此以柔畜剛之道也此却是渾説然傳義謂先孚五而後得諸陽之助也自是正論本義居柔得正虛中巽體二陽助之只渾説亦精象曰有孚惕出上合志也傳曰四既有孚則五信任之與之合志所以得惕出而無咎也惕出則血去可知舉其輕者也血去須如此補出又曰五既合志衆陽皆從之矣似此諸陽之從為餘意胡雙湖曰三陽上進而六四獨當其鋒將畜而止之必為所傷然以由中之信依附上之二陽與之合志而共畜之則可血去惕出而無咎矣較傳尤為分曉九五有孚攣如富以其鄰傳義皆不及陽剛意只云居中處尊居中所以孚也處尊所以富也傳曰五有孚信則其類皆應之矣故曰攣如謂牽連相從也五必援挽與之相濟是富以其鄰也五以居尊位之勢如富推其財力與鄰比共之也如此渾説為是本義巽體三爻同力畜乾雖曰鄰之象而有孚攣如之義在其中矣非有孚則不同心豈能同力而又何以畜乾也九五勢能有為以兼乎上下雖有孚攣如之象而鄰之義亦在其中矣非富以其鄰則勢不能有為而何以兼乎上下也合二句言蓋九五至誠之道能合上一陽助四共畜三陽也以字仍作春秋以某師之以為是謹按折中云六四者近君之位也所謂小畜者也九五者君位也能畜其德以受臣下之畜者也四曰有孚是積誠以格其君五亦曰有孚是推誠以待其下上下有孚而後畜道成矣故四曰上合志者指五也五曰以其鄰者指四也四與五相近故曰鄰又鄰即臣也書曰臣哉鄰哉是也富者積誠之滿也積誠之滿至于能用其鄰則其鄰亦以誠應之矣故象傳曰不獨富也以誠感誠之謂也大抵上下之間不實心則不能相交故曰富以其鄰不虛心則亦不能相交故曰不富以其鄰所取象者本于陽實隂虛而其義一也此爻之義為之大快象曰有孚攣如不獨富也富而獨則不以其鄰矣故傳曰有孚攣如蓋其類皆牽攣而從之與衆同欲不獨有其富也數語自好下難厄及爻傳君子小人正人羣邪等語俱不必用上九既雨既處尚德載婦貞厲月幾望君子征凶上九巽之極而畜之終也彖曰密雲不兩今則既雨而和矣彖傳曰尚往今則既處無所往而止矣既和而止畜道所由成也傳曰大畜畜之大故極而散小畜畜之小故極而成尚德載四用柔巽之德積滿而至于成也載積滿也詩云厥聲載路本義因之但加尊尚隂德一句備矣傳根此即申戒義竊意既雨既處尚德載二句無可戒者下三句才是戒辭傳曰婦謂四以隂而畜陽以柔而制剛婦若貞固守此危厲之道也又曰婦制其夫臣制其君恐不必用月亦隂也月既望則盈盈則虧矣幾望者將盈未盈宜有以待之此時若更有所征則凶矣凡行役在路者皆曰征本義以彖為文王演易之事則此爻指文王説極好蓋周公曲體文王之遇之心而繫辭也尚德載即文王之隂行善也月幾望即文王之三分有二也如此則戒意不必分隂分陽只就一人説但以分言則曰婦曰月以德言則曰君子若貞厲若幾望若征凶皆狀文王以服事殷之心也先儒云文王志在明夷道在小畜其謂此乎蒙引載朱子語類以為如伊尹之畜太甲周公之畜成王似矣又曰武后之畜高宗則非也武后如何説的尚德載象曰既雨既處德積載也君子征凶有所疑也積即坤文言積善積不善之積言非一朝一夕之故也積久然後既雨既處而成畜道也疑即坤隂疑于陽之疑隂疑于陽君子畏懼之不暇而敢征乎兌下乾上履虎尾不嘻人亨履何以云禮也人非禮則手足無所措如何行的去故以禮為履程傳解履曰踐曰藉本義曰躡而進之履步履也詩曰履我即兮又曰率履不越則藉與躡亦無大異要是兊依乾行耳兌之德為説必和以澤兌之象為澤必虛以受奉乾作前導步亦步趨亦趨此所以蹈危地而無害也然則禮也者其化凶馴頑戢暴之善物乎譬如萊兵虎狼也而孔子却之只是箇禮彖曰履柔履剛也乾剛也兌柔也剛上而柔下剛先而柔後兌履乾柔履剛也以下奉上以後從先也説而應乎乾是以履虎尾不嘻人亨兌説也不言而説諸心也説以應乾則事事合乎天則矣天之所佑物不能災故有履虎尾而不見傷之象剛中正履帝位而不疚光明也九五剛而得中得正履至尊之位而無所疚病也內省不疚如青天白日則光明矣傳云德盛而輝光是也吳氏以位之顯著言恐未確此傳于彖辭外又特發此段議論與周公之爻各有取爾也象曰上天下澤履君子以辨上下定民志乾天也高而在上兌澤也卑而在下所謂天高地下而禮制行也故其象為履君子觀于履之象而知尊卑失序貴賤異位民志所由惶惑淆亂而莫知適從也是以創制立法凡君臣父子夫婦兄弟以至朋友之交莫不有尊卑貴賤之等焉上下辨矣辨則安其分而無非望之覬故其志定也曲禮曰禮所以定嫌疑決猶豫明是非也正此意也傳曰古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預于已也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至于公卿日志于尊榮農工商賈日志于富侈億兆之心交騖于利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也然則治天下之道以定民志為先定民志非辨别上下之分不可也故本義但云程傳備矣不能復贊一辭初九素履往無咎一陽之初未緣染于世俗故有素履之象淡而不飾質而不華潔而不緇不犯所忌故往而無咎也傳曰夫人不能自安于貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往而有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也此可為進身者針也象曰素履之往獨行願也獨行志願言以素心為素履不隨俗俯仰也傳曰獨專也若欲貴之心與行道之心交戰于中豈能安履其素也九二履道坦坦幽人貞吉二以剛居柔而得中故有履道坦坦幽人貞吉之象道者平康正直者也不由其道而往則舉足盡荆棘由其道則坦坦矣以履道二字為主履道故坦坦坦坦故幽幽故貞故吉皆相因而至者也傳義却不然曰雖所履得坦易之道亦必幽靜安恬之人處之則能貞固而吉也重在幽人上尤是不必深山窮谷之士也只不以巖廊損其山林之致便是蓋九二臣位故也然則李泌白衣其廊廟之幽人乎种放終南其山林之顯者乎是未可以出處論也象曰幽人貞吉中不自亂也恬正自守不以富貴紛華動其心故曰中不自亂也傳曰中若躁動豈能安其所履故必幽人則能堅固而吉蓋其中心安靜不以利欲自亂也利欲二字尤説出病根徐進齋曰初二皆陽剛而説體故有素履幽人之戒又皆無應于上故初九曰獨行願也二曰中不自亂也説的甚好六三眇能視跛能履履虎尾嘻人凶武人為于大君三以柔居剛不中不正而志在躁動如盲眇然却自以為能視如跛躄然却自以為能履不量力而妄為必履危地履危地則禍患必矣故有履虎尾嘻人凶之象又如武人剛猛躁暴絶無人君之度者也以之南面立見其敗矣本義秦政項籍之喻極確象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也不足以有明也而謂能視乎適見其眇而已不足以與行也而謂能履乎適見其跛而已柔居剛位所履不正嘻人之凶自取之也才弱志剛妄動輕舉徒速禍耳其何以為大君乎唐文宗昭宗志非不剛卒履虎尾而遭嘻人之凶無他志有餘而才不足也九四履虎尾訴訴終吉四所乘者剛躁不中之人也所承者剛決自用之君也動輒得咎故有履虎尾之象然以剛居柔深懷畏懼故有訴訴之象訴訴者書所謂心之憂危若蹈虎尾是也若蹈虎尾思患而預防之故有不嘻人之亨而終吉也象曰訴訴終吉志行也傳曰志在于行不處也此處字即作安處之處故朱子曰志行也只是説進將去行而不處即乾德與志剛者異矣故有訴訴之吉九五夬履貞厲九五中正無不吉者彖傳之言善矣爻獨以夬履貞厲為戒何也上乾下兌有剛明之君而無骨鯁之臣是以有此戒蓋兼聽並觀君道也如書云朕志先定可謂夬矣而必云詢謀僉同古人之不自用如此九五乾剛獨攬而下以説順承之故惟所欲為視臣下皆莫已若本義所謂凡事必行無所疑礙是也傳曰古之聖人居天下之尊明足以照剛足以決勢足以專然未嘗不盡天下之議雖芻蕘之微必取乃其所以為聖也履帝位而光明者也若自任高明決行不顧雖使得位亦危道也可固守乎有剛明之才苟專自任猶為危道况剛明不足者乎可作人君座右針又曰易中云貞厲義各不同隨卦可見象曰夬履貞厲位正當也位正當者正當尊位也位不當也咎其不及位正當也咎其過過猶不及也本義傷于所恃四字宜玩蓋才剛位尊皆所恃之具也上九視履考祥其旋元吉考祥者恆委其權于鬼神假其靈于蓍龜而不視所履若何非考祥之道也上九履之終視履之終以為考祥之劵若其旋則善而吉也正蒙云周旋不舍為風旋者周回不舍之意謂完全周備無所虧欠也以當身之懿美卜造化之正祥其理固不誣也傳曰人之吉凶係其所履善惡之多寡吉凶之大小也考者宜識此意象曰元吉在上大有慶也元吉在上令終有淑也大有慶福履成之也慶解吉大解元也傳曰人之行貴乎有終在上正有終者乾下坤上泰小往大來吉亨上坤下乾坤隂也隂小往而居外故曰小往乾陽也陽大來而居內故曰大來往所當往來所當來朝廷清明太和在宇宙間矣故曰吉而且亨也傳曰隂陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子隂為小人君子來處于內小人往處于外是君子得位小人在下天下之泰也如此説泰義始備嘗試反而求之一身人欲者吾心之小人也天理者吾心之君子也人欲外往天理內來則心泰而身亦泰矣未有不吉亨者也傳又曰不云元吉元亨者時有汚隆治有小大雖泰豈一槩哉言吉亨則可包矣此意亦須識得彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也泰小往大來吉亨則是天氣下降地氣上騰二氣交感而萬物欣合無間也上效天之降而交乎下下效地之升而交乎上君臣道合同心一德也當是時陽明用事而隂暗退矣剛直吐氣而柔媚屈矣衆正盈朝而僉壬易志矣內不必其親而近之也雖疏逖有腹心之寄外不必其黜而逺之也雖咫尺有釜􅑄之形要是君子得志小人失勢云爾君子小人不並立此長則彼消自然之理也如堯舜之世朝無幸位野無遺賢雖四凶何所售其姦哉象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地交而隂陽合和則清寧康阜所以為泰也后主泰運故觀其象而以裁成天地之道輔相天地之宜以左右民四時行百物生天地之道即天地之宜也以其理言故曰道以其理之當然言故曰宜四時自能行聖人為治歷以明之春夏秋冬截然有限而不可爽所以裁而成之也百物自能生聖人為利用以享之作訛成易秩然有序而不可亂所以裁成之也若此者皆天地之道合當如此裁成其道正所以輔相其宜也輔相參贊化育之謂也裁成輔相其功在天地其德則在民也在天地為裁成輔相在民則為左右也左右民扶持保護而俾之安生也非然者斯民之顛仆也久矣初九拔茅茹以其彚征吉一陽在下當泰之時上進其志也然三陽同體進則相連傳曰君子之進必與其同類相牽援如茅之根拔其一則牽連而起矣茹根之相連者故以為象彚類也説的甚分曉本義依郭璞洞林下卦俱讀至彚字絶句極是自古正人在朝未有孤立無徒而能成天下之事者也故賢者進而有為必援引善良布列庶位聲應氣求以共濟斯民故曰征吉征謂仕進非徒曰出行也象曰拔茅征吉志在外也以天下生民為念而無內顧之私故曰志在外也九二包荒用馮河不遐遺朋亡得尚于中行九二陽剛中正治世之才王者之佐也上有六五為正應君明臣良咸有一德可以行其所學矣故治泰之道專屬之傳曰二雖居臣位主治泰者也所謂上下交而其志同也故治泰之道主二而言包荒用馮河不遐遺朋亡四者處泰之道也人情安肆則政舒緩而法度廢弛庶事無節治之之道必有包含荒穢之量則其施為寬裕詳密弊革事理而人安之若旡含𢎞之度有忿疾之心則無深逺之慮有暴擾之患深弊未去而近患易生矣故在包荒也用馮河泰寧之世人情習于久安安于守常惰于因循憚于更變非有馮河之勇不能有為于斯時也馮河謂其剛果足以濟深起險也自古泰治之世必漸至于衰替蓋由狃習安逸因循而然自非剛斷之君英烈之輔不能挺特奮發以革其弊也故曰用馮河或疑上云包荒則是包含寬容此云用馮河則是奮發改革似相反也不知以含容之量施剛果之用乃聖賢之為也不遐遺泰寧之時人心狃于泰則苟安逸而已惡能復深思逺慮及于遐逺之事哉治夫泰者當周及庶事雖遐逺不可遺若事之隱微賢才之在僻陋皆遐逺者也時泰則固遺之矣朋亡夫時之既泰則人習于安其情肆而失節將約而正之非絶去其朋與之私則不能也故云朋亡自古立法制事牽于人情卒不能行者多矣若夫禁奢侈則害于近戚限田産則妨于貴家如此之類既不能斷以大公而必行則牽于朋比也治泰不能朋亡則為之難矣爻辭竒崛特甚傳却説的如此顯切凡治天下者皆不可不知此道也余又嘗從其意推之包荒以言乎其量也川澤納汚山藪藏疾必如書所稱有容德乃大爾毋忿疾于頑而後可以包含荒穢也荒者荒逖荒野之謂此而可包則無不包矣如呂蒙正不問參政之謗婁師德不較唾面之羞之類是也用馮河以言乎其膽也韓魏公生平未嘗以膽許人蓋自許也觀其處英宗之變攝刺客之心何等鎮定他若富鄭公契丹之使冦萊公澶淵之後亦庶幾矣或云恂恂長者而使之濟深越險難矣哉非也薛文清云能忍人所不能忍之忤逆斯能為人所不能為之事功包荒馮河固非兩截人也量與膽合而識不足以燭微算不足以周逺未善也故云不遐遺時方安阜輒為憂聖危明之計近在目前便為百年必世之謀旁觀者以為迂濶而逺于事情耳不知明哲先見老成苦心固有不可少者若李文靖預料神仙土木之事狄梁公早薦柬之諸公之賢此道得也使非大公至正破情面而出之其可乎從來敉寧世界大半為情面二字壞盡士大夫相習成風寧喪名節欺君父誣國家而必不肯破其情面非徇私阿黨則懼勢畏威此朋亡之道所以不可不講也先輩若吳復菴之彈座師趙鶴儕之黜姻親抑亦不愧古人矣四者全才全德以此配合中行之義庶為得之故曰得尚于中行傳以尚為配如尚主之尚象曰包荒得尚于中行以光大也象舉爻首句至末句以該中三句之義而遡所由來曰以光大也光明則無不燭之理廣大則無不盡之道朱子曰易上如説以中正也皆是以其中正方能如此此處也只得做以其光大説若不是一箇心胸明濶的如何做得如此才説的以字義出傳曰四者能配合中行之德而其道光明顯大也便不見以字義九三無平不陂無往不復艱貞無咎勿恤其孚于食有福傳曰三居泰之中在諸陽之上泰之盛也物理如循環在下者必升居上者必降泰久而必否故于泰之盛與陽之將進而為之戒曰無常安平而不險陂者謂無常泰也無常往而不反者謂隂當復也平者陂往者復則為否矣當知天理之必然二句須如此暢發始盡蓋三所居者陽終而隂始之時也泰極則否正猶日中則昃月盈則虧一般若安享太平之福而無道以斡旋之可乎故曰艱貞無咎傳艱危其思慮正固其施為二句極確蓋泰之時人易狃于宴安故必以艱苦自處不敢自暇自逸也人易習于圎通故必以貞固自守不敢為浮為沉也如是則可以無咎矣勿恤其孚傳云不勞憂恤得其所求也不失所期為孚本義因之其理自確胡氏云孚與復此天運之必至而有孚者也艱貞則無憂其必至矣丘氏云孚即不戒以孚之孚勿恤者不以三隂之復而動其慮也二説俱好宜並存之大抵屈伸往來之理雖然信其固然持盈保泰之道要當盡其在我故艱貞者不惟無咎而又有福也于食有福謂食泰之福也善處泰者其福可食也蓋德善日積則福祿日臻德踰于祿則雖盛而非滿自古隆盛未有不失道而喪敗者也凡有家有國而處隆盛者皆當服膺此理象曰無往不復天地際也或作無平不陂或作無平不陂無往不復今作無往不復從程傳也天地際謂三正當隂陽交際之會也陽際隂將復于上隂際陽將復于下此天地常理宜早用為戒而從中維挽之也六四翩翩不富以其鄰不戒以孚六四過中隂得位而用事也隂主利其所以急疾而不能待者不富故也如象辭不富絶句以五以上以其鄰也三隂不待告戒而同心欲去不富之位以求富也歐陽云小人所同者利祿此之謂也傳云不富非為利本義云不待富與此全别象曰翩翩不富皆失實也不戒以孚中心願也小人之心在顯名尤在厚實翩翩不富三隂皆失實也失實則求得實矣故不戒以孚蓋其心所深願不言而喻者也三隂皆虛貧之象故爻曰不富象曰失實六五帝乙歸妹以祉元吉傳引帝乙皆歷歷有據觀多士曰自成湯至于帝乙罔不明德恤祀則以為微子之父帝乙猶確傳曰以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為禮法使降其尊貴以順從其夫也六五以隂柔居君位下應于九二剛明之賢五能倚任其賢臣而順從之如帝乙之歸妹然降其尊而順從于陽則以之受祉且元吉也元吉大吉而盡善者也謂成治泰之功也自注疏皆作此解但傳尤為詳明耳本義云帝乙歸妹之時亦嘗占得此爻余未敢信如傳説煞有關係君臣之禮夫婦之禮胥于是乎見之按春秋書王姬歸于齊胡傳云陽倡而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁于齊侯亦執婦道成肅雍之德後世尊君抑臣至謂列侯尚公主使男事女夫屈于婦陰陽之位逆矣無他不講于帝乙歸妹之義故也古者優禮大臣賔之師之坐而論道往往成泰交焉自秦而後君日尊臣日卑禮貌益衰情志益隔欲望天下之泰難矣無他不講于帝乙歸妹之義故也象曰以祉元吉中以行願也以祉元吉由五與二中德相合而行其心所樂為非出于勉強也上六城復于隍勿用師自邑告命貞吝上六泰之終而隂之極小人據尊位社稷將覆故為城復于隍之象傳曰掘隍土積纍以成城如治道積纍以成泰及泰之終將及于否如城土頺圮復反于隍也其義甚明勿用師向來根城復于隍説言不可勞民動衆也每見時勢孔亟當局者築城鑿池無虛日徒長怨咨而無救于敗亡犯此戒也本義云不可力爭似就行師説傳曰君之所以能用其衆者上下之情通而心從也今泰之將終失泰之道上下之情不通民心離散不從其上豈可用也用之則亂如此説更妥又曰衆既不可用方自其親近而告命之雖使所告命得其正亦可羞吝邑所居謂親近大率告命必自近始尤為顯切蓋人心未去則辰告定命必獲貞吉泰之上非其時矣雖責以大義其如衆不用命何哉故可羞吝也象曰城復于隍其命亂也本義曰命亂故復否告命所以治之此因爻辭不全故特贅之也按象傳例勿用師自邑告命貞吝三句皆該在城復于隍內而以其命亂也一句總結之命即告命或以命為政令恐未是傳曰雖其命之亂不可止也還是作告命説命亂謂政命錯亂無序故名義雖正而人不信為可羞也如唐明皇之幸蜀德宗之幸奉天頗類此爻然自邑告命卒完舊物天下事豈果不可為哉爻言吝而不言凶或亦不絶人興復之路也坤下乾上否之匪人不利君子貞大往小來天在上不能下降地在下不能上升故為否傳曰天地交而萬物生于中然後三才備人為最靈故為萬物之首凡生天地之中者皆人道也天地不交則不生萬物是無人道故曰匪人謂非人道也本義因之余意否之時宵小出而用事故曰否之匪人不利君子貞二句一氣讀言匪人為正人之患害也君子得志則以秉正嫉邪為事不利小人小人得志則以黨同伐異為事不利君子正如氷炭之不相容也從來君子待小人只是一箇公心即有時處置小人只是一箇恕心小人則不然棘心毒手必欲置之死地而後已必欲一網打盡而後快象辭辟難之説正為此也陽往而居外隂來而居內凶不待言矣象曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也否之匪人不利君子貞則是天地之氣不交而萬物無由發育滯塞不通也上下之情不交離心離德而天下無邦也無邦者詩所云我瞻四方蹙蹙靡所騁也隂暗盛而陽明衰矣諂諛者得計而直方者無色矣驕人好好而勞人草草矣小人之道在朝廷君子之道在山林此長則彼消也象曰天地不交否君子以儉德辟難不可榮以祿泰言后否不言后天下無君也時勢不可為矣天地閉賢人隱安得不見幾而作乎儉德本義作斂左傳云儉者德之共書云慎乃儉德依古作儉德為是大抵高尚之心人皆有之只為耐不的貧賤甘不得淡薄失節末路者多矣故辟難須用儉德看自古隱逸一流人那箇不是咬菜根的即或家當豐厚亦有一種清苦意思在不然更可榮以祿矣君子之受祿行其義也天地不交君臣之義安在所謂祿者豈真祿所謂榮者豈真榮哉是故高爵厚糈人之所榮而君子之所辱也欲舉以相凂得乎三代而後管幼安陶淵明陳希夷劉靜修鄭思肖其表表者也初六拔茅茹以其彚貞吉亨傳曰泰之時則以同征為吉否之時則以同貞為亨始以內小人外君子為否之象復以初六否而在下為君子之道易隨時取義變動無常否之時在下者君子也與泰初俱作君子説本義獨指小人説曰三隂在下當否之時小人連類而進之象而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣蓋陽之進行則正故曰征吉勉之也隂之進正乃可行故曰貞吉戒之也聖人一字之權衡如此丘氏曰彖辭以貞字屬君子而初六以貞字屬小人所以為小人謀即所以為君子謀也説的甚好謹按折中亦以作君子説為是象曰拔茅貞吉志在君也拔茅貞吉以其志在君而無復身家之念也志在君則貞志在身家則不貞故進身之始宜辨志蒙引曰味貞吉志在君之辭方知自古小人敗人家國者都是志不在君也只知有其身之富貴而已最中病痛玩志在君也一語愈覺作君子説其理甚長六二包承小人吉大人否亨隂柔中正而能包含承受君子之象或陽慕其名而假以為重或隂利其實而借以蓋非此亦小人秉彜之良不可埋沒處故曰吉大人若以包承之故曲徇情面毁方瓦合則與時俱否矣惟安守窮厄矢志靡他身之否正道之亨也蒙引曰蔡雍之于董卓張浚初年之于汪黃亦為其所包承也若薛文清不謁王振斯否亨之大人矣故從政名言有曰不可以小人包承而易其心蓋自道也象曰大人否亨不亂羣也小人非我族類其心必異雖多方攀援到底介介自守不因之而改節易操故曰不亂羣本義曰不亂于小人之羣也傳曰不云君子而云大人能如是則其道大也此意正須補出六三包羞隂柔不居正而當否時志在害正其中懷有不可告人者故為包羞之象傳謂邪濫極小人之情恐太重本義但云志于傷善而未能又云以其未發故無凶咎之戒象曰包羞位不當也以隂柔居下卦之上無德以堪之故曰位不當也位不當故仰愧俯怍而包羞也九四有命無咎疇離祉否過中而陽用事矣以濟否之才而在高位不患其無為患其過于有為而來專擅之嫌也故傳曰當君道方否之時處逼近之地所惡在居功取忌而已若能使動必出于君命威柄一歸于上則無咎而其志行矣能使事皆出于君命則可以濟時之否其疇類皆附離其福祉離麗也君子道行則與其類同進以濟天下之否疇離祉也此善則歸君盡人事以挽回造化大道理須如此發揮始盡本義作天命之命便不見盡人事意了試嘗考之春秋毛伯奉命天子而不稱使所以示後世當國大臣當國秉政不可擅權之法戒也宋華元楚子反平而春秋貶之謂其以情實私相告語而其君不預知非人臣之義也皆可以證有命無咎之義楊龜山曰東漢之衰嬖幸持權內小人而外君子至是而否極矣竇武何進倚元舅之親詔集天下名儒碩德共起而圖之宜若可為也然命不出于君而下不應故與疇類皆陷于禍也正從傳義得來象曰有命無咎志行也有君命而無咎則興衰撥亂莫或尼之者故曰志得行也九五休否大人吉其亡其亡繫于苞桑以陽剛中正之德居尊位轉否為泰此其人矣大人即否亨之大人昔以否而亨者今以休否而吉時不同也休者休息即詩可小休之休然又有其亡之戒何也傳曰否既休息漸將反泰不可便為安肆當深慮逺戒常虞否之復來曰其亡矣其亡矣其繫于苞桑謂為安固之道如維繫于苞桑也桑之為物其根深固苞謂叢生者其固尤甚聖人之戒深矣在繫辭發揮曲盡似添不得在傳解釋詳明又似減不得細玩自見昔成湯勝夏撫有萬方乃曰兹朕未知獲戾于上下栗栗危懼若將隕于深淵所謂其亡其亡者乎山川鬼神亦莫不寧暨鳥獸魚鱉咸若則繫于苞桑矣又曰漢王允唐李德裕不知此戒所以致禍敗也余謂此為人臣言也若以人君言之晉武帝志怠于平吳唐莊宗情肆于滅梁皆緣不知此戒耳象曰大人之吉位正當也大人之所以休否而吉者以剛中之德居至尊之位正相當也傳曰無其位則雖有其道將何為乎故聖人之位謂之大寶上九傾否先否後喜否之終三隂退聽三陽得權故有傾否之象傾如水之傾于地言不復留遺也否則憂泰則喜否極泰來故憂極喜至天地循環之理則然也象曰否終則傾何可長也否終則傾否傾則不長矣否自不長居否者何可使之長也所以示人轉否為泰不宜付之無可奈何也傳曰反危為安易亂為治必有陽剛之才而後能也故否之上九則能傾否屯之上六則不能變屯也否泰相生雖云天運大抵泰則安肆逸豫之心生而萬事廢矣安得不否否則艱苦奮勵之心生而萬事理矣安得不泰若徒言天運而不言人事豈聖人作易之意乎立國立身莫不皆然離下乾上同人于野亨利涉大川利君子貞同人之義與比類比一陽而五隂從之有仰而附之象故曰比同人一隂而五陽與之有俯而就之象故曰同人亦見尊陽卑隂之意又二五俱居人位二五相應上下相同故曰同人乾天也天之所覆廣以大離火也火之所燭高以逺故有同人于野之象廊然大同無逺弗屆亨可知也傳曰野謂曠野取逺與外之義不繫所私也人心不同如面故動輒齟齬大同者以天下為一體天下莫不同之又何險阻之不可濟乎渒彼涇舟蒸徒楫之故利涉大川也然非以大公至正之道處之雖人人嚮應亦黨與之私而非胞與之公矣故曰利君子貞貞則所同者道義而非比昵之私情矣傳曰小人唯用私意所比者雖非亦同所惡者雖是亦異蓋其心不正也此等語皆當書紳自警彖曰同人柔得位得中而應乎乾曰同人以六居二得柔之正位也以一隂麗二陽之間得中也上應九五應乎乾也同此中正之德故曰同人此成卦之義也同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志卦雖成于二其所以致亨利涉者實剛健之德為之乾行也內文明則所見者正而無以眩之外剛健則所守者正而無以奪之以中正之道相應則所感者正而無以岐之故曰君子正也惟正故能通天下之志天下之志本無不同也只為偏以私故滯礙不能相通耳君子大居正以天下之志為志而無所偏私何不通之有曰天下則盡乎人矣曰通天下之志則盡乎人而同之矣傳曰聖人視億兆之心猶一心者通于理而已文明則能燭理故能明大同之義剛健則能克己故能盡大同之道皆至語宜朱子甚善而亟稱之也象曰天與火同人君子以類族辨物傳曰不云火在天下天下有火而云天與火者天在上火性炎上火與天同故為同人之義君子觀同人之象而以類族辨物類族辨物程朱説大異試從程説推之蓋統人物而言也以人之類言之士有士類農有農類以物之類言之牛有牛類馬有馬類此之謂類辨以人之族言之張為張族王為王族以物之族言之毛為毛族羽為羽族此之謂族辨各以其族類辨物之異同也又嘗從朱説推之類族屬人辨物屬物類其族之源流以正名分秩然其不可亂也辨其物之差等以别名器凛然其不可假也二説意不同而理亦相通總之萬物分殊若一切以渾厚處之則紛紜而不可窮詰矣其何以同之哉故精明然後能渾厚也是君子大同之道也初九同人于門無咎九居同人之初未有私主又上無繫應故為同人于門之象門者內外之限也于門則在外與斯人為徒傳所謂博而公也故無咎象曰出門同人又誰咎也按又誰咎也與節卦不同加一出字其義益明傳曰人之同也有厚薄親疏之異過咎所由生也既無所偏黨誰其咎之節卦之又誰咎也已不得咎人同人之又誰咎也人不得咎已固未可以一例而讀之也六二同人于宗吝二柔五剛中正相應豈不甚善但二當同人之時五陽皆與焉今獨繫于五而應之故為同人于宗之象傳曰宗黨也同人于宗是同乎門以內而不能同乎門以外故可咎象曰同人于宗吝道也加一道字言二同五其道原自中正但狹小而不廣大故于道為吝傳曰諸卦以中正相應為善而在同人則為可吝故五不取君義蓋私比非人君之道相同以私為可吝也此易之隨時取義亦須説破然吝亦有二義或曰羞吝恥辱之義或曰鄙嗇之義此則言私非言羞也九三伏戎于莽升其高陵三歲不興二與五正應三以與二比鄰之故恃其剛暴欲強同之而畏為五所攻伏戎于林莽之中將出其不意攘而有之也升其高陵徘徊顧望畏首畏尾之意三在下卦之上故曰高陵三歲不興興與伏對言終于伏而不敢興也象曰戎伏于莽敵剛也三歲不興安行也伏戎于莽以五固徑敵也三歲不興行將安之乎三蓋屈于勢力而罷兵與四以義退者異矣九四乘其墉弗克攻吉傳以為攻五本義以為攻二看來四與二為三所隔如一墻矣故為乘墉以攻之象乘三攻二也其所以弗克則是以五之故弗克五與二為正應陵下則犯上故曰弗克攻以上下之分故弗克攻而吉也象曰乘其墉義弗克也其吉則困而反則也乘其墉則目中不見有五矣揆之于義為未安故曰義弗克也弗克而吉者非困于力困于義也困于義而反之為則則者義之凖則不可踰越者也胡傳引此爻解趙盾納捷災之事與其改過也文過以遂非則凶改過以遷善則吉由九四以剛居柔故耳若九三以剛居剛則迷而不反矣三四不言同人以其有戰爭之象非同人之道也九五同人先號咷而後笑大師克相遇九五剛健中正同人者也若能以兼容併包為度三四雖強皆可擾而馴之矣乃昵而同之致三伏戎四乘墉兵端兆矣是以至于用師也先為三四所隔而未遇則號咷後克其相隔者而相遇則笑啼笑皆以二發非中節之喜怒也傳曰五自以義直理勝故不勝憤抑至于號咷然邪不勝正雖為所隔終必得合故後笑也最得先後情狀二五相遇亦豈易者蓋大師以勝之而然也甲胄從事異乎玉帛相先者矣傳曰九五君位而爻不取人君同人之義者蓋五專以私昵應于二而失其中正之德人君當與天下同而獨私一人非君道也二之在下尚以同于宗為吝况人君乎五既于君道無取故更不言君道而明二人同心不可間隔之義繫辭云君子之道或出或處或默或語二人同心其利斷金至中誠所同出處語默無不同天下莫能間也同者一也一不可分二也一可以貫金石冒水火無所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也繫辭備矣非傳合周公孔子之旨如此兩兩解釋恐讀者亦不解其義象曰同人之先以中直也大師相遇言相克也五剛中下同二之柔中其理直也理直而不獲伸故號咷也克者力勝之辭所謂強弗友剛克也遇者相遇克者亦相克也曰相克者以敵國之禮待之也五私二而失大同之道故其辭如此春秋周王以諸侯伐鄭王不稱天正此意也上九同人于郊無悔上九居卦之外下無應與故為同人于郊之象郊與野似相類然于野者取曠逺意無一不可同之人于郊者取荒僻意無一可同之人也義之相去逺矣凡人始同而終不同有末路之悔無所同故無所悔也或曰荷蕢一流人是也象曰同人于郊志未得也爻言無悔者以其無可同之勢而諒之象言志未得者以其有可同之理而惜之也象有不專解爻辭而别發一義者此類是也乾下離上大有元亨五陽大矣皆為一隂所有故曰大有五陽所有亦大矣皆以其有為一隂之有故曰大有傳曰大有盛大豐有也凡卦德有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也傳所謂才即彖傳所謂德也以用言故曰才以體言故曰德有體有用大有之義也彖曰大有柔得尊位大中而上下應之曰大有大有與同人俱五陽一隂之卦同人一隂在下卦之中大有一隂在上卦之中故同人云得位大有則云得尊位同人云得中大有則云得大中同人云應乎乾一隂勝五陽也大有云上下應五陽同應一隂也其位異則成卦之義亦異矣其德剛健而文明應乎天而時行是以元亨剛健而不文明或以冥行決事文明而不剛健或以狐疑失事健以致其決明以晰其幾此言卦內外之德也以下則指六五傳曰六五之君應乎乾之九二五之性柔順而明能應乎二二乾之主也是應乎乾也順應乾行順乎天時也故曰應乎天而時行其德如此是以元亨也開口既曰卦之德至此又曰其德如此兩德字正須分别又曰王弼云不大通何由得大有乎大有則必元亨矣此不識卦義離乾成大有之義非大有之義便有元亨由其才故得元亨大有而不善者與不能亨者有矣説的如此斟酌恐人誤認大有之義恆致驕肆也又曰諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大善之義有元亨者四卦大有蠱升鼎也唯升之彖誤隨他卦作大亨曰諸卦之元與乾不同何也曰元之在乾為元始之義他卦則不能有此義又為首出庶物之義他卦但為善為大而已曰元之為大可矣為善何也曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先于成也興而後有衰衰固後于興也得而後有失非得則何以有失也至于善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也須如此剖晰才盡元亨之義本義一槩作大亨恐未是象曰火在天上大有君子以遏惡揚善順天休命離火乾天離在乾上火在天上也合萬物在光照之中故為大有君子觀大有之象以遏惡揚善順天休命有善而無惡者性也有善而有惡者習也上焉者無以端其習而復其性則大有之盛不可得而保矣是故離以辨之乾以治之惡者逆天者也天討有罪利用遏遏者抑而止之也善者奉天者也天命有德利用揚揚者表而章之也此二者皆所以代天工而奉若天道也故曰順天休命休解美即紹我周王見休之休古之人旌别淑慝表宅里殊井疆其斯之謂與本義云所有既大無以治之則釁孽萌于其間矣天命有善而無惡故遏惡揚善所以順天精絶又云反之于身亦若是而已矣添此一轉最有益于身心薛文清曰遏惡揚善非內剛外明者不能故大有象之又發明朱子之義曰如去人欲存天理即遏惡揚善也其理益明矣初九無交害匪咎艱則無咎注疏以無交害為無上下之交所以有害傳獨云處卑無應與未涉于害甚確之説也本義從之余意九居大有之初上無繫應在已無驕盈之失在人無猜忌之嫌故有無交害之象言不相為害也已于人無患人于已無爭夫何咎使視為匪咎而以易心處之則匪咎者又有咎也故須克艱其心而後可艱者無害而時如交害書所謂其難其愼也戒謹恐懼庶乎可以保其匪咎之初矣傳曰大凡富有鮮不有害以子貢之賢未能盡免况其下者乎匪咎艱則無咎富有本非有咎也人因富有自為咎耳若能享富有而知難處則自無咎也處富而不能思艱兢畏則驕侈之心生矣所以有咎也此正可為富有者作針象曰大有初九無交害也當大有之時居初九之位而能艱其心以處之故無交害也此爻卑而在下立是非毁譽之外或以為逸民是也意邵康節足以當之九二大車以載有攸往無咎二剛而得中上有六五之君推誠委任而才德足以勝之故有大車以載之象陽志上進可以任重而行逺故有攸往之象無咎而不言吉者人臣之義不居功唯求寡過云爾三四亦然象曰大車以載積中不敗也積者重疊層纍之意載雖重而無損敗之患大車之能勝厥任也九二能勝大有之任正復如是此宰相之位也伊尹自任以天下之重者當之厥後則孔明其人也昔劉誠意論相曰胡惟庸小犢足以覆轅而破犁矣正從此爻反言之九三公用亨于天子小人弗克三下體而高居人上公侯之象也公用亨于天子傳作享本義作亨謂古亨享烹三字併作亨字通用又云三剛而得正上有六五之君虛中下賢故為享于天子之象此理甚確蓋公侯懋德而親膺天子之寵命也須合朝享宴享二禮而其義始盡小人才弱力薄無德以堪之故弗克也本義解經不用傳却于近思録引之蓋其義固有不可廢者傳曰公侯上承天子天子居天下之尊率土之濵莫非王臣在下者何敢專其有凡土地之富人民之衆皆王者之有也此理之正也故三當大有之時居諸侯之位有其富之必用亨通于天子謂以其有為天子之有也乃人臣之常義也若小人處之則專其富有以為私不知公已奉上之道故曰小人弗克也凡為公侯者曷可不知此義象曰公用亨于天子小人害也亨于天子在君子為利在小人為害或大有為小人之害或小人大有為國家之害象特出此一字以示戒欲小人度德量力不邀非分之福也此藩封之位也太公封于齊及彤弓諸侯可以當之傳曰自古諸侯皆守臣節忠順奉上者則蕃養其衆以為王之屏翰豐殖其財以待上之徴賦若小人處之則不知為臣奉上之道以其為己之私民衆財豐則反擅其富強為不順是小人害也爻傳備矣象傳又如此發揮其理益暢九四匪其彭無咎九四過中上近柔中之君有僣逼之嫌而能以剛居柔不居其大盛故為匪其彭之象彭字考之詩凡四見皆取盛之義故程傳本義因之鄭氏云四居四陽之首而率諸陽與之偕進其盛多蓋彭彭矣匪其彭則深自貶損不以盛多自處所以免于咎也其説甚明無煩别解象曰匪其彭明辨晳也物理盛衰相為倚伏非明炳幾先豈能處大有為之世而不有其大耶傳曰有明辨之智本義曰晳明貌皆以離之初而言也此大臣之立功于外者周公避東土遜碩膚而赤舄几几可以當之厥後則郭子儀其人也六五厥孚交如威如吉六五剛順虛中推赤心置人腹中有孚象下應九二之賢而二以剛中載之有交孚象且非特九二也三用亨四匪彭上履信皆交孚于一人者也交孚者上下相親愛之意然威克厥愛允濟愛克厥威允罔功仁而不武非迪吉之道也故須用威德威惟畏其吉蓋可知矣象曰厥孚交如信以發志也威如之吉易而無備也交孚者上下之志也無以發之孚何自而交乎惟一人以不欺為主而上下各喻其志其所以感發激發者至矣威不立而以剛立則慢易而無戒備之心偷安苟且豈足與有為哉此威如之所以吉也孚者五所有故正言以解之威者五所少故反言以釋之聖人文義固有當也此爻周成康漢文帝足以當之上九自天祐之吉無不利上九處大有之極而無位是功成身退超然于富貴功名之外者故有自天祐之吉無不利之象造物忌盈而欿然不居則為所眷注可知已象曰大有上吉自天祐也此與初爻俱不另作解但以卦名加爻辭之上而重言之其義自見在繫辭固詳言之矣天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也周公言天孔子兼言人非人心固無以卜天意也傳曰履信謂履五五虛中信也思順謂謙退不居尚賢謂志從于五朱子曰若無繫辭此數句此爻遂無收煞愚謂繫辭發周公之意程傳發明孔子之意皆缺一不可者此耆舊之謂也張良為帝者師而託為辟穀從赤松子遊足以當之艮下坤上謙亨君子有終上坤地下艮山也山髙大而居地之下卑屈之義故其象為謙舉其名不待釋其義而即以亨許之謙與比一例也傳曰有其德而不居謂之謙凡人之情始未嘗不勉為謙巽久則把持不住漸至于髙所以鮮終也君子指九三以孤陽處五隂之中小心退抑惟恐失之終其身如一日故曰有終傳曰君子達理故樂天而不競內充故退讓而不矜安履乎謙終身不易自卑而人益尊之自晦而德益光顯此所以謂君子有終也在小人則有欲必競有德必伐雖使勉慕于謙亦不能安行而固守不能有終也傳言君子併及小人反言以足其義也昔謝上蔡别伊川一年問其功課曰只降伏的一箇矜字曰何謂也曰仔細簡點起來病痛盡在這裏王陽明曰傲者衆惡之魁也知傲為惡之魁則知謙為善之首矣知傲為凶德則知謙為亨道矣學者時時佩服上蔡陽明之言然後可以語謙德彖曰謙亨天道下濟而光明地道卑而上行謙之所以亨者何也天以下濟為道天之謙也傳曰濟當為際謂下交也竊意濟以天施言不必作際發育萬物光顯著明則亨矣地以卑為道地之謙也卑以順承天施言其氣上行而交于天則亨矣天本髙故以下濟為謙其亨于光明見之光明固艮體也地以卑為謙其亨于上行見之非卑固不能上行也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也天道以氣言如日月寒暑盈者減損之謙者增加之虧盈而益謙也地道以形言如山川浚谷盈者傾壞之謙者流注之變盈而流謙也鬼神以理言盈者降之殃謙者降之祥害盈而福謙也傳曰鬼神謂造化之迹以理之不掩言朱子曰鬼神言害福是有些造化之柄以理之不爽言也人道以情言盈者憎而疾之謙者愛而敬之惡盈而好謙也傳曰謙者人之至德故聖人詳言所以戒盈而勸謙也謙尊而光卑而不可踰傳曰謙為卑巽也而其道尊大而光顯自處雖卑屈而其德實髙不可加尚尊卑以德言本義曰人能謙則其居尊者其德愈光其居卑者人亦莫能過尊卑以位言傳以德言是與繫辭一例看極是義以位言則尊而光即天道下濟而光明卑而不可踰即地道卑而上行其理固確君子有終正所以合德于天地也如禹之謙也汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功其尊而光乎如顔子之謙曰願無伐善無施勞克己而天下歸仁其卑而不可踰乎象曰地中有山謙君子以裒多益寡稱物平施傳曰不云山在地中而曰地中有山言卑下之中藴其崇高也若言崇高藴于卑下之中則文理不順諸象皆然觀文可見本義因之裒多益寡稱物平施二句余嘗有答友人説頗詳今録之其説曰謙之大象曰裒多益寡稱物平施是就君子身上説而其謙德則已施而人受之也朱子曰人多見在己者髙在人者卑謙者抑己之高而卑以下人便是平也此亦不是兼人己説人多見在己者高在人者卑此泛就衆人言也抑己之高而卑以下人才就君子説然抑己之高自然卑以下人卑以下人正是抑己之高處這是一律話非謂抑己之高屬已卑以下人屬人也來諭裒多屬己益寡屬人諸家亦會有説但多寡分屬人已則是在已實實的高了却要用力制這高的念頭在人實實的卑了却要用力制這卑的念頭此所謂𨗳其源而塞其流也顔子以能問于不能畢竟是見能者在人而不能者在己故也以多問于寡竟是見多者在人而寡者在己故也若實實見己之能而見人之不能却故意向不能者開口實實見己之多而見人之寡却故意向寡者開口則是偽也則是安排作弄也其何以為顔子哉然則君子之謙從可知矣畢竟在己者常見寡在人者常見多而後可以言謙德也來諭云在己則有其德而不居其德有其功而不居其功以名裒多是也在人則德而目以為德功而目以為功如此只是還他本分何名為益寡乎此言甚當與程傳高者下之卑者上之抑高舉下損有餘益不足之義正同但其意未甚顯耳竊意推而明之卦體上坤下艮外順內止也內止而外不順則有傲志有矜色外順而內不止則為象恭為色莊非所語于君子之道也君子裒多裒已之多也損其有餘如山高而降之使下益寡益己之寡也增其不足如地卑而升之使上皆所以法地中有山之象也至于稱物平施却就人説言稱人而施得其平也平者多寡適中之謂凡吾人尊卑上下親疏逺近那一箇不該我謙然就中都有恰好道理在如孔子與上大夫言便誾誾如與下大夫言便侃侃如豈不是稱物的樣子可見君子裒多益寡只是要恭近于禮的意思不失之驕不失之諂謙到恰好處便了嘗徴之春秋春秋書魯隱公盟莒人于浮來胡傳曰屈千乘之尊下與小國之大夫盟豈裒多益寡稱物平施之謂乎太卑而可踰非謙德矣然則康侯非特善春秋又善易即此可以識其大假矣初六謙謙君子用涉大川吉以六之謙體居初之卑位但曰謙未足以盡其盛德也故曰謙謙謙謙君子猶云溫溫恭人也此卑而不可踰之君子也凡事處後而莫敢爭先則有餘地故雖冒險難而無失也險難無失則平易之地可無所往而不吉矣或謂用涉與利涉不同蓋利近自然用者尚費氣力也象曰謙謙君子卑以自牧也牧字傳作處以詩云自牧歸荑也張丘二公本注疏作養亦好蓋謙德不夙養于平日則矜高好勝之心未能自持謙而又謙君子之所養可知己故曰卑以自牧也六二鳴謙貞吉或以鳴謙為自鳴其謙恐于謙德有礙本義以謙有聞自好傳曰二以柔順居中是為謙德積于中謙德充積于中故發于外見于聲音顔色故曰鳴謙此理似更確又曰居中得正有中正之德也故曰貞吉凡貞吉有為貞且吉者有為得貞則吉者六二之貞吉所自有也朱子作戒辭又為嫵媚一流人下針象曰鳴謙貞吉中心得也鳴謙貞吉蓋得其中心之誠然者非勉強而為之也得于中者故鳴于外也九三勞謙君子有終吉三為成卦之主故爻但用卦辭以吉代亨而加勞字注疏作勤勞之勞程朱本繫辭作功勞為是傳曰三以陽剛之德而居下體為衆隂所宗履得其位為下之上是上為君所任下為衆所從有功勞而持謙德者也故曰勞謙古之人有當之者周公是也竊意周公之先尤有禹抑洪水而平天下禹之勞也輔幼主而寧王室周公之勞也一不矜伐一遜碩膚勞謙君子有終吉舍二聖其誰與歸傳又曰既能勞謙又須君子行之有終則吉竊意此爻當以勞謙君子為句觀象傳可見正與初六謙謙君子例同無用復加一轉也故傳又曰九三以剛居正能終者也此爻之德最盛故象辭特重如此一直説才是象曰勞謙君子萬民服也萬民謂五隂服者服其功高天下而不有也繫辭云勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也傳曰有勞而不自矜伐有功而不自以為德是其德宏厚之至也言以其功勞而自謙以下于人也德言盛禮言恭以其德言之則至盛以其自處之禮言之則至恭此所謂謙也夫謙也者謂致恭以存其位者也存守也致其恭巽以守其位故高而不危滿而不溢是以能終吉也夫君子履謙乃其常行非為保其位而為之也而言存其位者蓋能致恭所以能存其位言謙之道如此如言為善有令名君子豈為令名而為善也哉亦言其令名者為善之故也繫辭曲盡周公之義傳又曲盡孔子之義學易者不須另作解矣六四無不利撝謙無不利撝謙傳作一句讀本義作兩句讀尤精其曰柔而得正上而能下既盡六四之義又曰居九三之上故戒以更當發揮其謙以示不敢自安之意尤為確妥傳曰四居上體切近君位六五之君又以謙柔自處九三又有大功德為上所任衆所尊而已居其上當恭畏以奉謙德之君卑巽以讓勞謙之臣撝施布之象如人手之撝也動息進退必施其謙蓋居多懼之地又在賢臣之上故也余嘗有説云上承六五之柔謙則無猜無嫌近君之利也下乘九三之勞謙則不驕不伐近臣之利也故曰無不利然又恐其謙之過中而流于拘葸曲謹也則謙之義未盡故須發揮散布之曰撝謙上有謙德之君則以責難陳善為恭敬下有勞謙之臣則以推賢讓能為事功此理亦通姑存之象曰無不利撝謙不違則也裒多益寡稱物平施謙之則也不違則者施得其平無過不及之謂也傳曰中于法則又曰謂得其宜言合于天理之當然也六五不富以其鄰利用侵伐無不利五六虛中不富之象居尊位而執謙德不富以其鄰之象傳曰富者衆之所歸惟財為能聚人五以居位之尊而執謙順以接于下天下所歸心故不富而能有其鄰也鄰近也不富而得人之親也然專用文德而無武功則負固不服者何以待之故利用侵伐胡氏春秋傳云聲罪致討曰伐潛師掠境曰侵侵伐利則無不利矣傳曰威德並著然後盡君道之宜而無所不利也蓋五之謙柔當防于過故發此義最為詳盡胡雲峰曰謙之一字自舜征有苗而伯益發之可見五用侵伐謙之益非滿之損也然則周公之意蓋與益同矣象曰利用侵伐征不服也周公慮人君以姑息養姦也故曰利用侵伐孔子慮人君以貪功生事也故曰征不服不服而後征之豈得已哉二聖之意蓋交相足也昔漢文帝謙德未遑四海歸心豈非不富以其鄰者乎及胸奴犯邊則出而勞軍欲親征之可謂利用侵伐征不服矣上六鳴謙利用行師征邑國傳云欲謙之志未得故不勝其切至發于聲音見于顔色似自鳴其謙矣本義仍如二之謙德有聞而加極字其説自妥蓋上六處順之極居謙之終下與九三同德相應謙無以加矣故亦有聞也利用行師征邑國傳以為剛武自治其私本義云隂柔無位才力不足故可以征已之邑國而已無位無才力如何可征邑國故蒙引解云位指君位似矣亦未顯也訂詁云上于六位為最髙比于九五君位有上公象坤為邑國曰邑即邑之在國中者古諸侯各自為國其大夫各有采邑采邑不順者伐之如墮費墮郈之類是上公所征止于國邑毋敢侵伐亦謙之象鄒汝光云舞干格苖六五以之因壘降崇上六以之如此説其義始明不可易矣象曰鳴謙志未得也可用行師征邑國也均一鳴謙也在二則曰中心得以其自然而無所勉強者言之也在上則曰志未得以其欿然而不自滿足者言之也總以釋其謙德也如是而猶有傲然以我為謙而不與較也遂敢于不順則行師以征之爻曰利象曰可可正所以許其利也易酌卷三
