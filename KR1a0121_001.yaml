body:
  text: 易酌卷一祁州刁包撰周易上經乾下乾上乾元亨利貞開卷第一義便從乾道説起萬物所由始也書首堯道統之始詩首關雎人倫之始戴記首敬禮之始春秋首春嵗之始首王人之始古聖立言率用是道也乾字程傳説的好傳曰乾健也健而無息之謂乾夫天専言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼以妙用謂之神以性情謂之乾此等處直可續聖經後人豈能贊一辭乎元亨利貞自穆薑時已作四德説孔子引之作文言其取義詳且盡矣朱子獨作占辭謂大亨而利在正固竊意還他四德無害其為占辭也存疑云晦菴利在正固之説却像元亨時仍有未正尚須勉之以正意終屬兩截話了訂詁云六畫純陽唯天惟聖人足以當之曰元曰亨曰利曰貞恢恢乎如摹天容然贊之不得豈假戒哉二説俱有理宜存之大抵乾德原與諸卦不同以大字解元字却未盡彖傳云乾元坤元胡傳云人君體元宰相調元舜典記元日伊訓稱元祀春秋書元年即劉秉忠建蒙古國號曰大元取易乾元之義亦創始意也直作大字便説不去孔子曰乾元者始而亨者也便是大證佐程傳曰元者萬物之始便是以孔子解易又曰亨者萬物之長利者萬物之遂貞者萬物之成下字俱確不可易余又謂元是就德之會歸處説亨是就德之發逹處説利是就德之濟益處説貞是就德之端確處説不過從傳引伸之耳初九潛龍勿用程傳曰理無形也故假象以顯義此理最確讀之知一部易莫非象則莫非理也或者乃謂伊川言理而遺象豈其然哉又曰龍之為物靈變不測故以象乾道變化此語便説盡了又兼陽氣消長聖人進退言之其義始備矣自下而上為第一畫故曰初其畫陽故曰九一陽伏于下而五陽覆之故其象為潛龍此蟄以存身之地也若能伸而不能屈則為躁動為冒進豈遵飬時晦之道乎故曰勿用于斯時也渾穆韜戢斂其鋒而不試善其藏而不用則庶乎潛之義矣其在君道則蕭王事更始之日在臣道則孔明卧隆中之時也推之士農工賈無不可因時取義者非特為有位者言也昔元薛居欲太子往陕西經理田事王約不為署行曰太子潛龍也當勿用之時為飛龍之事可乎此亦可謂知易者九二見龍在田利見大人二出乎地之上則為田矣龍離乎潛之地則為見矣德業聞望朝野推服欲深自掩蔽不得也故曰利見大人程傳曰利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤作三層説又曰是舜之田漁時也愚謂唯孔子之東西南北棲棲道路者足以當之九三君子終日乾乾夕惕若厲無咎以九居三重陽也故曰乾乾下乾三陽畢具故曰終日日陽精也終日必夕故曰夕惕若惕不可以龍言又爻居人位故曰君子處重剛不中之地危甚矣故曰厲恐懼修省罔敢自暇自逸則履危而安矣故曰厲無咎胡氏曰乾九三一爻實居六十四卦人道之首聖人尤致意焉此六卦所以不言乾而三所以獨言乾乾也此説最見大義推廣言之禮之無不敬詩之臨深履薄書之蹈虎尾涉春冰及先儒所云主敬謹獨皆此爻之義也然如此又恐有好高務約之病昔陳瑩中嘗愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已伊川先生曰凡説經義如只管節節推上去可知是盡夫終日乾乾未盡得易據此二句只做得九三使若謂乾乾是不已不已又是道漸漸推去自然是盡只是理不如此不有伊川此論幾何不以文中子之言為至言也哉嘗試考其生平似亦未為知易者獻策龍門炫玉求售潛而勿用之謂何且隋文僣擬九五豈飛龍比而輕身利見有愧九二大人矣按古讀夕惕若厲至程朱始改正之以若字絶句從文言雖危無咎看出此謂以孔子解易也九四或躍在淵無咎下乾終而上乾始改革之會也可以出而有為矣必曰或者斟酌詳審不以成心執著其間也四與五比與初應躍則為五之飛不為初之潛也是躍自淵中相時而進故無咎其在君道則舜禹由匹夫為天子其在臣道則伊尹諸葛由躬耕而開商祚扶漢鼎也蒙引曰在字輕看猶言或躍于淵也得之矣按綱目書即天子位者惟漢之髙祖及光武昭烈庶幾無咎若唐宗宋宗則不免于咎矣况其他乎肅宗即位靈武以繫天下之望恐亦不得苛責之也以一卦分言之則二五人位故二五皆稱大人以一卦合言之則三四人位故三與四皆不稱龍曰不稱龍而曰在淵曰躍龍之象昭然矣昭其象而諱其名或曰避五之嫌是也九五飛龍在天利見大人五以剛健中正之德居天子之位正如飛龍在天一般楊氏曰此如舜之謳歌朝覲時也程傳曰聖人既得天位天下因利見夫大德之君也兼二義説朱子曰文言分明以聖人為龍以作言飛以萬物覩解利見大人只是言天下利見夫大德之君也如此説則利見大人者瞻視其儀型想望其丰采也尤為確妥昔宋太祖一日問王昭素曰九五飛龍在天利見大人常人何可占得此卦昭素曰何害若臣等占得則陛下是飛龍在天臣等利見大人是利見陛下也可謂善解易可謂善對君矣上九亢龍有悔在乾為最上一畫進無復之矣故曰上九位髙則不免顛危之慮故曰亢龍有悔蔡澤曰此言上而不能下信而不能屈往而不能自反者也策士之言竟可作注疏大抵富貴功名到極盛時便當尋箇退步堯舜伊周尚矣三代而後在君道則唐髙祖之傳位太宗在臣道則張子房之從赤松子也若子胥屬鏤之劍淮隂爼醢之刑子孟驂乘之禍伏波薏苡之謗皆履盛滿而不知止故耳使明于乾之上九吾知免矣用九見羣龍無首吉王介甫以用九為用上九欲繫其辭于上爻之下程子非之以為六爻皆用九故傳曰用九者處乾剛之道也見羣龍謂觀諸陽之義無為則吉也朱子獨取歐説言凡筮得陽爻者皆用九而不用七蓋諸卦一百九十二陽爻之通例也竊意筮卦者六爻不變或六爻中一爻二爻不變則用七八曷言乎用九六不用七八也此即就卦之六爻言耳凡陽爻皆以九名未嘗云七也凡隂爻皆以六名未嘗云八也經固有用之之道焉獨于乾坤繫之辭者以其純陽純隂故也隂陽之道變則用不變則不用用九者用陽之變也乾變而為坤則剛以濟柔無強項出頭之患故曰見羣龍無首吉如此解與歐説全異存之以備參考謹按此節解者不一其説故程子則謂剛德不可為物先朱子獨取歐説而以左傳蔡墨之説明之來注則獨取介甫之説非不各有其理但細按之均有未盡協者如蔡墨之説乾變之坤則九皆成六是去其九而不用矣曷云用九乎且九之象為龍既已變六併龍之象俱無矣豈止無首乎况天德二字乃至純至粹之稱若云不可為首則九五之位乎天德與夫彖傳之首出庶物孔子之言不幾自相矛盾乎若以小象之言為戒詞則文言之天下治見天則又何居焉至來注用介甫之説謂上九為諸爻之首因其亢而變剛為柔則知進知退不為窮災而吉就占筮而言似有理而實偏母庸深辨竊嘗取全卦反覆細讀之用九者用其九也如所謂用之以酬酢用之以經緯萬端是也見者九為陽明乾主知故曰見也羣龍者潛見飛躍之龍也無首吉宜潛而潛宜見而見宜飛躍而飛躍時措咸宜如環之無端故吉也孔子識得此意故小象曰天德不可為首也天德者言其至純至粹即乾之元也故文言直云乾元用九不可為首者言潛見飛躍渾然于其中不可指定何者為首也大抵天行之健即所謂於穆不已也用九無首即所謂純亦不已也文言又曰乃見天則言天之不可端倪不可方物用九者乃見而則之也彖曰大哉乾元萬物資始乃統天本義云此専以天道明乾義竊意聖道亦在其中觀下析言元亨利貞四德而天與聖人平分之可見且稱乾元而以大哉冠之則元字不當訓大益明矣余意孔子解彖但加曰字言彖辭之意云云也如此解其義亦明後大象小象倣此乾之元即萬物之元謂萬物原本于此也資其氣以成質資其理以成性故曰資始如子之受氣于父也天以形體言其浩蕩無外者都包括在一元裏面故曰統天傳曰四德之元即五常之仁偏言則一事専言則包四者此其義大矣雲行雨施品物流形噓則為雲行者布氣于上也潤則為雨施者布澤于下也物有區别故曰品言諸品之物也灌輸滋長莫不成色而成象故曰流形大明終始六位時成時乘六龍以御天貞為終元為始言終始則亨利在其中矣本義云不終則無始不貞則無以為元也故不曰始終而曰終始也大明者灼見乾道之終始也時而潛時而見時而惕時而躍時而飛時而亢莫不因乾道自然之位而成之聖人無容心也乘如乘馬之乘安坐六龍之上而進退往來自如也御如御車之御遊行自在居然造化之在其手也乾道變化各正性命保合太和乃利貞乾道罏冶千態萬狀莫不幻現其中變變化化循環而無端也本義云變者化之漸化者變之成余謂自無而之有曰變自有而之無曰化傳曰天所賦為命物所受為性各正者靈蠢巨細各得其道以自全彼此不相假借本義云太和隂陽會合沖和之氣也余意即絪縕化醇之氣也保合者有翕聚而無泄越也傳曰保謂常存合謂常和天地之道常久而不已者保合太和也張子以太和表道蓋本諸此首出庶物萬國咸寧首出庶物兼知行言大明終始知之首出庶物也乘六龍以御天行之首出庶物也咸寧者正萬國之性命保和萬國之太和也乃利貞統承上三句説本義以大哉乾元三句釋乾之元雲行雨施三句釋乾之亨大明終始三句釋聖人之元亨乾道變化二句釋乾之利保合太和一句釋乾之貞首出庶物二句釋聖人之利貞其理自確後儒非之過矣象曰天行健君子以自強不息乾坤父母也故不取重義若六子則不厭重矣天稱健地稱坤其説甚多竊意天曰乾不如健字顯故曰天行健坤曰順該不得厚字故曰地𫝑坤用字各當其可也或曰乾坤異乾又異坤故尊其德而特以健稱亦通乾者健而無息之謂也天以乾道成人而人不能體天之健是謂不肖君子觀于乾乾之象以自強不息云按天一晝一夜行九十餘萬里人若一刻放下便與天行不相似了故一息尚存此志不容少懈務期與天同健而後已蓋始而法天者久而合天矣本義云不以人欲害其天德之剛又語録云不息祗是常存得此心則天理常行而周流不息矣此從源頭上著解才是真自強才是真不息才是君子下手真工夫君子以德言希聖希賢之稱也以者法其象以自勵也六十四卦凡身心家國天下之務無不俱備學者一一身體而力行之斯可以學易矣梁溪高先生曰大象是孔子之易是孔子特地教人用易之方潛龍勿用陽在下也一陽初萌于地下保而護之足矣可輕用乎傳曰君子處微未可用是説理陽謂九下謂潛是説象見龍在田德施普也有德無位何以普被言盛德之至能使人觀感而興起也終日乾乾反復道也指出道字則終日乾乾確有可依據矣反復終身由之而不盡也傳曰進退動息必以道也本義曰重復踐行之意皆真實有得之言故親切如此或躍在淵進無咎也加一進字則伏處巖穴之志可以幡然改矣傳曰量可而進適其時則無咎也説得極有斟酌飛龍在天大人造也本義云造猶作也作者創制立法之意開天闢地手假從此討出亢龍有悔盈不可久也亢則盈盈者造物所忌其能久乎欲免悔者急思持盈可也用九天德不可為首也六陽皆天德也天德純剛用則過過則折烏乎可不為首者變其剛而渾然無迹也傳曰復用剛而好先則過本義曰陽剛不可為物先其義一也天德二字説見爻辭用九條下文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也彖有傳象有傳又從而飾之以辭曰文言極盡乾坤之蘊以為諸卦之凡例也元者善之長四句傳專人事言本義則兼天人言其以四德配春夏秋冬原本孔疏而其義則益精矣愚謂元者冒萬善而居其先故曰善之長亨者萃衆美而集其成故曰嘉之會利者隨時宜而調其適故曰義之和貞者斂枝葉而植其根故曰事之幹本義云幹者木之身而枝葉所依以立者也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子大公無我與乾元同體則萬物皆在覆育之中故足以長人傳曰比而效之謂之體以體乾言也朱子以為不然而曰體仁不是將仁來為我之體我之體便都是仁也尤為親切美其所會則周旋中規折旋中矩必有可畏可象者矣故足以合禮利己足以害義則利物可知功德普被罔不合天理當人情又安有乖逆之患故足以和義圓通足以敗事則貞固可知明于經而堅確守之不少移易斯善建不拔故足以幹事君子行此四德者故曰乾元亨利貞元亨利貞天之四德也君子行之則君子之四德也天此乾君子亦此乾故不曰天元亨利貞而曰乾元亨利貞也或曰君子體仁四句分仁義禮智言之也首句先言仁二句三句結言禮義四句併不及智何也曰胡氏春秋傳云元者何仁是也仁者何心是也由內而達諸外然後為人之冠冕故先言之禮以簡身非美其所會則不合義以方外非實有利益于物則不和故後言之時貞固雖屬知而于信義尤切朱子云屬北方者便著用兩字王氏亦云腎有兩龜蛇亦兩也蓋信而不智則為尾生孝已之信智而不信則為蘇秦張儀之智智以信成故不得專言智也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也傳以初九為聖賢之在側陋蓋有聖人之德而韜光剷采以藏身者也不易乎世不與時浮沉也不成乎名不求聞達也傳守其身不隨世而變晦其行不求知于時二語最確潛則遁世不悔故無悶遁世不悔袛要求一箇是而昧昧者莫之見也不隨俗不延譽此當然之理而旁觀者不以為是這箇無悶較上句又深一層樂行憂違從來作出處説恐非潛德矣徐氏鄒氏之説俱有理而未確竊意二句緊跟上意説一則曰無悶再則曰無悶不亦樂乎樂天知命故不憂不憂者不戚戚于貧賤也行即人生行樂耳之行違即天與水違行之違違與行反行其樂而違其憂如孔子之樂以忘憂及顔子之人不堪其憂回也不改其樂是也此其胸中確有以自得處不以富貴功名動心所以為潛龍也傳見可而動知難而退不作出處呆講極有斟酌九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也以九居二中也非正也曰正中者正當中位也傳曰在卦之正中為得正中之義若作中正則非矣德之中于言行見之言不為立異惟求勿欺此心而已行不為過高惟求勿斁此心而已此庸字即中庸之庸傳袛作常信常謹説故曰造次必于是也信也謹也皆所以存誠也而必云間邪者念慮之發微有不正即遏絶之謹幾之學也程子云間其邪者在于言語飲食進退與人交接之際説在日用上教人好下手也言行之誠足以移風易俗故曰善世有其善喪厥善故不伐德之被物者無疆故曰博渾然不露痕迹故曰化化即大而化之之化上句善世而不有其善下句德博而不有其德是一律説傳云德博而化正已而物正也則化當作感化之化上句從善世歸到德上去下句從德博又歸到善世上去便是交互説非君位而備君德兹其所以與九五同稱大人與隆山李氏曰乾畫一實則生誠坤畫一虛則生敬故乾九二言誠坤六二言敬二字始于庖羲心畫而實天地自然之理也不可不知九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子終日乾乾夕惕若果何為哉進德修業焉耳何謂進德忠信所以進德也傳不著解祗加內積二字朱子曰積字説的好本義主于心者無一念之不誠亦是就裏面説蓋以德者得之于心也總是要肫懇篤實則得于心者自然日新月盛而不能已矣朱子曰忠信二字與别處説不同且如破釜甑焚廬舍持三日糧示士卒必死無還心如此方會厮殺忠信便是有這心如此方會進德何謂修業修辭立其誠所以居業也傳云擇言篤志擇言解修辭固當篤志解立誠未甚顯明道曰修辭立其誠不可不仔細理會言能修省言辭便是要立誠若袛是修飾言辭為心只是為偽也修其言辭正為立己之誠意乃是體當自已敬以直內義以方外之實事道之浩浩何處下手惟立誠才有可居之處有可居之處則可修業朱子所謂説的來洞洞流轉者此也或問立誠不在制行上説而專指修辭何也朱子曰人不誠處多在言語上又曰人多將言語做沒緊要容易説出來若一一要實這工夫自是大故本義曰見于事者無一言之不實便是兼制行説又曰修辭立誠便要立得這忠信若口不擇言逄事便説只這忠信亦被汨沒動蕩立不住了又曰修辭立誠祗于平日語默之際以氣上驗之思與不思而發意味自别明道所謂體當自家敬以直內義以方外之實事者只觀發言之平易躁妄便見其德之厚薄所飬之淺深矣合程子之言熟讀之始盡修辭立誠之意學者宜書紳書壁不可作訓詁看過愚嘗謂我輩矢志要做箇人究竟做不起來都被糊言亂語誤了修辭有二義言語躁妄宜慎重者則當修省言語間冗沒關係者則當修治必如朱子所云一字是一字一句是一句者而後可言立誠也昔司馬溫公告劉元城以誠而曰自不妄語始元城櫽栝七年而後成其有得于修辭立誠之道乎橫渠解此句直作著書立言説亦是一理前曰修業修者整頓振飾之意後曰居業居者安享其成也修是為那居的張本居是從那修裏來有用功成功之分知至至之傳以為致知所謂始條理者知之事也知終終之傳以為力行所謂終條理者聖之事也朱子大意亦分屬知行愚意知至知終統以知言也至之終之統以行言也知至是知到下手處至之便是下手了知終是知到盡頭處終之便是盡頭了看到那裏就做到那裏即知以為行知甫及之而仁便能守之也幾非知幾之幾即顔氏之子其庶幾乎之幾可與幾即可與進德也能集義能精義而後能存義存義者萬理具備惟所用之也可與存義即可與居業也本義明以進德修業分屬兩假矣且曰至之乃行也何又以前假專屬知後假專屬行乎從下卦論之三居上則君子進德修業于上豈有驕焉者乎從上卦論之三在下則君子進德修業于下豈有憂焉者乎無時不進德修業故雖以剛居剛而無咎也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎在淵下也躍則上矣迹似無常而心有常非枉道以從人也在下退也上則進矣迹似無恆而心有恆非絶類以自異也夙昔進德修業原非獨善一身而已正欲及時圖治使天下共沐其德共庇其業也大公無我何咎之有九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也聖人物覩句是主上六句及下二句俱是客末句則總結之也同聲相應以儔伍之唱和言也下至雞犬之類亦然孟子雞鳴狗吠達乎四境同聲相應也同氣相求以臭味之投合言也下至磁鐵之類亦然吳氏曰磁石鐵之母而可以引鐵同氣相求也水潤下故流濕火炎上故就燥其性然也龍興致雲虎嘯生風其體然也聖人作而飛在天矣萬物覩言人皆利見之也所謂望日瞻雲也傳云本乎天者如日月星辰本乎地者如蟲獸草木本義主康節説以人為動物親上草木為植物親下上從上之類下從下之類也不如傳更確萬物以類相從聖人之于人亦類也但出乎其類耳故興起于上而人皆見之上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也九龍故貴居最上故高在卦之外故無位無民自四以下皆從五故無輔孤而睽動安得吉是以有悔也潛龍勿用下也前曰陽在下重在護陽此但曰下則越次躐等非所宜也見龍在田時舍也本義作用舍之舍或作傳舍之舍言若羇旅然非其正位也亦通終日乾乾行事也行事者言體之于身非但凛之于心也傳曰進德修業蓋以德業為事以進修為行甚確或躍在淵自試也設身以處其地而審度之非冒進也飛龍在天上治也以天道治天下恭已無為而化馳若神故曰上治近見訂詁正同此解傳曰上之治也本義曰居上以治下俱不説開為是避天下治也一句亢龍有悔窮之災也窮而不變則禍患隨之乾元用九天下治也亨利貞之德統于元故曰乾元用九則剛而能柔經綸天下胥本諸此豈曰小補之哉潛龍勿用陽氣潛藏淵而凝之以厚其積韜而戢之以固其鋒何用之敢云見龍在田天下文明一鄉一國沒箇人物便覺黯然無色九二天下一人豈不令世界光榮精彩許多傳與本義俱就被化説亦是終日乾乾與時偕行當九三之時而不乾乾惕若則厲矣故與時偕行進進而不已也或躍在淵乾道乃革時當改革天運為之一新矣潛而不躍其何以自安飛龍在天乃位乎天德初曰隱德二曰中德三四曰進德皆天德也而位不足以稱之惟五在天乃可曰位乎天德德與位兩相稱矣亢龍有悔與時偕極時也者與之偕行則可與之偕極則不可極則亢而悔矣乾元用九乃見天則剛者過乎則柔者不及乎則用九則剛柔適宜天然恰好之品節出焉乃曉然共見之也乾元者始而亨者也元亨利貞彖傳逐假説文言開口便四句説至此袛兩句説又一句説愈説愈約矣若曰乾者元而亨者也亦自分明必合元于乾而加始字以見元德無不統括萬物資之以始即資之以亨也利貞者性情也傳云以性情言謂之乾乾之性情如何在利貞上見得本義所謂收斂歸藏乃見性情之實是也乾始能以美利利天下不言所利大矣哉形形色色光輝發越美利也乾始能以美利利天下元而亨亨而利者也不言所利貞也蕩蕩乎無能名之意也不言所利者傳云無所不利非可指名也本義引或人之言曰坤利牝馬則言所利矣説得最明曉王注云不性其情何能久行其正二語獨到明道定性書用之後儒用其意者皆以為本于程而不知本于王也大哉乾乎剛健中正純粹精也傳曰此一節又反覆詳説以盡其義也方以大矣哉結上又以大哉起下總是極口贊嘆之辭乾陽故剛而健本義曰剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之德也分疏甚明又曰純者不雜于隂柔粹者不雜于邪惡恐不似贊語竊謂純者純一無駁雜也粹者粹美無渣滓也精者至純至粹而一無痕迹也若夫純粹者剛健中正之至極而精者又純粹之至極者也二語確甚勝傳六德之説矣下面就作易聖人説六爻發揮旁通情也爻者效也效乾道而發揮于六爻之中旁引曲喻以盡其義類也時乘六龍以御天也雲行雨施天下平也若此者豈徒託諸空言乎時乘潛龍則有潛的道理時乘見龍則有見的道理推而至于惕躍飛亢莫不皆然變變化化與天同運如雲之行渾淪磅礴如雨之施優渥沾足功德普被而天下久安長治矣六爻之時義大矣哉又曰乘六龍之時以當天運則天之功用著矣故見雲行雨施隂陽溥暢天下和平之道也説得恁地詳明本義曰言聖人時乘六龍以御天則如天之雲行雨施而天下平也只加三間字便自醒發説得恁地約要君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也君子成德者也得之心必徴之事豈有不可見諸行事之日哉但時方處潛未能見故未能成其所以行傳曰未成未著也是以君子弗用也焦氏云或世道未亨或君聘未至得之矣君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也此又從進德修業而推本言之學以窮古今之理而滙其歸故曰聚問以剖疑似之關而析其幾故曰辨學問而有自矜之意則其德業狹矣須寬以居之浩浩乎其莫不容納也學問而有自私之意則其德業薄矣須仁以行之肫肫乎其莫非胞與也二臣位乾二非臣也故再言君德以明之九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣三以下乾之上承上乾故重剛非二五故不中非五則上不飛于天非二則下不見于田時之危也甚矣因乾乾之時惕而為乾乾之心故雖危不危而無咎也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎四以上乾之下乘下乾故重剛重字非衍也不中不見不飛與三同而又曰中不在人何也三人位下履二地猶可惕而安四人位居三上焦氏所謂立于頭上空虛之處也視三之危倍甚矣故可以躍而稱或或者遲回未決之辭也故曰疑無咎昔漢文帝為代藩入正大統嘗有疑于諸大臣矣賴宋昌之言卒踐飛龍之位其事正與此爻同夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎夫九五之大人為萬物所利見者豈尋常功用所可擬乎天無私覆地無私載天地之德也大人覆載萬物而不有其德與天地合矣以此句為主下三句俱從天地説出日月天地之德所明也大人無私照而光被萬物與日月合其明矣四時天地之德所行也大人無愆時而運周萬物與四時合其序矣鬼神奉天地之德福善禍淫者也大人彰善疸惡使萬物趨吉而避凶與鬼神合其吉凶矣先天而天弗違謂創制立法功奪造化也後天而奉天時謂繼志述事功侔造化也天弗違而地在其中而人與鬼神可類推而知矣蓋天者理而已矣人則秉賦此理者也鬼神則往來屈伸此理者也此一節正學聚問辨之極功而聖作物覩之實事也本義曰人與天地鬼神本無二理特蔽于有物之私是以牿于形體而不能相通大人無私以道為體曾何彼此先後之可言哉先天不違謂意之所為默與道契後天奉若謂知理如是奉而行之皆切實有至理亢之為言也知進而不知退知存而不知亡知得而不知喪身有進必有退位有存必有亡人之道也物有得必有喪天之道也存謂見在亡謂遁去亢也者窮于上而不知反于下知進而不知退也極為九而不知變為六知存而不知亡也知自高貴而不知其無位無民無輔知得而不知喪也昧于天人之道所以動而有悔也其惟聖人乎知進退存亡而不失其正者其惟聖人乎言進退存亡不復言得喪者得喪在天進退存亡在我也盡其在我者以聼于天故不失其正也正貞也乾之德以元始以貞終也本義曰知其理勢如是而處之以道則不至于有悔矣固非計私以避害者也説的聖人心事出又曰其唯聖人乎始若設問而卒自應之也妙絶坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉乾而繼之以坤者陽倡隂和無孤立孤行之理也乾為龍坤為馬御天行地之分也乾為馬坤為牝馬陽竒隂偶之義也君子有攸往傳直取彖傳之辭加之朱子以為袛是虛句引起下文來極是傳義皆以先迷後得為句主利為句竊意易凡言利者皆貞也未有言主利者以利為主豈可訓乎後儒以先迷為句後得主利為句極有理蓋隂為和不為倡先陽則有迷錯之愆後陽則得所主而利矣又陽明隂暗先陽則背明任暗故迷後陽則舍暗投明故得主孔疏原有此解文言後得主而有常尤為確證程朱乃謂主字下脫利字蛇足矣西南隂方得朋則喪主而衆隂無以成功東北陽方喪朋則得主而從之乃可與乾合德隂以從陽為貞安其貞而不變吉可知已此説所從來甚遠注曰東北反西南者也隂之為物必離其黨之于反類而後獲安貞吉疏曰以人事言之象人臣離其黨而入君之朝女子離其家而入夫之室傳曰離喪其朋類乃成化育之功而有安貞之吉此理自不可易愚意隂必從陽天地不易之正理亦常理也今不從陽而從隂是反正反常豈所語于坤德乎孔氏曰猶人既懷隂柔之行又向隂柔之方是重隂柔弱故非吉也謹按後得主以孔子文言為據其説自不可易折中云得朋喪朋正與上文得主相對蓋事主者惟知有主而已朋類非所私也然亦冇時而宜于得朋者西南是坤代乾致役之地非合衆力不足以濟于是而得朋正所以終主之事是得朋即得主也惟東方者受命之先北方者告成之候稟令歸功已無私焉而又何朋類之足云故必喪朋而後得主也其説最為曉暢學者所宜潛心也彖曰至哉坤元萬物資生乃順承天傳曰資生之道可謂大矣乾既稱大故坤稱至至義差緩不若大之盛也聖人于尊卑之辨謹嚴如此如此説才見聖人下筆之妙或曰至者行而到之之謂不直訓極蓋乾道恁樣大坤便都能到的故以至哉贊之遊氏曰大則無所不包至則無所不盡坤元即乾元非有二元也萬物皆發育于此故曰資生猶子之成形于母也乃順天而承之受其所施也坤厚載物德合無疆含𢎞光大品物咸亨翕受故厚厚故萬物載焉乾德無疆而坤合之所以配乾也此以上總釋元義也自坤之靜翕者言之則為含為𢎞含以言乎其蘊藉也𢎞以言乎其恢廓也自坤之動闢者言之則為光為大光以言乎其昭著也大以言乎其普被也傳曰以四者形容地猶乾之剛健中正純粹也品物咸亨則亦嘉之會矣此以上釋亨義也牝馬地類行地無疆柔順利貞君子攸行馬而牝自坤道成又以其柔順而健行故曰地類傳曰行地無疆謂健也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也其動也剛不害其為柔也是則柔順所利之貞坤德也君子之所行也此以上釋利貞之義兼釋君子有攸往也前言坤德合乾德至此又言君子之德合坤德也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶先迷則失承天之道後順則得承天之常柔順不柔順之分也西南得朋巽離兑也推類是與未可以為常道也東北喪朋震坎艮也離失羣類乃因陽而成生育之功得道有常故終有慶也安貞之吉應地無疆安貞者安守常道也守常道之吉德合無疆也地之應天者如是君子之應地者亦如是三言無疆從天説到地上來從地説到君子身上來言有序而意加切矣參同契曰雄不獨處雌不孤居以明牝牡竟當相須假使二女共室顔色甚姝蘇秦通言張儀合媒推心調諧合為夫妻敝髮腐齒終不相知此得朋善喻也而喪朋之慶可知已象曰地𫝑坤君子以厚德載物天以氣言故曰行地以形載故曰𫝑傳曰地𫝑坤取其順厚之象本義高下相因無窮雖是説順而厚亦在其中矣君子觀其象而以厚德載物包括無外者其體也曲成多方者其用也恩不市功不居非道非義不較者其量也是故誠信其德則為忠厚沉默其德則為長厚肫懇其德則為仁厚皆所以在宥羣生舉胞與之擔而一身肩荷之也初六履霜堅冰至履初象霜一隂象堅冰六隂象方一隂始生便知五隂都要漸次到的故曰履霜堅冰至杜釁消萌之道不可不講也按坤初六在姤為五月一隂始生便有凝意以其由發散而翕聚也此時隂氣在下催逼上陽氣來故天道越炎熱了然驗之井泉則已寒故雖堅冰之時甚遠而聖人見微知著早有以處之若云初凍則坤之十月矣豈待智者而知哉象曰履霜堅冰隂始凝也馴致其道至堅冰也霜者隂氣凝結之始也馴致沿習因循之意泄泄沓沓釀成大惡而不悟也春秋公子翬請殺桓公履霜之漸也隱公不悟以及鍾巫之禍唐高宗命武氏蓄髮履霜之漸也房褚諸公不悟以及誅滅唐室之禍可無凛與本義云夫隂陽者造化之本不能相無而消長有常亦非人所能損益也然陽主生隂主殺則其類有淑慝之分焉故聖人作易子其不能相無者既以健順仁義之屬明之而無所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉蓋所以贊化育而參天地者其旨深矣隂陽二義須如此分合説到參贊處才是聖人作易之旨六二直方大不習無不利五爻俱未盡善惟六二中正故地道有獨歸焉此一卦之主爻也直者生理四達無所屈抑也方者生質已定無所移易也大者生氣沛然充塞兩間無所限量也直方大則無不利矣然皆出于自然無所用力也傳曰在坤道則莫之為而為也在聖人則從容中道也直方大孟子所謂至大至剛以直也在坤體故以方易剛猶貞加牝馬也言氣則先大大氣之體也于坤則先直方由直方而大也直方大足以盡地道在人識之耳乾坤純體以位相應二坤之主故不取五應不以君道處五也乾則二五相應此皆學易者所當知也象曰六二之動直以方也不習無不利地道光也六二中正動以中故直動以正故方言直方則大在其中矣乾以美利利天下不言所利坤以美利利天下不習所利地道其著于此乎初爻言道戒其馴上爻言道戒其窮二之道盡善故贊其光六三含章可貞或從王事無成有終三陽也陽明有章象六隂也隂暗有含章象三不中正本非可貞也韜晦章美故可貞耳居上卦之下從王象居下卦之終無成有終象不居成功自含章來克終臣職自可貞來象曰含章可貞以時發也或從王事知光大也夫子恐人之過于隱默以自全也故曰含章可貞非不發也以時發耳樹立建明務當其可而已或從王事而無成有終者則其知足稱也光故所照者遠大故所包者廣一切才藝功名渾忘了又安有專擅之患哉張乖崖曰事君者忠不言已能勤不言已勞亦無成有終之義也傳曰象只舉上句解義則並及下文他卦皆然此義宜知又曰夫子懼人之守文而不達義也又從而明之言義所當為者則以時而發非含藏終不為也含而不為不盡忠者也又曰惟其知之光大故能含晦吕氏曰此語極有意味尋常人欲含晦者多只去鋤治驕矜深匿名迹然愈鋤愈生愈匿愈露者蓋不曽去根本上理會自已知未光大胸中淺狹才有一功一善便無安著處雖強欲抑遏終制不住譬如瓶小水多雖抑遏固閉終必泛溢若瓶大水少自不泛溢都不須費力伯恭可謂善讀程傳矣六四括囊無咎無譽隂虛能受囊象也隂而又隂閉塞不開括囊象也此時有咎不可有譽亦不可咎則為人所指摘譽則為人所忌嫉也括囊者藏鋒斂鍔如結囊口而不出庶幾可免于二者矣象曰括囊無咎慎不害也象不言無譽省文也慎懼則無妄動慎密則無輕泄全身遠害之道也朱子宜去宜隱二義極好不然隱忍忌諱為啞為聾非易教矣按四重隂不中俱宜就時位言故傳曰上下間隔以立危疑之地也疏曰括結也囊所以貯物以譬心藏知也六五黃裳元吉傳羿莽媧武之言朱子非之謂爻中原無此意焦氏引周官注及詩緑衣黃裳之喻謂言黃裳于坤六五則知為乾九五之配矣坤爻純隂嫌于言君又不可以臣當之故取象于后以存君臣又嫌于敵乾故象下裳示坤當下于乾也聖人謹于君臣之辨如此此説極有證據但爻中亦未見此意李氏以九五為堯舜以六五為臯夔稷契乾坤二卦相應其理極是恐亦未切五意惟馮氏云百官總已以聼三代之常制人臣而行君事何世無之惟忠誠純至臨大節而不可奪如黃裳者是賴而後成社稷之功此説頗為得之其伊尹之于太甲周公之于成王霍光之于昭帝乎黃屬土坤之色裳在下坤之位攝飛龍之位安牝馬之貞元德元勳何吉如之象曰黃裳元吉文在中也黃裳文也在上卦之中故居髙能下彰施其美如是也按本義引子服惠伯告南蒯之言以為占法竊意未然爻辭居中守下則有大善之吉若反中謀上凶可知已正教以謹守為臣之分也惠伯不能申明言外之意使南蒯體會爻辭而用之乃與言忠信之事曰不可以占險曰筮雖當未也講是非不講禍福豈足以動小人之心哉無惑乎王之不聼也上六龍戰于野其血玄黃隂極而居最上之地與陽為敵矣能無戰乎不曰隂與陽戰而曰龍戰胡氏所謂與春秋王師敗績于茅戎天王狩于河陽同一書法是也戰于卦外故曰野隂慘之象故曰血兩敗俱傷故曰其血玄黃象曰龍戰于野其道窮也其道窮正與馴致其道相應方其時便逆料有今日之禍矣隂盛而至于窮極殺運所由興也漢李郭挾獻帝奔走蒙塵互相攻殺頗類此爻胡氏曰初曰堅冰至者防龍戰之禍于其始上曰龍戰于野者著堅冰之至于其終也照應甚好用六利永貞坤之用六猶乾之用九蓋合一卦六爻而用之也用者用其變也坤變而為乾則健行不息故曰利永貞胡氏乾變坤剛而能柔坤變乾雖柔必強善變化氣質者當知之象曰用六永貞以大終也陽大隂小隂雖小其始也變而陽以大終也乾之體首出者也其用却云無首坤之體安貞者也其用却云永貞明于乾坤之體用者其他可觸類而通之矣謹按用九之變隂前卦辨之詳矣此節之大終説者俱以變陽為大終夫以變陽為大終豈變隂者亦可曰小終乎竊意乾知大始故所重在元所云無首與不可為首者即中庸所謂既無虛假自無間斷諺所謂不須另起頭是也總要打合到健字上去坤作成物故所重在貞所云永貞大終者即其在初而凛履霜之戒在二而有直方之利在三則守含章之貞在四則為括囊之慎在五則有黃裳之吉在上則無龍戰之傷所謂永貞而大其終者也蓋大終者即艮之上九以厚終也之意總要打合到厚字上去才是文言曰坤至柔而動也剛至靜而德方坤順天故至柔順天而動則健矣故剛其體隤然故至靜生生之德罔有變遷故方傳曰剛動故應乾不違靜方故生物有常此釋牝馬之貞也後得主而有常後則得乾為主而以大終故有常此釋利義也主下不必添利字疏云隂主退若在事之後不為物先即得主也此隂之恆理故云有常此説極其的當含萬物而化光柔靜故含生意斂藏于內也剛方故化生意輝煌發越于外也此釋亨義也坤道其順乎承天而時行贊坤道之順引起下句耳承天時行正其所以順也如承天春夏之時則有生長之道承天秋冬之時則有收藏之道不先時亦不後時也此釋坤之元即乾之元也本義曰復釋順承天之義正指坤元言胡氏曰乾文言釋元亨利貞自元而亨亨而利利而貞乾以君之所主在元也坤文言則首釋牝馬之貞自貞而利利而亨亨而元坤以藏之所主在貞也此説從本義來正見聖人立言之妙蒙引非之不亦過乎積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也此示初六以謹微之道也天下事莫不積于微而成于著善不積不足以成名惡不積不足以滅身積者禍福之原也是故亂臣賊子其罪固不容誅矣揆厥由來要亦君父養成之春秋之法在于端本清源殆以此耳使辨之早而慎所積以防其漸則有慶無殃何堅冰之足患哉順依本義作慎極是直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也六二所謂直者在人心為肅然端一處蓋其正也所謂方者在人心為截然裁制處蓋其義也君子以六二為德故敬以直內義以方外也梁溪先生曰知直方之動靜一體而成靜中有毫髮私念攙和便不能直動中有毫髮世情粘帶便不能方愈直則愈方愈方則愈直妙處真不容言也伊川先生言敬每以整齊嚴肅四字恰好形容得一箇正字先生析理精微多此類敬內義外本義但贊程傳之備而不另著解程傳于上句但加主字蓋主一無適以為體而無一念之紆曲也于下句但加守字蓋隨時制宜以為用而無一事之瓦合也敬立而內直義形而外方則見敬以直內非以敬直內義以方外非以義方外也義形于外非在外也則見義本于敬而不可以內外岐其視也敬義既立其德盛矣不期大而大矣德不孤也明道所謂敬義夾持上達天德自此也敬以直內德盛于內矣內不孤也若形之外者不能是是非非一切順理而行到恰好處則外孤義以方外德盛于外矣外不孤也若存之內者無常惺惺法使其心收斂不容一物則內孤孤者狹小之意內外不孤此直方之所以為大也直方大不習無不利則行無留難而左宜右有也又何疑乎不疑而又何習乎學乾者須從九三入學坤者須從六二入故聖人于兩爻之辭諄復詳切如此讀易者不能于此身體力行之無為貴易矣蒙引云讀易之乾而得進修之方讀易之坤而得敬義之訓然乾之進修非坤之敬義則無以為之具也已其曰忠信則敬之謂也其曰修辭立誠即義之謂也今就其言思之忠信者凡事要盡心凡事要辨實去做這便是小心無敢慢的意思豈非敬之謂乎修辭立誠者凡事皆如其口罔不心安理得自然處處做的妥當豈非敬之謂乎二爻之義正宜如此關合方為得解謹按理學家動云存誠主敬今此二義源于易之乾坤則易者其理學之宗乎竊嘗思之乾之畫竒竒故實而主于誠然體實而用則虛用而不虛則誠不能明而為從井救人之愚誠矣惟以虛用則以實心體實理而次第淺深無或渝其則矣坤之畫偶偶故虛而主于敬然體虛而用則實用而不實則敬而無實而為聲音笑貌之虛文矣唯以實用則唯虛心能虛受而尊卑隆殺無或爽其度矣且乾之德圓故立誠者通權達變無可無不可而不淪于鄉原之亂德誠者聖人之德也坤之德方故主敬者秉禮守義持正不阿而不效夫達士之圓通敬者賢人之學也是故誠則無不能敬敬則不必皆誠也圓則未有不方方則亦可至圓也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也此節以地道明臣道而並及妻道也隂雖有美含之不敢見其美也以從王事弗敢成不敢居其美也此臣道也臣道法地妻道亦然語曰婦人無才便是德否則牝雞司晨惟家之索已地也妻也臣也分則三而道則一也末復專言地道舉大者以例其餘也地本以成為道而無其成唯有代乾終事而已曰代仍是弗敢有之意天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也上二句是客下二句是主天地變化草木蕃陽明之象也天地閉賢人隱重隂之象也括囊無咎無譽其以身之隱應天地之閉乎蓋言慎也防間之意遠蓋言謹也韜斂之功勝君子黃中通理三與五俱隂包陽故有章美之象三不中故含五中故積內而炳外也君子之德黃握居中環應之樞而表裏精粗洞達無礙極渾厚者又極精明也正位居體隂居陽位非正然坤為土土居中央不以四時易位則正矣觀河圖洛書可見正位者處五之尊而不以為嫌也然為裳不為衣謙抑遜順安居為下之體位彌高者體彌卑也美在其中而暢于四支發于事業美之至也黃中通理則美在其中非有表著之迹也正位居體則美形諸外矣暢于四支德潤身睟面盎背也發于事業道經世懋勳底績也美至此何以加諸然得力却自敬義來六五六二非有兩君子也隂疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃隂盛極儼然以陽自居幾莫辨其大與小矣故疑疑則不安其位故戰時方六隂人以為無陽矣作易者嫌于無而稱龍尊陽也如魯昭公出奔春秋必書公所在唐武后僣號綱目必書帝在房州是也名器不可假隂欲離類以擬于陽得乎類未離故稱血著隂禍也玄黃者兩敗俱傷天地失其色矣故雜然雜者時也勢也不雜者其理也天畢竟玄地畢竟黃所以正名定分表萬古不易之經也聖人抑隂扶陽之意如此謹按乾坤二卦為易學之宗六十四卦三百八十四爻皆從此生出故孔子繫易于此特加詳焉然而乾又自為一例坤雖加詳第與餘卦一例蓋乾為天為君其尊無對莫敢與之敵體故也至于周公爻辭特加用九用六于兩卦之後前于本節之下辨之已詳然特論其理也若就占筮變爻而論則介甫之説來氏宗之不為無見蓋六爻之位按之人身則初為趾而上為首比之無首與既未濟之濡首皆其較著者也故以上九為羣龍之首亢而有悔則不可為首明矣若變而為柔則一變而夬再變而大壯三變而泰四變而臨五變而復其卦皆吉余向謂用九必變者此也若六則疑于陽且戰矣况變而為剛則一變而剝再變而觀三變而否四變而遁五變而姤其卦皆不吉余向謂用六不變者此也易酌卷一
