body:
  text: 易酌卷六祁州刁包撰周易下經艮下兑上咸亨利貞取女吉上經首乾坤天地一大夫婦也下經首咸恆夫婦一小天地也傳曰咸感也不曰感者咸有皆義男女交相感也物之相感莫如男女而少復甚焉本義曰艮止則感之専兑説則應之至俱精甚天地以交感而泰不感則否人心以交感而通不感則暌傳曰凡君臣上下以及萬物皆有相感之道物之相感則有亨通之理君臣能相感則君臣之道通上下能相感則上下之志通以至父子夫婦親戚朋友皆情意相感則和順而亨通事物皆然故咸有亨之理也利貞相感之道利在於正也不以正則入於惡矣如夫婦之以淫姣君臣之以媚説上下之以邪僻皆相感之不以正也天下感應之大端悉此矣請自其正者言之如君以禮使臣臣以道事君而不為媚説君臣之利貞也父以義訓子子以道諭親而不為順從父子之利貞也夫婦相敬如賓而不為狎褻夫婦之利貞也推之萬物莫不皆然然於夫婦為猶切故曰取女吉傳統承彖傳説然所重只在貞字六禮不備貞女不行男以正感女以正應故吉也以尊卑言君尊臣卑男尊女卑以先後言君先求於臣男先求於女觀取女之吉則人臣守身之義可知矣自古未有炫玉求售而迪吉者彖曰咸感也有心恐涉偏私非寂然不動之理故彖以咸代感無心恐涉寂滅非感而遂通之道故彖傳以感解咸先儒云互明其旨是也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也兑女故曰柔上艮男故曰剛下傳曰柔上變剛而成兑剛下變柔而成艮指乾坤二體言也卦六畫皆剛柔相應故曰二氣感應以相與謂情意和合也又乾感坤而坤應之成兑坤與乾也坤感乾而乾應之成艮乾與坤也龜山曰夫婦之道止而不説則離説而不止則亂艮男居兑女之下故曰男下女所謂男先求于女也親迎御輪前導皆此意也柔上剛上二氣感應以相與解亨卦體也止而説解利貞卦德也男下女解取女吉卦象也各有所指是以二字則總結之耳下又因男女交感而推之天地聖人無非此理也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣天地所以感萬物者氣焉耳而傳曰天地之理聖人所以感人心者體焉耳而傳曰聖人之用於天地則曰二氣交感於聖人則至誠以感億兆之心直從源頭本領處説萬物化生翕然丕變成形成色也人心和平徯志丕應無侮無拂也觀其所感緊承上二句來極是蒙引非之過矣感者情也所以感者性也性微而情顯蓋就流行發見之真切篤摯處言也明乎感通之理天地萬物豈有近情乎傳曰知道者默而觀之可也此語尤為可思象曰山上有澤咸君子以虛受人朱子主傳説以為水潤土躁二氣感通有虛受之義其理甚確但未見山字義余謂山高澤下山上有澤高而能下虛受之象也朱子又云兑上缺有澤口之象下二陽畫有澤底之象艮上一畫陽有土之象下二隂畫中虛便是滲水之象説象尤為顯切君子觀其象而以虛受人虛者實之反也實則有來必拒虛則無物不容傳曰虛中者無我也中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也最為簡盡蒙引曰納其言而酌其是非悉其事而裁其當否未免添足以虛受人只主善而當受者言為是初六咸其拇本義云此卦雖主於感然六爻皆宜靜而不宜動也二句雖好宜細看感就人身取象而以心為主非獨心不可動身亦不可動也初居最下宜安分內求而曰咸其拇則是未能不動也拇足大指也指動而足不動其能有行乎傳曰以微處初其感未深豈能動於人故不言吉凶又曰人之相感有淺深輕重之異識其時勢則所處不失其宜矣皆格言也象曰咸其拇志在外也四在卦外而初與為正應咸其拇則是志也動于九四矣動者志置之弗問可也六二咸其腓凶居吉居下體之中故曰咸其腓腓在拇之上故曰二當其處腓足肚也行則先動有躁進之象二與五為正應若不待五之感而輕身以先所謂無媒自嫁者也凶可知矣但二本中正所應又中正若安汝止而不輕動破凶為吉無難耳方戒之以躁妄自失隨處之以安靜自處聖人之誨人至矣象曰雖凶居吉順不害也雖者抑揚之辭也既凶矣又能迪吉者豈必矯逆而為之哉隂性本靜直順其性而不改中正本色則無失身之害而吉矣聖人非欲其絶所感也但當待時而動耳九三咸其股執其隨往吝三以剛居剛非隨人之才也居艮體之上非隨人之位也而曰咸其股股在身之中下猶三在卦之中下也故以為象執其隨者一意以隨人為主而胸中漫無操持也以是而往無面目對正人君子故可羞吝也傳以為三隨上本義以為三隨二與初蓋股本隨足而動者也本義更確象曰咸其股亦不處也志在隨人所執下也不處猶言不居也初與二皆隂其不處也宜也三陽亦踵而從之不自愛甚矣曰亦者若曰二隂不足道如三亦爾爾乎蓋深致憐惜之意也志在隨人可謂甘居下流不自振拔者矣或曰陽在上而下隨二隂故曰所執下也亦好後世若張禹孔光輩皆素行修謹身列上位而一阿王氏一媚董賢其九三之謂乎蒙引以王莽之揚雄朱全忠之張文蔚薛貽矩為喻而又引高季迪鶴媒詩嗟爾高潔非凡禽胡為狗食移此心可謂生平夙負聞望而失節末路者之明鑒矣九四貞吉悔亡憧憧往來朋從爾思四當心位咸之主也而不言咸其心欲其以無心感也以九居四非正又説體居隂而應初故以貞吉勉之而又戒以不貞之悔也傳曰貞者虛中無我之謂也本義云貞者正而固也非正而固亦安能虛中無我哉二説正互相發耳余謂貞則一一則靜虛動直而吉吉則悔無不亡矣傳曰聖人感天下之心如寒暑雨㿩無不通無不應者亦貞而已矣貞一則所感無不通若往來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也是其朋類則從其思也以有係之私心既主於一隅一事豈能廓然無所不通乎其理甚確朱子又云往來不是心中憧憧然往來如所云往來於懷也這個只是對那日往則月來底説那個是自然之往來此憧憧是加私意不能順自然之理猶言助長正心與計獲相似其理益醒矣此爻是心學之要故孔子繫辭極言之程傳又句句發明朱子又反覆數千言皆不可不熟讀也象曰貞吉悔亡未感害也憧憧往來未光大也偏害正私害公貞吉悔亡只是廓然大公故未感於偏私之害也憧憧往來則其志偏而私矣偏則不光大私則不光明故曰未光大也豈所以感天下乎傳曰以私感則其道狹言朋則從而非朋則不從也極好恐只説的未大九五咸其脢無悔五爻皆戒動獨此爻不動而靜又無取焉何也能動而不能靜則有用無體非感也能靜而不能動則有體無用非感也九五居説體之中而得正宜如聖人感人心而天下和平也今在心之上口之下故曰咸其脢脢背肉也背心而動漠然無所感者也此所謂勿求於心若後世之禪學是也寂滅自甘豈曰無可悔哉無所悔耳傳解爻辭云與心相背而所不見也言能背其私心感非其所見而説者則得人君感天下之正而無悔也至象辭則云戒使背其心而咸脢者為其存心淺末係二而説上感於私知也却費一轉朱子云武王不泄邇不忘逺是其心量該遍故周流如此是此義也至本義又云志末謂不能感物則與武王之説矛盾矣二説俱似未確象曰咸其脢志末也心者身之本脢者身之末舍其本而末是志塊然不靈故不能感物也又脢在背後故曰末上六咸其輔頰舌輔頰舌用其一足矣而必三用者言其諄復不憚煩也上以隂柔為説之主居感之極又兑為口舌故有此象不言凶咎者不待言也胡傳云信在言先者不言而自喻誠在令外者不令而自行徒區區口舌間何為乎傳曰不能以至誠感物而發見於口舌之間小人女子之常態也豈能動於人乎不直云口而云輔頰舌亦猶今人謂口過曰唇吻曰頰舌也輔頰舌皆所用以言也説的詳明象曰咸其輔頰舌滕口説也上焉者不務修德而徒恃詔令下焉者不務積誠而専憑文辭故曰滕口説無實事而有空談三代後感人者多坐此病本義曰滕騰通用張中溪曰蘇秦張儀之徒縱橫其説即滕口説也引證亦確巽下震上恆亨無咎利貞利有攸往以感通之情言之則取乎少男少女少者情之最摯者也以尊卑之分言之則取乎長男長女長者分之最肅者也然而不肅其分亦無以摯其情懼其和而流也此恆所以次咸也其與乾坤分主上下經何也乾坤之道非夫婦則萬物何由化生中庸曰君子之道造端乎夫婦及其至也察乎天地正此理也震上象男尊巽下象女卑男尊正位乎外女卑正位乎內此夫婦不易之常道所為終身如一日者也順其常道而不變自然亨通而無過咎矣然所利者在貞貞者震上巽下之正理也一失其正或狎褻或乖離則不足以致亨而咎有所不免矣利有攸往自貞來一利無往不利矣或曰以成卦言之所以成卦者震巽也震巽者隂陽之始也隂自巽生至坤極矣一陽生於下而為震陽自震生至乾極矣一隂生於下而為巽隂陽嗣續如環無端惟其往而不息所以能恆也如使積而不往則兩間之氣化或幾乎息矣此理甚好程云變而後能常朱云常而後能變兩説正可恭看彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆常也常則久矣故言久而不言常也古字作􅷳其説象一隻船兩頭靠岸今作恆謂其立心如一日義各有取也傳合四者統名曰卦才本義則分體分象分德剛上柔下卦體也雷風相與卦象也巽而動剛柔皆應卦德也剛上而柔下以卦變言之傳主乾坤説謂乾之初上居於四坤之初下居於初剛爻上而柔爻下也本義則别有所引云恆自豐來剛上居二柔下居初也以傳為主本義亦宜參看若直以其體言之震上故曰剛上巽下故曰柔下此二體之常也雷動則風發二者相須交助其勢故曰相與此二氣之常也下巽上震順而動也逆動非可久之道順動乃可久也初柔與四剛相應二剛與五柔相應三剛與六柔相應六爻應的恰好剛柔皆應也剛柔一不相應非可久之道皆應乃可久也此四者所以成恆之義也恆亨無咎利貞久于其道也天地之道恆久而不已也恆亨無咎而利在貞正者久于其道也道字即指貞字説貞正也道謂當然之正理久於其道謂當然之正理也天地亘古亘今只此當然之正理其道所以恆久而不已也利有攸往終則有始也天地且然况於人乎由始而終幾無所往矣終則有始有始則無終是以往之久而無不利也易所謂貞下起元中庸所謂物之終始皆此義也或曰巽終於坤一陽生而震始矣震終於乾一隂生而巽始矣傳曰凡天地所生之物雖山嶽之堅厚未有能不變者也故恆非一定之謂也一定則不能恆矣惟隨時變易乃常道也故云利有攸往明理之如是懼人之泥於常也本義曰久於其道終也利有攸往始也動靜相生循環之理然必靜為主也二義皆不可不知傳曰極言常道本義曰極言恆久之道非有異也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣傳又云日月隂陽之精氣耳惟其順天之道往來盈縮故能久照而不已得天順天理也四時隂陽之氣耳往來變化生成萬物亦以得天故常久而不已此本義所不容贊一辭者蒙引云日月只是附麗於天不必説到往來盈縮處且以天與日月行度參差不齊證之誤矣行度雖有不齊而究未始不同歸從古豈有不順天時之日月哉若只就附麗説則日月只是箇塊然的物事恐亦不能久照矣又云四時變化不必説得天豈寒往暑來暑往寒來能外天理而自成一變化乎言隂陽五行而不及太極變化如何成的是皆不詳程傳之過也日月四時以得天而久聖人則以久而得天久於其道者與日月合其照與四時合其變化也天下化成則得天而贊其化育矣天地萬物見於所感又見於所恆何也感以見其情之真也恆以見其情之正也正則久矣自天地貞觀日月貞明以及飛潛動植之類都是常常如此稍變異則為反常矣故曰天地常久之道天下常久之理非知道者孰能識之此可與子在川上章參看象曰雷風恆君子以立不易方傳自立於大中常久之道不變易其方所二語最確故本義不著解再詳諸儒或引雜卦傳震起巽伏及象傳剛上柔下而為之説曰陽震動而起則宜上隂巽伏而入則宜下二物各居其方而不易其在人事長男常震動於外而無所牽於內長女常巽順於內而無所與於外是皆立不易方之象故君子觀其象以立不易方其説甚顯余謂方與圓對確不可易之理也立不易方樹起兩脊跕定兩腳不因人推移也所謂嶽峙中天八風不動者與初六浚恆貞凶無攸利初與四為正應故曰貞初巽性善入而居最下之地故曰浚恆浚即浚井之浚深之也四震體而陽性以剛居高志上而不下又為二三所隔應初之志異乎常乃初不度勢之從違奢望而過求之故凶而無所利也本義辭意全用傳但解貞字不同傳謂堅執常理本義謂雖正亦凶本義更妥傳曰世之責望故素而致悔咎者皆浚恆者也志既上求之深是不能恆安其處者也柔微而不恆安其處亦致凶之道凡卦之初終淺與深微與盛之地也在下而求深亦不知時矣皆名言也象曰浚恆之凶始求深也居恆之始而所求於四者太深嫌疑所由生禍患所由起也能無凶乎程子以劉蕡當之余謂賈誼亦然或曰京房亦其類也謹按賈誼洛陽少年耳開口便痛哭流涕就要更張改革非浚恆而何九二悔亡二以陽居隂非正也宜有悔矣然所處者中而五之應中咸有一德悔所以亡也易有不費一辭但數其畫而定吉凶者此類是也傳曰中重於正中則正矣正不必中也人能識重輕之勢則可以言易矣朱子解之曰如君子而時中則是中無不正若君子有時乎不中即正未必中蓋正是骨子好了而所作事未有恰好處故未必中也又曰一件物事自以為正却有不中在且如飢渴飲食是正若過些子便非中節中節處乃中也責善正也父子之間不責善非伊川不能發明中正二字如此分曉非晦翁不能發明伊川之意如此分曉象曰九二悔亡能久中也居中而應未必中應中而居未必中皆非可久之道也居中應中故曰能久中也傳曰人能恆久於中豈止亡其悔德之善也又進一步説九三不恆其德或承之羞貞吝三以陽居陽其位正矣然過剛失中志從上六不能久處其位是躁動不恆之人也所謂士也罔極二三其德者與傳云或承之謂有時而至也本義云或者不知其何人之辭承奉也言人皆得奉而進之不知所自來也貞吝傳云固守不恆以為恆本義云正而不恆為可羞吝本義尤醒説卦云巽為進退為不果其究為躁卦正九三之謂也象曰不恆其德無所容也無容身之地即孔子所謂不可作巫醫是也傳曰當處之地既不能恆處非其據豈能恆哉言三以陽爻居陽位當處之地也乃不能恆處而從上六處非其據矣故不能恆也蒙引引華歆諸人皆始負重名而末節貽臭千古可謂確論九四田無禽四以陽居隂不中不正用力於其所不當為之事徒勞而無功也故為田無禽之象或以禽為初曰初伏而下四亢而上故不能相有也亦通傳曰人之所為得其道則久而成功不得其道雖久何益如田獵而無禽獸之獲無為貴恆矣象曰久非其位安得禽也傳解爻辭既曰以田為喻矣至解象辭又泛言處非其位雖久無所得然後申言之曰以田為喻故曰安得禽也可見九四爻辭只是喻意不是正意未可執定説馮厚齋曰久非其位處不當位也六五恆其德貞婦人吉夫子凶五應二以柔中應剛中也其德可久正而固矣故有恆其德貞之象但不為倡而為隨婦人之吉非夫子之道也婦人無才便是德所謂以順從為正者也故吉若夫子而唯唯聽命則失其鬚眉本色矣故凶傳曰五君位而不以君道言者如六五之義在丈夫猶凶况人君之道乎在他卦六居君位而應剛未為失也在恆故不可耳君道豈可以柔順為恆也此易所以貴於知時識變也象曰婦人貞吉從一而終也夫子制義從婦凶也傳曰如五之從二在婦人則為正而吉婦人以從為正以順為德當終守於從一此即一與之醮終身不改之義也夫子以制義為事則裁決由心斷制自我若惟婦是從所謂牝雞司晨惟家之索矣安得不凶後世若晉惠帝唐高宗光宗隋文帝及肅宗皆以從婦而凶可謂前車已上六振恆凶本義曰振者動之速也上六居恆之極處震之終恆極則不常震終則過動又隂柔不能固守居上非其所安此全用傳也傳又曰振恆以震為恆也如振衣振書抖擻運動之意在上而其動無節此義亦不可少備録之蓋紛更變亂靡有已極立見其敗也故凶謹按有明方正學之輔建文殆此爻之謂矣象曰振恆在上大無功也爻言凶象復言大無功者蓋振恆在上喜功生事欲以兾幸非常而不知其究竟一無成立也所以灰躁動者之心也若王安石之新法是已艮下乾上遁亨小利貞二隂方長四陽向消此君子見幾而作之時也故其卦為遁以退避為遁遁其迹也以晦藏為遁遁其用也傳曰君子退藏以伸其道道不屈則為亨又曰在事亦有由遁避而亨者雖小人道長之時君子知幾退避固善也或曰身之屈道之亨也余意全身逺害不惟道亨身亦亨矣小利貞朱子不主程説謂隂柔小人勉之以正也其説甚辨細看來當以程傳為是傳云隂柔方長而未至於甚盛君子尚有遲遲致力之道不可大貞而尚利小貞也易中小利有攸往小貞吉小過小畜都如此看且臨遁之對大壯遁之反皆曰利貞遁加小字其非為小人謀也明矣又三隂進而為否則曰不利君子貞二隂未至於否則小小利貞以此互推其義自明蓋伊川之説本注疏不可易也彖曰遁亨遁而亨也剛當位而應與時行也遁亨不著解只用而字轉下言遁不期亨而自亨也聖人解經之簡易如是傳曰小人道長之時君子遁退乃其道之亨也尚未著解二隂長於下固當退避四陽未消於上獨不可致力乎五以剛陽之德當中正之位而下應六二之中正有君有臣何遂不可有為也傳曰雖隂長之時如卦之才尚當隨時消息茍可以致其力無不至誠自盡以扶持其道未必於遁藏而不為故曰與時行也極是朱子以知時而遁為與時行恐與剛當位而應句不侔矣小利貞浸而長也其斷然以小為小人者全用彖傳浸而長一句竊意浸而長故小利貞以小人卜君子也若羣隂暴長則天下事不可為矣惟積漸而來故尚可隄防而挽回之就中摶捖微權斡旋妙用莫可名言故極言之而贊其大曰時曰義言因時制宜不得拘拘一轍也傳曰遁者隂之始長君子知微故當深戒而聖人之意未便遽已也故有與時行小利貞之教聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間強此之衰艱彼之進圖其暫安茍得為之孔孟之所屑為也王允謝安之於漢晉是也此理甚好朱子已引入近思録至於解經獨不用何也遁之時義大矣哉本義但云處之為難孔子不云乎果哉末之難矣如何見的時義之大且上句戒小人之長而下句忽贊君子之遁於文義恐亦未協象曰天下有山遁君子以逺小人不惡而嚴山下起而止天上進而遙故為遁避之象君子觀其象以逺小人不惡而嚴蓋嫉惡太甚激成水火之形故不惡持身稍疏便來衆多之口故嚴無悻悻不能容之意有凛凛不可犯之節君子之待小人類如斯也觀孔子之於陽貨孟子之於王歡則可見矣傳曰逺小人之道若以惡聲厲色適足以致其怨忿唯在乎矜莊威嚴使知敬畏則自然逺矣此理正從平日主敬得來蒙引又進一步豈傳所謂矜莊威嚴専為小人設乎多事矣初六遁尾厲勿用有攸往傳以為遁而不往本義以為不往而遁其説不同從傳為是初隂柔而居遁最後之地尾之象也在上者先遁矣雖踵其後亦將無及故有遁尾之厲然處亂世者或去或不去歸潔其身而已往既有厲則亦何必以逺去鳴高勿往可耳勿往非甘心亂世也朱子晦處靜俟四字極好象曰遁尾之厲不往何災也厲似不免於災矣不往則不厲何災之有古之人身處微賤不立異不茍同斂德以自善者是或一道也六二執之用黃牛之革莫之勝説二不言遁本義云以中順自守人莫能解必遁之志非也初不必遁二不可遁三不能遁聖人皆以小利貞之道望之傳曰二與五為正應雖在相違遁之時二以中正順應於五五以中正親合於二其交自固黃中色牛順物革堅固之物二五以中正順道相與其固如執係之以牛革也莫之勝説謂其交之固不可勝言也此與本義注疏全别余謂莫之勝説即遐不謂矣不啻若自其口出之意象曰執用黃牛固志也固志者固其上下相應之志而不可解也九三繫遁有疾厲畜臣妾吉三陽下比二隂繫戀之而不能脫迹逺去腹心之患也故曰疾善良之憂也故曰厲然豈付之無可奈何已乎若以臣妾之道畜之猶可獲吉而免於疾厲也不以公義放置其身姑以私恩結納其心正所謂小利貞也或曰艮為閽寺臣妾象臣妾即指二隂傳曰然君子之待小人亦不如是也三與二非正應以昵比相親非待君子之道若以正則雖繫不得為有疾蜀先主之不忍棄士民是也雖危為無咎矣象曰繫遁之厲有疾憊也畜臣妾吉不可大事也憊者一陽為二隂所困也按左傳華元對子反曰憊矣病困之意肥之反也不可大事程朱俱云當不得大事余意云只可畜以臣妾不可任以大事也厚其祿賜終不假之事權則小人無所肆其毒而君子獲安矣昔朱子勸趙汝愚處置韓伌胄一事正是此義惜乎不能聽任以大事遂使疾入膏肓不可救藥惜哉若九三者可謂憂之深而處之當矣馮厚齋曰作易者以隂陽消長之會寄之九三憂之治之其所以為君子慮者不其周乎正得此意九四好遁君子吉小人否四應初六式相好也情愛綢繆而能斷之以義克之以禮飄然逺遁惟陽剛之君子為然若小人者貪戀而不能割濡忍而不能決昔人所謂駑馬戀棧豆也否只作不字看不必説到不善處言君子能之而小人則不能也傳曰君子雖有所好愛義茍當遁則去而不凝所謂克己復禮以道制欲是以吉也又曰四乾體能剛斷者聖人以其處隂而有繫故設小人之戒恐其失於正也俱精甚象曰君子好遁小人否也象不贅一語就本文咏嘆一番若曰彼小人者何苦而不為君子乎蓋所以憐惜之亦所以屬望之也九五嘉遁貞吉當遁之時雖九五不以君位言然則當位而應與時行正非以藏形匿影為遁也或廊廟而饒山林之致或丘園而繫朝野之望此其遁誠可嘉美得正而吉也若張子房之從遊赤松李鄴侯之白衣宰相其近之矣傳曰九五中正遁之嘉美者也處得中正之道時止時行乃所謂嘉美也故為貞正而吉九五非無係應然與二皆以中正自處是其心志及乎動止莫非中正而無私係之失所以為嘉也在彖則概言遁時故云與時行小利貞尚有濟遁之意於爻至五遁將極矣故唯以中正處遁言之遁非人君之事故不主君位言然人君之所避逺乃遁也亦在中正而已須如此發明其義始備象曰嘉遁貞吉以正志也傳曰志正則動必由正所以為遁之嘉也此推本言之也胡氏曰二以隂應陽其志當固五以陽應隂其志當正此分别言之也二説皆當知上九肥遁無不利三陽不與隂繫則於隂應獨上居乾之終遁之極在卦外而去隂最逺者也故可以超然自得稱肥遁焉傳以肥為充大寬裕本義但加自得二字余謂肥者優遊泮渙之意睟面盎背疾憊之反也安往而不利哉傳曰遁者唯飄然逺逝無所係滯之為善又曰遁者窮困之時也善處則肥矣俱精甚象曰肥遁無不利無所疑也大凡出處之際一有所疑則徘徊觀望而不果故無所疑而後肥遁無不利也無所疑者胸中洞達了徹毫不芥帶於人情世故也若嚴子陵加足帝腹殆其人與四皓兩生亦庶幾矣乾下震上大壯利貞按三畫卦初為少二為壯三為究六畫則初二為少三四為壯五六為究此卦陽長至四自下升上自內達外如人之血氣方剛故為大壯鄭康成曰大壯者氣力浸強之名也大壯而不出於正則強項好勝者之為血氣之壯非義理之壯也故其道利在貞正彖曰大壯大者壯也剛以動故壯曰大壯似歸重壯字而大字意輕曰大者壯也則知隂為小陽為大陽道盛長乃為大壯所以表衆陽之彚征此以卦體言也乾剛也震動也剛以動有莫禦莫遏之勢故壯此以卦德言也皆所以釋卦之名義也以下釋利貞末言天地則本義所謂極言之也大壯利貞大者正也正大而天地之情可見矣大壯所以利貞者以大者要壯還要正也非正則雖大無所用之矣豈特人情為然哉即天地之情亦然無私覆無私載天地之正也無不覆無不載天地之大也天地以生物為心故曰情傳曰天地之道常久而不己者至大至正也正大之理學者默識心通可也不云大正而云正大恐疑為一事也分析最明象曰雷在天上大壯君子以非禮弗履雷在天上威靈赫奕大壯之象也君子觀其象以自強有動容周旋中禮者焉禮者天理之節文也非禮弗履原是恂恂儒雅事如何看的驚天動地屏絶人欲渾全天理非天下之大勇者不能也學者一念警䇿轉念便放鬆了一時振拔踰時便放倒了到底是箇柔懦人須是發起憤來如雷轟中天一般才説的非禮弗履才説的大壯舍此而言壯縱使力拔山氣蓋世藐乎小矣然則大壯者其惟顔子乎夫子告顔子曰克己復禮為仁則非禮弗履仁者之事也而象辭却以為勇者之事傳引自勝之謂強及中庸強哉矯兩假解之而曰君子之大壯者莫若克己復禮其義精矣初九壯于趾征凶有孚初以陽剛乾體而在下壯于趾之象也藏鋒斂鍔在下之道况三剛在前尤宜退避畜養以俟時者乃貿貿然用壯而進不審時度勢輕試其鋒凶也必矣傳曰以剛處壯強居上猶不可行况在下乎故征則其凶有孚孚信也謂以壯往則得凶可必也此解甚當或以孚為四未免矯強象曰壯于趾其孚窮也其孚窮信其必窮困而不爽也九二貞吉傳曰二雖以陽剛當大壯之時然居柔而處中是其剛柔得中不過於壯得貞正而吉也與九四辭同而意異一許之一戒之傳曰易取所勝為義以陽剛健體當大壯之時處得中道無不正也在四則有不正之戒人能識時義之輕重則可以學易矣本義俱作戒辭與九四一例看蓋就占者言象曰九二貞吉以中也得中道則無過動無冒進所以貞正而吉也傳曰中則不失正况陽剛而乾體乎九三小人用壯君子用罔羝羊觸藩羸其角三以剛居剛過剛不中者也當大壯之時小人卑而在下則恃其強陽暴戾以陵轢物類君子尊而在上則任其驕倨慢易篾視天下事無足以當其盼經其心者傳曰小人尚力故用其壯勇君子志剛故用罔罔無也猶云篾也以其至剛篾視於事而無所忌憚也本義視有如無只是傳意貞厲傳曰貞固守此則危道也本義雖正亦危較傳尤醒蓋此句兼承君子小人説君子小人皆非正者特反言以見意耳羝羊喜觸藩籬當其前則必觸之未有不羸困其角者君子小人之用罔用壯何以異於是傳曰凡物莫不用其壯齒者齧角者觸蹄者踶羊壯於首羝為喜觸故取為象又曰三壯甚如此而不至凶何也曰如三之為其往足以致凶而方言其危故未及於凶也凡可以致凶而未至者則曰厲也學易者亦知此義象曰小人用壯君子罔也全用上句下句去用字而以也字結之蓋嗟嘆之辭也若曰小人不足責君子亦冒昧爾爾乎傳從本文解去亦是本義直加敗困字恐不必九四貞吉悔亡藩決不羸壯于大輿之輹四以陽居隂不中不正宜有悔也然當大壯之時不極其剛若能如九二之貞吉則可以亡其悔矣蓋君子道長之時何可以不正也三以四為藩四剛故羸角四以二隂為藩隂柔故藩決不復羸困也輿恃輹以行輹壯則輿利任重道逺無不可者故曰壯於大輿之輹象曰藩決不羸尚往也尚往者前無阻礙可以上進不己也朱子曰九二貞吉只是自守而不進前遇三四二陽隔之也九四却有可進之象前遇二隂開之也因念自古有才勝於德學不中正而遭時遇主績著旗常者九四之類也趙普吕夷簡是也亦有才德兼美居中得正而扼於時勢不獲大行其志者九二之類也李綱宗澤是也六五喪羊于易無悔傳以羊為下四陽為其羣行而喜觸故取象也五以位言則正以德言則中能用和易之道使羣陽無所用其剛故曰喪羊於易柔勝剛故無悔本義獨指五言謂以柔居中不能羝觸似非本色注疏尤晦總不如程説為長蓋以剛御剛則有摧折之勢以柔御剛則有降伏之理况羊性柔而剛強在角不善用之則角足以為害善用之其性可馴也然則和易樂易其禦羣陽之善道乎象曰喪羊于易位不當也以隂柔居尊位位不當也焦弱侯曰在他卦為不宜在大壯之時以陽居陽則凶禍立至故九二九四皆曰貞吉蓋不以當位為正而以剛柔相濟為正也此説正得傳意傳曰所以必用柔和者以隂柔居尊位故也大率治壯不可用剛夫君臣上下之勢不相侔也茍君之權足以制乎下則雖有強壯跋扈之人不足謂之壯也必人君之勢有所不足然後謂之治壯故治壯之道不可以剛也析理微矣上六羝羊觸藩不能退不能遂無攸利艱則吉羝羊但取其用壯故隂爻亦稱之上以隂柔處震之極壯之終不能安處而用壯如羝羊之角挂於藩上退則勢有所不可進則力有所不能束縛困頓莫可如何無所往而利矣傳曰才本隂柔故不能勝已以就義是不能退也隂柔之人雖極用壯之心然不必能終其壯有摧必縮是不能遂也直從源本説出艱則吉傳作艱困朱子作艱難其義一也始恃其壯必有輕率慢易之心及歷身進退然後知行之惟艱而靜以待之過而能改是以吉也象曰不能退不能遂不詳也艱則吉咎不長也大凡進退之際須從容詳審乃可無半途之悔不詳雖未至於用罔然疏略而短於計何以善後無怪乎其進退維谷也艱則必詳吉則無咎故曰不長可以退可以進利有攸往矣坤下離上晉康侯用錫馬蕃庶晝日三接當壯極之時而進光明盛大不可掩抑故晉者明盛之義也為卦坤下離上坤臣道日君象下坤進而上瞻離日有諸侯朝見天子之象離日進麗天中下照坤土有天子禮接諸侯之象康侯安民之侯猶考工記所稱寧侯也屯豫言侯以震晉言侯以坤坤有土有民故有侯象民功曰康書所謂康功是也朱子以用錫馬之用為虛字蒙引歷引王用出征等用字為一例且曰用字下可貼箇得字細看未當不如徐氏曰言諸侯有安民之功故用此以受君之錫豫而被其親禮詩曰君子來朝何錫豫之路車乘馬曰錫馬統言也書文侯之命曰馬四匹曰蕃庶則不止四匹也晝日三接言寵遇之隆接見無時也或引周官三享三問三勞及覲禮三升為證却不必彖曰晉進也晉進也日進於明盛也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日二接也明出地上離乘坤也此卦象也順而麗乎大明坤附離也此卦德也柔進而上行指六五上進而居尊位也本義云自觀而來為六四之柔進而上行以至於五此卦變也君明而以柔居之其離之中虛乎臣順而麗於君其地道之無成而代有終乎君臣道合相得益章是以康侯膺此殊常之寵異也象曰明出地上晉君子以自昭明德明出地上方升而未巳晉之象也君子觀晉之象以自昭明德光瑩如日有不容纎翳之或留者焉傳曰去蔽致知昭明德於已也明明德於天下昭明德於外也兼人己説愚謂昭明德於己非自不能詣其極昭明德於人非自不能滿其量明德由己而由人乎哉大學皆自明也本此初六晉如摧如貞吉罔孚裕無咎焦氏初柔體自抑而如摧傳云於始進而言遂其進不遂其進惟得正則吉也二説不同俱有理然不如本義以隂居下應不中正有欲進見摧之象為確得正而吉宜見信矣若猶未也則寬裕以處無覬幸之心無怨尤之意可無咎也傳曰罔孚者在下而始進豈遽能深見信於上茍上未見信則當安分自守雍容寬裕無急於求上之信也茍欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎君子處進退之道也名言宜服象曰晉如摧如獨行正也裕無咎未受命也進而見摧以獨行正道不能降志從俗也若俯仰取容豈至見摧乎裕無咎為未受官守之命者言也若己受命一日立乎位則一日業乎其官茍不見信而優遊間曠以廢厥職咎孰大焉聖人恐後之人不達寬裕之義故為初六特寬一步正所以専其責於受命者耳此全用傳意至於末云事非一概久速惟時亦容有為之兆者一段尤宜補出六二晉如愁如貞吉受兹介福于其王母焦氏曰仕進之日無識者恆志得意滿以取敗二柔體中正自斂而如愁胡氏曰五下互坎為加憂二欲進而前有坎險又為艮止所沮故有憂愁之象二説俱好凡入官者以不克勝任為憂此小心畏慎之道也必能拮據王事得正而吉矣傳曰二中正之德久而必彰上有大明之君必當以同德相求加之寵祿故受兹介福于其王母王母祖母也謂隂之至尊者指六五也祖母二字難解本義以為享先妣之吉占亦未必然且依傳解去象曰受兹介福以中正也居中得正令德也令德天必相之介福之錫豈偶然哉六三衆允悔亡以隂居陽位不中正宜有悔也然當坤之終順之極罔孚者罔不孚矣焦氏曰初極下二猶在地皆欲進而未能至三始出地上率衆柔與之俱進故莫不率從也欲獲上而不能信友則動輒齟齬今二隂曉然共信詢謀僉同是以有進而無悔也傳曰或曰不由中正而與衆同得為善乎曰衆所允者必至當也况順上之大明豈有不善也是以悔亡蓋亡其不中之失矣古人曰謀從衆則合天心得此一難六三之義始盡象曰衆允之志上行也上行正所謂順而麗乎大明也本其志言之以見三隂有同心耳九四晉如鼫鼠貞厲以九居四不中不正竊據高位故為鼫鼠之象能鼠即詩所謂碩鼠也貪冒無厭畏首畏尾雖正亦厲况不正乎象曰鼫鼠貞厲位不當也德不乘位非所據而據焉欲不危得乎六五悔亡失得勿恤往吉無不利以柔居尊位宜有悔也然大明在上而下皆剛德順附故其悔可亡失得勿恤傳誠太深宜如本義一切去其計功謀利之心為醒當晉之時而志柔易為功利所纍惟盡其在我一切置之度外而無容心焉則往吉而無不利矣五柔進而上行故其吉如此謹按折中云彖辭言康侯之被遇而傳以柔進上行釋之則聖人之意以此爻當康侯而為卦主明矣蓋凡卦皆有主其合于彖辭者是也九四高位而爻辭不善如此則彖辭之義誠非六五不足以當之晉如鼫鼠者患得患失鄙夫之行也失得勿恤者竭誠盡忠君子之志也説理極為透亮象曰失得勿恤往有慶也失得勿恤者究之有得無失故曰有慶非特悔亡而已上九晉其角維用伐邑厲吉無咎貞吝以九居上於剛為極於進為終前無餘地窮於所之矣故有晉其角之象角剛而在上之物也維用伐邑向來從傳作自治説仔細看來經明言伐邑而云自治非也還當如朱子墮費墮郈之類為是蓋伐大國則不可若伐私邑尚可進而用其剛以制勝也但厲吉無咎不當如程朱雖危而吉且無咎説宜云必懷惕厲危懼之心乃可以吉而無咎也須此一轉其義乃通夫以上治下以大治小亦未為失正但用極剛治小邑終非理勢所宜故雖貞而吝也始許之既鄙之聖人固不以過剛為善耳象曰維用伐邑道未光也維用伐邑未免於強凌弱衆暴寡故於晉之道為未光也以離日照四方宜乎無思不服奈何僅用諸一邑也哉離下坤上明夷利艱貞晉者以其明進也進而不已則其明傷矣故為明夷明夷與晉反傳曰晉者明盛之卦明君在上羣賢並進之時也明夷昏暗之卦暗君在上明者見傷之時也時不同而君子所以處之亦必有道矣傳曰當明夷之時利在知艱難而不失其貞正也艱字只就時説非是他卦皆曰利貞此獨曰利艱貞利以艱為貞也艱者辛苦備嘗之謂彖曰明入地中明夷離為日明也在坤之下故曰明入地中此卦象也出乎地則明入乎地則晦晦則夷矣此卦所由名也內文明而外柔順以蒙大難文王以之內卦離離有文明之德外卦坤坤有柔順之德此以卦德釋卦辭也囚於羑里大難也若有所覆蔽然故曰蒙文王得全卦之義以脫紂之禍故曰文王以之文王緝熙敬止內文明也徽柔懿恭外柔順也如隂行善之類皆是柔順處利艱貞晦其明也內難而能正其志箕子以之利艱貞晦藏其明而不露也傳曰箕子當紂之時身處其國內切近其難非也內難謂骨月至親也本義云謂為紂近親如六五之近上六是也正其志正其自靖自獻之志也箕子得六五一爻之義以免紂之禍故曰箕子以之文王箕子皆晦其明者也而艱貞之利在箕子為尤甚故傳有獨歸焉胡氏曰此一時也文王因而發伏羲河圖之易箕子因而發大禹洛書之疇雖非象傳本義不可不一及也象曰明入地中明夷君子以蒞衆用晦而明明入地中晦於外而明於內也君子觀明夷之象以臨蒞大衆不用明而用晦用晦者不以苛察炫耀為明而以沈靜韜戢為明所謂若愚之大智不億不逆之先覺也三代而後明君以綜核為能循吏以鈎距為智其於明夷之象何居傳曰君子不極其明察而用晦然後能容物和衆衆親而安是用晦乃所以為明也若自任其明無所不察則已不勝其忿嫉而無寬厚含容之德人情睽疑而不安失蒞衆之道適所以為不明也古之聖人設前旒屏樹者不欲明之盡乎隱也何等詳盡初九明夷于飛垂其翼君子于行三日不食有攸往主人有言明夷斷句三爻亦然居明夷之初去上雖逺而傷從此始矣離為飛鳥九陽明上升故有飛象避矰繳者高飛而此下飛昏暗在上飛者宜下不宜上也振翼不敢戢翼不能故有垂其翼之象君子于行見幾而作也三日不食甘心窮餓也夫事有其幾矣未有其形也有其兆矣未有其象也而已望望然去之個中情實有難以告語者故有所適則主人驚訝而議論之是以有言也傳曰明夷之始其見傷未顯而去之則世俗孰不疑怪然君子不以世俗之見怪而遲疑其行也若俟衆人盡識則傷已及而不能去矣此薛方所以為明而揚雄所以不獲其去也或曰傷至於垂翼傷已明矣何得衆人猶未識也曰初傷之始也云垂其翼謂傷其所以飛爾其事則未顯也君子見幾故急去之世俗之人未能見也故異而非之如穆生之去楚申公白公且非之况世俗之人乎但譏其責小禮而不知穆生之去避胥靡之禍也當其言曰不去楚人將鉗我於市雖二儒者亦以為過甚之言也又袁間於黨事未起之前名德之士方蜂起而獨潛身土室故人以為狂生卒免黨錮之禍所往而人有言胡足怪也逺引曲譬明快之極余意梅福逄萌徐稚龔勝亦其表表者矣象曰君子于行義不食也象傳點出義字即賁二義弗乘之義蓋義之所在雖得生失死弗恤也夷齊恥食周粟餓死首陽太公曰義士也誠然哉六二明夷夷于左股用拯馬壯吉二體明而中虛故雖有所傷而終賴救濟以免也傳及諸家之辨甚悉俱以為夷于左股幸傷之末甚切也余謂經意不如是足者所以行股既在脛足之上夷之則害於行矣害於行故須用馬拯之又須用壯馬拯之馬不壯則左股既夷亦安能以有行哉若夫言左者只是前右後左陽右隂左之意非謂傷之不甚切也傷不甚切而拯之又安用壯馬哉如此説似上下一意謹按人恃足以行股在足之上夷其股則不能行矣文王囚羑里之象也左者離居東為左六四為左腹亦然觀伏義卦圖自見用拯馬壯者散宜生等以珍玩美女贖之不惟釋其囚且使得専征伐故云吉也又按卦象乾為馬震與坎亦為馬故爻之取象于馬者如屯也賁也大畜也明夷也睽也渙也中孚也其中惟屯之三爻與大畜之九三渙之初六皆本卦有乾或震或坎故也若賁之六四則以中爻自三至五為震震為馵足白蹄也為的顙白顛也故云白馬明夷二至四為坎中孚二至四為震睽之初九變而為坎上應九四亦為中爻之坎非其正應故云喪馬若夫屯之六二上六皆乘剛者也故云乘馬明夷之六二渙之初六皆比剛者也故云拯馬屯之六四應乎初故亦云乘馬中孚之六四絶乎初故云馬匹亡周公之取象皆本卦所自具學易者不可不知也象曰六二之吉順以則也以柔居柔順也中正則也順乎中正之法則故能虛心以聽於人而人多助之雖暗君在上無所施其暴而吉也傳既明則本義不著解諸如此類甚多蒙引以其未之及也又以順則扭合到用拯馬壯上去甚不切矣九三明夷于南狩得其大首不可疾貞三應上六一至明之極一至暗之極不並立者也又以剛居剛故有南狩得其大首之象南向明之方於南以明除暗也狩田獵之事曹操曰與將軍會獵於吳古人以征伐為狩此其證也得其大首殱厥渠魁也指上六言不可疾貞傳曰誅其元惡舊染汚俗未能遽革必有其漸革之遽則駭懼而不安故酒誥云惟殷之迪諸臣惟工乃湎於酒勿庸殺之姑惟教之至於既久尚曰餘風未殄是漸漬之俗不可以遽革也故曰不可疾貞正之不可急也本義即指南狩説謂不可以亟而引成湯起於夏臺文王興於羑里為戒辭如此則作遵養時晦意看如武王十三年之前無非兾紂一悟蓋遲之又久不得已而後為之故曰不可疾貞二理宜並存之象曰南狩之志乃大得也南狩非富天下志在順天應人耳天與人歸故曰志大得也不言功而言志若曰非希絶世之功只慰救民之志耳六四入于左腹獲明夷之心于出門庭傳以為隂邪小人誠過矣朱子非之其説甚詳而以左腹為幽隱之處以獲明夷之心于出門庭為得意於逺之義其義更確此本義所以有功於程傳也其曰離體為至明之德坤體為至暗之地下三爻明在暗外故隨其逺近高下而處之不同六四以柔正居暗地而尚淺故猶可得意於逺去五以柔中居暗地而已迫故為內難正志以晦其明之象上則極乎暗矣故為自傷其明以至於暗而又足以傷人之明蓋下五爻皆為君子獨上一爻為暗君也此發傳所未發皆一字不可易者胡氏曰坤有腹象入於左腹自離而入於坤也坤偶有門象于出門庭猶可去而出乎坤也丘氏曰傷人之明者上也六四深入其腹而得其傷明之心故曰獲明夷之心與上同體知上之暗不可輔舍而去之以就九三之明此微子去紂而歸武王書所謂吾家髦遜於荒我不顧行遁者也合二説而後本義之義始盡象曰入于左腹獲心意也獲心意者獲明夷之心意而知其終不可悟也六五箕子之明夷利貞五以中正居至暗之地故不作君位説而以上六隂暗傷明之極者當之五切近上六所謂內難也傳曰若顯其明則見傷害必矣故當如箕子之自晦藏則可以免於難故曰箕子之明夷也言當以箕子處明夷之道為法也箕子處明夷之道能正其志所謂貞也五隂柔故利在箕子之貞也言利貞而不言利艱貞朱子曰言箕子則其艱可見故不必更言是也象曰箕子之貞明不可息也箕子雖在坤之中而不失離之體是以晦其明而明益著如之何其可息也不可息兹其所以貞也與觀周孔之言箕子所為者視微子比干猶難矣後世文人至以朝鮮之封為迸諸四夷何謬也上六不明晦初登于天後入于地上以隂居坤之極卦之終五爻之明盡為所夷矣本義加德字恐不必其曰始則處高位以傷人之明終必至於自傷而墜厥命故曰不明晦二句獨精胡氏又益之曰爻設為此象以為後世人主之大戒人之明未必傷也卒乃自傷而遂隕絶厥命則亦何益之有哉如紂者亦可鑒矣可謂能暢本義之説象曰初登于天照四國也後入于地失則也初登于天威加一世何赫赫也此本義以位言之説也傳曰居高而明則當照及四方尤切後入于地求為匹夫而不可得矣惟失則故也傳謂失明之道竊意則即有物有則之則秉彛之性也順之則為文王失之則為紂可不慎與胡氏曰以商周之事概論之上一爻極暗為紂之昏棄五近晦為箕子之囚奴四與止同體避暗就明為微子之遁去三與上應以明尅暗為武王之伐紂二在大臣之位藏明於暗為文王之羑里初暗稍逺見傷即避其伯夷太公居海濱之事乎細閲六爻果有此象非臆説也易酌卷六
