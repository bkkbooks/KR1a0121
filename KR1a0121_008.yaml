body:
  text: 易酌卷八祁州刁包撰周易下經巽下乾上姤女壯勿用取女傳以一隂始生漸有盛長之勢為女壯本義以一隂當五陽為女壯本義較勝蓋一隂雖漸長未見其壯也惟出而當五陽則暴悍剛狠之意具見于此矣故曰女壯壯者男子之事非婦人之宜也觀家人一卦以女貞盡之女之不貞家道所繇敗也故曰勿用取女傳曰取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也又曰姤雖一隂甚微然有漸壯之道所以戒也此春秋慮禍于微防患於早之意也彖曰姤遇也柔遇剛也一陽始生則幸之曰復復者固然之事也一隂始生則危之曰姤姤者卒然之遭也本義云姤遇也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為遇遇已非正又一隂而遇五陽則女德不貞而壯之甚也其義更詳於傳此釋卦名也勿用取女不可與長也取女所以偕老為保家長久之計今一隂雖微已有凌逼五陽之勢豈可長久乎故勿用取女也此釋卦辭也天地相遇品物咸章也以卦辭言之本是個不好的遇雖然以卦體言之天非地則不成地非天則不生天地相遇而品物有光輝發越之盛矣章即文章之章謂有文彩可著見也或曰姤者乾之末坤之始天地相遇象也以四時言之月至姤辰為午萬物相見乎離而蕃衍乎大夏品物咸章象也剛遇中正天下大行也剛遇中正從來俱指二五本義獨指九五蓋以五中且正二中而非正也以陽剛之德遇中正之位故其道可以大行於天下也此釋卦才也姤之時義大矣哉姤之時義承上四句而贊之此例甚多本義獨云幾微之際聖人所謹專為一隂慮也大抵彖辭原是不好的傳既釋之却又看出一假絶好道理來是孔子之易而非文王之易也傳辭原是極好的本義又看出一個不好消息來是朱子之易而非孔子之易也若必正釋彖辭則必以程傳為主傳曰天地不相過則萬物不生君臣不相遇則政治不興聖賢不相遇則道德不亨事物不相遇則功用不成姤之時與義皆甚大也如此説大之義始無餘藴象曰天下有風姤后以施命誥四方天之所以鼓舞萬物者風也風其天之誥命乎后之所以鼓舞萬民者誥命也誥命其后之風乎故后觀于天下有風之象而以施命誥四方也施象天命象巽誥四方象風行天下是上下所以相遇者也按詔誥之體三代尚矣後世遂故事視之或言是而行非或朝令而夕改奉天之謂何然漢唐間亦有誥辭懇篤而父老扶杖軍士投戈者其猶庶幾乎姤之象乎傳曰諸象或稱先王或稱后或稱君子大人稱先王者先王所以立法制建國作樂省方敕法閉關育物享帝皆是也稱后者后王之所為也財成天下之道施命誥四方是也君子則上下之通稱大人者王公之通稱此義安可不知初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅本義云繫於金柅小人自繫也看來還作君子繫之為是傳曰姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當于其微而未盛之時柅止車之物金為之堅強之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也其所以防之者至矣又曰使之進往則漸盛而害於陽是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為况羸弱之豕雖未能強猛然其中心在乎蹢躅蹢躅跳擲也隂微而在下可謂羸矣然其中心常在乎消陽也君子小人異道小人雖微弱之時未嘗無害君子之心防於微則無能為矣其所以慮之者深矣防之至慮之深則小人終為金柅所繫而不得肆其蹢躅之勢矣自古小人用事之始類似為無能為者及其權勢既成則束手而莫可誰何冦準之於丁謂是也使明於初六之義則小人終於羸豕而已象曰繫於金柅柔道牽也牽者挽拽之意即所謂繫也繫於金柅挽拽柔道使不得進也如此看似於牽意為切九二包有魚無咎不利賓傳意似未甚醒竊意初與四為正應四本初之主也初既比二而為其所乘則二為主四為賓矣魚隂美之物象小人包而有之者苴裹之使不逸於外也制馭小人罔為君子之害何咎之有然制馭之道利主不利賓何也主去初近賓去初逺也九二剛中身任制隂之責不委其事於四故曰不利賓象曰包有魚義不及賓也象提出義字蓋戢惡防姦義當為則為之若自已不做靠他人做則非義矣故賓在上而不相及也此與舊解全别九三臀無膚其行次且厲無大咎焦氏云姤之九三即夬之九四非也夬四宜進而從陽居不安行不進柔之象也故曰無大咎以剛居剛見一隂在下而不肯坐視臀無膚也欲制在下之隂而不得其道其行次且也與隂為敵常懷危厲之心雖未能如二之無咎亦可以無大咎矣本義曰既無所遇則無隂邪之傷故雖危厲而無大咎也如此説更妥象曰其行次且行未牽也三之次且與夬四之次且同三之行與夬四之行實不同蓋其行也未能繫於金柅牽制柔道而亦未為柔道所牽制也兩牽字正同九四包無魚起凶四與初為正應初固四之有也今既遇於二則失其所有矣故為包無魚之象傳曰四之失者不中正也以不中正而失其民所以凶也曰初之從二以比近也豈四之罪乎曰在四而言義當有咎不能保其下繇失道也豈有上不失道而下離者乎遇之道君臣民主夫婦朋友皆在焉四以中繫故主民而言為上而下離必有凶變起者將生之謂民心既離難將作矣此義甚透然則象雖言民凡為君臣夫婦朋友者皆不可不知此義也象曰無魚之凶逺民也不曰民逺已而曰已逺民責有攸歸矣或曰象辭另發一意非也均是隂也以德言曰小人消陽者也不可近也以位言曰民從陽者也槩以為隂而逺之失却上下一體道理矣此學易者所以貴乎知變通也九五以杞包瓜含章有隕自天傳作求賢説似晦本義曰瓜隂物之在下者甘美而善潰杞髙大堅實之木也五以陽剛中正主卦於上而下防始生必潰之隂其象如此然隂陽迭勝時運之常若能含晦章美靜以制之則可以回造化矣有隕自天本無而倐有之象也其義精矣余更有説焉詩云綿綿瓜瓞瓜之為物滋蔓不已象小人以甘美之資為援引之勢也杞髙蔭大包者覆冒其上日不能暄雨露不能潤則瓜何以蔓此防間小人之善道也含章者明足以燭而不露術足以用而不泄覆冒之中寓有裁割之意也如是則瓜不蔓而自潰天隕之矣瓜墜落曰隕以陽消隂而無其迹疑非人力所為故曰有隕自天也如此解似通象曰九五含章中正也有隕自天志不舍命也英氣最害事五有中正之德故渾然不露圭角含章也命者所得於天之理也志不舍命處心積慮不敢踰越乎天理有隕自天其志一之動氣乎冥冥中有相之者矣上九姤其角吝無咎傳曰至剛而在最上者角也九以剛居正故以角為象人之相遇繇降屈以相從和順以相接故能合也上九髙亢而剛極人誰與之以此求吝固可吝也此義甚精獨以無咎為無所歸咎恐未確竊意吝者無所遇也吝而無咎者無所遇而隂未能消陽也象曰姤其角上窮吝也當姤之時憤世嫉俗甘心孤孑窮於上而致吝也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往為卦兊上坤下兊為説説者情之聚也坤為衆衆者勢之聚也情與勢合所遇與聚矣故其卦為萃觀彖傳無亨字其為羡文無疑或尚著解非也假字訓至未盡當作感格意如詩奏假無言之格易王假有家為感格况王假有廟乎傳曰羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其德耳故豺獺能祭其性然也又曰天下之聚必得大人以治之人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃以不正則人聚為茍合財聚為悖入安得亨乎故利貞如此始盡彖義用大牲吉承王假有廟來當萃之時百物豐備二簋不可以用享故須用大牲始可以將假廟之誠稱假廟之典而吉也利有攸往承利見大人來見大人則事事皆亨物物皆正故往無不利也此王者受命而興合萬國之歡心以事先王之卦孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝故四海之內各以職來助祭所謂用大牲吉而利有攸往者也彖曰萃聚也順以説剛中而應故聚也卦之所以為萃者以其聚也萃之所以為聚者以其順以説剛中而應也萃者下坤順上兊説順以説也此卦體也九五剛中而六二應之剛中而應也此卦德也君臣聚會和順而恱豫故於義為聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也王假有廟王者萃祖考之神以萃天下人之心所以極致孝享之誠致孝謂盡志致享謂盡物也傳曰萃天下之心者無如孝享此語宜玩利見大人亨九五六二相聚以中正也傳曰見大人則其聚以正道得其正則亨矣萃不以正其能亨乎聚以正雖釋上句而釋利貞之意固在其中矣不言利貞省文也萃之時貴豐不貴儉用大牲吉所以對越天命也萃之時宜進不宜退利有攸往所以踐履天命也奉而不違故曰順順天命謂順天理也觀其所聚而天地萬物之情可見矣傳曰觀萃之理可以見天地萬物之情也天地之化育萬物之生成凡有者皆聚也有無動靜終始之理聚散而已本義曰極言其理而贊之天地萬物固無理外之情也徐氏曰天地萬物髙下散殊咸則見其情之通恆則見其情之久萃則見其情之同不於其聚而觀之情之一者不可得而見矣説理頗精象曰澤上於地萃君子以除戎器戒不虞澤者水之聚地者澤之聚澤上於地萃之象也君子觀其象而萃兵以萃民則有除戎器戒不虞之道焉國家雖安忘戰必危故戎禁亂之所繇生猶防止水之所自來也以舊防為無所用而去之者必有水敗以治戎為無所用而廢之者必有亂患蓋承平日久類有鈍兵朽甲之弊除者除其鈍朽而一新之也書曰善穀乃甲胄敿乃干備乃弓矢煆乃戈矛礪乃鋒刃詩曰修爾車馬弓矢戎兵用戒戎作皆有備無患之道也秦平六國而銷鋒鏑晉平吳而撤武備不旋踵而滅亡豈非忘不虞之戒乎師之大象曰地中有水師君子以容民畜衆萃之大象曰澤上於地萃君子以除戎器戒不虞二象大意略同但彼以師之故而議萃此則以萃之故而議師耳初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎初與四為正應有孚者也不幸三隂同處所與者盡柔懦無立之輩故有不終其孚乃亂乃萃之象乃亂者狐疑惶惑而不能自立也乃萃者因利乘便而不能自拔也若號於四之正應以踐有孚之約則一握笑之矣傳曰一握俗語一圑也謂衆以為笑也然笑者小人之私心號者君子之公義若能不以私心奪公義置多口於勿恤斷然應四之剛陽而不失其正改過遷善無咎之道也象曰乃亂乃萃其志亂也象復原其志而戒之蓋謂此處把持不定則無如羣隂何矣若陡然立起志那有此事傳曰其心志為同類所惑亂故乃萃於羣隂也不能固其守則為小人所惑亂而失其正矣格言也六二引吉無咎孚乃利用禴傳曰初隂柔又非中正恐不能終其孚故因其才而為之戒二雖隂柔而得中正故雖戒而微辭凡爻之辭關得失二端者為法為戒亦各隨其才而設也此義亦須曉的傳以引為牽引之引曰人之交相求則合相待則離二與五為正應當萃者也而相逺又在羣隂之間必相牽引則失其萃矣此理甚好余向作援引之引蓋二與五為正應因雜二隂之間未能卓有樹立故必援引之有君臣道合之慶吉而無咎也如登髙者氣易竭力易盡稍提攜之則一往而前矣二之柔順中正孚於五之剛健中正同心一德者也相信以心不以迹相交以質不以文猶簡薄之物可以交於神明故曰孚乃利用禴禴夏祭專尚聲與二簋可用享之意同如此亦説的去然不如傳婉切懇至又推的開傳曰孚信之在中誠之謂也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交于神明也孚乃者謂有其孚則可不用文飾專以至誠交於上也以禴言者謂薦其誠而已上下相聚而尚飾焉是未誠也蓋其中實者不假飾於外用禴之義也孚信者萃之本也不獨君臣之聚凡天下之聚在誠而已本義只就祭説故雖云伊川説好而無取也象曰引吉無咎中未變也中正而柔一為二隂所變易雖引之其能前乎中未變者柔而能守其中正之本體故無有孚不終之號也或曰二既有中正之德而象云未變辭若不足何也曰羣隂類處乃其類聚方萃之時居其間能自守不變逺須正應剛立者能之二隂柔之才以其有中正之德可覬其未至於變耳故象含其意以存戒也須此一難爻義始盡六三萃如嗟如無攸利往無咎小吝三隂柔不中正四居其上欲與之萃而非正應二處其下欲與之萃而二應五萃如者徒有嗟如而已上下莫之與何利之有若往而應上當以同類相憐不復如二與四之見拒矣不得於此而得之於彼無咎之道也傳曰三與上雖非隂陽正應然萃之時以類相從皆以柔居二體之上又皆無與居相應之地上復處説順之極故得其萃而無咎也易道變動無常在人識之此義極盡且雖非正應句有斟酌本義云當近捨不正之強援而逺結正應之窮交理雖精而正應二字未的故胡氏曰恐誤是也小吝者始棄其應而不往必待二四不相容乃反而求之也能無愧乎人情攀援勢利輒遭擯斥之辱及其窮無所歸然後商貧賤之交縱使憐而收之必有慚恧不自安者矣象曰往無咎上巽也傳曰上居柔説之極三往而無咎者上六巽順而受之也本義往從於上一句是解爻未解象故全無巽義蒙引以為此説長於所謂上能巽受之者吾不知之矣九四大吉無咎九四以陽居隂非正上比五而得君之萃則擬於擅權下比羣隂而得民之萃則疑於樹黨故必大吉而後無咎也傳曰大為周遍之義無所不周然後為大無所不正則為大吉夫上下之聚固有不繇正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳恆魯之季氏是也然得為大吉乎得為無咎乎反言之其義始明矣象曰大吉無咎位不當也大吉無咎何以云位不當也位不當則所為未必能盡善故戒之戒之實勉之也九五萃有位無咎匪孚元永貞悔亡五以陽剛居尊位為萃之主萃有位何咎之有朱子云有位而無德則雖萃而不能使人信故人有不信當修其元永貞之位而後悔亡也此理固是傳獨兼德位説曰王者有位有德中正無過咎而天下尚有未信服歸附者在修德以來之如苖民逆命帝乃誕敷文德舜德非不至也蓋有逺近昏明之異故其歸有先後既有未歸則當修德也所謂德元永貞之道也如此説猶有至理又曰元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又恆永貞固則通於神明光於四海無思不服而其悔亡矣何等透徹象曰萃有位志未光也象專舉爻上句傳以尚有匪孚補之為志未光張本也志未光則悔悔必元永貞而後亡是象傳一句統解爻辭也蓋王者以萬類同歸為志不曰人之志未能孚於我而曰我之志未能光於人亦教人以反躬責己之道也上六齊咨涕洟無咎傳以上為隂柔之小人曲盡情狀本義云處萃之終隂柔無位求萃不得憂戚如是而後可以無咎也本義較勝蓋上六居説之極説極生悲固理之常然説極而能悲則知危知懼所謂善補過者故宜無咎且三居順體之上以嗟而無咎上居説體之上以齊咨涕洟而無咎其理正同項氏曰齊咨兊口之歎涕洟兊澤之流甚切卦義象曰齊咨涕洟未安上也未安上者居卦之上未敢晏然自安故有悲傷難堪之象設心如是未有久而不萃者也傳曰君子慎其所處非義不居不幸而有危困則泰然自安不以纍其心小人居不擇安常履非據及其窮迫則隕穫躁撓甚至涕洟為可羞也未者非據之辭猶俗云未便也未便能安於其上也隂而居上孤處無與既非其據豈能安乎此與本義全别然可為困窮之戒巽下坤上升元亨用見大人勿恤南征吉為卦下巽上坤巽為木下一隂象根上二陽象幹自根逹幹自小而大自卑而髙也大象所謂積小以髙大也坤三隂在上順受二陽之升故有亨通之理以其自根發達起來故曰元亨用見大人指九二陽為大二人位二有剛中之德而六五應之用見者六五用柔中之德以見也勿恤南征吉俱指九二二五志同道合一見如故勿恤不憂其不遇也南征程朱俱云前進也潘夢斿曰向陽之方極是巽居東南坤居西南柔本三而升為四以離體升也萬物相見於離故南征吉象曰柔以時升傳曰柔升謂坤上行也巽既體卑而就下坤乃順時而上升以時謂時當升也本義曰升自解來柔進居四李隆山曰隂陽二氣迭為升降反萃而升是二陽降居下三隂反居上故曰柔以時升三説俱有理巽而順剛中而應是以大亨巽而順以卦體言內巽而外順也剛中而應以卦德言二有剛中之德而五應之也如此則得其可升之時矣是以大亨也卦主坤言故曰元彖主剛中言故曰大用見大人勿恤有慶也南征吉志行也用見大人勿恤君明臣良相得益章有慶也傳曰凡升之道必繇大人升於位則繇王公升於道必繇聖賢此義更大亦須知之南征則遂得其升而行其志是以吉也謹按升者上進之象也巽木在地中生而不已由萌芽而甲拆而條枚而森茂參天升之義也伏處之賢出而為朝家梁棟亦升也所謂用見大人勿恤也觀國之光利用賓於王所謂南征吉也伏羲卦圖乾南坤北巽木由地而生出乎坤則入乎乾南征之象也初六一爻為成卦之主乃巽木之根根深葉茂欣欣向榮柔以時升也二三陽剛木之體也外卦三隂不唯無以滯其生意且有以培其生機故剛中而應是以大亨也應工師之求勝巨室之任故曰有慶而志行也象曰地中生木升君子以順德積小以髙大坤順也故曰順德順德者敬以直內義以方外是也積小以髙大巽為髙故也六爻之義皆於卦之內外兩體及上下中爻之象求之思過半矣象曰地中生木升君子以順德積小以髙大蒙引云地中生木不可説成地上生木蓋地中生木者取巽居於坤之下而言如木仗生意於地之中而後發逹於地之上所謂其根深者其末茂也極好君子觀其象以自升升須是要順逆則退矣本義依王肅本作慎德未是順德坤地象積小以髙大巽木象如何易的吾心之德原與天地萬物同體只因物欲錮蔽便自家卑小了積小者敬小慎微也昭烈云勿以善小而不為繫辭云善不積不足以成名自一念之小合天理積而至於念念皆合天理則髙大矣自一事之小合天理積而至於事事皆合天理則髙大矣天理日升人欲日降反觀心德依然與天地萬物同體何髙大如之傳曰學業之充實道德之崇髙皆繇積纍而至積小所以成髙大升之義也格言可破頓悟之説初六允升大吉初以一隂為巽之主上無正應非能升者也幸比九二剛中之德信而任之附以同升則其吉大矣允者心肯意肯誠信而服從也象曰允升大吉上合志也二居初之上故曰上合志者一德同心以慰生平至願也歐陽永叔之於韓魏公類此九二孚乃利用禴無咎二有剛中之德誠信以孚於五五孚中亦交孚焉如是乃可脫略繁縟如祭者之薄其物以格神也至誠相與簡朴篤至何咎之有所謂南征吉正謂此也乃字宜玩曰孚乃利用禴若未孚而用則不利矣象曰九二之孚有喜也象復進一步説言二孚於五非特為臣之道無咎而已剛柔相濟澤及天下且有喜也傳曰凡象言有慶者如是則有福履及於物也言有喜者事既善而又有可喜也如大畜童牛之牿元吉象云有喜蓋牿於童則易又免強制之難是有可喜也九三升虛邑三一升則為坤矣坤為邑隂虛故曰虛邑以陽剛之才居正而體又巽故有此象所謂如入無人之境也象曰升虛邑無所疑也一往直前無所阻礙也六四王用亨于岐山吉無咎本義作亨謂登祭於山之象只是要就占説傳作亨曰昔者文王之居岐山之下上順天子而欲致之有道下順天下之賢而使之升進已則柔順謙恭不出其位至德如此周之王業如是而亨也四能如是則亨而吉且無咎矣此説極有理又曰四之才固自善矣復有無咎之辭何也曰四之才雖善而其位當戒也居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而無咎也然處大臣之位不得無事於升當上升其君之道下升天下之賢已則止其分焉分雖當止而德則當升也道則當亨也盡斯道者其惟文王乎此轉尤為曲盡或以王為文王以亨為享以亨於岐山為克謙侯度惟祭境內之山川終不敢越分而修禋祀亦通象曰王用享于岐山順事也以柔居柔而坤體順之至也文王三分天下有其二以服事殷正是這個樣子周公引來作證而孔子以順事釋之殆欲其師文王乎傳曰上順乎上下順乎下已順處其義故云順事也六五貞吉升階傳曰五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也按程朱俱以升階為五傳曰階所繇而升也任剛中之賢輔之而升猶登進自階言有繇而易也指言九二正應又從九二推開説曰在下之賢皆用升之階也能用賢則彚升矣此理固不可易本義特約言之耳或曰指九二言坤為土三偶畫如之自下而髙有階象二之升五如升階然然此人君升進賢臣與共天下之象也此理亦好余向來有説云人主倚任賢人猶升之有階也無階而憑一手一足之力其能升乎九二以剛中應五五之階五之所以吉也使非信篤任專正固不二雖有階吾得而升諸故必貞而後能吉貞吉而後能升階也此亦明曉姑存之象曰貞吉升階大得志也五以二為階而有所憑依以往二為五之階而有所扶翼以進上下相資躋一世於升平之域五之志乃大得也或曰志大得指九二非也上六冥升利于不息之貞上以隂處升之極貿貿於迷途而不知止者也故曰冥升冥升猶言冥行也若以貿貿於迷途者還而孜孜于正路則不息之貞也所謂惟狂克念作聖矣傳曰君子于貞正之德終日乾乾自強不息如上六不已之心用之于此則利也以小人貪求無已之心移于進德則何善如之其義甚精象曰冥升在上消不富也處極上而不知止其心將以求益也孰知隂本虛日就消亡豈有加益之理乎傳曰升既極則有退而無進也惟從事于不息之貞則日息而富矣坎下兊上困亨貞大人吉無咎有言不信本義云困者窮而不能自振之意兊在上為澤坎在下為水澤在水上則其澤竭矣此其所以為困也內坎外兊是處險而能説也故曰困亨傳所謂以卦才言是也困而能亨則貞矣貞非小人所能也故于大人有專屬焉大人者不以貧賤憂慮易志不以艱危險阻動心是以吉而無咎也時方不利宜緘默以自全若嘐嘐然求白于人其誰信之兊為口故有尚口之戒彖曰困剛掩也以二體合言之坎剛為兊柔所掩以二體分言之下一剛為二柔所掩上二剛為一柔所掩卦以困名謂此也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也剛陽君子為隂柔小人所掩蔽君子之道用窒之時也陷于險中是人情所憂虞難堪者也而以説體處之怡然自得險以説也險以説則時困而道亨身困而心亨知命樂天困而不失其所亨也非君子能之乎傳曰君子大人通稱或曰所字斷句即艮止其所之所不如連亨字讀為是貞所以為大人之吉者以其有剛中之德也謂九二九五也兊上六有言而不信于坎坎兊相失尚口乃窮也以口舌免困祇益之困耳何如反躬修德之為愈也文王囚羑里而演易孔子厄陳蔡而弦歌周公居東土而赤舄几几皆困而不失其所亨者也象曰澤無水困君子以致命遂志澤在水下則有水水在澤下則無水本義曰水下漏則澤上枯困之象也君子觀其象而命可困志不可困以致命遂志傳云推致其命本義云致命猶言授命言持以與人而不之有也其義更確蓋時勢既不可為則命與志無兩全之理命全而志喪志全而命喪致以遂之即舍生取義殺身成仁也凡人平居矢志時鮮不願為忠臣義士者及禍患切身便貪生怖死把生平志願都灰墮了如范質王溥輩可勝歎哉若是社稷念重身家念輕君父念重妻子念輕臨時須辦得一死不至搖尾乞憐靦顔人世矣儒行云儒有劫之以衆阻之以兵見死不更其守又曰可殺也而不可辱也此致命遂志之謂也文天祥方孝孺其表表者與初六臀困于株木入于幽谷三嵗不覿初以隂柔處困之下其才既不足以自濟其困四為正應掩于上六自治不暇其力又不足以濟初六之困如木無枝葉失所庇蔭居其下則不安也故曰臀困于株木臀即臀無膚之臀在坎下幽谷之象故曰入于幽谷三嵗之久不見正應則是上下交困也象曰入于幽谷幽不明也不明故無所覿也猶云黑洞洞底如何出的去明則日進于崇髙不明則日入于卑暗理固然也九二困于酒食朱紱方來利用享祀征凶無咎本義云困于酒食厭飫苦惱之意謂醉飽過宜也郭氏云困于家無飲食宴樂之奉二説逈異然不如傳意為長需之九五需于酒食困之九二困于酒食皆以在坎中也需就養人説困二亦宜就養人説傳曰君子之所欲澤天下之民濟天下之困也二未得遂其欲施其惠故為困于酒食也先代亂離之世以世有醉人為瑞豈非困于酒食之一驗與二以剛中之德困于下正已而無求者也上有九五剛中之君同德相應必能造廬而請故曰朱紱方來朱紱王者之服蔽膝也服蔽膝而來便有造膝意方來者謂其來方自此始也利用享祀傳所謂以至誠通神明是也未能事人焉能事鬼欲以事人者事神也利用享祀欲以事神者事人也潔誠齋一莫過于享祀故九二利用之傳曰自昔賢哲困于幽逺而德卒升聞道卒為用者唯自守至誠而已征凶無咎傳云無所歸咎也本義云若征行則非其時而于義為無咎也反覆求之既云凶矣何以無咎既云行非其時則非義矣又何以于義無咎畢竟未安主傳為是征凶者君不來而自往無媒是以凶也將誰咎乎當困之時慮其以急于濟困之心而不遑自愛故戒之也謹按困之二五兩爻説者率多異同竊意孔明之髙卧南陽淡泊明志困于酒食也不求聞逹而昭烈三顧于草廬中朱紱方來也言聽計從有魚水之洽利用享祀也鞠躬盡瘁食少而事多征凶也然而命已致矣志已遂矣又何咎之有哉孔方昭烈之在江夏也前有孫權後有曹操劓刖也明如吳營而不返困于赤紱也徐自南屏而歸乃徐有説也卒得荊州以為基業利用祭祀也又按爻辭所有皆卦中自具之象故困之九二即需之九五所以皆取酒食為象但彼以剛健不陷而吉此以剛掩而困是其義自一也兊為口舌為頰為毁折五為上六所掩劓之象也中爻二至四為離為戈兵四為三所掩在五之下刖之象也坎為赤中爻五至三為巽為繩赤紱朱紱之象也坎為豕兊為羊離為牛牲牢畢具享祀祭祀之象也以此類推大易之取象無俟小求矣象曰困于酒食中有慶也象舉爻首句以該下故曰中有慶也五剛中而折節下賢二之慶也二剛中而推誠事主五之慶也上下交盡其道困于酒食者行當需于酒食矣是以有慶六三困于石據于蒺藜入于其宫不見其妻凶三隂柔不中正上承四不能降心以相從而力犯之困于石也石堅不可勝之物而與為難可乎下乘二不能屈體以相附而直據之據于蒺藜也蒺藜刺不可近之物而憑其上可乎進退兩窮反而求之無容身之地矣三坎體男也上兊體女也故上者三之妻然非正應又為二剛所隔何可見也故有入其宫不見其妻之象宫謂三也詩所謂宛其死矣他人入室者凶可知也本義云繫辭備矣傳釋之尤為明盡象曰據于蒺藜乘剛也入于其宫不見其妻不祥也二剛也三乘其上如藉刺然故曰困于蒺藜也不祥者犯上凌下不善之積有餘殃也九四來徐徐困于金車吝有終來徐徐謂四也蒙引以為初誤矣易自下而上曰往自上而下曰來故知其為四也四與初為正應思有以拯其困而未能初比于二疑其遂有之矣故遲回觀望而不敢直前二阻之也二坎為輿有車象剛而堅強有金車象故曰困于金車四困二而失初誠為可羞但初之應四正也比二非正也久則去其不正者以歸于正故有終也傳曰寒士之妻弱國之臣各安其正而已茍擇勢而從則惡之大者不容于世矣讀至此使我毛骨俱悚象曰來徐徐志在下也雖不當位有與也在下者初志在下志在于拯初也志在拯初而隔于二故徐徐其來也以剛居柔為不當位然正應在初有與也有與則有終矣九五劓刖困于赤紱乃徐有説利用祭祀傳云上下皆掩于隂以卦之全體言也本義云上為隂掩下則乘剛此專指五言蔽于一隂則傷於上截鼻之象下逼于一剛則傷于下刖足之象困于赤紱謂二也二以五為朱紱五以二為赤紱君臣異服也五與二同德而不相應不得與于冠裳之會故曰困于赤紱時方不利急之則重困緩之則亨困故曰乃徐有説本義云剛中而説體故能遲久而有説也約言之而其義盡矣傳曰五雖在困而有剛中之德下有九二剛中之賢道同德合徐必相應而來共濟天下之困是始困而徐有喜説也博言之而其義益暢矣利用祭祀與利用享祀同一至誠感格之意但有君臣之分享祀人臣所以祭宗廟也故屬二祭祀天子所以禮百神也故屬五傳曰祭天神祀地祗享人鬼其義備矣象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上下見傷未得遂其濟困之志也以中直之道得中直之賢庶幾喜起之風矣傳曰不曰中正與二合者云直乃宜也直比正義差緩祭則受福在鬼神固然而况于人乎又曰盡其誠意如祭祀然以求天下之賢則能亨天下之困而享受其福慶也明且備矣上六困于葛藟于臲卼曰動悔有悔征吉上以隂柔處困極之地纒綿而不解髙危而不安故有困于葛藟于臲卼之象困極則必變矣曰者自怨自艾之辭若曰每做事輒不強人意輒覺愧歉難堪却是好念頭凡人履錯蹈愆而宴然不知其非則難與言矣知其動輒得悔是有悔也有悔則必改過改過則必遷善以是而征其吉可知二在困之中是宜安困故曰征凶上在困之終是宜出困故曰征吉傳曰困與屯之上皆以無應居卦終屯則泣血漣如困則有悔征吉屯險極而困説體故也以説順進可以離乎困也象曰困于葛藟未當也動悔有悔吉行也葛藟之困是他解脫不來割斷不去故曰未當言自已處置未善不管他人事便見悔意動悔有悔悔其所行則不行其所悔故行而吉也行謂去而出于困也巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶卦體上坎下巽坎水也巽之象則木也巽之義則入也朱子只取巽入之義不取木義恐巽乎水而上水句難解依傳木器汲水之説為是或云與羸其瓶句不合按鄭康成云巽木桔槔也言桔槔引瓶下入泉口汲水而出也如此則巽木瓶瓦之説兩得之矣自古建邦設都或以民利遷或以易代遷邑可改也若井則無遷而之他之理井不可改也或曰坎自坤變坤為邑故曰改邑不改井亦通汲之而不竭無喪也存之而不盈無得也人人給其所求往來井井也本義云往者來者皆井其井醒甚張中溪曰下本乾體上本坤體剛往居五柔來居初往者得水而上來者求水于下往來井井也于象尤切傳曰無喪無得其德也常往來井井其用也周常也周也井之道也于理尤確繘綆也汲水索也巽為繩故為繘象水幾至上而未出井謂水謂坎中畫未至坎上畫則汲未出井口亦與未施繘于井者同耳羸敗其瓶象二三之水已實在汲井之瓶而下一畫偶猶瓶底傷損而水下漏則終不能貯水矣有喪無得徒往來而無以井其井濟物之功廢矣故凶胡氏曰澤無水為困命也澤雖無水而井則有水性也知困之義則知安命知井之義則知盡性易性命之書而言之明且切者莫困井二卦若也改邑不改井三句為井言汔至三句為汲者言改邑不改井井之體也性靜而定也無喪無得往來井井井之用也性動亦定也汔至未繘井而羸其瓶人之于性知之行之有未盡者其猶是乎此理不可不知謹按改邑不改井説者不一折中獨謂所在之邑井無異製即王道之行家不異政國不殊俗是也竊嘗取彖傳爻象反覆詳味追尋改字來歷蓋坎之中爻在九二則為困在九五則為井總一水耳一上一下而用與井不同所謂改邑不改井也以喻王道之行雖有時而通變宜民而三綱五常百代如一所損益可知也無喪無得則經國體野王道之可久也往來井井則養欲給求王道之可大也所謂井養而不窮也然井之澤雖可逺施而取之無具汲之無人亦不能成濟人利物之功故汔至以下又以汲井之事言之君子觀其象而以勞民勸相明于井之義也井泥不食舊井無禽如紀綱法度廢弛已久不可施行也然而尚可泄也井谷射鮒井中旁空為谷小魚往來如射也甕敝漏者昔子貢見老父抱甕而汲則甕亦汲器也敝漏則不可汲矣言王政之弛敝竇百出而又行之無其也然而尚可梵也九三泄其泥而可食矣而不食者亦未繘井故也是以求王明而受福也六四甃其谷而鮒去矣其無咎者可以往來井井故也九五之寒泉上六之勿幕則澤可逺施家給人足井養而不窮矣此則從欲以治風動時雍之意故元吉而大成也彖曰巽乎水而上水井井養而不窮也巽木入于坎水之下而汲水以上故曰巽乎水而上水莊子所謂鑿木為機後重前輕挈水若抽者是也濟人利物無有窮已井養而不窮也以卦象釋卦名義也而卦之德亦在其中矣改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也剛中程朱俱指二五或專指九五為是坤之邑變為坎之井則畫在卦體之中也天下之水至冬而溫者惟井泉以其獨得天一之真性也二句已該無喪無得往來井井之義故彖傳不復出汔至亦未繘井是不如行潦之酌可以濯溉濯饎也何功之有羸其瓶則不惟不得水併其瓶而喪之不亦凶乎傳曰五榖不熟不如荑稗掘井九仞而不及泉猶為棄井本義云又當敬勉不可幾成而敗其勉學者之意深矣然則始終成敗之際可勿慎與象曰木上有水井君子以勞民勸相木承水而上以養人于不窮井之義也君子觀其象而布德于民勞即愛之能無勞乎之勞如水以濟物為功使非往來井井水能自上而給人之養乎勞民之意正如此勸者教之誨之誘掖之以勉其進也相者輔之翼之左右之以振其德也皆所以勞民也若曰勞徠而勸之相助則相為虛字須添實字始得非也胡氏曰井以喻性勞民勸相養其生併養其性也初六井泥不食舊井無禽初以隂居井之下泥之象也泥則汚而不可食矣凡水之可食者禽鳥亦資其潤人既不井其井即禽鳥亦莫往莫來矣故曰舊井無禽象曰井泥不食下也舊井無禽時舍也下者處乎下而水不能上也時舍者為時所棄置而莫之用也學者才柔志卑溺于下流于世無涓滴之益者抑亦可以自愧矣九二井谷射鮒甕敝漏二陽剛之才爻辭甚不好何也井以下而能上為義上無正應而比于下失井之義矣井之完美者無谷枯井廢井則有谷有谷則水旁出而注于鮒無所用之矣鮒蝦蟇之屬或曰甕汲水器即瓶非也甕成水器與瓶異器雖小分井中之餘潤亦足以利用敝而滲漏有日就枯竭而已凶咎不待言矣象曰井谷射鮒無與也上無應故曰無與無與則無以巽乎水而上水矣故井谷射鮒也如人資質之美才分之髙儘足以上達但無誘掖之提攜之者遂與下流為伍馳騖于旁途敗壞流溢而不知自愛其器也可惜甚矣九三井泄不食為我心惻可用汲王明並受其福三剛正處下之上其井泄矣泄即泄初之泥使皎然清潔也而乃不食與舊井同負此嘉美能無惻然不安之心乎或曰知已興嗟輿論稱屈也汲而用之井養不窮其如上無明王何若遇王明則受福矣傳曰賢才見用則已得行其道君得享其功下得被其澤合三者而受福之義始備象曰井泄不食行惻也求王明受福也爻言心惻象言行惻傳未著解本義云行道之人皆以為惻甚好賢者不見用則秉彝好德之良有同心焉故曰行惻也爻言王明象加求字焦氏云爻脫求字言求者三以不求求之非也炫玉求售非九三本色矣然則何以云求曰非三求之惻者求之也惻于心則思求王明以慰其心求王明正所以求福也六四井甃無咎四以柔居柔其才不足有為無濟物之功者也然守正不回上承九五而效一臂之力分固應爾故曰井甃無咎甃者砌纍其井使谷不伏于旁鮒不生于下救敝補漏所繇與九二異矣象曰井甃無咎修井也象復以修釋甃言舊者修之以至于新缺者修之以至于全整飾戢治之謂也才力柔弱故不事蝢悟事漸進學之以積纍為功者乎九二以才勝而敗六四以學勝而成天分之遜美于人事也項平庵曰泥與甃皆隂也初六不正在下故不能自修而為泥六四正而在上故能自修而為甃甃所以禦泥而達泉也有間邪存誠之功故為修井之象王建安曰三在內卦泄井內以致其潔四在外卦甃井外以禦其汚蓋不泄則汚不潔不甃則潔者易汚此君子內外交相養之道也二説甚妙不可不知九五井冽寒泉食九五坎之中所謂改邑不改井者謂此也以陽居陽為坎居正北分為寒甘潔而清涼口之于味也有同嗜焉故曰井冽寒泉食不言吉者三泄之四甃之上收之五中正無為坐享成功而已傳曰井以上出為成功未至于上未及用也故至上而後言元吉象曰寒泉之食中正也九二中矣而非正九三正矣而非中全中正之德以食于人者其惟九五乎故曰其才其德盡善盡美也上六井收勿幕有孚元吉井與諸卦不同以最上為美先儒云收鹿盧收繘者也以木之才成水之用正與卦體合勿幕者恣其所取即往來井井之意同井其井故坎口開而勿用蔽覆也若視為一人一家之私則幕之矣此王道大公氣象與文王之囿一般有孚傳謂有常而不變也本義謂其出有源而不窮也傳更確博施而有常故有大喜之吉象曰元吉在上大成也井至是不泄而清不甃而完寒冽之美與天下共之澤被羣生矣故曰大成也李氏曰初與二在井之地故初泥而二谷三與四人位必盡人事故三泄而四甃五與上則得之天矣是以三才之位取義也其説甚好離下兊上革已日乃孚元亨利貞悔亡上兊為水水下降而滅火下離為火火上升而涸水相尅故相革也此本彖傳程朱之説詳矣或曰兊為金離為火火鼓鑄而金從革以火革金也于理亦通玩彖傳却無此意凡民可與樂成而難與慮始當始為改作之日鮮不疑且惑者及害除而利興然後自悔其見不及此而曉然相信也故曰已日乃孚事方始而未孚所固然也若遽為衆論所奪則終不能革矣事既已而乃孚所必然也若終為衆心所疑則非所當革矣故已日乃孚所以為革也革體內文明外和説以乾之四德屬之四德者大通而利在正固也正固則無紛更移易之悔故曰悔亡傳曰革而無甚益猶可悔也况反害乎古人所以重改作也此名言也彖曰革水火相息二女同居其志不相得曰革本義曰以卦象釋卦名義大略與暌相似然以相違而為暌相息而為爭也引喻最確相息須兼滅與生二義傳曰物止而後有生本義曰滅息而後生息也兊少女離中女二女同居也中少二女各有志故不相得而革也已日乃孚革而信之文明以説大亨以正革而當其悔乃亡已日已革之日也孚信也傳曰人心不信雖強之行不能成也先王政令人心始以為疑者有矣然其久也必信終不孚而成善治者未之有也離明也內有文明之德則大亨以正而其革也當乎天理兊説也外有和説之德則大亨以正而其革也當乎人情天理人情各得其至當何悔之有傳曰新舊之悔皆亡最盡天下事有恰好的道理曰當當者時措咸宜也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉即以天地聖人言之能外是乎四時之序成功者退退革也天地隂陽推遷變易而春夏秋冬合著其生長收藏之用互革而成四時也王者之興受命于天湯革夏正武革商正易代受命也豫畏上帝不敢不正湯之順天乎撫綏萬方湯之應人乎豫弗順天厥罪惟均武之順天乎綏厥士女武之應人乎天地聖人無不革者天地聖人之革無不時者時之未革天地聖人不能先時之既革天地聖人不能後革之時大矣哉革而當其可之謂時象曰澤中有火革君子以治厯明時澤中有火勢不兩立革之象也君子觀革之象以治厯法而明四時之序即堯命羲和欽若昊天歷象日月星辰敬授人時之意期三百有六旬有六日歷之數也在璇璣玉衡以齊七政歷之理也治歷明時之道讀月令大略可見蓋歷不乖其序則治求其故而定千嵗之日行所無事也有兌象時不失其中則明晦朔弦望分至啓閉燦若觀火也有離象傳曰夫變易之道事之至大理之至明迹之至著莫如四時觀四時而順變革則與天地合其序矣最簡盡初九鞏用黃牛之革傳言變革之道有三曰時曰位曰才九以時則初也初宜待以位則下也下宜守以才則明而剛也剛明宜晦故曰鞏用黃牛之革鞏拘束也本義云鞏固也離為牡牛離爻本坤黃牛象黃中色牛順物以中順自守而不妄動則其分也革為皮與卦名雖同而義異傳曰不云吉凶何也曰妄動則有凶咎以中順自固則不革而已安得便有吉凶乎象曰鞏用黃牛不可以有為也不可有為以時位才俱不可也在益之初曰利用大作在革之初曰不可有為學易者明乎此則知進退之道矣六二已日乃革之征吉無咎傳曰以六居二柔順而得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也然臣道不當為革之先又必待上下之信故已日乃革之也如二之才德所居之地所逄之時足以革天下之弊新天下之治當進而上輔于君則吉而無咎也不進則失可為之時而有咎也如此説其義始備卦言已日乃孚已革之日乃孚也爻言已日乃革已孚之日乃革也或曰有君臣之分亦是象曰已口革之行有嘉也行有嘉即所謂征吉也謂煥然與天下更始行有嘉美之功也又何咎徐氏曰凡卦中言嘉者皆二與五應如隨之孚于嘉遁之嘉遁是也此義不可不知九三征凶貞厲革言三就有孚以剛陽為下之上又居離之上而不得中躁動于革者也在下而躁于變革以是而行則有凶也然居下之上事苟當革豈可不為也在乎守貞正而懷危懼也貞厲二字平看諸家之説皆與征凶一例看言征則凶而貞則厲也唯革言三就則征不凶貞不厲而有孚矣其理俱通革言謂以改革之論相籌度也咨詢衆説參稽公論至再至三而僉同焉卦所謂乃孚者三有之矣有孚者至誠之道見信于中外上下也或曰三上正應上兌為口言象三至上歷三爻三就象亦通象曰革言三就又何之矣傳曰又何之猶俗語更何往也本義曰言已審俱極簡盡余謂又何之言革而當無庸轉圖再計也九四悔亡有孚改命吉傳于九四極贊之至數層蓋離兌交代正改命之時剛柔罔偏正改命之才而又近承九五當改命之任故美善與他卦九四不同悔亡彖所謂革而當其悔乃亡也有孚改命吉彖所謂湯武革命順乎天而應乎人也傳曰四非中正而至善何也曰惟其處柔也故剛而不過近而不逼順承中正之君乃中正之人也易之取義無常也隨時而已此義須知象曰改命之吉信志也傳曰改命而吉以上下信其志也誠既至則上下信矣革之道以上下之信為本不當不孚則不信當而不信猶不可信也况不當乎三代而後漢霍光廢昏立明庶幾改命之吉矣以其匡扶社稷之志有足信故也九五大人虎變未占有孚九五以陽剛之才中正之德居尊位大人也大人德威惟畏故象虎虎變傳所謂遇變化事理明著如虎之文采本義謂希革而毛毨也在大人則自新新民之極順天應人之時也皆有至理可參傳又曰變者事物之變曰虎何也曰大人變之乃大人之變也上下但易一字便成至妙之理按乾九五言龍堯舜其猶龍乎革九五言虎湯武其猶虎乎書曰朕夢協朕卜襲于休祥詩曰卜云其吉終焉允臧占而孚即數以推理也大人之革至當而人信之故不須此即理以奪數也易之言進乎詩書矣象曰大人虎變其文炳也道德功業煥為文章有光輝發越之盛故曰其文炳也天下之孚不待言矣上六君子豹變小人革面征凶居貞吉上處革之中革道成矣君子斐然成章故曰豹變小人屈已聽命故曰革面君子小人以德言非以位言也傳曰以堯舜為君以聖繼聖百有餘年天下被化可謂深且久矣而有苗有象其來格蒸乂蓋亦革面而已引喻最確又曰小人既革其外革道可以為成也茍更從而深治之則為已甚已甚非道也故至革之終而又征則凶也征凶單承小人革面句説又曰革至于極而不守以貞則所革隨復變矣天下之事始則患其難革已革則患乎不能守也故革之終戒以居貞則吉也自古招亡納叛不旋踵而背去者多矣皆繇不能居貞故也又曰人性本善有不可革者何也曰語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴自棄也人茍以善自治則無不可移者雖昏愚之至皆可漸磨而進也唯自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然天下自棄自暴者非必皆昏愚也往往強戾而才力有過人者商辛是也聖人以其自絶于善謂之下愚然考其歸則誠愚也既曰下愚其能革面何也曰心雖絶于善道其畏危而寡罪則與人同也唯其有與人同所以知其非性之罪也革面二字如此分疏其義始明象曰君子豹變其文蔚也小人革面順以從君也虎豹同文但虎之文疏而著故曰炳豹之文密而理故曰蔚大小不同也小人革面順而不復逆從而不敢違束于法也本義云上六之才不足以有行也一似革面未為上治傳曰小人勉而假善君子所容也更往而治之則凶矣似上治只是革而竊意革道既成豈宜復留餘地傳義皆未盡也君子豹變中庸所謂明著動變也是至誠而化的學問小人革面語所謂民可使由之不可使知之也奉公守法不必更論其所以然也如此看則征凶兼承君子小人説君子之文至豹變無以加若更有所往則過飾矣小人之道至順從無以加若更有所往則過刻矣惟自守其固然之正道則上而彬彬有大雅之士下而皞皞無梗化之民革道成矣故吉也巽下離上鼎元吉亨六十四卦惟大有與鼎直稱元亨而不别贅一辭蓋鼎者有天下之重器故其才可以致元亨也元亨者體無不備用無不周大善而亨通也吉字羡讀彖傳自明矣彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢先王制器尚象鼎器也故以象釋之分二體而言上離中虛下巽有足以承之鼎之象也合全體而言下植為足中實為腹受物在中之象對峙于上者耳也橫亘乎上者鉉也鼎之象也傳曰有象而後有器卦復用器而為義也巽木離火相資為用可以成亨飪之功利濟羣生也然豈徒口腹之奉哉聖人報本反始則有享帝之禮郊特牲不敢用褻味而貴多品故帝之享但曰亨養賢致民則有享賢之禮大饗尚腵修而已矣大饗君三重席而酢焉多儀備物故聖賢之養則曰大亨巽而耳目聰明柔進而上行得中而應乎剛是以元亨下體巽巽者內順于理也上體離離為目中虛為耳外而耳目聰明也此以其象言也傳云凡離在上者皆云柔進上行柔在下之物乃居尊位進而上行也本義云卦自巽來隂進居五則以其變言也五柔居上卦之中而下應九二得中而應乎剛也此以其德言也有才有德以居尊位而又下應剛中之賢是以元亨或曰大吉無不利爻屬上九而彖傳以五為元亨者五為卦主舉鼎者雖上九之鉉而非有六五之黃耳則鉉無所施故以元亨贊焉象曰木上有火鼎君子以正位凝命木上有火為爨則木上有水為汲即鼎象益知井象矣水火不濟則鼎之用不凝位不正則命之理不凝其義一也傳云端正其居處安重其命令朱子以為未然此言人君臨朝須莊重如那鼎相似安在這裏不動然後可以凝住那天之命所謂協于上下以承天休也説得極好但大象如施命誥四方之類則必稱后若如晦翁説當不稱君子矣竊意位即素其位順在位不出其位之位正者正其所居之位也君子所處必正其小至于席不正不坐毋跛毋倚傳義精矣命即維天之命永言配命顧諟明命之命凝即至道不凝之凝翕而聚之也謂正位以凝其所賦于天之理也如此説當與朱義併存謹按此節當以朱義為是初六鼎顛趾利出否得妾以其子無咎初居鼎下有趾象上應四則趾向上口向下有顛象方是時鼎未有實而舊有否惡之積焉宜有以易之趾顚則鼎覆鼎覆則否出否出則利矣六隂而卑妾象初剛六柔得妾象傳以子為主謂良妾能輔助其主也本義直作子謂得妾而因得其子亦繇是也爻本因一象又得一象故繇是二字極精至于因敗以為功因賤以致貴二語尤確宜理會胡氏曰爻不正故稱妾下巽伏震長子之象也主器有人無咎之道也此又暢朱子之説矣象曰鼎顚趾未悖也利出否以從貴也趾顚鼎覆悖道也象曰未悖已引起利出否義矣利出否去故而納新瀉惡而受美象曰從貴又結出應四義矣四近君居大臣之位故貴也然春秋母以子貴之義固在其中聖人解經之妙如此九二鼎有實我仇有疾不我能即吉二以剛居中鼎有實之象然上應六五而密比初隂隂從陽者必利其實而即之我九二自我也仇謂初傳云仇對也隂陽相對之物本義直作怨仇謂隂陽相求而非正則相陷于惡而為仇徐氏曰怨耦曰仇不善之匹也其義益明矣顚迹也顚趾則難前欲即我而不能然亦二之剛中自守有以遏其密比之勢也吉可知矣象曰鼎有實慎所之也我仇有疾終無尤也傳曰鼎有實乃人之有才業也若不自貴重將玷其實而喪所有矣慎所之愛吾鼎也謂不昵于初而上從六五之正應也我仇有疾兼下句説初有疾而我即則有尤不我能即何過尤之有九三鼎耳革其行塞雉膏不食方雨虧悔終吉六五鼎耳也為鼎之主三越五應上是革去其耳無所恃以為舉移之具矣凡物皆行以足獨鼎之舉措在耳故行以耳耳既革其能行乎故曰塞傳曰膏甘美之物象祿位雉指五也有文明之德故謂之雉三有才用而不得六五之祿位是不得雉膏食之也本義云承上卦文明之腴有雉膏之美而不得以為人之食本義猶醒三懷才抱德而不見售猶雉膏在鼎而不見食也與井泄不食意同雖然三與五非應而同功剛柔有相濟之理方且隂陽和暢而為雨也雨則行之塞者可通雉膏之不食者見食矣方雨句虧悔終吉句言始有不足之悔而終有相遇之吉也傳曰三雖不中以巽體故無過剛之失若過剛則豈能終吉象曰鼎耳革失其義也語曰君臣之義如之何其廢之孟子曰義之于君臣也鼎耳革君臣之義廢矣故曰失其義也蒙引不主不仕無義説曰越五應上自失其義無所取裁也固自有理九四鼎折足覆公餗其形渥凶傳曰四大臣之位任天下之事者也天下之事豈一人所能獨任必當求天下之賢智與之叶力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患四下應于初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也又按初顚趾而四應之故為鼎折足之象足折則所謂享上帝養聖賢之實覆矣故曰覆公餗餗糝也八珍之膳鼎之實也三為公位公餗公所食之餗也形渥傳作赧汗言可羞愧之甚也固是本義從朝氏之説作形渥鄭注以為夷三族謬矣豈周公時已制始皇之刑耶蒙引辨之極是舊以為沾濡貌朱子語録亦引澆濕渾身之説則渥即詩既優既渥之渥謂鼎實覆溢也當以此説為的外誤其國內汚其身凶可知也象曰覆公餗信如何也任用匪人敗乃公事上無以信君下無以信民而內亦無以自信盟心之謂何故曰信如何也六五鼎黃耳金鉉利貞五居上體之中受鉉以舉鼎者也故為耳坤正色本黃離得坤中畫故為黃耳金鉉程朱俱指九二以玉鉉屬上故以金鉉屬二但二在耳之下恐未能勝厥任也指上九為是訂詁云鼎豈有二鉉哉玉不可以為鉉以金鉉而飾以玉也得之矣在五以已之柔視上之剛則為金鉉在上九自視畫剛位柔則為玉鉉各有取爾也五質隂柔恐不勝堅剛之鉉故又有正固之戒象曰鼎黃耳中以為實也中以為實者五以九二之實為實也二五正應二有實而五舉之正彖所謂得中而應乎剛也上九鼎玉鉉大吉無不利一陽橫亘於鼎耳之上為鉉象陽而居隂有溫潤以栗之德為玉鉉象處鼎之終巽木離火畢達其用鼎于是乎告成功矣是以大吉無不利象曰玉鉉在上剛柔節也鼎之亨飪以剛柔適中為度玉鉉在上佐黃耳之鼎左提右挈而無不宜故曰剛柔節也書所謂以鹽梅作和羮燮理隂陽者殆其人與易酌卷八
